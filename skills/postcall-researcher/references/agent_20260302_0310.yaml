flow:
# Exception settings
  list_states_exception: [
    "exc_inconvenient_time",
    "exc_complaint",
    "exc_dispute",
    "exc_dispute_balance",
    "exc_dispute_paid",
    "exc_dispute_theft",
    "exc_dispute_txn_fraud",
    "exc_bankruptcy",
    "exc_cease_comms",
    "exc_attorney",
    "exc_cb",
    "post_exc",
    "exc_human_agent_request",
    "exc_revoke_recording",
    "exc_revoke_ai_recording",
    "exc_deceased",
    "exc_prison",
    "exc_military_service",
    "exc_language",
  ]
  
  # Randomize some settings as the SM starts
  abtest:
    randomize:
      exp_nego:
        base: 0
        variation_5: 1
      exp_voicemail:
        base: 0
        variation_1: 0.5
        variation_2: 0.5

  # Initial state to start the SM (depending on the direction of the call)
  init_state:
    "'{{raw_call_assignment.direction}}' == 'inbound'": "inbound_opening"
    "'{{raw_call_assignment.direction}}' == 'outbound'": "pre_opening"
    else: "pre_opening"

  # Initial fixed message by the SM 
  init_assistant: >-
    {% if raw_call_assignment.direction == 'inbound' %}
      Hi, Thank you for calling {{raw_call_assignment.company_name}}. This is {{raw_call_assignment.agent_name}} on a recorded line. How can I assist you today?
    {% else %}
    {% endif %}

  # Definition of all states
  states:
    end_call:
      type: 2llmcalls
      2llmcalls:
        type_llm_reflection: *reflection_model_name
        type_llm_response: *response_model_name
        len_msg_reflection: 2
        len_msg_response:
        type_output_reflection: custom1
        reflection_template: template_default
        variable_change_exception: { "receive": "no" }

        pre_reflection_variable:
        reflection_variable:
          info_updated:
            description:
              not_updated: This is the default state, applied when neither the `updated` nor `refused` conditions are met. This includes scenarios where the agent confirmed fewer than two of the three required contact details (phone, email, mailing address) for record-keeping purposes, or when details were provided solely for identity verification without an explicit update.
              refused: This state applies only if the agent explicitly inquired about all three required contact details (phone, email, mailing address) for record-keeping purposes and the user clearly refused to provide or confirm at least one of them. If the agent did not inquire about all three, use `not_updated`.
              updated: "This state applies if the agent successfully obtained confirmation or new information for at least two of the three required contact details: phone, email, and mailing address. Phone is confirmed by successful connection with the intended user. Email requires explicit verbal provision or confirmation for updating the email on file. Mailing address requires explicit verbal provision or confirmation for updating the mailing address on file; however, if requested primarily for identity verification (e.g., early in the call before account-specific discussions), it only counts as an update if the agent explicitly states it is for updating the customer's records."
            overview: Categorizes the outcome of attempts to update or confirm the user's phone, email, and mailing address details for record-keeping purposes, specifically indicating if at least two of these were successfully confirmed or updated during the conversation.
            example: "not_updated"
          receive:
            description: return "yes" when the consumer EXPLICITLY says that they have received a letter or email from {{raw_call_assignment.company_name}} and wish to continue discuss their account. Else, return "no"
            example: "no"
        processing_variable:

        transition_conditions:
          "'{{dict_variable.no_notice}}' == 'yes' and '{{dict_variable.receive}}' == 'yes'":
            next_state: negotiation_from_script
            filler:
            repeat_filler:

          "'{{dict_variable.no_notice}}' == 'no' and '{{dict_variable.info_updated}}' == 'not_updated'":
            next_state: update_info
            filler:
            repeat_filler:

          else:
            next_state: end_call
            filler:
            repeat_filler:

        repeat_continuously:
          max_repeat: 10
          state_exceed_max_repeat: end_call
          filler_exceed_max_repeat: <ENDCALL>
          repeat_filler: 1
        max_turn_back:

    pre_opening:
      type: 2llmcalls
      2llmcalls:
        type_llm_reflection: *local_reflection_model_name
        type_llm_response: *response_model_name
        len_msg_reflection: 10
        len_msg_response:
        type_output_reflection: custom1
        reflection_template: template_default
        variable_change_exception: { "exc": "null" }
        
        pre_reflection_variable:
          # Get the vendor ID as an integer
          vendor_id:
            tool: lib_tools.tools_kompato.pick_value_from_conditions
            params:
              conditions:
                - condition: "rca_vendor_id not in ['', 'None', None]"
                  value: rca_vendor_id
                - condition: else
                  value: 0
              local_vars:
                rca_vendor_id:
                  value: self.raw_call_assignment.vendor_id
                  type: str
              return_type: int

          # Get the creditor/client name
          creditor_name:
            tool: lib_tools.tools_kompato.pick_value_from_conditions
            params:
              conditions:
                - condition: "current_creditor_name not in ['', None, 'None']"
                  value: current_creditor_name
                - condition: "client_name not in ['', None, 'None']"
                  value: client_name
                - condition: "original_creditor_name not in ['', None, 'None']"
                  value: original_creditor_name
                - condition: else
                  value: ''
              local_vars:
                current_creditor_name:
                  value: self.raw_call_assignment.current_creditor_name
                  type: str
                client_name:
                  value: self.raw_call_assignment.client_name
                  type: str
                original_creditor_name:
                  value: self.raw_call_assignment.original_creditor_name
                  type: str
              return_type: str
        
        reflection_variable:
          response:
            overview: Capture _user's response after the call begins.
            description:
              voice_mail: if _user appears to be a voicemail automated answering machine. Common phrases may include "This is a message for...", "Please leave a message after the tone.", "I'm not available right now.", "At the beep...", "You've reached the voicemail of...", "Please call me back at...", "I'll get back to you soon.", "Sorry I missed your call.", "[Name] is currently not available", "Can't take your call now", "This is [Name]..." (often followed by "leaving a message"), "Press [number] for [department/option]", "Enter the extension", "May be recorded and used by a third party" , "Hi, if you record your name and reason for calling, I'll see if this person is available" or other similar phrases.
              hello: if _user says "hello?", "hello", "hi", similar without stating any name. _user's response does not appear to be a voice mail machine, and _user shows the intent to want to continue the current conversation such as "Yes, who is this?", "Can I help you?", "Okay" or "What do you need?".
              business: _user is from a business. Common phrases may include "This is [Name] from [Business/Location]", "Thank you for calling [Business/Location], how may I help you?", "This is [Name] at [Business/Location]" or other similar phrases. Select `voice_mail` instead of `business` if the _user appears to be a voicemail automated answering machine.
              matched: if _user stated their name and the name is {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}
              unmatched: if _user stated their name and the name does not match with {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}
              unknown: if it is not clear what _user says
            example: hello
        
        typical_cases:
          hello:
            function: lib_tools.tool_pattern_matching.typical_case_matching
            params:
              conversation: self.messages
              logger: self.logger
              assistant_ref:
              user_refs: ['Hello?', 'Hello.', 'Hi.', 'Hey.', 'Yes.', 'Yeah.', 'Who is this?', "Who's this?", 'Yes. Hello?', 'Hello? Hello?', 'Are you there?', 'What?', 'What do you want?', 'Mhmm.', 'Uh-huh.', "I'm here.", "I can't hear you."]
              user_model: exact
            output:
              response: hello
          voice_mail:
            function: lib_tools.tool_pattern_matching.typical_case_matching
            params:
              conversation: self.messages
              logger: self.logger
              assistant_ref:
              user_refs: self.data_loaded.references.typical_case_refs.voice_mail_v1
              user_model: qwen3-0.6b-embeddings-base
              user_threshold: 0.82
            output:
              response: voice_mail

        processing_variable:

        transition_conditions:
          # If there is no information about the customer's name in the RCA 
          # (likely to prevent unpredicted errors, since outbound calls are supposed to have complete information about the call receiver)
          "{{not raw_call_assignment.first_name}}":
            next_state: pre_opening
            filler: Hello.
            repeat_filler:

          # If we reach a voicemail or business number, end the call 
          # (leaving a voicemail is optional, depending on the ABTest randomization)
          "'{{dict_variable.response}}' == 'voice_mail' or '{{dict_variable.response}}' == 'business'":
            next_state: pre_opening
            filler:
              if exp_voicemail == "variation_1": <ENDCALL>
              elif exp_voicemail == "variation_2": Hi, this is {{raw_call_assignment.agent_name}}, a virtual agent calling from Kompato AI. Please contact me or any of our live agents at 1--8-8-8--5-6-6--7-2-8-0 . Live agents are available from 9am to 6pm Eastern Monday to Friday, and virtual agents are available 24 hours a day for your convenience. <ENDCALL>
              else: <ENDCALL>
            repeat_filler:

          # If the customer replies "Hello" or the like => Check RPC
          "'{{dict_variable.response}}' == 'hello'":
            next_state: check_rpc
            filler: >- 
              [happy] Hey, this is {{raw_call_assignment.agent_name}}, a virtual agent on a recorded line. Is this {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}?
            repeat_filler:

          # If the customer replies "[Name] speaking" or the like which matches the RCA's information => Check RPC
          "'{{dict_variable.response}}' == 'matched'":
            next_state: check_rpc
            filler: Hello.
            repeat_filler:

          # If the customer replies "[Name] speaking" or the like which DOES NOT match the RCA's information => Check RPC
          "'{{dict_variable.response}}' == 'unmatched'":
            next_state: check_rpc
            filler: Hello.
            repeat_filler:

          # If the customer's response is vague => Check RPC
          "'{{dict_variable.response}}' == 'unknown'":
            next_state: check_rpc
            filler: Hello.
            repeat_filler:

          # All other cases => Repeat this state
          else:
            next_state: check_rpc
            filler:
            repeat_filler:

        repeat_continuously:
          max_repeat: 5
          state_exceed_max_repeat: end_call
          filler_exceed_max_repeat: I apologize for the inconvenience. It seems there's an issue on our end, and we'll need to end this call. Thank you for your understanding. <ENDCALL>
          repeat_filler:
        max_turn_back:

    check_rpc:
      type: 2llmcalls
      2llmcalls:
        dynamic_filler:
          model_name: gpt-4o
          nturns: 6
          fillers:
          prompt_template: prompt_filler_v2
          quick_fillers:
        type_llm_reflection: *local_reflection_model_name
        type_llm_response: *response_model_name
        len_msg_reflection: 10
        len_msg_response: 4
        type_output_reflection: custom1
        reflection_template: template_default
        variable_change_exception: { "exc": "null" }
        
        pre_reflection_variable:
          # Get call date
          init_call_date:
            tool: lib_tools.tools_kompato.init_outbound_call_date
          
          # Initilize and pre-process the customer's info 
          init_consumer_info:
            tool: lib_tools.tools_kompato.init_outbound_consumer_info
          
          # Get the month and year of birth from the RCA
          myob_on_file:
            tool: lib_tools.tools_kompato.get_myob_on_file

        reflection_variable:
          - variables:
              voice_mail:
                overview: Determine if the call receiver is a voicemail system.
                description: 
                  "yes": _user appears to be a voicemail automated answering machine. Common phrases may include "This is a message for...", "Please leave a message after the tone.", "At the beep...", "You've reached the voicemail of...", "[Name] is currently not available", "Leave me a message", "Press [number] for [department/option]", "Enter the extension", "May be recorded and used by a third party", "Hi, if you record your name and reason for calling, I'll see if this person is available" or other similar phrases
                  "business": _user is from a business. Common phrases may include "This is [Name] from [Business/Location]", "Thank you for calling [Business/Location], how may I help you?", "This is [Name] at [Business/Location]" or other similar phrases. Select this category if _user explicitly says that this is a business number.
                  "no": if _user is neither a voicemail nor a business, or if what the _user says is unclear
                example: "no"

              rpc:
                overview: Capture whether the call receiver is the customer (Right Person Contact).
                description:
                  cus: _user confirmed that they were the customer (e.g. "speaking", "okay", "yes", etc) in response to _assistant speaking out their name (e.g., "Am I speaking with {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}?", "Is this {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}?")
                  attorney: _user wanted to assign to their attorney or lawyer, or that they are the attorney or lawyer of the customer
                  wrong_number: _user indicates you have the wrong number entirely - typically when they say "No" to being the customer AND "No" to having a good contact number, OR when they explicitly say "wrong number", "I'm not her. Stop calling", "I don't know him", "I don't know her number" or similar phrases
                  not: _user confirms they are not the specific customer being sought - typically when they say "No" to being the customer; _user may or may not know the customer or the customer's contact number
                  unknown: if you are not sure, or the user answers not clearly, gives unrelated responses, or uses non-English without clear intent
                example: "not"
                
              confirm_callback:
                overview: Determine whether _assistant has successfully scheduled a callback time with _user ONLY IF _user confirms they are not the intended customer.
                description:
                  done: if _user is NOT {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}} AND _assistant has clarified the callback time with _user (e.g., "what is the best time for us to call back?")
                  not: if one of the following cases holds true (1) the _user is {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}, (2) the _user is NOT {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}} AND the _assistant has NOT clarified the callback time 
                example: "done"

          - variables:
              exc:
                overview: Capture special requests and/or objections from _user.
                description:
                  inconvenient_time: Select this if the consumer is alive but they are busy and temporarily unavailable to speak (e.g., 'call me back later', 'cannot talk now'). This includes temporary unavailability due to an event (e.g., working, driving, eating, sleeping) or location (e.g., "out of town", "at a funeral", "in the hospital", "at work",  at a doctor's appointment, attending a ceremony (e.g., funeral, wedding, church)).
                  cease_comms: if caller explicitly requests to take them off your calling list or if caller proactively asks to stop receiving communications from us including email, texting, sms or call
                  non_english: if _user says they does not speak English, or requests to speak in a different language, or has spoken in a non-English language
                  prison: if _user is not {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}} AND explicitly says that {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}} is in prison
                  deceased: Select this ONLY if the user explicitly confirms the consumer, {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}, no longer exists (e.g., died, passed away, no longer with us). Only select this category if the CONSUMER is the SUBJECT of the death. Differentiation Logic, If the user describes an activity the consumer is doing (e.g., "visiting a grave", "going to a funeral"), the consumer is clearly alive. 
                  military_service: if _user is not {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}} AND explicitly says that {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}} is actively serving in the military
                  human_agent_request: if _user explicitly requests to speak to a live agent/representative. Do NOT select this category if _user simply complains about the AI virtual agent without the explicit request
                  revoke_record_consent: if _user explicitly says that they do not want to be RECORDED, or questions the purpose of recording. Do NOT select this category if _user simply saying "no" without any other context
                  revoke_record_ai_consent: if _user explicitly says that they do not want to be RECORDED by an AI virtual agent, or questions the purpose of recording by an AI virtual agent. Do NOT select this category if _user simply complains about the AI virtual agent. Do NOT select this category if _user simply saying "no" without any other context
                  "null": default value, if _user did not mention any above
                example: "null"
            reflection_template: template_exc_default
        
        typical_cases:
          cus:
            function: lib_tools.tool_pattern_matching.typical_case_matching
            params:
              conversation: self.messages
              logger: self.logger
              assistant_refs: 
                - Am I speaking with.*?\?
                - Is this ([A-Z][a-z]+) ([A-Z][a-z]+)
              assistant_model: regex
              user_refs: ['Yes.', 'Yeah.', 'This is she.', 'This is him.', 'Speaking.', 'You are.', 'Yes. Hello?', 'Mhmm.', 'Uh-huh.', "Yes, ma'am.", 'Yes, sir.', 'Yep.']
              user_model: exact
            output:
              exc: "null"
              rpc: cus
              confirm_callback: not
          not:
            function: lib_tools.tool_pattern_matching.typical_case_matching
            params:
              conversation: self.messages
              logger: self.logger
              assistant_refs: 
                - Am I speaking with.*?\?
                - Is this ([A-Z][a-z]+) ([A-Z][a-z]+)
              assistant_model: regex
              user_refs: ['No.', 'Nope.', "You're not.", "You are not.", "No, ma'am."]
              user_model: exact
            output:
              exc: "null"
              rpc: not
              confirm_callback: not
          wrong_number1:
            function: lib_tools.tool_pattern_matching.typical_case_matching
            params:
              conversation: self.messages
              logger: self.logger
              assistant_refs: 
                - Am I speaking with.*?\?
                - Is this ([A-Z][a-z]+) ([A-Z][a-z]+)
              assistant_model: regex
              user_refs: ['Wrong number.', 'wrong number.', "I don't know him.", "I don't know her."]
              user_model: exact
            output:
              exc: "null"
              rpc: wrong_number
              confirm_callback: not
          unknown1:
            function: lib_tools.tool_pattern_matching.typical_case_matching
            params:
              conversation: self.messages
              logger: self.logger
              assistant_refs: 
                - Am I speaking with.*?\?
                - Is this ([A-Z][a-z]+) ([A-Z][a-z]+)
              assistant_model: regex
              user_refs: ['Hello.', 'Hello?', 'Hi.', 'Hey.']
              user_model: exact
            output:
              exc: "null"
              rpc: unknown
              confirm_callback: not
          wrong_number2:
            function: lib_tools.tool_pattern_matching.typical_case_matching
            params:
              conversation: self.messages
              logger: self.logger
              assistant_refs: 
                - Is there a good number to contact
              assistant_model: substring
              user_refs: ['No.', 'Nope.', 'Wrong number.', 'wrong number.', "I don't know him.", "I don't know her.", 'I have no idea.', 'I am not sure.']
              user_model: exact
            output:
              exc: "null"
              rpc: wrong_number
              confirm_callback: not
          unknown2:
            function: lib_tools.tool_pattern_matching.typical_case_matching
            params:
              conversation: self.messages
              logger: self.logger
              assistant_refs: 
                - Hello.
              assistant_model: substring
              user_refs: ['Hello.', 'Hello?', 'Hi.', 'Hey.', 'Yes.', 'Yeah.', 'No.', 'Nope.', "Who is this?", "Who is that?", 'Okay.']
              user_model: exact
            output:
              exc: "null"
              rpc: unknown
              confirm_callback: not
        
        processing_variable:

        transition_conditions:
          # If we reach a voicemail or business number, end the call 
          # This condition is already defined in pre_opening. We repeat it again here to avoid missing out voicemails in case SM didn't detect voicemails earlier at pre_opening.
          "'{{dict_variable.voice_mail}}' == 'yes' or '{{dict_variable.voice_mail}}' == 'business'":
            next_state: pre_opening
            filler:
              if exp_voicemail == "variation_1": <ENDCALL>
              elif exp_voicemail == "variation_2": Hi, this is {{raw_call_assignment.agent_name}}, a virtual agent calling from Kompato AI. Please contact me or any of our live agents at 1--8-8-8--5-6-6--7-2-8-0 . Live agents are available from 9am to 6pm Eastern Monday to Friday, and virtual agents are available 24 hours a day for your convenience. <ENDCALL>
              else: pre_opening
            repeat_filler:

          # [EXCEPTION] The customer has passed away
          "'{{dict_variable.exc}}' == 'deceased'":
            next_state: exc_deceased
            filler:
            repeat_filler:

          # [EXCEPTION] The customer doesn't speak English
          "'{{dict_variable.exc}}' == 'non_english'":
            next_state: exc_language
            filler:
            repeat_filler:

          # [EXCEPTION] The customer requests to cease communications
          "'{{dict_variable.exc}}' == 'cease_comms'":
            next_state: exc_cease_comms
            filler:
            repeat_filler:

          # [EXCEPTION] The customer is in prison
          "'{{dict_variable.exc}}' == 'prison'":
            next_state: exc_prison
            filler:
            repeat_filler:

          # [EXCEPTION] The customer is enrolled in military services
          "'{{dict_variable.exc}}' == 'military_service'":
            next_state: exc_military_service
            filler:
            repeat_filler:

          # [EXCEPTION] The customer requests to speak with a live agent
          "'{{dict_variable.exc}}' == 'human_agent_request'":
            next_state: exc_human_agent_request
            filler:
            repeat_filler:

          # [EXCEPTION] The customer requests to revoke AI recording consent
          "'{{dict_variable.exc}}' == 'revoke_record_ai_consent'":
            next_state: exc_revoke_ai_recording
            filler:
            repeat_filler:

          # [EXCEPTION] The customer is not available at the moment
          "'{{dict_variable.exc}}' == 'inconvenient_time'":
            next_state: exc_inconvenient_time
            filler:
            repeat_filler:

          # [EXCEPTION] The customer revokes record consent
          "'{{dict_variable.exc}}' == 'revoke_record_consent'":
            next_state: exc_revoke_recording
            filler:
            repeat_filler:

          # The customer says that they are being represented by an attorney, OR the call receiver is the attorney of the customer
          "'{{dict_variable.rpc}}' == 'attorney'":
            next_state: exc_attorney
            filler:
            repeat_filler:

          # The call receiver confirms to be the customer and we have the DOB information in the RCA and no exception is detected => Verify DOB
          "'{{dict_variable.rpc}}' == 'cus' and '{{dict_variable.exc}}' == 'null' and '{{raw_call_assignment.date_of_birth}}' != ''":
            next_state: verify_dob
            filler: >-
              [happy] I'm calling from {{raw_call_assignment.company_name}} on behalf of {{dict_variable.creditor_name}}. {% if dict_variable.get('meaningful', '') == 'yes' and dict_variable.get('adapt_opening', 'none') != 'none' %}{{dict_variable.adapt_opening}}{% endif %} [confident] {% if dict_variable.vendor_id in [6, 8] %}For verification purposes,{% else %}To protect your privacy and proceed with the call,{% endif %} I have {{dict_variable.ssml_date_of_birth}} as your birthdate on file. Is that correct?
            repeat_filler:

          # The call receiver confirms to be the customer but the DOB is not available in the RCA, yet the last 4 digits of SSN is available in the RCA, and there's no exception detected => Verify SSN
          "'{{dict_variable.rpc}}' == 'cus' and '{{dict_variable.exc}}' == 'null' and '{{raw_call_assignment.last_4_ssn}}' != '' and '{{raw_call_assignment.date_of_birth}}' == ''":
            next_state: verify_ssn
            filler: >-
              [happy] I'm calling from {{raw_call_assignment.company_name}} on behalf of {{dict_variable.creditor_name}}. {% if dict_variable.get('meaningful', '') == 'yes' and dict_variable.get('adapt_opening', 'none') != 'none' %}{{dict_variable.adapt_opening}}{% endif %} [confident] {% if dict_variable.vendor_id in [6, 8] %}For verification purposes,{% else %}To protect your privacy and proceed with the call,{% endif %} could you please confirm the last four digits of your Social Security Number?
            repeat_filler:

          # The call receiver confirms to be the customer but the DOB and the last 4 SSN are NOT available in the RCA, yet the zipcode is available in the RCA, and there's no exception detected => Verify by zipcode
          "'{{dict_variable.rpc}}' == 'cus' and '{{dict_variable.exc}}' == 'null' and '{{raw_call_assignment.zip}}' != '' and '{{raw_call_assignment.last_4_ssn}}' == '' and '{{raw_call_assignment.date_of_birth}}' == ''":
            next_state: verify_zip_code
            filler: >-
              [happy] I'm calling from {{raw_call_assignment.company_name}} on behalf of {{dict_variable.creditor_name}}. {% if dict_variable.get('meaningful', '') == 'yes' and dict_variable.get('adapt_opening', 'none') != 'none' %}{{dict_variable.adapt_opening}}{% endif %} [confident] {% if dict_variable.vendor_id in [6, 8] %}For verification purposes,{% else %}To protect your privacy and proceed with the call,{% endif %} could you please confirm your zipcode?
            repeat_filler:

          # The call receiver does not confirm to be the customer, and a callback time has been confirmed with them => Callback handling
          "'{{dict_variable.rpc}}' == 'not' and '{{dict_variable.confirm_callback}}' == 'done'":
            next_state: exc_cb
            filler:
            repeat_filler:

          # All other cases => Repeat this state
          else:
            next_state: check_rpc
            filler:
            repeat_filler:

        repeat_continuously:
          max_repeat: 10
          state_exceed_max_repeat: exc_cb
          filler_exceed_max_repeat: >-
            {% if dict_variable.get('is_working_hours', 'no') == "yes" %}
            We are looking for a live agent to assist you. Just in case there is no live agent available, when will be a good time to call you back?
            {% else %}
            We can arrange a callback for you. What time would work best for you?
            {% endif %}
          repeat_filler: 1
        max_turn_back:

    verify_dob:
      type: 2llmcalls
      2llmcalls:
        dynamic_filler:
          model_name: gpt-4o
          nturns: 6
          fillers:
          prompt_template: prompt_filler_v2
          quick_fillers:
        type_llm_reflection: *local_reflection_model_name
        type_llm_response: *response_model_name
        len_msg_reflection: 10
        len_msg_response: 4
        type_output_reflection: custom1
        reflection_template: template_verify_dob
        variable_change_exception: { "exc": "null" }

        pre_reflection_variable:
          _dob:
            tool: lib_tools.tools_kompato.extract_dob
            params:
              date_of_birth: self.raw_call_assignment.date_of_birth
          _mob:
            tool: lib_tools.tools_kompato.extract_mob
            params:
              date_of_birth: self.raw_call_assignment.date_of_birth

        reflection_variable:
          - variables:
              dob:
                description: |
                  + If the user confirms that the day of birth the agent states is correct OR explicitly says a corrected day of birth, return it as a two-digit number in the format `dd`. Note that the day may be provided in spoken language format (e.g., "twenty-seventh")
                  + If the user refuses to provide or confirm their day of birth (e.g., "Why do I need to tell you that information?"), assign `refuse`.
                  + If it's unclear, return `unknown`
                example: "27"
              mob:
                description: |
                
                  + If the user confirms that the month of birth the agent states is correct OR explicitly says a corrected month of birth, return it as a two-digit number in the format `mm`. Note that the month may be provided in spoken language format (e.g., "April")
                  + If the user refuses to provide or confirm their month of birth (e.g., "Why do I need to tell you that information?"), assign `refuse` 
                  + If it's unclear, return `unknown`
                example: "04"
              dob_confirmed:
                description:
                  "confirmed": _user confirmed their date of birth was recorded correctly
                  "unknown": _user hasn't confirmed BOTH their date of birth was recorded correctly or stated that the recored date of birth was not correct
                example: unknown

          # relection to detect exceptions
          - variables:
              exc:
                description:
                  inconvenient_time: Select this if the consumer is alive but they are busy and temporarily unavailable to speak (e.g., 'call me back later', 'cannot talk now'). This includes temporary unavailability due to an event (e.g., working, driving, eating, sleeping) or location (e.g., "out of town", "at a funeral", "in the hospital", "at work",  at a doctor's appointment, attending a ceremony (e.g., funeral, wedding, church)).
                  cease_comms: if caller explicitly requests to take them off your calling list or if caller proactively asks to stop receiving communications from us including email, texting, sms or call
                  non_english: if _user says they does not speak English, or requests to speak in a different language, or has spoken in a non-English language
                  prison: if _user is not {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}} AND explicitly says that {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}} is in prison
                  deceased: Select this ONLY if the user explicitly confirms the consumer, {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}, no longer exists (e.g., died, passed away, no longer with us). Only select this category if the CONSUMER is the SUBJECT of the death. Differentiation Logic, If the user describes an activity the consumer is doing (e.g., "visiting a grave", "going to a funeral"), the consumer is clearly alive. 
                  military_service: if _user is not {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}} AND explicitly says that {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}} is actively serving in the military
                  human_agent_request: if _user explicitly requests to speak to a live agent/representative. Do NOT select this category if _user simply complains about the AI virtual agent without the explicit request
                  revoke_record_consent: if _user explicitly says that they do not want to be RECORDED, or questions the purpose of recording. Do NOT select this category if _user simply saying "no" without any other context
                  revoke_record_ai_consent: if _user explicitly says that they do not want to be RECORDED by an AI virtual agent, or questions the purpose of recording by an AI virtual agent. Do NOT select this category if _user simply complains about the AI virtual agent. Do NOT select this category if _user simply saying "no" without any other context
                  "null": default value, if _user did not mention any above
                example: "null"
            reflection_template: template_exc_default
        
        typical_cases:
          confirmed:
            function: lib_tools.tool_pattern_matching.typical_case_matching
            params:
              conversation: self.messages
              logger: self.logger
              assistant_refs: 
                - as your birthdate.*correct
              assistant_model: regex
              user_refs: ['Yes.', 'Yeah.', 'Correct.', 'Mhmm.', "Yes, ma'am.", 'Yes, sir.', 'Yes. Yes.', 'Uh-huh.', 'Yep.']
              user_model: exact
            output:
              exc: "null"
              dob: self.dict_variable._dob
              mob: self.dict_variable._mob
              dob_confirmed: "confirmed"
          unknown:
            function: lib_tools.tool_pattern_matching.typical_case_matching
            params:
              conversation: self.messages
              logger: self.logger
              assistant_refs: 
                - as your birthdate.*correct
              assistant_model: regex
              user_refs: ['No.', 'Nope.', 'Not correct.', 'Wrong.', 'Incorrect.', 'Hello?']
              user_model: exact
            output:
              exc: "null"
              dob: "unknown"
              mob: "unknown"
              dob_confirmed: "unknown"
        
        processing_variable:
          mmddob: # depreciating tools, will remove in future
            tool: lib_tools.tools_kompato.format_dob
          is_dob_matched:
            tool: lib_tools.tools_kompato.outbound_verify_dob
          no_match_cnt:
            tool: lib_tools.tools_kompato.count_no_match
          refuse_cnt:
            tool: lib_tools.tools_kompato.count_refuse
          unknown_cnt:
            tool: lib_tools.tools_kompato.count_unknown
          
          # As a result of AGI-4176 (prepare all variables pre-negotiation)
          init_call_date:
            tool: lib_tools.tools_kompato.init_outbound_call_date
          init_consumer_info:
            tool: lib_tools.tools_kompato.init_outbound_consumer_info

        transition_conditions:
          "'{{dict_variable.exc}}' == 'deceased'":
            next_state: exc_deceased
            filler:
            repeat_filler:

          "'{{dict_variable.exc}}' == 'non_english'":
            next_state: exc_language
            filler:
            repeat_filler:

          "'{{dict_variable.exc}}' == 'prison'":
            next_state: exc_prison
            filler:
            repeat_filler:

