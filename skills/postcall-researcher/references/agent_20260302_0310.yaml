                  # attorney: if the caller or consumer lets you know that they are being represented by an attorney or lawyer (e.g. "I have an attorney" or "Speak to my lawyer" or "My lawyer told me not to talk to you. Please contact them instead")
                  human_agent_request: if _user specifically requests speaking to a live agent, human, or representative; and in the latest turns of the conversation has not agreed to continue the conversation
                  "null": default value, if _user did not mention any above; or if the _user simply asks a question about virtual agent without requesting to speak to a live agent
                example: "null"

            len_msg_reflection: 2
            reflection_template: template_default

        processing_variable:
          cnt_unknown:
            tool: lib_tools.tools_kompato.count_unknown_threshold

        transition_conditions:
          # The customer requests live agent
          "'{{dict_variable.exc}}' == 'human_agent_request'":
            next_state: exc_human_agent_request
            filler:
            repeat_filler:

          # The customer changes their mind about not being contacted anymore 
          # (i.e., they wish to continue communication)
          "'{{dict_variable.exc_comms_confirmed}}' == 'refuted'":
            next_state: BACK|EXC #ask debt detail
            filler: #Could you please provide the account details of the debt you are disputing?
            repeat_filler:

          # The customer wants to stop being called but hasn't confirmed the phone number they want to stop being called to 
          "'{{dict_variable.exc_comms}}' == 'call' and '{{dict_variable.exc_comms_contact}}' == 'unknown'":
            next_state: exc_cease_comms
            filler: 
            repeat_filler:

          # The customer wants to stop being texted but hasn't confirmed the phone number they want to stop receiving text to
          "'{{dict_variable.exc_comms}}' == 'sms' and '{{dict_variable.exc_comms_contact}}' == 'unknown'":
            next_state: exc_cease_comms
            filler:
            repeat_filler:

          # The customer wants to stop being emailed but hasn't confirmed the email address they want to stop receiving emails
          "'{{dict_variable.exc_comms}}' == 'email' and '{{dict_variable.exc_comms_contact}}' == 'unknown'":
            next_state: exc_cease_comms
            filler:
            repeat_filler:
          
          # The customer wants to stop being contacted by email and sms and has confirmed the address/phone number they wish to cease communication with and has confirmed so
          "'{{dict_variable.exc_comms}}' in ('email', 'sms') and '{{dict_variable.exc_comms_contact}}' != 'unknown' and '{{dict_variable.contact_confirmed}}' == 'yes'":
            next_state: BACK|EXC
            filler:
            repeat_filler:

          # The customer wants to stop being contacted via call, email, sms, and has confirmed the address/phone number to cease communication with but hasn't confirmed so
          "'{{dict_variable.exc_comms}}' in ('call', 'email', 'sms') and '{{dict_variable.exc_comms_contact}}' != 'unknown' and '{{dict_variable.contact_confirmed}}' == 'unknown'":
            next_state: exc_cease_comms
            filler:
            repeat_filler:

          # The customer wants to stop being called and has provided a phone number to cease communication with and has confirmed so
          "'{{dict_variable.exc_comms}}' == 'call' and '{{dict_variable.exc_comms_contact}}' != 'unknown' and '{{dict_variable.contact_confirmed}}' == 'yes'":
            next_state: end_call
            filler: #Do you have any concerns?
            repeat_filler:

          # The customer wants to stop being contacted via call, email, sms, and has confirmed the address/phone number to cease communication with but explicitly refuses it
          "'{{dict_variable.exc_comms}}' in ('call', 'email', 'sms') and '{{dict_variable.exc_comms_contact}}' != 'unknown' and '{{dict_variable.contact_confirmed}}' == 'no'":
            next_state: exc_cease_comms
            filler: #Can you provide your new contact again that we will stop contact you via?
            repeat_filler:

          else: # '{{dict_variable.exc_comms}}' == 'unknown'
            next_state: exc_cease_comms
            filler: #To resolve this matter quickly and accurately, it's essential that we verify the payment details. Could you please share the reasons why you believe this debt does not belong to you?
            repeat_filler:

        repeat_continuously:
          max_repeat: 10
          state_exceed_max_repeat: end_call
          filler_exceed_max_repeat: #I understand. |partial # We will stop all forms of communication with your account as per your request via contact number {{dict_variable.ssml_phone}} or email {{raw_call_assignment.email}}. Do you have any other concerns?
          repeat_filler:
        max_turn_back:

    exc_attorney:
      type: 2llmcalls
      2llmcalls:
        response_delay: 1000
        ## dynamic filler customized for each state
        dynamic_filler:
          model_name: gpt-4o #Qwen3-4B-df_en_v3b
          nturns: 6
          fillers:
          prompt_template: prompt_filler_v2 #prompt_filler_v3    ## a key in `prompt_templates_dynamic_filler`
          quick_fillers:
        type_llm_reflection: *reflection_model_name
        type_llm_response: *response_model_name
        len_msg_reflection:
        len_msg_response:
        type_output_reflection: custom1
        reflection_template: template_exception
        variable_change_exception: { "exc": "null" }

        pre_reflection_variable:
          init_call_date:
            tool: lib_tools.tools_kompato.init_outbound_call_date
          init_consumer_info:
            tool: lib_tools.tools_kompato.init_outbound_consumer_info
        reflection_variable:
          - variables:
              exc_attorney_confirmed:
                description:
                  confirmed: if _user confirms that they have an attorney, lawyer or attorney's law firm to represent them
                  refuted: if _user refutes that they have an attorney
                  unknown: if _user gives unclear answer
                example: unknown
              exc_attorney_name:
                description: return full name of attorney that _user provided (extracted directly from answer of user), if _user haven't provided yet, return "unknown"
                example: "Taylor Swift"
              exc_attorney_phone:
                description: return phone number of attorney (e.g. "0282346867") that _user stated, else return 'unknown'.
                example: "0123456789"
              exc_attorney_contact:
                description: return attorney's email address (e.g. "mylove@gmail.com"), or the attorney's law firm (e.g. "Pearson Specter Litt LLC"), or the state or city (e.g. "New York") they are residing in that _user stated, else return 'unknown'.
                example: "Pearson Specter Litt LLC"
              asked_attorney_contact:
                description: return "yes" if you already ask _user for attorney's email address or the attorney's law firm or the state/ city, else return "no"
                example: "yes"
              reasked_attorney_name:
                description: return "yes" if you ask _user for their attorney's name the second time by saying this "Could you please also provide the name of the attorney associated with this phone number?", else return "no"
                example: "yes"
          - variables:
              exc:
                description:
                  # complaint: if _user complain about historical calls, system issues, procedure issues, policy issues, response time or process of receiving requested documents.; and in the latest turns of the conversation has not confirmed that the complaint is now resolved or they have chosen to ignore it for now.
                  # dispute: if _user just said they want to dispute the debt but not mention clear reasons such as debt amount, or they already paid, or they are a victim of identity theft.; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                  # dispute_balance: if _user has dispute about the balance of the debt, the charges (for example 'We agreed to a $500 discount but the portal is still showing the original amount', 'The creditor promised me I would not need to pay late fees', 'This balance is too high because…', 'I was charged for this account, but I never received the item', 'I refunded this charge, but it still showed up on my account'); and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                  # dispute_paid: if _user has dispute that they already paid the debt (for example 'I paid the full amount via bank transfer six months ago. Can you confirm this on your end?', 'I settled this debt last year with a check. Why is it still showing as unpaid?', 'I made a payment directly to the creditor last year. This should be updated in your records.', 'I have already paid off this debt through your online portal. Can you verify the payment?', 'I cleared this balance with a credit card payment last 2 years. Please check and confirm it has been received'); and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                  # dispute_theft: if _user explicitly informs us that they are a victim of identity theft (e.g. "I received a notification about a debt in my name that I never incurred.", "I found out someone used my identity to open an account.", "This debt is not mine; I suspect my identity has been stolen.", "I noticed unfamiliar charges under my name that I never authorized.", "I believe my personal information was used fraudulently to create this debt.").; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                  # bankruptcy: if caller tells that they are in bankruptcy
                  # cease_comms: if caller requests to take them off your calling list or if caller proactively (which means without being prompted) asks to stop receiving communications from us including email, texting, sms or call; and in the latest turns of the conversation has not confirmed that they now want to continue receiving communications.
                  # attorney: if the caller or consumer lets you know that they are being represented by an attorney or lawyer (e.g. "I have an attorney" or "Speak to my lawyer" or "My lawyer told me not to talk to you. Please contact them instead")
                  human_agent_request: if _user specifically requests speaking to a live agent, human, or representative; and in the latest turns of the conversation has not agreed to continue the conversation
                  "null": default value, if _user did not mention any above; or if the _user simply asks a question about virtual agent without requesting to speak to a live agent
                example: "null"

            len_msg_reflection: 2
            reflection_template: template_default

        processing_variable:
          cnt_unknown:
            tool: lib_tools.tools_kompato.count_unknown_threshold

        transition_conditions:
          "'{{dict_variable.exc}}' == 'human_agent_request'":
            next_state: exc_human_agent_request
            filler:
            repeat_filler:

          "'{{dict_variable.exc_attorney_confirmed}}' == 'refuted'":
            next_state: BACK|EXC #ask debt detail
            filler: #Could you please provide the account details of the debt you are disputing?
            repeat_filler:

          ### get attorney's name and phone
          "'{{dict_variable.exc_attorney_name}}' != 'unknown' and '{{dict_variable.exc_attorney_phone}}' != 'unknown'":
            next_state: end_call
            filler:
            repeat_filler:

          ### only get attorney's name
          "'{{dict_variable.exc_attorney_name}}' != 'unknown' and '{{dict_variable.exc_attorney_phone}}' == 'unknown' and '{{dict_variable.exc_attorney_contact}}' == 'unknown' and '{{dict_variable.asked_attorney_contact}}' == 'no' and '{{dict_variable.reasked_attorney_name}}' == 'no'":
            next_state: exc_attorney
            filler:
            repeat_filler:

          "'{{dict_variable.exc_attorney_name}}' != 'unknown' and '{{dict_variable.exc_attorney_phone}}' == 'unknown' and '{{dict_variable.exc_attorney_contact}}' == 'unknown' and '{{dict_variable.asked_attorney_contact}}' == 'yes' and '{{dict_variable.reasked_attorney_name}}' == 'no'":
            next_state: end_call
            filler:
            repeat_filler:

          "'{{dict_variable.exc_attorney_name}}' != 'unknown' and '{{dict_variable.exc_attorney_phone}}' == 'unknown' and '{{dict_variable.exc_attorney_contact}}' != 'unknown' and '{{dict_variable.asked_attorney_contact}}' == 'yes' and '{{dict_variable.reasked_attorney_name}}' == 'no'":
            next_state: end_call
            filler:
            repeat_filler:

          ### only get attorney's phone
          "'{{dict_variable.exc_attorney_name}}' == 'unknown' and '{{dict_variable.exc_attorney_phone}}' != 'unknown' and '{{dict_variable.exc_attorney_contact}}' == 'unknown' and '{{dict_variable.asked_attorney_contact}}' == 'no' and '{{dict_variable.reasked_attorney_name}}' == 'no'":
            next_state: exc_attorney
            filler:
            repeat_filler:

          "'{{dict_variable.exc_attorney_name}}' == 'unknown' and '{{dict_variable.exc_attorney_phone}}' != 'unknown' and '{{dict_variable.exc_attorney_contact}}' == 'unknown' and '{{dict_variable.asked_attorney_contact}}' == 'no' and '{{dict_variable.reasked_attorney_name}}' == 'yes'":
            next_state: exc_attorney
            filler:
            repeat_filler:

          "'{{dict_variable.exc_attorney_name}}' == 'unknown' and '{{dict_variable.exc_attorney_phone}}' != 'unknown' and '{{dict_variable.exc_attorney_contact}}' == 'unknown' and '{{dict_variable.asked_attorney_contact}}' == 'yes' and '{{dict_variable.reasked_attorney_name}}' == 'yes'":
            next_state: end_call
            filler:
            repeat_filler:

          "'{{dict_variable.exc_attorney_name}}' == 'unknown' and '{{dict_variable.exc_attorney_phone}}' != 'unknown' and '{{dict_variable.exc_attorney_contact}}' != 'unknown' and '{{dict_variable.asked_attorney_contact}}' == 'yes' and '{{dict_variable.reasked_attorney_name}}' == 'yes'":
            next_state: end_call
            filler:
            repeat_filler:

          ### get neither attorney's name nor attorney's phone BUT exceed threshold 3 times
          "'{{dict_variable.exc_attorney_name}}' == 'unknown' and '{{dict_variable.exc_attorney_phone}}' == 'unknown' and {{dict_variable.cnt_unknown}}>=3":
            next_state: end_call
            filler:
            repeat_filler:

          else: ### get neither attorney's name nor attorney's phone BUT within threshold 3 times
            next_state: exc_attorney
            filler: #I will be unable to resolve the debt if you do not get the attorney's information. Can you provide their full name and phone number?
            repeat_filler:

        repeat_continuously:
          max_repeat:
          state_exceed_max_repeat: end_call
          filler_exceed_max_repeat:
          repeat_filler:
        max_turn_back:

    exc_cb:
      type: 2llmcalls
      2llmcalls:
        response_delay: 1000
        ## dynamic filler customized for each state
        dynamic_filler:
          model_name: gpt-4o #Qwen3-4B-df_en_v3b
          nturns: 6
          fillers:
          prompt_template: prompt_filler_v2 #prompt_filler_v3    ## a key in `prompt_templates_dynamic_filler`
          quick_fillers:
        type_llm_reflection: *reflection_model_name
        type_llm_response: *response_model_name
        len_msg_reflection:
        len_msg_response:
        type_output_reflection: custom1
        reflection_template: template_exception
        
        pre_reflection_variable:
          init_call_date:
            tool: lib_tools.tools_kompato.init_outbound_call_date
          init_consumer_info:
            tool: lib_tools.tools_kompato.init_outbound_consumer_info
        
        reflection_variable:
          exc_cb_consent:
            description:
              "yes": if _user explicitly or implicitly agrees to be called back (e.g. 'yes', 'okay', 'please call me back')
              "sooner": if _user explicitly or implicitly agree to be called back sooner (e.g. 'call me sooner', 'can you call me tommorrow?')
              never: if _user rejects to be called back by human (e.g. "Never call me again", "No I don't want a human to call me back")
              unknown: if _user gives unclear answer
            example: "yes"
          exc_cb_schedule:
            description: return specific time or date for callback if provided by _user, else return 'unknown'
            example: "tomorrow at 3 PM"
        
        processing_variable:
          cnt_unknown:
            tool: lib_tools.tools_kompato.count_unknown_threshold
          warm_transfer_elapsed_time_cb:
            tool: lib_tools.tools_kompato.calculate_duration
            params:
              date_input: self.dict_variable.warm_transfer_init_time

        transition_conditions:
          "'{{dict_variable.payment_result}}' == 'success'":
            next_state: update_info
            filler: Thank you for setting up your payment with us. To ensure important account updates reach you timely, could we take a moment to update your contact details?
            repeat_filler:

          "('{{dict_variable.rpc}}' == 'not') and '{{dict_variable.exc_cb_schedule}}' != 'unknown'":
            next_state: end_call
            filler:
            repeat_filler:

          #If the agent is not sure or the customer anwers not clearly or gives unrelated responses, or use non-English without clear intent and the customer doesn't require a callback => Warm-transfer (given that it is during working hours and a WT signal has not been sent yet)        
          "'{{dict_variable.get('is_working_hours', 'no') }}' == 'yes' and '{{dict_variable.get('warm_transfer_sent', 'no')}}' != 'yes' and '{{dict_variable.get('rpc', 'unknown')}}' != 'not' and '{{dict_variable.exc}}' != 'callback'":
            next_state: exc_cb
            filler:
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I have located a live agent to further help you.
                  metadata: *sm_metadata
                  extra_info: *base_warm_transfer_info

          ### timeout warm transfer; busy signal
          "'{{dict_variable.warm_transfer_sent}}' == 'yes' and '{{dict_variable.transfer_result}}' != 'busy' and ( ({{dict_variable.get('warm_transfer_elapsed_time_cb',0) < 600}} and {{dict_variable.get('mini_miranda', '') != 'yes' }} ) or ({{dict_variable.get('warm_transfer_elapsed_time_cb',0) < 600}} and {{dict_variable.get('mini_miranda', '') == 'yes' }} ) )":
            next_state: exc_cb
            filler:
            repeat_filler:

          "('{{dict_variable.exc_cb_consent}}' != 'unknown') and '{{dict_variable.exc_cb_schedule}}' != 'unknown'":
            next_state: end_call
            filler:
            repeat_filler:

          "'{{dict_variable.exc_cb_consent}}' == 'unknown' and {{dict_variable.cnt_unknown}} < 2":
            next_state: exc_cb
            filler:
            repeat_filler:

          "'{{dict_variable.exc_cb_consent}}' == 'unknown' and {{dict_variable.cnt_unknown}} == 2":
            next_state: end_call
            filler:
            repeat_filler:

          "'{{dict_variable.exc_cb_consent}}' == 'no' and '{{dict_variable.exc_cb_schedule}}' == 'unknown' and {{dict_variable.cnt_unknown}} < 2":
            next_state: exc_cb
            filler:
            repeat_filler:

          "'{{dict_variable.exc_cb_consent}}' == 'no' and '{{dict_variable.exc_cb_schedule}}' == 'unknown' and {{dict_variable.cnt_unknown}} == 2":
            next_state: end_call
            filler:
            repeat_filler:

          "'{{dict_variable.exc_cb_consent}}' == 'yes' and '{{dict_variable.exc_cb_schedule}}' != 'unknown'":
            next_state: end_call
            filler:
            repeat_filler:

          "'{{dict_variable.exc_cb_consent}}' == 'never'":
            next_state: end_call
            filler:
            repeat_filler:

          "'{{dict_variable.transfer_result}}' == 'busy'":
            next_state: end_call
            filler: Sorry we could not find an available agent at the moment. |partial
            repeat_filler:

          "{{dict_variable.get('warm_transfer_elapsed_time_cb',0) > 600 and dict_variable.get('mini_miranda','') != 'yes' }}":
            next_state: end_call
            filler: Sorry we could not find an available agent at the moment. |partial
            repeat_filler:

          "{{dict_variable.get('warm_transfer_elapsed_time_cb',0) > 600 and dict_variable.get('mini_miranda', '') == 'yes' }}":
            next_state: end_call
            filler: Sorry we could not find an available agent at the moment. |partial
            repeat_filler:

          else:
            next_state: exc_cb
            filler:
            repeat_filler:

        repeat_continuously:
          max_repeat: 20
          state_exceed_max_repeat: end_call
          filler_exceed_max_repeat:
          repeat_filler:
        max_turn_back:

    post_exc:
      type: 2llmcalls
      2llmcalls:
        response_delay: 1000
        ## dynamic filler customized for each state
        dynamic_filler:
          model_name: gpt-4o #Qwen3-4B-df_en_v3b
          nturns: 6
          fillers:
          prompt_template: prompt_filler_v2 #prompt_filler_v3    ## a key in `prompt_templates_dynamic_filler`
          quick_fillers:
        type_llm_reflection: *reflection_model_name
        type_llm_response: *response_model_name
        len_msg_reflection:
        len_msg_response:
        type_output_reflection: custom1
        reflection_template: template_exception

        pre_reflection_variable:
          init_call_date:
            tool: lib_tools.tools_kompato.init_outbound_call_date
          init_consumer_info:
            tool: lib_tools.tools_kompato.init_outbound_consumer_info
        reflection_variable:
          continue_conversation:
            description:
              "yes": the user's concerns or issues have been resulted and they want to resume the conversation with the agent
              "no": user requests callback by a live agent or wishes to stop this call
              "unknown": user response unclear
            example: "unknown"
          exc_cb:
            description: return 'yes' if _user agrees to be called back and 'no' if _user rejects to be called back, else return 'unknown' in the latest turn of the conversation
            example: "no"
        processing_variable:

        transition_conditions:
          "'{{dict_variable.continue_conversation}}' == 'yes' ":
            next_state: BACK|EXC
            filler:
            repeat_filler:
            ignore_back_msg: true

          "'{{dict_variable.exc_cb}}' == 'no'":
            next_state: post_exc #persuade to ask call back
            filler: #Respecting your privacy is crucial to us. Without your consent, our team cannot reach out to assist in resolving this issue. Could you reconsider allowing us to call you back?
            repeat_filler:

          "'{{dict_variable.exc_cb}}' == 'yes' and '{{dict_variable.exc}}' not in ('dispute_theft', 'dispute_txn_fraud', 'bankruptcy')":
            next_state: end_call #BACK|EXC
            filler:
            repeat_filler:
            # ignore_back_msg: true

          "'{{dict_variable.exc_cb}}' == 'yes' and '{{dict_variable.exc}}' in ('dispute_theft', 'dispute_txn_fraud', 'bankruptcy')":
            next_state: end_call
            filler: #Do you have any concerns?
            repeat_filler:

          else: #exc_cb=unknown
            next_state: post_exc
            filler: # We will escalate this dispute to a supervisor. May we have your permission for a supervisor to contact you and help resolve your issue?
            repeat_filler:

        repeat_continuously:
          max_repeat: 10
          state_exceed_max_repeat: end_call
          filler_exceed_max_repeat:
          repeat_filler:
        max_turn_back:

    exc_human_agent_request:
      type: 2llmcalls
      2llmcalls:
        response_delay: 1000
        dynamic_filler:
          model_name: gpt-4o
          nturns: 6
          fillers:
          prompt_template: prompt_filler_v2
          quick_fillers:
        type_llm_reflection: *reflection_model_name
        type_llm_response: *response_model_name
        len_msg_reflection: 10
        len_msg_response: 10
        type_output_reflection: custom1
        reflection_template: template_exception
        variable_change_exception: { "exc": "null" }

        pre_reflection_variable:
          init_call_date:
            tool: lib_tools.tools_kompato.init_outbound_call_date
          init_consumer_info:
            tool: lib_tools.tools_kompato.init_outbound_consumer_info
        
        reflection_variable:
          # Whether the customer confirms that they want to speak with a live agent
          human_request_confirmed:
            description:
              human_request: if is clear or unequivocal that the _user requested to speak to a live agent now and does not want to speak to a bot, or an AI or a virtual agent
              not_human_request: the _user can speak to virtual agent right now and does not request to speak to a live agent now
              unknown: if it is not clear whether the _user requested to speak to a live agent only
            example: "unknown"
          
          # Whether the customer agrees to be called back in 7 days
          exc_cb_consent:
            description:
              "yes": if _user explicitly or implicitly agrees to be called back in 7 days (e.g. 'yes', 'okay', 'please call me back')
              "sooner": if _user explicitly or implicitly agree to be called back but not in 7 days (e.g. 'call me sooner', 'can you call me tommorrow?')
              never: if _user rejects to be called back by human (e.g. "Never call me again", "No I don't want a human to call me back")
              unknown: if _user gives unclear answer
            example: "yes"
          
          # The callback time provided by the customer
          exc_cb_schedule:
            description: only return specific time or date for callback if provided by _user when _user disagrees to being called back within the next 7 days, else return 'unknown'
            example: "tomorrow at 3 PM"
          
          # New contact of the customer in case they provide a new one
          new_contact:
            description: new contact number that _user stated (extracted directly from answer of user), if _user haven't provided yet or say this is the good number to contact them, return "unknown"
            example: unknown
          
          # Whether the customer confirms their new contact
          confirmed_contact:
            description: return "confirmed" if _user provided a new phone number or say this is the good number to contact them, after you ask if this is the best number to reach them. else, return "unknown"
            example: unknown
        
        processing_variable:
          # Count the number of times any of the reflection variables of this state are "unknown"
          cnt_unknown:
            tool: lib_tools.tools_kompato.count_unknown_threshold
        
        transition_conditions:
          "'{{dict_variable.payment_result}}' == 'success'":
            next_state: update_info
            filler: Thank you for setting up your payment with us. To ensure important account updates reach you timely, could we take a moment to update your contact details?
            repeat_filler:

          "'{{dict_variable.warm_transfer_sent}}' == 'yes'":
            next_state: exc_human_agent_request
            filler:
            repeat_filler:

          "'{{dict_variable.human_request_confirmed}}' == 'not_human_request'":
            next_state: BACK|EXC
            filler:
            repeat_filler:

          "'{{dict_variable.exc_cb_consent}}' != 'unknown' and '{{dict_variable.exc_cb_schedule}}' != 'unknown' and '{{dict_variable.confirmed_contact}}' == 'confirmed'":
            next_state: end_call
            filler:
            repeat_filler:

          "'{{dict_variable.human_request_confirmed}}' != 'human_request'":
            next_state: exc_human_agent_request
            filler:
            repeat_filler:

          # if customer requested to speak to a live agent and the statement "This is an attempt to collect a debt by a debt collector. Any information obtained will be used for that purpose." has been delivered in full by the agent without any interruption by the customer => Warm-transfer (given that it is during working hours and a WT signal has not been sent yet)
          "'{{dict_variable.human_request_confirmed}}' == 'human_request' and '{{dict_variable.mini_miranda}}' == 'yes' and '{{dict_variable.is_working_hours }}' == 'yes' and '{{dict_variable.warm_transfer_sent}}' != 'yes'":
            next_state: update_info
            filler: "We are looking for a human agent to assist you. In the meantime, to ensure important account updates are communicated timely to you, let's ensure we have your accurate contact details on file. I have {{dict_variable.ssml_phone}} as your contact number in my records. Is this still the best way to reach you?"
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I have located a live agent to further help you.
                  metadata: *sm_metadata
                  extra_info: *base_warm_transfer_info

          "'{{dict_variable.human_request_confirmed}}' == 'human_request' and '{{dict_variable.mini_miranda}}' == 'yes' and '{{dict_variable.is_working_hours }}' != 'yes'":
            next_state: exc_cb
            filler: I understand. Unfortunately, our live agents are currently unavailable as it is outside of working hours. When would be a good time for us to call you back?

          #If customer requested to speak to a live agent and the statement "This is an attempt to collect a debt by a debt collector. Any information obtained will be used for that purpose." has been has either not been delivered, or interrupted or otherwise only partially delivered. => Warm-transfer (given that it is during working hours and a WT signal has not been sent yet)
          "'{{dict_variable.human_request_confirmed}}' == 'human_request' and '{{dict_variable.mini_miranda}}' != 'yes' and '{{dict_variable.is_working_hours }}' == 'yes' and '{{dict_variable.warm_transfer_sent}}' != 'yes'":
            next_state: exc_cb
            filler: I understand. We are looking for a human agent to assist you. Please hold for just a moment while I connect your call.
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I have located a live agent to further help you.
                  metadata: *sm_metadata
                  extra_info: *base_warm_transfer_info

          "'{{dict_variable.human_request_confirmed}}' == 'human_request' and '{{dict_variable.mini_miranda}}' != 'yes' and '{{dict_variable.is_working_hours }}' != 'yes'":
            next_state: exc_cb
            filler: I understand. Unfortunately, our live agents are currently unavailable as it is outside of working hours. When would be a good time for us to call you back?

          "'{{dict_variable.exc_cb_consent}}' == 'unknown' and {{dict_variable.cnt_unknown}} < 2":
            next_state: exc_human_agent_request
            filler:
            repeat_filler:

          "'{{dict_variable.exc_cb_consent}}' == 'unknown' and {{dict_variable.cnt_unknown}} == 2":
            next_state: end_call
            filler:
            repeat_filler:
          "'{{dict_variable.exc_cb_consent}}' == 'no' and '{{dict_variable.exc_cb_schedule}}' == 'unknown' and {{dict_variable.cnt_unknown}} < 2":
            next_state: exc_human_agent_request
            filler:
            repeat_filler:
          "'{{dict_variable.exc_cb_consent}}' == 'no' and '{{dict_variable.exc_cb_schedule}}' == 'unknown' and {{dict_variable.cnt_unknown}} == 2":
            next_state: end_call
            filler:
            repeat_filler:

          "'{{dict_variable.exc_cb_consent}}' == 'never'":
            next_state: end_call
            filler:
            repeat_filler:

          "'{{dict_variable.confirmed_contact}}' == 'unknown'":
            next_state: exc_human_agent_request
            filler:
            repeat_filler:
          
          else: # exc_cb_consent = 'yes'
            # next_state: end_call
            next_state: exc_human_agent_request
            filler:
            repeat_filler:
        
        repeat_continuously:
          max_repeat: 20
          state_exceed_max_repeat: end_call
          filler_exceed_max_repeat: Sorry it seems no live agent is currently available. |partial
          repeat_filler:
        max_turn_back:

    exc_revoke_recording:
      type: 2llmcalls
      2llmcalls:
        response_delay: 1000
        ## dynamic filler customized for each state
        dynamic_filler:
          model_name: gpt-4o #Qwen3-4B-df_en_v3b
          nturns: 6
          fillers:
          prompt_template: prompt_filler_v2 #prompt_filler_v3    ## a key in `prompt_templates_dynamic_filler`
          quick_fillers:
        type_llm_reflection: *reflection_model_name
        type_llm_response: *response_model_name
        len_msg_reflection:
        len_msg_response:
        type_output_reflection: custom1
        reflection_template: template_default
        variable_change_exception: { "exc": "null" }

        pre_reflection_variable:
          init_call_date:
            tool: lib_tools.tools_kompato.init_outbound_call_date
          init_consumer_info:
            tool: lib_tools.tools_kompato.init_outbound_consumer_info
        reflection_variable:
          - variables:
              record_consent:
                description:
                  revoke: if _user disagree or question about for being recorded (e.g. why you need recording?, i prefer not recording, ...); and in the latest turns of the conversation has not confirmed that they are now accepting recording; then assign `revoke` to `record_consent`
                  agree: if, in the latest turns of the conversation, the _user agree for being recorded then assign `agree` to `record_consent`.
                  concluded: if , in the latest turns of the conversation, the _user has agreed to be called back by a live agent, or receive other form of communication. While they still don't consent, there is a resolution for the next communication.
                  unknown: |
                    if _user did not mention about recording consent then assign `unknown` to `record_consent`

                    Example:
                      _assistant: Hello, this is {{raw_call_assignment.agent_name}} with Kompato on a recorded line, How can I help you?
                      _user: I don't want to be recorded and I am calling because I received a letter from you
                      _assistant: I acknowledge your concern, however, without your consent for being recorded, I can not help you proceed the call. Can you change mind?
                      _user: Okay, fine

                    output: <record_consent:agree>
                example: unknown
              callback_time:
                description: only return specific time or date for callback if provided by _user when _user disagrees to being called back within the next 7 days. Else return 'unknown'
                example: "tomorrow at 3 PM"
          - variables:
              exc:
                description:
                  # complaint: if _user complain about historical calls, system issues, procedure issues, policy issues, response time or process of receiving requested documents.; and in the latest turns of the conversation has not confirmed that the complaint is now resolved or they have chosen to ignore it for now.
                  # dispute: if _user just said they want to dispute the debt but not mention clear reasons such as debt amount, or they already paid, or they are a victim of identity theft.; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                  # dispute_balance: if _user has dispute about the balance of the debt, the charges (for example 'We agreed to a $500 discount but the portal is still showing the original amount', 'The creditor promised me I would not need to pay late fees', 'This balance is too high because…', 'I was charged for this account, but I never received the item', 'I refunded this charge, but it still showed up on my account'); and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                  # dispute_paid: if _user has dispute that they already paid the debt (for example 'I paid the full amount via bank transfer six months ago. Can you confirm this on your end?', 'I settled this debt last year with a check. Why is it still showing as unpaid?', 'I made a payment directly to the creditor last year. This should be updated in your records.', 'I have already paid off this debt through your online portal. Can you verify the payment?', 'I cleared this balance with a credit card payment last 2 years. Please check and confirm it has been received'); and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                  # dispute_theft: if _user explicitly informs us that they are a victim of identity theft (e.g. "I received a notification about a debt in my name that I never incurred.", "I found out someone used my identity to open an account.", "This debt is not mine; I suspect my identity has been stolen.", "I noticed unfamiliar charges under my name that I never authorized.", "I believe my personal information was used fraudulently to create this debt.").; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                  # bankruptcy: if caller tells that they are in bankruptcy
                  # cease_comms: if caller requests to take them off your calling list or if caller proactively (which means without being prompted) asks to stop receiving communications from us including email, texting, sms or call; and in the latest turns of the conversation has not confirmed that they now want to continue receiving communications.
                  # attorney: if the caller or consumer lets you know that they are being represented by an attorney or lawyer (e.g. "I have an attorney" or "Speak to my lawyer" or "My lawyer told me not to talk to you. Please contact them instead")
                  human_agent_request: if _user specifically requests speaking to a live agent, human, or representative; and in the latest turns of the conversation has not agreed to continue the conversation
                  "null": default value, if _user did not mention any above; or if the _user simply asks a question about virtual agent without requesting to speak to a live agent
                example: "null"

            len_msg_reflection: 2
            reflection_template: template_default
        processing_variable:

        transition_conditions:
          "'{{dict_variable.exc}}' == 'human_agent_request'":
            next_state: exc_human_agent_request
            filler:
            repeat_filler:

          "'{{dict_variable.record_consent}}' == 'agree'":
            next_state: BACK|EXC
            filler:
            repeat_filler:

          "'{{dict_variable.record_consent}}' == 'revoke'":
            next_state: exc_revoke_recording
            filler: #If you're not comfortable continuing, I can note your preferences for future communications. How would you like to proceed?
            repeat_filler:

          "'{{dict_variable.record_consent}}' == 'concluded'":
            next_state: update_info
            filler: #If you're not comfortable continuing, I can note your preferences for future communications. How would you like to proceed?
            repeat_filler:

          ### unknown
          else:
            next_state: exc_revoke_recording
            filler: # Sorry, I didn't get that. How can I help you today?
            repeat_filler:

        repeat_continuously:
          max_repeat: 6
          state_exceed_max_repeat: end_call
          filler_exceed_max_repeat:
          repeat_filler: 1
        max_turn_back:

