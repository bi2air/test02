      Apologize let them know that we will schedule a callback according to the time that they have suggested.
      {% else %}
      Once you get all the information, tell them that there is currently no live agent available to assist them. However, we can schedule a call back for them to discuss this issue further. Ask them when would be a good time to call them back?
      {% endif %}
      
      {% if is_transfer_fallback %}
        {% if dict_variable.warm_transfer_sent == 'yes' and dict_variable.transfer_result != 'busy' %}
      Once you get all the information, tell them " <break time="3s" /> One moment, I will get you right over to a live agent to get this payment plan set up for you. <break time="3s" />"
        If the consumer talks about something else, let them know that a live agent will join the call shortly to support them.
        {% else %}
      Once you get all the information, tell them that there is currently no live agent available to assist them. However, we can schedule a call back for them to discuss this issue further. Ask them when would be a good time to call them back?
