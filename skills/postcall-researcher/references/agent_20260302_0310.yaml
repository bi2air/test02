      prompt_detect_payment_resolution_type_and_intention: |
        # Context
        You are a debt collector (`assistant`) tasked with extracting information about a promised or agreed payment plan after discussing with a debtor (`user`). To extract the information, you are provided with the conversation between the collector and the debtor, located under the section `Conversation Transcript`.

        # Guidelines
        After reading and understanding the provided conversation, extract the following information:
        - Resolution type (string): Determine how the debtor wishes to resolve their debt, choosing ONE of the following values:
          -- "paid_in_full": The debtor wishes to make a one-time payment for the full balance of their debt.
          -- "payment_plan": The debtor wishes to resolve their debt by paying in installments.
          -- "settle_in_full": The debtor wishes to resolve their debt via a settlement in a one-time payment.
          -- "settlement_plan": The debtor wishes to resolve their debt via a settlement in installments.
          -- "kit_plan": The debtor refuses other payment plans and only agrees to a temporary Keep-in-Touch (KIT) plan for now.
          -- "null": The debtor has not proposed nor agreed to any payment plan.
        - Settlement intention (bool): Return the boolean value "true" if the debtor wishes to resolve their debt via a settlement, and "false" otherwise. Note that even if the debtor only agrees to a Keep-in-Touch (KIT) plan, it could still be a premise to a settlement offer.

        # Response Format
        Return the requested information in this JSON format.
        {
          "resolution_type": "paid_in_full"/"payment_plan"/"settle_in_full"/"settlement_plan"/"kit_plan"/"null",
          "settlement_intention": true/false
        }

        # Conversation Transcript
        ```
        {{conversation_transcript}}
        ```

      prompt_detect_resolution_details: |
        # Context
        You are a debt collector (`assistant`) tasked with extracting information about a promised or agreed payment plan after discussing with a debtor (`user`). To extract the information, you are provided with the conversation transcribed from a phone call between the collector and the debtor, located under the section `Conversation Transcript`.

        # Guidelines
        After reading and understanding the provided conversation, extract the following information:

        - First payment date (string): The first date of the payment plan or the date of the one-time payment as confirmed with the debtor, in the format "YYYY-MM-DD".
        
        - Number of installments, i.e., payment count (int): The number of installments for a payment plan by installments if explicitly mentioned in the transctipt, '1' if it is a one-time payment. 
          -- If only the monthly amount and total payment amount are mentioned in the transcript, calculate to get the number of installments, for example, if the total payment amount is $4560 and the monthly amount the debtor can afford is $100, then the number of installments (rounded up) is 4560 / 100 = 46.
        
        - Payment frequency (string): The frequency of the payment, such as 'weekly' or 'monthly'. 
          -- If it is mentioned in the transcript that a regular payment has already been put in place before the call, without further details on the frequency, return 'monthly' by default. 
          -- Return 'null' if it is a one-time payment.
        
        - Monthly payment amount (float): The monthly amount for a payment plan by installments, or the total amount for a one-time payment, if explicitly mentioned in the transcript.
          -- If only the total payment amount and number of installments are mentioned in the transcript, calculate to get the monthly amount, for example, if the total payment amount is $4560 and the number of installments is 10, the monthly amount is 4560 / 10 = $456 per installment.
        
        - Total payment amount (float): The total amount as a result of the payment plan {% if raw_call_assignment.get('itemizationCurrentBalance', '') != '' %}given that the current balance of the debtor is {{raw_call_assignment.itemizationCurrentBalance}}{% endif %}
          -- If it is a one-time payment, this amount is the same as the payment amount. 
          -- If it is a payment plan, this is the sum of all monthly payments. 
          -- If it is a Keep-in-Touch (KIT) plan, return "null" because a KIT plan does not count toward resolving a debt. 
          -- Note that multiplying the monthly amount by the number of installments does not systematically equal the total amount, since the last installment amount could be lower than the regular installment amount. Usually, the total amount is already stated by the collector during the call (be it full payment or settlement), so return that amount if explicitly stated in the conversation; otherwise, calculate to get the correct total amount.
        
        - Settlement percentage (float): The percentage of settlement as agreed, suggested, or confirmed by the debtor.
          -- Return 'null' if the debtor agrees to a full payment (i.e., no settlement). 
          -- If the percentage is not explicitly mentioned in the transcript, calculate to get the settlement percentage if only the full balance and the balance agreed to be paid after a reduction are mentioned in the call, for example, if the total balance is $1000 and the balance agreed to be paid is $650, the settlement percentage is 650 / 1000 = 65% (return '65' instead of '0.65').
        
        - Recurrent authorization (bool): Whether the debtor committed to be charged regularly.
          -- Return 'true' if the debtor agrees to be charged regularly by replying "I agree" to the mandatory statement ("I will now read a mandatory statement to confirm this arrangement to confirm our arrangement today..."), or if a regular payment plan has already been put in place before the call
          -- Return 'false' if it is a one-time payment, if the debtor doesn't agree to a regular payment plan, or if the call did not progress to reading the mandatory statement before ending.

        For any of the information above, return "null" if that information cannot be found nor calculated from the transcript.

        # Response Format
        Return the requested information in the following JSON format. Ensure the keys are returned exactly as indicated, with example values provided below:
        {
          "first_payment_date": "2026-01-23",
          "payment_count": 12,
          "payment_frequency": "monthly",
          "payment_amount": 50.00,
          "total_payment_amount": 600.00,
          "settlement_percentage": 80.0,
          "recurring_authorization": true
        }

        # Conversation Transcript
        ```
        {{conversation_transcript}}
        ```

      prompt_detect_hardship_type: |
        # Context
        You are a debt collector (`assistant`) tasked with identifying the type of hardship expressed by the debtor (`user`) in a phone call. To extract the information, you are provided with the conversation transcribed from the phone call between the collector and the debtor, located under the section `Conversation Transcript`.

        # Guidelines
        Classify the hardship expressed by the debtor into one of the following categories:
        - "temporary": A temporary hardship is difficult, but it's expected to improve with time, action, or changed circumstances, such as losing a job, falling behind on bills, brief financial downturn, or unexpected expense.
        - "permanent": A permanent hardship is long-lasting or irreversible, with little to no realistic chance of improvement, such as being permanently disabled, having cancer, or age combined with health limitations.

        # Response Format
