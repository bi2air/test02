        {{conversation_transcript}}
        ```

      prompt_extract_notes_template: |
        # Objective
        You are a professional note-taking specialist for debt collection calls. Your task is to analyze the conversation transcript and create a concise, flowing summary note in the style of a live agent for updating the System of Record (SOR).

        # Instructions
        Extract and summarize the following 8 categories of information from the call transcript into a single, natural-flowing paragraph:

        ## 1. Recording Disclosure
        - State whether recording disclosure was given or not given
        - Use phrases like: "Recording disclosure given" or "Recording disclosure not given"

        ## 2. Verified First & Last Name
        - Include the consumer's verified full name
        - Use phrases like: "confirmed speaking to [First Last]" or "verified identity of [First Last]"
        - If name not verified, note: "unable to verify identity"

        ## 3. Verification Method
        - Specify how identity was verified: DOB (date of birth), Last 4 of SSN (social security number)
        - Use phrases like: "verified by DOB", "verified by Last 4 of SSN"
        - If not verified, note: "identity not verified"

        ## 4. Mini Miranda
        - State whether Mini Miranda was provided by agent/assistant or not
        - Here is the mini miranda statement: "this is an attempt to collect a debt by a debt collector. Any information obtained will be used for that purpose."
        - Use phrases like: "gave mini miranda", "provided mini miranda", or "mini miranda not provided"

        ## 6. Call Purpose & Discussion Summary
        This is the core of the notes. Include:
        - **Balance discussed**: "Adv balance of $[amount]" or "Spoke regarding balance of $[amount]"
        - **Consumer response**: Their reaction, concerns, or intentions
        - **Payment options discussed**: What options were presented (if any)
        - **Settlement offer(s)**: Any settlement amounts offered and consumer's response
        - **Dispute raised**: If yes, briefly note: "Dispute raised - [reason]"
        - **Fraud claim**: If yes, note: "Fraud claim made - [details]" and if fraud steps were provided

        ## 7. Demographic Updates
        Include any updated contact information:
        - **Phone**: "updated phone number to [number]" or "phone current on file"
        - **Email**: "updated email to [email]" or "email current on file"
        - **Address**: "updated address to [address]" or "addy current on file"
        - If no updates: "contact info current on file" or similar

        ## 8. Consents
        - **Text/email consent**: "Text/email permission YES" or "Text/email permission NO" or "Text/email permission N/A"
        - **Callback consent within 7 days**:
          - "Consent to callback within 7 days YES" if the customer/user agreed to be called back after disconnected
          - "Consent to callback within 7 days NO" if the customer/user refused to be called back
          - Other cases: "Consent to callback within 7 days N/A"

        ## 9. Call Transfer (if applicable)
        - If call was transferred or callback scheduled, note: "Transferred to [department]" or "Callback scheduled for [specific time/date]"

        # Writing Style Guidelines
        - Write in a concise, professional tone similar to live agent notes
        - Flow information naturally in a paragraph format, not as bullet points
        - Omit categories that are not applicable or where no information was gathered
        - Focus on actionable information relevant for SOR updates
        - Keep the entire note to 3-5 sentences maximum

        # PHONE_CALL_TRANSCRIPT
        ```
        {{conversation_transcript}}
        ```

        # Response Format
        Return ONLY the summary note as plain text without any tags, formatting, or labels. Write it as a single flowing paragraph.

        # Examples

        ## Example 1: Successful Payment Setup
        Recording disclosure given, confirmed speaking to [First Last], verified by DOB, gave mini miranda. Advised balance of $[amount], consumer stated that they were looking to resolve for a lesser amount. Gave settlement of $[amount] to resolve, consumer agreed, set up payment for [date]. Text/email permission YES, updated phone number to [phone number], email and address are current on file. Consent to callback within 7 days YES.

        ## Example 2: Dispute Raised
        Recording disclosure given, verified identity of [First Last] by SSN, provided mini miranda. Advised balance of $[amount], consumer disputed the amount claiming payment was made in [month year] via bank transfer. Dispute raised - claims already paid, provided validation documents will be reviewed. Contact info current on file. Text/email consent YES, no callback consent needed.

        ## Example 3: Callback Requested
        Recording disclosure not given, spoke with [First Last], unable to verify at this time. Consumer stated not convenient to talk, requested callback tomorrow between [time range]. Did not discuss balance or payment options. Consumer agreed to callback within 7 days. Text consent N/A.

        ## Example 4: Payment Plan Discussed
        Recording disclosure given, confirmed speaking to [First Last], verified by address, gave mini miranda. Advised balance of $[amount], discussed payment options. Consumer interested in payment plan, offered [number] monthly payments of $[amount], consumer requested time to consider. Updated email to [email address], phone and address current. Text/email permission YES, consent to callback within 7 days YES.

        ## Example 5: Wrong Number/Third Party
        Recording disclosure given, party answered stated not the consumer, indicated wrong number. Did not verify identity. Call terminated. No further information collected.

    extraction_pipeline:
      # Potentila call codes detect from call_code_agent
      list_call_codes:
        - extractor_type: SMVariableMapping
          trigger_condition: "True"
          extractor_params:
            template: "{{call_code_result.potential_call_codes | default([]) }}"
            dtype: list

      # Reasoning behind the selected call codes
      callcode_reason:
        - extractor_type: SMVariableMapping
          trigger_condition: "True"
          extractor_params:
            template: "{{call_code_result.callcode_reason | default(None)}}"
            dtype: string

      # Call summary
      summary:
        - extractor_type: LLMExtractor
          trigger_condition: "True"
          extractor_params:
            prompt_template: prompt_summary_conversation

      # Contact classification
      contact_classification:
        - extractor_type: SMVariableMapping
          trigger_condition: >-
            {{list_current_state | length > 0}} and
            '{{raw_call_assignment.call_direction_detail}}' not in ['transfer_inbound', 'transfer_outbound', 'human_outbound', 'human_inbound']

          extractor_params:
            template: "{% if 'check_rpc' in list_current_state %}Communication{% else %}Attempt{% endif %}"
            dtype: string

      # Detect dispute info
      dispute_info:
        - extractor_type: LLMExtractor
          trigger_condition: '{{ "DIS" in call_code_result.potential_call_codes }}'
          extractor_params:
            prompt_template: prompt_detect_dispute_info
            flatten_output: True
            json_response_format:
              dispute_label:
                dtype: string
                description: "The category of the dispute, one of the following: dispute_balance, dispute_paid, dispute_theft, dispute_txn_fraud"
              dispute_reason:
                dtype: string
                description: "The reason for the dispute, if no dispute reason is detected return None"

      # Consent: time to call back (raw), do not call, 7-7 consent, callback info (date, time, by whom)
      consent:
        # Raw text of the requested callback time/schedule
        time_to_call_back_raw:
          - extractor_type: SMVariableMapping
            trigger_condition: "{{dict_variable | length > 0}}"
            extractor_params:
              template: "{{dict_variable.get('callback_time', dict_variable.get('exc_cb_schedule', dict_variable.get('review', 'unknown')))}}"
              dtype: string

        # Flag indicating if any form of Do Not Call was requested
        # only trigger this flag when user pass mini_miranda
        do_not_call:
          - extractor_type: SMVariableMapping
            trigger_condition: "{{dict_variable | length > 0}} and {{list_current_state | length > 0}}"
            extractor_params:
              template: >-
                {% if "negotiation_from_script" in list_current_state %}
                  {{
                    (call_code_result.call_code | default('')) in ["DNC", "CDS"] or
                    dict_variable.get('exc_cb_consent') == "never" or
                    dict_variable.get('exc_cb') == "no" or
                    (dict_variable.get('exc_comms_confirmed') == "confirmed" and dict_variable.get('exc_comms') in ["call", "cease_all"])
                  }}
                {% else %}False
                {% endif %}
              dtype: bool

        consent_to_contact_within_7_days:
          - extractor_type: SMVariableMapping
            trigger_condition: "{{dict_variable | length > 0}}"
            extractor_params:
              template: >-
                {% if dict_variable.get('exc_cb_consent', 'unknown') in ['yes', 'sooner'] or dict_variable.get('human_call', 'unknown') == 'agree' %}True
                {% elif dict_variable.get('exc_cb_consent') == 'never' or dict_variable.get('human_call', 'unknown') == 'revoke' %}False
                {% else %}unknown
                {% endif %}
              dtype: bool

        # Callback date and time parsed from conversation
        callback_info:
          - extractor_type: LLMExtractor
            trigger_condition: "{{ call_code_result.call_code in ['CAB', 'PCAB', 'NCV', 'PNCV', 'TSR', 'PTSR', 'WFR', 'PWFR', 'FTP', 'ATY'] }}"
            extractor_params:
              prompt_template: prompt_detect_callback_info
              flatten_output: True
              json_response_format:
                date_to_call_back:
                  dtype: string
                  description: "The callback date in YYYY-MM-DD format, or 'unknown' if not available"
                time_to_call_back:
                  dtype: string
                  description: "The callback time in HH:MM format, or 'unknown' if not available"
                human_to_call_back:
                  dtype: bool
                  description: "true if human callback was specifically requested, false if not, unknown if unclear"

      # General consents
      consents:
        - extractor_type: RecursiveMapping
          trigger_condition: "{{dict_variable | length > 0}} and {{list_current_state | length > 0}}"
          extractor_params:
            schema:
              - category: debt_via_human_call
                medium: ai_voice_call
                entity: phone_number
                availability: {}
                status:
                  template: >-
                    {% if "negotiation_from_script" in list_current_state %}
                      {% if (
                        (call_code_result.call_code | default('')) in ["DNC", "CDS"] or
                        dict_variable.get('exc_cb_consent') == "never" or
                        dict_variable.get('exc_cb') == "no" or
                        dict_variable.get('human_call') == "revoke" or
                        (dict_variable.get('exc_comms_confirmed') == "confirmed" and dict_variable.get('exc_comms') in ["call", "cease_all"])
                      ) %}False
                      {% elif dict_variable.get('cb_consent') == "agree" %}True
                      {% endif %}
                    {% else %}unknown
                    {% endif %}
                  dtype: bool

              - category: debt_via_ai_call
                medium: ai_voice_call
                entity: phone_number
                availability: {}
                status:
                  template: >-
                    {% if "negotiation_from_script" in list_current_state %}
                      {% if (
                        (call_code_result.call_code | default('')) in ["DNC", "CDS"] or
                        dict_variable.get('exc_cb_consent') == "never" or
                        dict_variable.get('exc_cb') == "no" or
                        dict_variable.get('human_call') == "revoke" or
                        (dict_variable.get('exc_comms_confirmed') == "confirmed" and dict_variable.get('exc_comms') in ["call", "cease_all"])
                      ) %}False
                      {% elif dict_variable.get('cb_consent') == "agree" %}True
                      {% endif %}
                    {% else %}unknown
                    {% endif %}
                  dtype: bool

              - category: debt_via_sms
                medium: ai_voice_call
                entity: phone_number
                availability: {}
                status:
                  template: >
                    {% if dict_variable.get('text_consent') == "no" %}False
                    {% elif dict_variable.get('text_consent') == "yes" %}True
                    {% else %}unknown
                    {% endif %}
                  dtype: bool

      # Bankruptcy information
      bankruptcy_info:
        status:
          - extractor_type: SMVariableMapping
            trigger_condition: "{{dict_variable | length > 0}}"
            extractor_params:
              template: >
                {% if dict_variable.get('filing', 'unknown') == "filed" %}filed
                {% elif dict_variable.get('filing', 'unknown') != "unknown" %}not_filed
                {% else %}unknown
                {% endif %}
              dtype: string
        case_number:
          - extractor_type: SMVariableMapping
            trigger_condition: "{{dict_variable | length > 0}}"
            extractor_params:
              template: "{{dict_variable.get('exc_bankruptcy_case', 'unknown')}}"
              dtype: string

      # Attorney information
      attorney_info:
        - extractor_type: RecursiveMapping
          trigger_condition: "{{dict_variable | length > 0}}"
          extractor_params:
            schema:
              attorney_name:
                template: "{{dict_variable.get('exc_attorney_name', 'unknown')}}"
                dtype: string
              attorney_phone:
                template: "{{dict_variable.get('exc_attorney_phone', 'unknown')}}"
                dtype: string
              attorney_contact:
                template: "{{dict_variable.get('exc_attorney_contact', 'unknown')}}"
                dtype: string

      # ID verification information
      id_verify:
        - extractor_type: RecursiveMapping
          trigger_condition: >-
            {{list_current_state | length > 0}} and
            '{{raw_call_assignment.call_direction_detail}}' not in ['human_outbound', 'human_inbound', 'transfer_inbound', 'transfer_outbound']
          extractor_params:
            schema:
              dob_raw:
                template: "{{dict_variable.mob}}-{{dict_variable.dob}}"
                dtype: string
              ssn:
                template: "{{dict_variable.ssn}}"
                dtype: string
              rpc:
                template: >-
                  {% if "negotiation_from_script" in list_current_state %}True
                  {% else %}False
                  {% endif %}
                dtype: bool

        - extractor_type: LLMExtractor
          trigger_condition: >-
            '{{raw_call_assignment.call_direction_detail}}' in ['human_outbound', 'human_inbound', 'transfer_inbound', 'transfer_outbound']
          extractor_params:
            prompt_template: prompt_detect_id_verify_info
            json_response_format:
              dob_raw:
                dtype: string
                description: "The date of birth in MM-DD format that was provided by the user, or 'unknown' if not available"
              ssn:
                dtype: string
                description: "The Social Security Number that was provided by the user, or 'unknown' if not available"
              rpc:
                dtype: bool
                description: "True if the current user is the right person contact, False if not"

      # Legacy payment plan from state machine
      payment_plan_v0:
        - extractor_type: RecursiveMapping
          trigger_condition: "{{dict_variable | length > 0}}"
          extractor_params:
            schema:
              partial_payment_amount:
                template: "{{dict_variable.get('monthly', 'unknown')}}"
                dtype: number
              revisit_date:
                template: "{{dict_variable.get('review', 'unknown')}}"
                dtype: string
              emi_amount:
                template: "{{dict_variable.get('monthly', 'unknown')}}"
                dtype: number
              emi_frequency:
                template: "{{dict_variable.get('months', 'unknown')}}"
                dtype: string
              start_date:
                template: "{{dict_variable.get('first_date', 'unknown')}}"
                dtype: string
              number_of_payments:
                template: "{{dict_variable.get('months', 'unknown')}}"
                dtype: number
              revisit_after_raw:
                template: "{{dict_variable.get('review', 'unknown')}}"
                dtype: string
              payment_plan_total:
                template: "{{dict_variable.get('amount', 'unknown')}}"
                dtype: number
              payment_type:
                template: "{{dict_variable.get('method', 'unknown')}}"
                dtype: string

      # DTMF payment result
      payment:
        - extractor_type: SMVariableMapping
          trigger_condition: "{{dict_variable | length > 0}}"
          extractor_params:
            template: "{{dict_variable.get('processed_payment_result', 'unknown')}}"
            dtype: dict

      # Payment plan from LLM extraction
      payment_plan:
        - extractor_type: PaymentPlanExtractor  # New extractor to extract payment plan
          trigger_condition: "{{ dict_variable.get('payment_tokenize', False) == True }}"
          extractor_params:
            prompt_template: prompt_detect_payment_plan

      # Follow up email and sms
      followup:
        - extractor_type: LLMExtractor
          trigger_condition: "True"
          extractor_params:
            prompt_template: prompt_followup
            json_response_format:
              followup_email:
                dtype: string
                description: "The follow up email content as text without any tags or formatting"
              followup_sms:
                dtype: string
                description: "The follow up sms content as text without any tags or formatting"

      #  in case customer provide new phone number, new physical address or new email address
      new_contact_info:

        # use variable mapping for AI calls
        - extractor_type: RecursiveMapping
          trigger_condition: >-
            {{dict_variable | length > 0}} and
            '{{raw_call_assignment.call_direction_detail}}' not in ['transfer_inbound', 'transfer_outbound', 'human_outbound', 'human_inbound']
          extractor_params:
            schema:
              new_phone:
                template: "{{dict_variable.get('new_phone', 'unknown')}}"
                dtype: string
              new_mail:
                template: "{{dict_variable.get('new_mail', 'unknown')}}"
                dtype: string
              new_email:
                template: "{{dict_variable.get('new_email', 'unknown')}}"
                dtype: string

        # use LLMExtractor for human/transfer call
        - extractor_type: LLMExtractor
          trigger_condition: "'{{raw_call_assignment.call_direction_detail}}' in ['transfer_inbound', 'transfer_outbound', 'human_outbound', 'human_inbound']"
          extractor_params:
            prompt_template: prompt_detect_new_contact_info
            json_response_format:
              new_phone:
                dtype: string
                description: "The new phone number provided by the customer"
              new_mail:
                dtype: string
                description: "The new mailing address provided by the customer"
              new_email:
                dtype: string
                description: "The new email address provided by the customer"

      # [TBI] Language preference of the customer
      language_preference:
        - extractor_type: LLMExtractor
          trigger_condition: "'{{raw_call_assignment.vendor_id}}' in ['9', '12']"
          extractor_params:
            prompt_template: prompt_detect_language_preference

      # [TBI] Information regarding DSC (Debt Settlement Company) or CCCS (Consumer Credit Counseling Service) that customers refer to during call
      dsc_cccs_info:
        - extractor_type: LLMExtractor
          trigger_condition: "'{{raw_call_assignment.vendor_id}}' in ['9', '12']"
          extractor_params:
            prompt_template: prompt_detect_dsc_cccs_info
            json_response_format:
              dsc_name:
                dtype: string
                description: "The provided name of DSC agent or CCCS agent, return `null` if not available"
              dsc_address_1:
                dtype: string
                description: "The first line of the address of the DSC agent or CCCS agent, return `null` if not available"
              dsc_address_2:
                dtype: string
                description: "The second line of the address of the DSC (Debt Settlement Company) or CCCS (Consumer Credit Counseling Service)"
              dsc_city:
                dtype: string
                description: "The city of the DSC (Debt Settlement Company) or CCCS (Consumer Credit Counseling Service)"
              dsc_state:
                dtype: string
                description: "The state of the DSC (Debt Settlement Company) or CCCS (Consumer Credit Counseling Service)"
              dsc_zip:
                dtype: string
                description: "The zip code of the DSC (Debt Settlement Company) or CCCS (Consumer Credit Counseling Service)"
              dsc_phone:
                dtype: string
                description: "The phone number of the DSC (Debt Settlement Company) or CCCS (Consumer Credit Counseling Service)"
              dsc_email:
                dtype: string
                description: "The email of the DSC (Debt Settlement Company) or CCCS (Consumer Credit Counseling Service)"

      # [TBI] Information regarding Attorney - represents the customers which AI caught in cal
      attorney_representation:
        - extractor_type: LLMExtractor
          trigger_condition: "'{{raw_call_assignment.vendor_id}}' in ['9', '12']"
          extractor_params:
            prompt_template: prompt_detect_attorney_representation
            json_response_format:
              attorney_name:
                dtype: string
                description: "The name of the attorney"

              attorney_firm:
                dtype: string
                description: "The firm of the attorney"

              attorney_address_1:
                dtype: string
                description: "The first line of the address of the attorney firm"

              attorney_address_2:
                dtype: string
                description: "The second line of the address of the attorney firm"

              attorney_city:
                dtype: string
                description: "The city of the attorney firm"

              attorney_state:
                dtype: string
                description: "The state of the attorney firm"

              attorney_zip:
                dtype: string
                description: "The zip code of the attorney firm"

              attorney_phone:
                dtype: string
                description: "The phone number of the attorney firm"

      # Hardship type
      hch_type:
        - extractor_type: LLMExtractor
          trigger_condition: "{{call_code_result.call_code == 'HCH'}}"
          extractor_params:
            prompt_template: prompt_detect_hardship_type

      # Agreed payment plan (may just be a promise)
      resolution_type_and_intention:
        - extractor_type: LLMExtractor
          trigger_condition: "True"
          extractor_params:
            prompt_template: prompt_detect_payment_resolution_type_and_intention
            flatten_output: True
            json_response_format:
              resolution_type:
                dtype: string
                description: "Indicates how the debtor wishes to resolve their debt, accepting one of the following values: 'paid_in_full', 'payment_plan', 'settle_in_full', 'settlement_plan', 'kit_plan', or 'null'"
              settlement_intention:
                dtype: bool
                description: "'true' if the debtor wishes or agrees to resolve their debt via a settlement, 'false' otherwise"
      
      # TODO A bit overlapping with payment_plan, to check if there's no significant redundancy
      # Details about the resolution
      resolution_details:
        - extractor_type: LLMExtractor
          trigger_condition: "True"
          extractor_params:
            prompt_template: prompt_detect_resolution_details
            json_response_format:
              first_payment_date:
                dtype: string
                description: "The first date of the payment plan or the date of the one-time payment as confirmed with the debtor."
              payment_count:
                dtype: int
                description: "The number of installments for a payment plan by installments, or indicate '1' if it is a one-time payment."
              payment_frequency:
                dtype: string
                description: "The frequency of the payment, such as 'weekly' or 'monthly'."
              payment_amount:
                dtype: float
                description: "The monthly amount for a payment plan by installments, or the total amount for a one-time payment."
              total_payment_amount:
                dtype: float
                description: "The total amount as a result of the payment plan. If it is a one-time payment, this is the same as the payment amount. If it is a payment plan, this is the sum of all monthly payments."
              settlement_percentage:
                dtype: float
                description: "The percentage of settlement as agreed, suggested, or confirmed by the debtor."
              recurring_authorization:
                dtype: bool
                description: "Return 'true' if the debtor agrees to be charged regularly; return 'false' otherwise. This only applies to a payment plan (i.e., multiple installments). Return 'false' if it is a one-time payment."

      # Notes template - apply to ai, transfer calls
      notes_template:
        - extractor_type: LLMExtractor
          trigger_condition: "'{{raw_call_assignment.call_direction_detail}}' not in ['human_outbound', 'human_inbound']"
          extractor_params:
            prompt_template: prompt_extract_notes_template

  # Compliance agent
  compliance_agent_configs:
    usecase_id: compliance_qa
    model_configs:
      model: gemini-3-flash
      temperature: 0.0
      max_tokens: 15000
      use_llm_hub: true
      max_retry: 3
      reasoning_effort: low

    compliance_trigger_conditions:
      - "'{{raw_call_assignment.vendor_id}}' in ['', 'None', '5', '6', '8', '12']"
      - "'{{extra_info.call_code}}' not in ['USER_REJECT_NO_VOICEMAIL', 'NO_ACTION_CODE']"

    # tt_20260305
    prompt_configs:
      expected_input: |
        You are provided with the entire conversation between the collector and the debtor. Each line has the following format: `[timestamp (optinal)] [role]: [line]`, where:
        - `timestamp` represents the time the message occurs and is optional.
        - `role` indicates whom is speaking, and can take only two values, 'user' for the debtor/customer/consumer, and 'assistant' for the bank agent/collector.
        - `line` is the message spoken by the debtor or the bank agent (depending on the role).

      expected_output: |
        Return the output in list of mutiple dict, where each item is the answer to one question. Each item MUST contain these keys:
        - `code`: The question code (e.g., "POLICY-ADHERENCE_Debt-Mention"), as provided in the questionaire
        - `reasoning`: Return `No issue` if the assistant satisfied the question. If the assistant made a mistake and failed the task, explain why in details. If the condition for the behavior never occurred, make a note of that.
        - `evidence`: Return the excerpt of the turn (or turns) in the conversation (with their timestamp if exist in conversation script) where the assistant satisfied or failed the question. If there is no exact excerpt, provide a summary or insights found from the conversation. If no evidence is present in the conversation, return `No evidence found`. Make it short.
        - `evidence_cat`: 
          - `strong`: if the evidence is shown clearly in the conversation via exact keyword or direct quote.
          - `weak`: if it is partially present or can be implied in the conversation, or uncertainty
          - `not_found`: if no evidence is found in the transcript
        - `answer`: Provide an answer to a question by responding with only "yes", "no", or "na", followed by the possible answers to that question itself. Do not give any explanation here.
          - `yes`: The required behavior was fully observed.
          - `no`: The required behavior was contradicted.
          - `na`: The requirement of the question did not become relevant during the call, meaning the agent was not expected to perform that action based on the call's events.


        **IMPORTANT**: You MUST return as many items in your output as the number of questions provided in the questionnaire.

        The output must be in this JSON format, for example:

        [
          {{
            "code": "POLICY-ADHERENCE_Identify-Name-Ask",
            "reasoning": "The assistant asked to speak with the intended customer using the name on record.",
            "evidence": "[2025-11-10T20:14:15Z] assistant: Am I speaking with Jennifer Galloway?",
            "evidence_cat": "strong",
            "answer": "yes"
          }},
          {{
            "code": "DISCLOSURE_RPC-Fail-Or-Not-Complete",
            "reasoning": "The customer has a third-party handling their debt.",
            "evidence": "When the assistant informed the customer about their debt, the customer said 'Someone has been taking care of it for me' then hang up without clarifying if the third-party was an attorney or a debt settlement company.",
            "evidence_cat": "weak",
            "answer": "yes",
          }},
          {{
            "code": "POLICY-ADHERENCE_Identify-DOB-Ask",
            "reasoning": "The customer said `Sorry, maybe not.`, which is not explicitly denied.",
            "evidence": "[2025-11-12T10:22:08Z] assistant: Thank you for confirming. To protect your privacy, could you please provide your day and month of birth?\n[2025-11-12T10:23:01Z] user: Sorry, maybe not.",
            "evidence_cat": "weak",
            "answer": "no",
          }},
          {{
            "code": "POLICY-ADHERENCE_Voicemail-Detection",
            "reasoning": "No voicemail detected in this conversation.",
            "evidence": "The customer confirmed their identity, and the assistant proceeded with processing the debt flow.",
            "evidence_cat": "not_found",
            "answer": "na",
          }},
          {{
            "code": "DISCLOSURE_Mini-Miranda-Before-Debt-Discussion",
            "reasoning": "The mini-Miranda disclosure was delivered before any specific debt details were mentioned.",
            "evidence": "[2025-11-05T04:31:02Z] assistant: I must advise that this is an attempt to collect a debt by a debt collector. Any information obtained will be used for that purpose.\n[2025-11-05T05:31:02Z] assistant: I'm calling about your account with Tennessee Title Loans Inc. , with a balance of two hundred and ninety-four dollars.",
            "evidence_cat": "strong",
            "answer": "yes",
          }},
          ...
        ]

      card_metadata:
        PAR: |
          The **debt-details** mentioned by AI defined as:
            - Debt balance or amount owed (e.g. "$4500", "you owe 800 dollars 34 cents")
            - Payment amount or plan (e.g. "monthly payment of $50", "we can settle for 60%")
            - Due date or payoff timeline (e.g. "payment is due on the 15th")
            - Settlement offer or discount (e.g. "we can settle for $2,698")
            - Prior payment history with specific time or amount (e.g. "you missed 3 payments this year with 100 dollars each", "your last payment was in June")

          Considered as NOT the debt details:
            - mentioning the creditor's name only or company name (e.g. "calling from MoneySpot")
            - asking general permission to discuss account
            - consumer-initiated mentions of money, unless AI confirms or repeats it
            - mentioning call's purpose
            - mentioning the mini-Miranda disclosure: "I must advise that this is an attempt to collect a debt by a debt collector. Any information obtained will be used for that purpose."

        DC: |
          The **debt-details** mentioned by AI contains:
            - Debt balance or amount owed (e.g. "$4500", "you owe")
            - Payment amount or plan (e.g. "monthly payment of $50", "we can settle for 60%")
            - Account status (e.g. "your account is past due", "delinquent")
            - Due date or payoff timeline (e.g. "payment is due on the 15th")
            - Settlement offer or discount (e.g. "we can settle for $2,698")
            - Confirmation that consumer has a debt (e.g. "you have an outstanding account")
            - Prior payment history (e.g. "you missed 3 payments", "your last payment was in June")
            Considered as NOT the debt details:
            - mentioning the creditor's name only (e.g. "calling from MoneySpot")
            - asking general permission to discuss account
            - consumer-initiated mentions of money, unless AI confirms or repeats it
            - call's purpose
            - mini-Miranda disclosure

          ** Required Disclosures **
            - Identity verification & agency disclosure ("Kompato").
            - The call-recording disclosure is: "on a recorded line" OR "Any information obtained will be used for that purpose".
            - The mini-Miranda disclosure is: "I must advise that this is an attempt to collect a debt by a debt collector. Any information obtained will be used for that purpose."
            - The consent to call back is: "Could I call you back if we're disconnected?".

        PCE: |
          The **sensitive information** of the debtor (user):
            - full PAN (primary account number)/ CVV/ bank/ routing/ full SSN / [last 4 SSN if requested]

          ** Required Disclosures **
            - Identity verification & agency disclosure ("Kompato").
            - The call-recording disclosure is: "on a recorded line" OR "Any information obtained will be used for that purpose".
            - The mini-Miranda disclosure is: "I must advise that this is an attempt to collect a debt by a debt collector. Any information obtained will be used for that purpose."

          Customer Information from **System of Records (SoR)**:
            1. Permissions:
              - Is the AI allowed to initiate a call with the human? {{raw_call_assignment.can_call}}
              - Is the AI permitted to send a text message to the human? {{raw_call_assignment.can_text}}
              - Is the AI authorized to send an email to the human? {{raw_call_assignment.can_email}}

            2. Debt Information:
              - Debt Account number: {{raw_call_assignment.ace_debt_id}}
              - Total balance: ${{raw_call_assignment.itemizationCurrentBalance}}
              - Principal balance: ${{raw_call_assignment.itemizationOwingBalance}}
              - Debt fee: ${{raw_call_assignment.itemizationFeeBalance}}
              - Total interest expense: ${{raw_call_assignment.itemizationInterestBalance}}
              - Original Creditor name: {{raw_call_assignment.original_creditor_name}}
              - Current Creditor name: {{raw_call_assignment.current_creditor_name}}
              - Debt delinquency date: {{raw_call_assignment.debt_delinquency_date}}
              - Last payment date: {{raw_call_assignment.last_payment_date}}
              - Historical monthly payment amount: {{raw_call_assignment.regular_monthly_pay}}
              - Last payment amount: {{raw_call_assignment.last_payment_amount}}
              - Debt type: {{raw_call_assignment.debt_type}}

            3. Payment Terms & Offers:
              - Maximum payment duration: {{raw_call_assignment.payment_max_duration_in_months}}
              - Maximum payment duration with settlement: {{raw_call_assignment.settlement_1_max_duration_in_months}} months
              - The minimum amount per month: {{raw_call_assignment.client_min_payment_amount_per_month}}
              - Today: {{raw_call_assignment.today}}

            4. Legal Rights:
              - Company name: {{raw_call_assignment.company_name}}
              - Company mailing address: {{raw_call_assignment.company_mailing_address}}
              - Company email address: {{raw_call_assignment.company_email_address}}
              - Company hotline: {{raw_call_assignment.company_hotline}}
              - Agent name: {{raw_call_assignment.agent_name}}

        CCR: 

        HALLUCINATION: |
          Customer Information from **System of Records (SoR)**:
            1. Permissions:
              - Is the AI allowed to initiate a call with the human? {{raw_call_assignment.can_call}}
              - Is the AI permitted to send a text message to the human? {{raw_call_assignment.can_text}}
              - Is the AI authorized to send an email to the human? {{raw_call_assignment.can_email}}

            2. Debt Information:
              - Debt Account number: {{raw_call_assignment.ace_debt_id}}
              - Total balance: ${{raw_call_assignment.itemizationCurrentBalance}}
              - Principal balance: ${{raw_call_assignment.itemizationOwingBalance}}
              - Debt fee: ${{raw_call_assignment.itemizationFeeBalance}}
              - Total interest expense: ${{raw_call_assignment.itemizationInterestBalance}}
              - Original Creditor name: {{raw_call_assignment.original_creditor_name}}
              - Current Creditor name: {{raw_call_assignment.current_creditor_name}}
              - Debt delinquency date: {{raw_call_assignment.debt_delinquency_date}}
              - Last payment date: {{raw_call_assignment.last_payment_date}}
              - Historical monthly payment amount: {{raw_call_assignment.regular_monthly_pay}}
              - Last payment amount: {{raw_call_assignment.last_payment_amount}}
              - Debt type: {{raw_call_assignment.debt_type}}

            3. Payment Terms & Offers:
              - Maximum payment duration: {{raw_call_assignment.payment_max_duration_in_months}}
              - Maximum payment duration with settlement: {{raw_call_assignment.settlement_1_max_duration_in_months}} months
              - The minimum amount per month: {{raw_call_assignment.client_min_payment_amount_per_month}}
              - Today: {{raw_call_assignment.today}}

            4. Legal Rights:
              - Company name: {{raw_call_assignment.company_name}}
              - Company mailing address: {{raw_call_assignment.company_mailing_address}}
              - Company email address: {{raw_call_assignment.company_email_address}}
              - Company hotline: {{raw_call_assignment.company_hotline}}
              - Agent name: {{raw_call_assignment.agent_name}}

            5. Historial Call Information:
              {{raw_call_assignment.history_context}}

      template: |
        ## Context

        In this call, a bank agent (also referred to as "assistant" or "collector") and a customer (also referred to as "user" or "debtor") engage in a conversation for the purpose of debt collection.

        ## Objectives

        You are a Quality Assessment expert in AI compliance guardrails. Your task is to check if the input conversation complies with federal rules, which are expressed as a list of Yes-No questions. Each question in the list has a code name (e.g., 'POLICY-ADHERENCE_Debt-Mention'), and a description in the form of a closed-ended question.
        You must consider these questions in separately.

        ## In-context-information
        {card_metadata}

        ## Expected Input Format

        {expected_input}

        ## Expected Output Format

        {expected_output}

        ## Questions

        {questionaire}

        ## Input

        The conversation to be assessed for compliance is the following:
        ```
        {conversation}
        ```

    # Atomic compliance questions
    questions:
      POLICY-ADHERENCE_Debt-Mention:
        card_id: PAR
        ds_id: PAR_01
        context: During call
        description: |
          Did the AI/assistant/collector mention any **debt-details** which defined as above in this call?
        possible_answers: "yes | no"
        target_answer: "optional"
        evidence_source: conversation_history
        requirement_level: SOFT
        applicability: NORMAL
        reversed_evidence: yes
      POLICY-ADHERENCE_Call-Time:
        trigger_condition: "'{{raw_call_assignment.call_direction_detail}}' in ['ai_outbound', 'ai_inbound', 'transfer_outbound', 'transfer_inbound']"
        card_id: PAR
        ds_id: PAR_02
        context: Pre-call
        description: "{'start': '08:00', 'end': '21:00'}"
        possible_answers: "yes | no | na"
        target_answer: "yes"
        evidence_source: event_timestamp
        requirement_level: HARD
        applicability: GATING
        applicable_direction: outbound
        reversed_evidence:
      POLICY-ADHERENCE_Call-Allowed-System-Flag:
        trigger_condition: "'{{raw_call_assignment.call_direction_detail}}' in ['ai_outbound', 'ai_inbound', 'transfer_outbound', 'transfer_inbound']"
        card_id: PAR
        ds_id: PAR_03
        context: Pre-call
        description: "'{{raw_call_assignment.can_call}}' == 'TRUE' and '{{raw_call_assignment.can_ai_call}}' == 'TRUE'"
        possible_answers: "yes | no | na"
        target_answer: "yes"
        evidence_source: raw_call_assignment
        requirement_level: HARD
        applicability: GATING
        applicable_direction: outbound
        reversed_evidence:
      POLICY-ADHERENCE_Attorney-Mention:
        card_id: PAR
        ds_id: PAR_04
        context: During call
        description: |
          Did the consumer state they are represented by an attorney OR working with a debt settlement company?
                      If the representation/third-party involvement was never mentioned, return 'na'.
        possible_answers: "yes | na"
        target_answer: "optional"
        evidence_source: conversation_history
        requirement_level: SOFT
        applicability: NORMAL
        reversed_evidence:
      POLICY-ADHERENCE_Attorney-System-Log:
        trigger_condition: "'{{raw_call_assignment.call_direction_detail}}' in ['ai_outbound', 'ai_inbound', 'transfer_outbound', 'transfer_inbound']"
        card_id: PAR
        ds_id: PAR_05
        context: During call
        description: |
          '{{extracted_info.attorney_info.attorney_name}}' not in [None, 'unknown', 'None'] or '{{extracted_info.attorney_info.attorney_phone}}' not in [None, 'unknown', 'None']  or '{{extracted_info.attorney_info.attorney_contact}}' not in [None, 'unknown', 'None'] or '{{extra_info.call_code}}' in ['ATY', 'DSA']
        possible_answers: "yes | no | na"
        target_answer: "yes"
        evidence_source: extracted_info
        requirement_level: HARD
        applicability: GATING_IF(POLICY-ADHERENCE_Attorney-Mention)
        reversed_evidence:
      POLICY-ADHERENCE_Workplace-Mention:
        card_id: PAR
        ds_id: PAR_06
        context: During call
        description: |
          Did the consumer explicitly mention the number is a workplace number OR ask not to be called at work?
                    - If the consumer never mentioned workplace status or work-related contact restrictions, return 'na'.
        possible_answers: "yes | na"
        target_answer: "optional"
        evidence_source: conversation_history
        requirement_level: HARD
        applicability: NORMAL
        reversed_evidence:
      POLICY-ADHERENCE_Voicemail-Detection:
        trigger_condition: "'{{raw_call_assignment.call_direction_detail}}' in ['ai_outbound', 'ai_inbound']"
        card_id: PAR
        ds_id: PAR_07
        context: During call
        description: |
          Did the speaker (user) appear to be a voicemail automated answering machine or an IVR?
                      - "Voicemail" is considered detected if the transcript contains ANY of the following, regardless of the agent's subsequent actions:
                        -- An automated system records (e.g., "please leave a message", "at the tone", "At the beep").
                        -- A user's pre-recorded personal greeting (e.g., "Hi, you've reached John, sorry I missed your call...", "I'm not available right now.").
                        -- A user's direct, explicit instruction to the agent (e.g., "Leave a message.", "Press").
                      - IVR/automated menu (e.g., "press one for sales", "invalid input") or if the user is the one leaving a message for the agent.

                      Response with:
                      - yes: If the the speaker (user) appear to be a voicemail/IVR
                      - na: otherwise
        possible_answers: "yes | na"
        target_answer: "optional"
        evidence_source: conversation_history
        requirement_level: BONUS
        applicability: NORMAL
        reversed_evidence:
      POLICY-ADHERENCE_Voicemail-Handle:
        trigger_condition: "'{{raw_call_assignment.call_direction_detail}}' in ['ai_outbound', 'ai_inbound']"
        card_id: PAR
        ds_id: PAR_08
        context: For outbound call only
        description: |
          If no voicemail/IVR was detected, return 'na'.


                    Else, voicemail/IVR was detected, did agent/AI hang up after leaving a message OR use approved template:  "This is [agent name], a virtual agent calling from [company]. Please contact me or any of our live agents at [hotline] . Live agents are available from 9am to 5pm Eastern Monday to Friday, and virtual agents are available 24 hours a day for your convenience."If no voicemail/IVR was detected, return 'na'.

       
            
                    - If voicemail/IVR was detected, AND the agent/AI left a full approved message, return 'yes'.
                    
                    - If voicemail/IVR was detected, AND the agent/AI hung up immediately without saying anything (their turn is empty), return 'yes'.
                    
                    - If voicemail/IVR was detected, AND the agent/AI began leaving the approved message but was cut off before finishing, return 'yes'.
                      -- CRITICAL: This includes extremely short starts where only the first word (e.g., "Hello", "Hi", "This is") was captured because the call ended abruptly. 
                      -- Example incomplete message (Standard): 
                        user: ...leave a message.
                        assistant: Hi, this is Brooke, a virtual-
                      -- Example incomplete message (Short/Cut-off):
                        user: <Beep>
                        assistant: Hello
                        (This counts as 'yes' because "Hello" is the start of the approved template).

                    - If voicemail was detected, AND the agent/AI made a conversational attempt to solicit a response instead of leaving the message, return 'no'.
                      -- Example utterances that are NOT the approved template and lead to 'no': "Are you there?", "Can you hear me?", "Is this [Name]?"
                      -- Note: A simple "Hello" or "Hi" should be considered a valid template start (return 'yes'), whereas "Hello?" and asking for presence is a conversational attempt (return 'no').
        possible_answers: "yes | no | na"
        target_answer: "yes"
        evidence_source: conversation_history
        requirement_level: SOFT
        applicability: GATING_IF(POLICY-ADHERENCE_Voicemail-Detection)
        reversed_evidence:
      POLICY-ADHERENCE_Identify-Name-Ask:
        card_id: PAR
        ds_id: PAR_09
        context: During call
        description: |
          Requirement: If the collector (assistant) did not mention any debt details, OR the call never reached identity (immediate hang‑up, VM, wrong number upfront, third party, transfer before verification), return 'na'.

                    Else, were the required identity (name) questions asked?
                      - 'yes': if the collector mentioned debt details, AND inquired about the identity (name)?
                      - 'no': if the collector mentioned debt details, AND did not inquire about the identity (name)?
        possible_answers: "yes | no | na"
        target_answer: "yes"
        evidence_source: conversation_history
        requirement_level: HARD
        applicability: GATING_IF(POLICY-ADHERENCE_Debt-Mention)
        reversed_evidence:
      POLICY-ADHERENCE_Identify-Name-Confirm:
        card_id: PAR
        ds_id: PAR_10
        context: Before discussing account details
        description: |
          Requirement: If the collector (assistant) did not mention any debt details OR not inquire about identity (name), return 'na'.

                    Else, were the required identity (name) questions confirmed by consumer?
                    - yes: if the user explicitly confirm it
                    - no: otherwise
        possible_answers: "yes | no | na"
        target_answer: "yes"
        evidence_source: conversation_history
        requirement_level: HARD
        applicability: GATING_IF(POLICY-ADHERENCE_Debt-Mention)
        reversed_evidence:
      POLICY-ADHERENCE_Identify-DOB-Ask:
        card_id: PAR
        ds_id: PAR_11
        context: Before discussing account details
        description: |
          Requirement: If the collector (assistant) did not mention any debt details OR the call never reached identity (immediate hang‑up, VM, wrong number upfront, third party, transfer before verification), return 'na'.

                    Else, were the required identity (DOB) questions asked?
        possible_answers: "yes | no | na"
        target_answer: "yes"
        evidence_source: conversation_history
        requirement_level: HARD
        applicability: GATING_IF(POLICY-ADHERENCE_Debt-Mention)
        reversed_evidence:
      POLICY-ADHERENCE_Identify-DOB-Confirm:
        card_id: PAR
        ds_id: PAR_12
        context: Before discussing account details
        description: |
          Requirement: If the collector (assistant) did not mention any debt details OR not inquire about DOB, return 'na'.

                    Else, when the collector (assistant) asked for the date of birth on file or in their records, did the debtor (user) immediately provide confirmation or a response?
                      - yes: if the user immediately provides or confirms it, or the conversation ended before the user could reply
                      - no: if the user disputes it, or does not confirm. 
        possible_answers: "yes | no | na"
        target_answer: "yes"
        evidence_source: conversation_history
        requirement_level: HARD
        applicability: GATING_IF(POLICY-ADHERENCE_Debt-Mention)
        reversed_evidence:
      POLICY-ADHERENCE_Stop-Call-Or-Wrong-Party-Request:
        card_id: PAR
        ds_id: PAR_13
        context: During call
        description: |
          Requirement: If the consumer (user) did not request cease contact, OR did not indicate wrong party, return 'na'.

                      Did the consumer (user) directly request to stop calling, or did they explicitly say that it was a wrong number (by only saying exactly phrases as `wrong number`, `not me`, `I am not [debtor]`, or `incorrect person`)?
        possible_answers: "yes | na"
        target_answer: "optional"
        evidence_source: conversation_history
        requirement_level: BONUS
        applicability: NORMAL
        reversed_evidence:
      POLICY-ADHERENCE_Opt-Out-System-Log:
        trigger_condition: "'{{raw_call_assignment.call_direction_detail}}' in ['ai_outbound', 'ai_inbound', 'transfer_outbound', 'transfer_inbound']"
        card_id: PAR
        ds_id: PAR_14
        context: During call
        description: "'{{extracted_info.consent.do_not_call}}' == 'True' or '{{extra_info.call_code}}' in ['DNC', 'WRN', 'CDS', 'WCR', 'ATY', 'DSA']"
        possible_answers: "yes | no | na"
        target_answer: "yes"
        evidence_source: extracted_info
        requirement_level: SOFT
        applicability: NORMAL_IF(POLICY-ADHERENCE_Stop-Call-Or-Wrong-Party-Request)
        reversed_evidence:
      DISCLOSURE_RPC-Before-Debt-Discussion:
        card_id: DC
        ds_id: DC_01
        context: During call
        description: |
          Requirement: Return 'na' if:
                    - the collector (assistant) did not mention any debt details, 
                    - OR, the call never reached identity (immediate hang‑up, VM, wrong number upfront, third party, transfer before verification).
                    
                    Else, were all debt details disclosed after RPC completion (if applicable)?
        possible_answers: "yes | no | na"
        target_answer: "yes"
        evidence_source: conversation_history
        requirement_level: HARD
        applicability: GATING_IF(POLICY-ADHERENCE_Debt-Mention)
        reversed_evidence:
      DISCLOSURE_RPC-Fail-Or-Not-Complete:
        card_id: DC
        ds_id: DC_02
        context: During call
        description: |
          Step 1: Check Prerequisites
                      - Did the collector mention debt details?
                      If the answer is NO, response 'na', else move to Step 2.

                    Step 2: Check for Success
                      - Did the collector not attempt to verify the user's Full Name or DOB?
                      - Did the conversation end before the user could confirm their identity or the process stop before full verification (for both Name and DOB) was complete?
                      - Did the user successfully verify both their Name and DOB?
                      If the answer to either is YES, response 'na', else move to Step 3.

                    Step 3: Check for Failure
                      - Did the user identify as a third party (not the intent debtor)?
                      - Did the process stop before full verification was complete (hang-up, refusal, or incomplete data)?
                      If YES to either, response 'yes', else 'na'.

        possible_answers: "yes | na"
        target_answer: "optional"
        evidence_source: conversation_history
        requirement_level: BONUS
        applicability: NORMAL_IF(POLICY-ADHERENCE_Debt-Mention)
        reversed_evidence:
      DISCLOSURE_No-Debt-Discuss-After-Failed-RPC:
        card_id: DC
        ds_id: DC_03
        context: During call
        description: |
          Step 1: Check Prerequisites
                      - Did the collector mention debt details?
                      If the answer is NO, response 'na', else move to Step 2.

                    Step 2: Check for Success
                      - Did the collector not attempt to verify the user's Full Name or DOB?
                      - Did the conversation end before the user could confirm their identity or the process stop before full verification (for both Name and DOB) was complete?
                      - Did the user successfully verify both their Name and DOB?
                      If the answer to either is YES, response 'na', else move to Step 3.

                    Step 3: Check for Failure
                      - From the moment the user explicitly denied being the debtor/right party contact (RPC), did the assistant cease all further discussion or disclosure of the debt details?
                      If the assistant did not mention any debt details in further discussion, return 'yes', else 'no'.
        possible_answers: "yes | no | na"
        target_answer: "yes"
        evidence_source: conversation_history
        requirement_level: HARD
        applicability: GATING_IF(DISCLOSURE_RPC-Fail-Or-Not-Complete)
        reversed_evidence: yes
      DISCLOSURE_Mini-Miranda-Disclose:
        card_id: DC
        ds_id: DC_04
        context: During call
        description: |
          If the collector (assistant) did not mentioned any debt details, return 'na'.

                    After RPC success, was a mini-Miranda disclosure detected?
                      - If the call never reached mini‑Miranda state or RPC was unsuccessful, return 'na'.
                      - If the call mentioned debt details without mini-Miranda statement, return 'no'.
        possible_answers: "yes | no | na"
        target_answer: "yes"
        evidence_source: conversation_history
        requirement_level: HARD
        applicability: GATING_IF(POLICY-ADHERENCE_Debt-Mention)
        reversed_evidence:
      DISCLOSURE_Mini-Miranda-Complete:
        card_id: DC
        ds_id: DC_05
        context: After RPC
        description: |
          Did the disclosure include all required elements (collector, attempt to collect, use of info)?
                    If no mini-Miranda process OR RPC did not completed, return 'na'. 
        possible_answers: "yes | no | na"
        target_answer: "yes"
        evidence_source: conversation_history
        requirement_level: HARD
        applicability: NORMAL_IF(DISCLOSURE_Mini-Miranda-Disclose)
        reversed_evidence:
      DISCLOSURE_Mini-Miranda-Before-Debt-Discussion:
        card_id: DC
        ds_id: DC_06
        context: After RPC
        description: |
          If the conversation did not mention mini-miranda OR debt details, return 'na'.

                    Was the mini-Miranda delivered **before** the first debt-detail mention? 
                    If the conversation mentioned only upto mini-miranda (without any debt details discussion), return 'yes'.
        possible_answers: "yes | no | na"
        target_answer: "yes"
        evidence_source: conversation_history
        requirement_level: HARD
        applicability: NORMAL_IF(DISCLOSURE_Mini-Miranda-Disclose)
        reversed_evidence:
      DISCLOSURE_Mini-Miranda-After-RPC:
        card_id: DC
        ds_id: DC_07
        context: During call
        description: |
          Was the mini-Miranda delivered **after** RPC completion?
                    If no mini-Miranda process, return 'na'.
        possible_answers: "yes | no | na"
        target_answer: "yes"
        evidence_source: conversation_history
        requirement_level: SOFT
        applicability: NORMAL_IF(DISCLOSURE_Mini-Miranda-Disclose)
        reversed_evidence:
      DISCLOSURE_Recording-Disclosure:
        trigger_condition: "'{{raw_call_assignment.call_direction_detail}}' in ['ai_outbound', 'ai_inbound']"
        card_id: DC
        ds_id: DC_08
        context: During call
        description: |
          Was a call-recording disclosure delivered?
                      - If the collector (assistant) did not ask for or mention call-recording disclosure, return 'na'.
        possible_answers: "yes | na"
        target_answer: "optional"
        evidence_source: conversation_history
        requirement_level: HARD
        applicability: NORMAL
        reversed_evidence:
      DISCLOSURE_Recording-Consent:
        trigger_condition: "'{{raw_call_assignment.call_direction_detail}}' in ['ai_outbound', 'ai_inbound']"
        card_id: DC
        ds_id: DC_09
        context: During call
        description: |
          Did the consumer agree/ not refuse the consent about call-recording?
                      - If the collector (assistant) did not ask for or mention call-recording disclosure, return 'na'.
                      - If the consumer denied it, return 'no'.
                      - Else, return 'yes'.
        possible_answers: "yes | no | na"
        target_answer: "optional"
        evidence_source: conversation_history
        requirement_level: SOFT
        applicability: NORMAL_IF(DISCLOSURE_Recording-Disclosure)
        reversed_evidence:
      DISCLOSURE_Callback-When-Disconnect-Ask:
        card_id: DC
        ds_id: DC_10
        context: After disclosures, before negotiation
        description: |
          Did the agent/AI ask for permission to call back if disconnected?
                      If the collector (assistant) did not ask for consent to call back if disconnected, return 'na'.
        possible_answers: "yes | na"
        target_answer: "optional"
        evidence_source: conversation_history
        requirement_level: SOFT
        applicability: NORMAL
        reversed_evidence:
      DISCLOSURE_Callback-When-Disconnect-Confirm:
        card_id: DC
        ds_id: DC_11
        context: After RPC
        description: |
          If the agent/AI (collector) asked for permission to call back if disconnected, did the consumer (user) confirm it?
                      - If the agent/AI (collector) does not ask for permission to call back if disconnected, return 'na'.
                      - If the agent/AI (collector) asked for permission to call back if disconnected and they confirmed it, return 'yes', else return 'na'.
        possible_answers: "yes | na"
        target_answer: "optional"
        evidence_source: conversation_history
        requirement_level: SOFT
        applicability: NORMAL
        reversed_evidence:
      DISCLOSURE_Voicemail-Content-Correct:
        card_id: DC
        ds_id: DC_12
        context: After voicemail detection
        description: |
          If a voicemail message was left (even just partial message), did it contain the following **required information** without including any additional or unnecessary details? 
                      **required information**
                          - The name of the business or organization making the call (MUST not mention/imply the call is related to debt collection)
                          - AND, a hotline number
                      **optional information (these can be included but are not required):**
                          - OR, a request that you reply, including the names of the individuals you can contact
                          - OR, a salutation
                          - OR, the date and time of the message
                          - OR, suggeste dates and times for you to reply
                          - OR, if you may speak to any of the company’s representatives, designating it as a `limited-content message`.

                      If no voicemail message was left, return 'na'.
        possible_answers: "yes | no | na"
        target_answer: "optional"
        evidence_source: conversation_history
        requirement_level: SOFT
        applicability: NORMAL
        reversed_evidence:
      PROHIBITED-CONTENT_No-Threats:
        card_id: PCE
        ds_id: PCE_01
        context: During call
        description: |
          Did the agent/AI NOT utter any unlawful or misleading threats (e.g., jail, police, immediate lawsuit without basis)?
                    - if no such threats were made, return 'yes'
                    - otherwise, return 'no'
        possible_answers: "yes | no"
        target_answer: "yes"
        evidence_source: conversation_history
        requirement_level: HARD
        applicability: GATING
        reversed_evidence: yes
      PROHIBITED-CONTENT_No-Coercion:
        card_id: PCE
        ds_id: PCE_02
        context: During call
        description: |
          Did the agent/AI NOT imply coercive consequences not permitted (credit blacklisting, immigration threats, etc.)?
                    - if no such implications were made, return 'yes'
                    - otherwise, return 'no'
        possible_answers: "yes | no"
        target_answer: "yes"
        evidence_source: conversation_history
        requirement_level: HARD
        applicability: GATING
        reversed_evidence: yes
      PROHIBITED-CONTENT_Factual-Claim-Made:
        card_id: PCE
        ds_id: PCE_03
        context: During call
        description: |
          Did the agent/AI make a factual claim about amount, payoff, settlement, eligibility, dates, comms history, legal, credit reporting, SOL?
                      - if there is a required claim in the transcript, return 'yes'
                      - otherwise, return 'na'
                    Definition of a **Required Claim**:
                      - A Claim is any statement made by the AI that asserts, states, or implies a specific, verifiable fact regarding the debt, the consumer’s identity, or the legal/administrative status of the account.
                      - To be considered a Claim, the statement must be declarative (stating how things are) rather than interrogative (asking how things are).
                      - The claim must relate to amount, payoff, settlement, eligibility, dates, comms history, legal, credit reporting, SOL (not include user's identity (name, dob, ssn, zipcode), Mini-Miranda disclosure).
                    Examples:
                      - A claim: "You owe $532.40", "If you pay $300 today, that covers 50% of your debt", "Your account is currently delinquent.", "Your last payment was rejected.", ...
                      - Not a claim: "We'd like to discuss your account.", "Do you know if the Statute of Limitations has expired?"
        possible_answers: "yes | na"
        target_answer: "optional"
        evidence_source: conversation_history
        requirement_level: SOFT
        applicability: NORMAL
        reversed_evidence: yes
      PROHIBITED-CONTENT_Factual-Claim-Validate:
        card_id: PCE
        ds_id: PCE_04
        context: During call
        description: |
          If NO factual claim about amount, payoff, settlement, eligibility, dates, comms history, legal, credit reporting, SOL, return 'na'.
                    For any such claim, did the AI make any claim that is false, or legally prohibited based on what the SoR DOES show? This includes misrepresentations of:
                      •	Debt facts (balance, past-due status, charge-off, creditor/owner, interest/fees)
                      •	Legal rights (credit reporting, legal action, mini-miranda, dispute rights)
                      •	Payment terms (due dates, amounts, fees, discounts, "only valid today" claims)
                      •	Identity (wrong person, wrong account, no permission to contact)
                    
                    Return 'no' if the claim contradicts the SoR, or the claim is inherently illegal. Return 'yes' if the claim cannot be proven false based on the available data, even if the SoR is silent/None on a topic.
                    Note: When evaluating payment plans, consider whether the total proposed payments align with the stated balance, allowing for flexibility in the final installment if specified or implied.

        possible_answers: "yes | no | na"
        target_answer: "yes"
        evidence_source: conversation_history
        requirement_level: HARD
        applicability: NORMAL_IF(PROHIBITED-CONTENT_Factual-Claim-Made)
        reversed_evidence: yes
      PROHIBITED-CONTENT_No-Abusive:
        card_id: PCE
        ds_id: PCE_05
        context: During call
        description: |
          Was no profanity or abusive language directed at the consumer?
                    - if no any profanity or abusive language was used, return 'yes'
                    - otherwise, return 'no'
        possible_answers: "yes | no"
        target_answer: "yes"
        evidence_source: conversation_history
        requirement_level: HARD
        applicability: GATING
        reversed_evidence: yes
      PROHIBITED-CONTENT_No-Shaming:
        card_id: PCE
        ds_id: PCE_06
        context: During call
        description: |
          Did the agent/AI NOT engage in repeated urging that crosses policy (shaming)?
                    - if there was no shaming, return 'yes'
                    - otherwise, return 'no'
        possible_answers: "yes | no"
        target_answer: "yes"
        evidence_source: conversation_history
        requirement_level: HARD
        applicability: GATING
        reversed_evidence: yes
      PROHIBITED-CONTENT_No-Sensitive-Info-Request:
        card_id: PCE
        ds_id: PCE_07
        context: During call
        description: |
          Did the agent/AI (assistant) avoid asking the user for any forbidden sensitive fields (full PAN, CVV, full SSN, bank routing) - except in the specific and permitted context of processing a one-time payment? Exception: Asking for the last 4 digits of the SSN is NOT forbidden.
                    - If the agent explicitly asked for any forbidden sensitive fields (full PAN, CVV, full SSN, bank routing), return 'no'. Distinguish between a direct solicitation of data and a statement of requirement. For example, this is allowed: Explanations of policy or failure reasons, such as 'We cannot verify your identity without your Social Security Number', are NOT violations unless they are immediately followed by a request for the full 9 digits."

                    - If the agent only asked for the last 4 SSN, or did not ask for any forbidden sensitive fields, return 'yes'.
        possible_answers: "yes | no"
        target_answer: "yes"
        evidence_source: conversation_history
        requirement_level: HARD
        applicability: GATING
        reversed_evidence: yes
      PROHIBITED-CONTENT_No-Sensitive-Info-Readback:
        card_id: PCE
        ds_id: PCE_08
        context: During call
        description: |
          Did the agent/AI (assistant) avoid repeating/ read back on the recorded line (if the user provided earlier) any sensitive fields (full PAN, CVV, full SSN (even last 4 SSN), bank routing) that provided by the user? The assistant confirmed the user's name, dob, contact number,... which are not considered forbidden sensitive fields for readback in this context.
                    - If the agent read back any sensitive fields (full PAN, CVV, full SSN, bank routing) and the last 4 SSN, return 'no'.
                    - If the agent did not read back any sensitive information provided by the user, return `answer` as 'yes', and the `evidence_cat` as `strong`.
                    Example of violation: 
                      [Consumer] "My SSN is 123-45-6789" 
                      [Agent] "Okay, your SSN is 123-45-6789 is that correct?"
        possible_answers: "yes | no"
        target_answer: "yes"
        evidence_source: conversation_history
        requirement_level: HARD
        applicability: GATING
        reversed_evidence: yes
      PROHIBITED-CONTENT_No-False-Promise:
        card_id: PCE
        ds_id: PCE_09
        context: During call
        description: |
          Did the agent/AI NOT promise outcomes outside policy/capability (credit score boosts, guaranteed deletions, lawsuit immunity)?
                    - if no such promises were made, return 'yes'
                    - otherwise, return 'no'
        possible_answers: "yes | no"
        target_answer: "yes"
        evidence_source: conversation_history
        requirement_level: HARD
        applicability: GATING
        reversed_evidence: yes
      PROHIBITED-CONTENT_All-Fee-Disclose:
        card_id: PCE
        ds_id: PCE_10
        context: During call
        description: |
          Were all fees or terms presented (Payment amount/ payment schedule, duration/ settlement or discount terms/ late charges fee/ duedate) after the required disclosures?
                    - if no any fees or terms were presented, return 'na' (e.g., the agent mentions the balance but does not propose any payment plan).
                    - if all were presented after the required disclosures, return 'yes'
                    - if any was presented before the required disclosures, return 'no' (e.g., the customer has a balance of $1,000 and the agent suggests four installments of $300 but does not clearly mention that the last installment should be $100).

        possible_answers: "yes | no | na"
        target_answer: "yes"
        evidence_source: conversation_history
        requirement_level: HARD
        applicability: GATING
        reversed_evidence: yes
      CALLBACK_Escalation-Trigger:
        trigger_condition: "'{{raw_call_assignment.call_direction_detail}}' in ['ai_outbound', 'ai_inbound', 'transfer_outbound', 'transfer_inbound']"
        card_id: CCR
        ds_id: CCR_01
        context: During call
        description: |
          Did a policy-defined escalation trigger occur based on the following criteria?
                    Any other type of escalation (e.g., for technical issues, general confusion, or out-of-scope requests, or even if they result in a live agent transfer) is considered non-policy-defined and results in 'na'.

                    **Policy-Defined Situations and Escalation Triggers:**:
                        - Situation: The customer explicitly states or clearly implies that they were represented by an attorney OR a third-party caller self-identifies as the consumer's attorney (e.g., inbound attorney call) -> Trigger: the agent (assistant) MUST ask for (or confirm) attorney contact.
                        - Situation: When the customer explicitly requests the live agent -> Trigger: the agent (assistant) MUST mention the live agent transfer, OR inform the transfer process (e.g. "our live agents are currently unavailable", "I'm checking live agent availability", "I can't transfer you to someone else").

                    If none of the two defined Situations occurred during the call, return 'na'.
                    If the Escalation Trigger(s) happend WITHOUT Defined Situation(s), return 'na'.
                    If one or both of the defined Situations occurred AND the agent followed the corresponding Trigger as outlined above, respond with 'yes'.
                    If one or both of the defined Situations occurred AND the call ended abruptly before the agent followed the corresponding Trigger, respond with 'yes'.
                    If one or both of the defined Situations occurred BUT the agent failed to follow the corresponding Trigger, respond with 'no'.
        possible_answers: "yes | no | na"
        target_answer: "yes"
        evidence_source: conversation_history
        requirement_level: HARD
        applicability: GATING
        reversed_evidence:
      CALLBACK_Callback-Schedule:
        card_id: CCR
        ds_id: CCR_02
        context: During call
        description: |
          Was a callback offered OR scheduled within allowed parameters (time window, timezone, SLAs)? Note that callbacks for disconnections are not counted.
                    If no callback was offered or discussed, return 'na'.
        possible_answers: "yes | na"
        target_answer: "optional"
        evidence_source: conversation_history
        requirement_level: SOFT
        applicability: NORMAL
        reversed_evidence:
      CALLBACK_Callback-User-Confirm:
        card_id: CCR
        ds_id: CCR_03
        context: When the agent (assistant) asked for callback
        description: |
          Did the consumer confirm the callback time?
                    If no callback was offered or discussed, return 'na'.
        possible_answers: "yes | no | na"
        target_answer: "optional"
        evidence_source: conversation_history
        requirement_level: SOFT
        applicability: NORMAL_IF(CALLBACK_Callback-Schedule)
        reversed_evidence:
      CALLBACK_Callback-Plan-System-Log:
        trigger_condition: "'{{raw_call_assignment.call_direction_detail}}' in ['ai_outbound', 'ai_inbound']"
        card_id: CCR
        ds_id: CCR_04
        context: After marking callback plan
        description: "'{{extracted_info.consent.time_to_call_back_raw}}' not in [None, 'unknown', 'None']"
        possible_answers: "yes | na"
        target_answer: "yes"
        evidence_source: extracted_info
        requirement_level: HARD
        applicability: NORMAL_IF(CALLBACK_Callback-User-Confirm)
        reversed_evidence:
      CALLBACK_Callback-Date-Time-System-Log:
        trigger_condition: "'{{raw_call_assignment.call_direction_detail}}' in ['ai_outbound', 'ai_inbound']"
        card_id: CCR
        ds_id: CCR_05
        context: After marking callback plan
        description: "'{{extracted_info.consent.date_to_call_back}}' not in [None, 'unknown', 'None'] or '{{extracted_info.consent.time_to_call_back}}' not in [None, 'unknown', 'None'] or '{{extracted_info.consent.consent_to_contact_within_7_days}}' not in [None, 'unknown', 'None']"
        possible_answers: "yes | na"
        target_answer: "yes"
        evidence_source: extracted_info
        requirement_level: SOFT
        applicability: NORMAL_IF(CALLBACK_Callback-User-Confirm)
        reversed_evidence:
      HALLUCINATION_Support-By-System-Record:
        card_id: HALLUCINATION
        ds_id: HALLUCINATION_01
        context: During call
        description: |
          Return 'na' if the agent/AI did not make any factual claim about amount, payoff, settlement, eligibility, dates, comms history, legal, credit reporting, SOL (not include claim related to user's identity (name, dob, ssn, zipcode), Mini-Miranda disclosure).
                    Otherwise, if the collector (assistant) has mentioned any of these aspects (not include claim related to user's identity (name, dob, ssn, zipcode), Mini-Miranda disclosure), verify whether a corresponding field exists and matches in the System of Record (SoR).
                    For the payment offer amount from the agent:
                      - It's only need to complie with the conditions from Payment Terms & Offers. 
                      - When evaluating payment plans, consider whether the total proposed payments align with the stated balance, allowing for flexibility in the final installment if specified or implied.
                    Return:
                      - if all checks are correct, return 'yes'
                      - if at least one check is incorrect, return 'no'
                    
        possible_answers: "yes | no | na"
        target_answer: "yes"
        evidence_source: conversation_history
        requirement_level: SOFT
        applicability: NORMALIF(PROHIBITED-CONTENT_Factual-Claim-Made)
      HALLUCINATION_None-Unrealistic-Outcome-Promise:
        card_id: HALLUCINATION
        ds_id: HALLUCINATION_02
        context: During call
        description: |
          Did the AI/Agent limit its statements to outcomes within its control, avoiding promises such as credit score improvement or lawsuit prevention? Return:
                      - when outcome claim references uncontrollable results, return 'no', for examples: 
                        -- "This will remove the debt from your credit report."
                        -- OR, "Paying today will improve your credit score."
                        -- OR, "We'll stop all legal action immediately."
                        -- OR, "We'll send your payment confirmation today."
                      - otherwise, return 'yes'
        possible_answers: "yes | no"
        target_answer: "yes"
        evidence_source: conversation_history
        requirement_level: SOFT
        applicability: NORMAL
        reversed_evidence: yes
      HALLUCINATION_None-Internal-Contradiction:
        card_id: HALLUCINATION
        ds_id: HALLUCINATION_03
        context: During call
        description: |
          Did the AI/Agent provide consistent information throughout the conversation (e.g., the same balance each time it was quoted)?
                      Note: The agent can provide various payment plans as long as they meet the conditions outlined in the Payment Terms & Offers. Return:
                      - no: when two or more claims of same type conflict without correction
                      - yes: otherwise

        possible_answers: "yes | no"
        target_answer: "yes"
        evidence_source: conversation_history
        requirement_level: SOFT
        applicability: NORMAL
        reversed_evidence: yes
      HALLUCINATION_Support-Unsupported-Legal-Reference:
        card_id: HALLUCINATION
        ds_id: HALLUCINATION_04
        context: During call
        description: |
          Did the AI/Agent refrain from referring to consumer rights, legal action, or credit reporting without evidence of legal basis?
                    Legal references include (but are not limited to):
                      - Litigation or legal action: lawsuit, court, legal department, judgment, attorney, subpoena, settlement.
                      - Credit reporting: credit bureau, credit file, tradeline, Equifax, Experian, TransUnion, report/delete from credit.
                      - Consumer rights or regulations: rights, dispute, validation letter, FDCPA, FCRA, CFPB, consumer protection.
                      - Enforcement or government references: police, sheriff, arrest, garnishment, investigation, regulator, law enforcement.
                      - Regulatory citations or pseudo-legal language: "under the law", "by law", "legally required", "federal regulation", "section 809", "U.S.C.", "Regulation E".
                    
                    Return:
                    - if the agent did NOT use any of the language above, return 'yes'
                    - if the agent DID use any language above, return 'no', e.g. "We'll file a lawsuit tomorrow", "We've reported this to the credit bureau."

        possible_answers: "yes | no"
        target_answer: "yes"
        evidence_source: conversation_history
        requirement_level: SOFT
        applicability: NORMAL
        reversed_evidence: yes

  # Customer insight agent
  customer_insights_agent_configs:
    usecase_id: customer_insights
    model_configs:
      model: gemini-3-flash
      temperature: 0.0
      max_tokens: 15000
      use_llm_hub: true
      max_retry: 3
      reasoning_effort: low

    human_turns_threshold: 7
    call_duration_threshold: 45
    customer_insights_skip_conditions:
      - "'{{raw_call_assignment.vendor_id}}' in ['4']"
      - "'{{call_code}}' in ['WCR', 'HUP', 'NKP', 'NCV', 'PRS', 'HUA', 'NVR', 'LM', 'NLM', 'NO_ACTION_CODE']"

    prompt_configs:
      expected_output: |
        Return the output in list of mutiple dict, where each item is the answer to one question. Each item MUST contain these keys:
        - `reasoning`: a concise explanation describing why this archetype/variant was selected (2–4 sentences), include one or two brief quotes from the transcript supporting your choice.
        - `supporting_evidence`: Extract the exact statements made by the user in the transcript that justify the chosen archetype/variant (do NOT include any speaker labels or identifiers such as 'user:' or 'assistant:' in these excerpts). Where possible, provide SEPARATE examples, each demonstrating a different relevant attribute or characteristic of the selected archetype/variant, to thoroughly support your assessment.
        - `archetype`: The archetype name (e.g., "Hostile"), as provided in the archetype configurations
        - `variant`: The variant name (e.g., "Aggressive Confrontational"), as provided in the variant configurations
        - `characteristics`: The characteristics of the variant mapping characteristic names to values (use only the names defined for the chosen variant)
        - `confidence`: A float value between 0 and 100 representing the model's confidence in the accuracy of the chosen archetype/variant. A higher score indicates greater certainty that the chosen archetype/variant is correct.
        - `recommended_strategy`: return empty string
        - `secondary_archetype`: return empty string
        - `human_escalation_required`:
            Did a policy-defined escalation trigger occur based on the following criteria?
              **Policy-Defined Situations and Escalation Triggers:**:
                  - Situation: The customer explicitly states or clearly implies that the matter involves an attorney (not include a third-party caller self-identifies as the consumer's attorney (e.g., inbound attorney call)) -> Trigger: the agent (assistant) MUST ask for (or confirm) attorney contact.
                  - Situation: When the customer explicitly requests the live agent -> Trigger: the agent (assistant) MUST mention the live agent transfer, OR inform the transfer process (e.g. "our live agents are currently unavailable", "I'm checking live agent availability").

              If none of the two defined Situations occurred during the call, return false.
              If one or both of the defined Situations occurred AND the agent followed the corresponding Trigger as outlined above, respond with true.
              If one or both of the defined Situations occurred BUT the agent failed to follow the corresponding Trigger, respond with false.

        **IMPORTANT**: Output MUST be a single JSON-like dict with these keys

        Required fields and types (the object must contain exactly these keys):
        {
          "archetype": string,
          "variant": string,
          "confidence": number,                // float between 0 and 100
          "recommended_strategy": string,     // return empty string ""
          "secondary_archetype": string,        // return empty string ""
          "supporting_evidence": [string],    // array of exact user utterances (no speaker labels)
          "human_escalation_required": boolean,
          "characteristics": { "key": "value", ... }, // object mapping characteristic names to values (strings)
          "reasoning": string                  // 2-4 sentences, include 1-2 short quoted excerpts from the transcript
        }

        MUST return the most confident archetype and variant. If you cannot determine a archetype with any confidence, still return the object with best-effort values, put confidence low (e.g., 10), and supporting_evidence as an empty array [].

        Example valid single-output (must be returned exactly as JSON when appropriate):
        {
          "archetype": "Cooperative",
          "variant": "FIN-Struggling but Honest",
          "confidence": 90.0,
          "recommended_strategy": "",
          "secondary_archetype": "",
          "supporting_evidence": [
            "No. I have to wait till next week.",
            "I don't have an email address no more."
          ],
          "human_escalation_required": false,
          "characteristics": {
            "engagement_level": "high",
            "communication_style": "passive",
            "want_to_pay": "yes",
            "payment_probability": "70%"
          },
          "reasoning": "The user expressed willingness to resolve the debt but asked to delay payment until next week (\"No. I have to wait till next week.\"). They also provided updated contact information and affirmed willingness to cooperate (\"I don't have an email address no more.\"), indicating a cooperative but temporarily constrained financial situation."
        }

      template: |
        ## Context
          In this call, a bank agent (also referred to as "assistant" or "collector") and a customer (also referred to as "user" or "debtor") engage in a conversation for the purpose of debt collection.
          You are a Quality Assessment expert for AI compliance guardrails. Your job is to read a single debt-collection conversation and assign it exactly one Archetype and one Variant from the provided definitions for the user's statements in the transcript.

        ## Task
          - Read the entire conversation.
          - Use ONLY the archetype and variant behavior patterns supplied (do not invent or merge archetypes).
          - Select the single best-fitting archetype and variant for the user's statements in the transcript.
          - Populate the required characteristics for that chosen variant (use only the characteristic names listed for that variant).
          - Provide concise reasoning citing conversation evidence (short quotes or line references).

        ## What to do with the provided conversation
          - Analyze behavior patterns against the variant behavior lists.
          - Decide which single variant most closely matches the dominant behavior by analyzing the user's statements in the transcript.
          - Fill in every characteristic for that chosen variant.
          - Provide a short justification with 1–2 short quotes or paraphrases from the transcript.

        ## Output Requirement
          You MUST return your answer in JSON format.
          You MUST mention the word "JSON" near the start of your response to signal the required format.
          Your output must be a valid JSON object conforming to the following structure:

        {{expected_output}}

        ## Archetype and variant behavior patterns

        {{archetype_configs}}

        ## Input

        The conversation to be assessed for compliance is the following:
        ```
        {{conversation_transcript}}
        ```

    # Archetype and variant behavior patterns
    archetype_configs:
      Cooperative:
        Archetype Definition: Debtors who are willing to resolve their obligations and work with collectors to find solutions.
        Variants:
          - Willing to pay:
              Variant behavior patterns: |
                Answers calls promptly
                Provides information readily
                Asks clarifying questions
                Seeks payment arrangements
                Honors commitments
              Characteristics:
                - engagement_level: returns [low, moderate, high] based on the level of engagement of the debtor in the conversation.
                - communication_style: returns [polite, formal, aggressive, passive, assertive, passive-aggressive] based on the communication style of the debtor.
                - solution_oriented: returns [yes, no] based on whether the debtor is solution-oriented.
                - payment_probability: return percentage of the probability of the debtor making a payment.
          - Confused but willing:
              Variant behavior patterns: |
                Asks many questions
                Needs repeated explanations
                May misunderstand terms
                Seeks reassurance
                Eventually cooperates
              Characteristics:
                - engagement_level: returns [low, moderate, high] based on the level of engagement of the debtor in the conversation.
                - communication_style: returns [uncertain, friendly, formal, aggressive, passive, assertive, passive-aggressive] based on the communication style of the debtor.
                - needs_guidance: returns [yes, no] based on whether the debtor needs guidance.
                - payment_probability: return percentage of the probability of the debtor making a payment.
          - FIN-Struggling but Honest:
              Variant behavior patterns: |
                Explains financial hardship
                Offers partial payments
                Provides documentation
                Seeks hardship programs
                Maintains communication
              Characteristics:
                - engagement_level: returns [low, medium, high] based on the level of engagement of the debtor in the conversation.
                - communication_style: returns [friendly, formal, aggressive, passive, assertive, passive-aggressive, apologetic] based on the communication style of the debtor.
                - want_to_pay: returns [yes, no] based on whether the debtor wants to pay.
                - payment_probability: return percentage of the probability of the debtor making a payment.
      Hostile:
        Archetype Definition: Debtors who respond with aggression, denial, or threats, requiring de-escalation and compliance management.
        Variants:
          - Aggressive Confrontational:
              Variant behavior patterns: |
                Immediate hostility
                Uses profanity
                Makes threats
                Raises voice/yells
                Hangs up quickly
              Characteristics:
                - aggression_level: returns [low, moderate, high] based on the level of aggression of the debtor.
                - profanity_usage: returns [frequent, occasional, none] based on the frequency of profanity used by the debtor.
                - threat_likelihood: return percentage of the likelihood of the debtor making a threat
                - compliance_risk: returns [low, moderate, high] based on the compliance risk of the conversation.
          - Denial and Deflection:
              Variant behavior patterns: |
                Denies debt exists
                Claims identity theft
                Blames others
                Disputes everything
                Avoids responsibility
              Characteristics:
                - denial_pattern: returns [consistent, inconsistent] based on the consistency of the denial pattern of the debtor.
                - blame_shifting: returns [yes, no] based on whether the debtor blames others.
                - factual_disputes: returns [frequent, occasional, rare, none] based on the frequency of factual disputes made by the debtor.
                - profanity_usage: returns [frequent, occasional, rare, none] based on the frequency of profanity used by the debtor.
                - cooperation: returns [yes, no] based on the cooperation of the debtor.
          - Litigious Threatener:
              Variant behavior patterns: |
                Cites laws (often incorrectly)
                Threatens lawsuits
                Claims recording
                Seeks FDCPA violations
                Demands documentation
              Characteristics:
                - legal_knowledge: returns [partial, correct, incorrect] based on the legal knowledge of the debtor.
                - threat_type: returns [legal, non-legal] based on the type of threat made by the debtor.
                - recording_calls: return [likely, unlikely] based on the likelihood of the debtor recording the call.
                - seeking_violation: returns [yes, no] based on whether the debtor is seeking a violation of the FDCPA.
      Vulnerable:
        Archetype Definition: Debtors requiring special handling due to age, disability, mental health, or severe financial distress.
        Variants:
          - Elderly/Confused:
              Variant behavior patterns: |
                  Confusion about debt
                  Repeats questions
                  Difficulty hearing/understanding
                  May involve family
                  Needs simplified explanations
              Characteristics:
                - age_range: return number of the age range of the debtor. 
                - comprehension: returns [partial, normal] based on the comprehension of the debtor.
                - memory_issues: returns [possible, unlikely] based on the likelihood of the debtor having memory issues.
                - requires_patience: returns [yes, no] based on whether the debtor requires patience.
          - Mental Health Crisis:
              Variant behavior patterns: |
                Crying/emotional breakdown
                Mentions self-harm
                Expresses hopelessness
                Panic responses
                Disconnected thinking
              Characteristics:
                - emotional_state: returns [distressed, stable] based on the emotional state of the debtor.
                - stability: returns [concerning, normal] based on the stability of the debtor.
                - risk_indicators: returns [present, absent] based on the presence of risk indicators in the conversation.
                - requires_intervention: returns [yes, no] based on whether the debtor requires intervention.
          - Language Barrier:
              Variant behavior patterns: |
                Struggles with English
                Asks for a translator
                Misunderstands terms
                Family interpretation
                Cultural differences
              Characteristics:
                - english_proficiency: returns [limited, normal] based on the English proficiency of the debtor.    
                - comprehension: returns [partial, normal] based on the comprehension of the debtor.
                - cultural_factors: returns [relevant, irrelevant] based on the relevance of cultural factors in the conversation.
                - requires_translation: returns [yes, no] based on whether the debtor requires translation.
      Sophisticated:
        Archetype Definition: Debtors with knowledge of the system who strategically manage their debts and test compliance.
        Variants:
          - Informed Negotiator:
              Variant behavior patterns: |
                Knows rights precisely
                Negotiates settlements
                Requests everything in writing
                Compares offers
                Strategic payment timing
              Characteristics:
                - financial_literacy: return [high, low] based on the financial literacy of the debtor. 
                - negotiation_skills: returns [strong, weak] based on the negotiation skills of the debtor.
                - settlement_seeking: returns [yes, no] based on whether the debtor is seeking a settlement.
                - documentation_focus: returns [high, low] based on the focus on documentation of the debtor.
          - Compliance Tester:
              Variant behavior patterns: |
                Tests agent knowledge
                Records everything
                Asks trap questions
                Cites specific laws
                Documents violations
              Characteristics:
                - legal_knowledge: returns [extensive, limited] based on the legal knowledge of the debtor.
                - recording_calls: returns [always, rarely] based on the likelihood of the debtor recording the call.
                - seeking_violations: returns [actively, passively] based on the likelihood of the debtor seeking violations of the FDCPA.
                - documentation: returns [thorough, minimal] based on the focus on documentation of the debtor.
          - System Gamer:
              Variant behavior patterns: |
                Exploits system weaknesses
                Files false disputes
                Delays tactics
                Payment reversals
                Multiple identities
              Characteristics:
                - manipulation_tactics: returns [sophisticated, simplistic] based on the sophistication of the manipulation tactics used by the debtor.
                - loophole_seeking: returns [constant, occasional] based on the frequency of loophole seeking by the debtor.
                - bad_faith_actions: returns [frequent, occasional] based on the frequency of bad faith actions by the debtor.
                - dispute_rate: returns [high, low] based on the rate of disputes made by the debtor.

  reflection_agent_configs:
    usecase_id: en_collin_kompato_sm_variable_extractor
    model_configs:
      model: gemini-3-flash
    skip_conditions:
      - "'{{raw_call_assignment.vendor_id}}' in ['4']"
      - "'{{raw_call_assignment.call_direction_detail}}' not in ['human_outbound', 'human_inbound', 'transfer_inbound', 'transfer_outbound']"
    states:
      # - negotiation_from_script
      # - payment_method_warm_transfer
    extra_reflection_extraction:
      - dsc
      - negotiation_from_script.promise
      - negotiation_from_script.amount
      - negotiation_from_script.first_date
      - negotiation_from_script.confirmed
      - negotiation_from_script.months
      - negotiation_from_script.monthly
      - negotiation_from_script.kit
      - payment_method_warm_transfer.payment_method
      - payment_method_warm_transfer.disclosure_agree

  ux_scorecard_agent_configs:
    usecase_id: uxscorecard

    general_configs:
      NEGOTIATION_STATE: negotiation_from_script
      DEFAULT_DAY_DIFF: 35

    universal_configs:

      payment_collection: {}

      speed_to_resolution: {}

      communication_excellence:
        model_configs:
          model: gemini-3-flash
          temperature: 0.0
          max_tokens: 15000
          use_llm_hub: true

        clarity:
          docs: |
            3.1 - Message Clarity (8 points)
              AC3.1.1 - Simplicity (simple language)
              AC3.1.2 - Clear Structure (information structure)
              AC3.1.3 - Clear Structure (actionable next step)
              AC3.1.4 - Emphasis (key info is emphasized and easy to find)
          scoring_template: |
            For each AC, pick the single best label that matches the call overall:
              - `2`: I'd be confident a typical customer understood without asking again.
              - `1`: Mixed, customer could follow but had friction or needed clarification.
              - `0`: Often confusing, customer likely lost or the agent created avoidable work.

          extractor:
            simplicity:
              description: |
                Agent presents information in an order that matches how a customer processes decisions:
                  - Agent follows a logical sequence: context → key facts → options → next step
                  - The primary topic per turn, avoid mixing unrelated items (amount + dispute + verification all in one turn)
                  - When complex info is needed, it is chunked into 2-3 parts with pause/check-ins
              dtype: int

            information_structure:
              description: |
                Agent presents information in an order that matches how a customer processes decisions:
                  - Agent follows a logical sequence: context → key facts → options → next step
                  - The primary topic per turn, avoid mixing unrelated items (amount + dispute + verification all in one turn)
                  - When complex info is needed, it is chunked into 2-3 parts with pause/check-ins
              dtype: int

            next_step:
              description: |
                Agent ends key segments with a concrete next step the customer can follow:
                  - Agent clearly states what happens next and what the customer needs to do. E.g., "would you like to pay today or set up a plan?", "which date works for you - Friday or next Tuesday?"
                  - If the customer is not ready, agent provides a clear alternative. E.g, “we can schedule a callback, what time is best?"
              dtype: int

            emphasis:
              description: |
                Agent highlights the 1-3 most important details and ensures they're retained:
                  - Critical details are explicitly called out using verbal markers: "The most important thing is..", "To confirm...", "Here's what matter.."
                  - Amounts/dates/options are repeated when they are decision-critical
                  - Agent confirm understanding for the key items (amount, due date, chosen option, next step)
                  - If the customer shows confusion, agent simplifies, rephrases, and checks understanding
              dtype: int

        comprehension:
          docs: |
            3.2 - Comprehension Validation (6 points)
              AC3.2.1 - Active Listening
              AC3.2.2 - Understanding confirmation (Audio processing)
              AC3.2.3 - Adaptive Communication (Audio processing)
          scoring_template: |
            For each AC, pick the single best label that matches the call overall:
              - `2`: The call is predominantly consistent and natural, effectively addressing key issues when it matters most.
              - `1`: The call shows occasional inconsistencies, providing some assistance but not consistently reliable.
              - `0`: The call is rarely effective, with frequent omissions or ineffectiveness in addressing concerns.

          extractor:
            active_listening:
              description: |
                Agent shows they are listening and understanding the customer, not just waiting to talk.
                  - Acknowledges the customer's statements in a meaningful way (e.g., "I hear you", "That makes sense", "Got it."), or mention the information that user provided earlier.
                  - Reflects/paraphrases the customer's meaning at key moments (e.g., "So you're saying...", "If I understand correctly...")
                  - Responds directly to the last customer statement/question (high topical relevance, no ignoring or jumping topics)
                  - Names the customer's concern when it matters (e.g., hardship, confusion, disagreement, preference) rather than using generic empathy
              dtype: int

        turn_taking:
          docs: |
            3.3 - Turn-Taking Behavior (4 points)
              AC3.3.1 - Interruption Management (Audio processing)
              AC3.3.2 - Response Timing (Audio processing)

        confusion_recovery:
          docs: |
            3.4 - Confusion Recovery (2 points)
              AC3.4.1 - Detection Rate (detect confusion signals)
              AC3.4.2 - Recover Speed (understanding confirmation)
              AC3.4.3 - Effectiveness (of clarification)
          scoring_template: |
            For each AC, pick the single best label that matches the call overall:
              - `2`: detects quickly, clarifies well, confusion resolves, OR no confusion is present throughout the conversation
              - `1`: detects or clarifies inconsistently, partial recovery
              - `0`: misses confusion or fails to resolve it

          extractor:
            detection:
              description: |
                Agent identifies when the customer is confused (directly or indirectly).
                  - Agent recognizes direct confusion statements (e.g., "I don't understand", "I'm confused", "What do you mean?").
                  - Agent recognizes indirect confusion signals (e.g., long silence after explanation, repeated questions, uncertain "okay", misinterpretation of instructions).
                  - Agent does not ignore confusion signals or continue the script as if the customer understood.
              dtype: int

            speed:
              description: |
                Agent responds to confusion quickly instead of letting the conversation drift. When confusion is detected:
                  - Agent addresses it immediately or within the next turn.
                  - Agent pauses progression (does not introduce new information/options until confusion is addressed).
                  - Agent uses a brief check-in to re-align (e.g., "Which part is unclear?") before moving forward.
              dtype: int

            effectiveness:
              description: |
                Agent's clarification actually improves understanding. When confusion is detected:
                  - Agent clarifies using a different approach, such as:
                    -- simpler wording,
                    -- step-by-step breakdown,
                    -- summarizing into 1-2 key points,
                    -- giving a concrete example or restating in customer-friendly terms.
                  - Agent confirms understanding after clarification (e.g., "Does that make sense now?" / "Is that clearer?").
                  - The customer shows evidence of comprehension (e.g., answers the question, confirms, selects an option) OR agent makes a clear next step that the customer can follow.
              dtype: int
