        type_llm_reflection: *reflection_model_name
        type_llm_response: *response_model_name
        len_msg_reflection:
        len_msg_response:
        type_output_reflection: custom1
        reflection_template: template_exception
        variable_change_exception: { "exc": "null" }

        pre_reflection_variable:
          init_call_date:
            tool: lib_tools.tools_kompato.init_outbound_call_date
          init_consumer_info:
            tool: lib_tools.tools_kompato.init_outbound_consumer_info
        reflection_variable:
          - variables:
              dispute_balance_confirmed:
                description:
                  confirmed: if the _user explicitly or implicitly confirm they have a concern or dispute about the balance of the debt, the charges (e.g. 'We agreed to a $500 discount but the portal is still showing the original amount', 'The creditor promised me I would not need to pay late fees', 'This balance is too high because…', 'I was charged for this account, but I never received the item', 'I refunded this charge, but it still showed up on my account')
                  refuted: if the _user explicitly or implicitly reject they have a concern or dispute about the balance of the debt, the charges (e.g. 'no, I don't have any balance concern', 'no, I don't have any balance issue', 'no, I don't have any balance related issues')
                  unknown: if it is not clear whether the _user has a concern or dispute about the balance of the debt, the charges
                example: unknown
              dispute_balance_aware:
                description:
                  aware_dispute: if _user implicitly or explicitly know about the debt or the paymentment plan **AND** continue disputing about it (for e.g "But I haven't borrowed that much", "It can not be that much")
                  aware_nodispute: if _user implicitly or explicitly know about the debt or the paymentment plan **AND** do not raise any dispute about it (for e.g "yes I know", "ok")
                  unaware: if _user implicitly or explicitly do not know about the debt (for e.g "I haven't got any debt", "That can't be mine")
                example: "fam_dispute"
              dispute_balance_addressed:
                description:
                  addressed: if the _user explicitly or implicitly regards the balance dispute as adequately explained, defused or resolved successfully. They may still be unhappy or disgruntle but appear willing to move on  - for example they ask to pay or settle the account.
                  not_addressed: if the _user is still furious, unhappy or feel incomplete about the balance dispute, and is not ready to move on to other topics
                  unknown: if it is not clear whether the balance dispute is adequately addressed or not
                example: not_addressed

          - variables:
              exc:
                description:
                  # complaint: if _user complain about historical calls, system issues, procedure issues, policy issues, response time or process of receiving requested documents.; and in the latest turns of the conversation has not confirmed that the complaint is now resolved or they have chosen to ignore it for now.
                  # dispute: if _user just said they want to dispute the debt but not mention clear reasons such as debt amount, or they already paid, or they are a victim of identity theft.; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                  # dispute_balance: if _user has dispute about the balance of the debt, the charges (for example 'We agreed to a $500 discount but the portal is still showing the original amount', 'The creditor promised me I would not need to pay late fees', 'This balance is too high because…', 'I was charged for this account, but I never received the item', 'I refunded this charge, but it still showed up on my account'); and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                  # dispute_paid: if _user has dispute that they already paid the debt (for example 'I paid the full amount via bank transfer six months ago. Can you confirm this on your end?', 'I settled this debt last year with a check. Why is it still showing as unpaid?', 'I made a payment directly to the creditor last year. This should be updated in your records.', 'I have already paid off this debt through your online portal. Can you verify the payment?', 'I cleared this balance with a credit card payment last 2 years. Please check and confirm it has been received'); and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                  # dispute_theft: if _user explicitly informs us that they are a victim of identity theft (e.g. "I received a notification about a debt in my name that I never incurred.", "I found out someone used my identity to open an account.", "This debt is not mine; I suspect my identity has been stolen.", "I noticed unfamiliar charges under my name that I never authorized.", "I believe my personal information was used fraudulently to create this debt.").; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                  # bankruptcy: if caller tells that they are in bankruptcy
                  # cease_comms: if caller requests to take them off your calling list or if caller proactively (which means without being prompted) asks to stop receiving communications from us including email, texting, sms or call; and in the latest turns of the conversation has not confirmed that they now want to continue receiving communications.
                  # attorney: if the caller or consumer lets you know that they are being represented by an attorney or lawyer (e.g. "I have an attorney" or "Speak to my lawyer" or "My lawyer told me not to talk to you. Please contact them instead")
                  human_agent_request: if _user specifically requests speaking to a live agent, human, or representative; and in the latest turns of the conversation has not agreed to continue the conversation
                  "null": default value, if _user did not mention any above; or if the _user simply asks a question about virtual agent without requesting to speak to a live agent
                example: "null"

            len_msg_reflection: 2
            reflection_template: template_default

        processing_variable:
          # validation_expire_flag:
          #   tool: lib_tools.tools_kompato.get_validation_expire_flag

        transition_conditions:
          "'{{dict_variable.exc}}' == 'human_agent_request'":
            next_state: exc_human_agent_request
            filler:
            repeat_filler:

          "'{{dict_variable.dispute_balance_confirmed}}'=='refuted' or '{{dict_variable.dispute_balance_addressed}}' =='addressed'":
            next_state: BACK|EXC
            filler:
            repeat_filler:

          "'{{raw_call_assignment.agreed_payment_plan}}' in ('10% off', '20% off', '30% off') ":
            next_state: exc_dispute_balance
            filler: #We previously agreed on a payment plan {{raw_call_assignment.agreed_payment_plan}} with you, so please continue following the agreed-upon plan.
            repeat_filler:
            ignore_back_msg: true

          "'{{raw_call_assignment.agreed_payment_plan}}' not in ('10% off', '20% off', '30% off') and '{{dict_variable.dispute_balance_aware}}' == 'unknown'":
            next_state: exc_dispute_balance #ask if user familiar to debt
            filler: #We apologize for any confusion, but to clarify, your debt is is associated with a Consumer Loan with current outstanding balance is {{dict_variable.ssml_total_balance}}, which includes a principal of {{dict_variable.ssml_principal_balance}}, interest of {{dict_variable.ssml_accrued_interest}}, and fees totaling {{dict_variable.ssml_fees_balance}}. This debt originates from {{raw_call_assignment.original_creditor_name}}, with the original date of default being {{dict_variable.ssm_debt_original_date_of_default}}. Is this information familiar to you?
            repeat_filler:

          "'{{raw_call_assignment.agreed_payment_plan}}' not in ('10% off', '20% off', '30% off') and '{{dict_variable.dispute_balance_aware}}' in ('aware_dispute','unaware') and '{{dict_variable.dispute_balance_addressed}}' == 'not_addressed'":
            next_state: post_exc #ask for human call back
            filler:
            repeat_filler:

          "'{{dict_variable.dispute_balance_addressed}}'!='addressed'":
            next_state: exc_dispute_balance #continue
            filler:
            repeat_filler:
          else: #no agreed_payment_plan + unfam_nodispute #when resolved
            next_state: BACK|EXC #negotiation_from_script
            filler:
            repeat_filler:

        repeat_continuously:
          max_repeat: 10
          state_exceed_max_repeat: end_call
          filler_exceed_max_repeat: I'm sorry, it seems I'm unable to assist you. |partial 
          repeat_filler:
        max_turn_back:

    exc_dispute_paid:
      type: 2llmcalls
      2llmcalls:
        response_delay: 1000
        ## dynamic filler customized for each state
        dynamic_filler:
          model_name: gpt-4o #Qwen3-4B-df_en_v3b
          nturns: 6
