            filler: #Your debt is associated with a Consumer Loan with current outstanding balance is {{dict_variable.ssml_total_balance}}, which includes a principal of {{dict_variable.ssml_principal_balance}}, interest of {{dict_variable.ssml_accrued_interest}}, and fees totaling {{dict_variable.ssml_fees_balance}}. This debt originates from {{raw_call_assignment.original_creditor_name}}, with the original date of default being {{dict_variable.ssm_debt_original_date_of_default}}. Could you please confirm this?
            repeat_filler:

          #If customer explicitly confirms that strangers make unauthorized transactions in their account but hasn't filed a report and hasn't provided specific case number or reference => Warm-transfer (given that it is during working hours and a WT signal has not been sent yet)
          "'{{dict_variable.dispute_fraud_confirmed}}' == 'confirmed' and '{{dict_variable.dispute_fraud_filing}}' == 'no' and '{{dict_variable.dispute_fraud_case}}' == 'unknown' and '{{dict_variable.is_working_hours }}' == 'yes' and '{{dict_variable.warm_transfer_sent}}' != 'yes'":
            next_state: update_info
            filler: "We are looking for a human agent to assist you. In the meantime, to ensure important account updates are communicated timely to you, let's ensure we have your accurate contact details on file. I have {{dict_variable.ssml_phone}} as your contact number in my records. Is this still the best way to reach you?"
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I have located a live agent to further help with the dispute claim.
                  metadata: *sm_metadata
                  extra_info: *base_warm_transfer_info
          # ASK reason - filing - case
          # "'{{dict_variable.dispute_fraud_confirmed}}' == 'confirmed' and '{{dict_variable.dispute_fraud_reason}}' == 'unknown' ":
          #   next_state: exc_dispute_txn_fraud #ask reason
          #   filler: I see. |partial #To resolve this matter quickly and accurately, it's essential that we verify the payment details. Could you please share the reasons why you believe this debt does not belong to you?
          #   repeat_filler:

          "'{{dict_variable.dispute_fraud_confirmed}}' == 'confirmed' and '{{dict_variable.dispute_fraud_filing}}' == 'unknown' and '{{dict_variable.dispute_fraud_case}}' == 'unknown'":
            next_state: exc_dispute_txn_fraud #ask filing
            filler:
            repeat_filler:

          "'{{dict_variable.dispute_fraud_confirmed}}' == 'confirmed' and '{{dict_variable.dispute_fraud_filing}}' == 'no' and '{{dict_variable.dispute_fraud_case}}' == 'unknown' and '{{dict_variable.is_working_hours }}' == 'no'":
            next_state: post_exc #encourage filing and ask human call back
            filler: #We encourage you to file a report and send the documentation to us either via our mailing address at {{dict_variable.ssml_company_mailing_address}} or through our email at {{raw_call_assignment.company_email_address}}. We'll raise this dispute to a supervisor. |partial. #To address your concerns more thoroughly and provide better support, would you like to be contacted by a supervisor within the next 7 days?
            repeat_filler:

          "'{{dict_variable.dispute_fraud_confirmed}}' == 'confirmed' and '{{dict_variable.dispute_fraud_filing}}' == 'yes' and '{{dict_variable.dispute_fraud_case}}' == 'unknown'":
            next_state: exc_dispute_txn_fraud #ask case
            filler: #Have you filed a report regarding this unauthorized transaction?
            repeat_filler:
          else: # got all info
            next_state: post_exc
            filler: #Thank you for your information. Please send the documentation to us either via our mailing address at {{dict_variable.ssml_company_mailing_address}} or through our email at {{raw_call_assignment.company_email_address}}. We'll raise this dispute to a supervisor. To address your concerns more thoroughly and provide better support, would you like to be contacted by a supervisor within the next 7 days?
            repeat_filler:

        repeat_continuously:
          max_repeat: 12
          state_exceed_max_repeat: end_call
          filler_exceed_max_repeat:
          repeat_filler:
        max_turn_back:

