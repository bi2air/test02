          - "What are the fees I owe?", "Why is the balance so high?"
          - "What is the original balance?", "What is the principal balance?"
          - "What is the last payment amount?", "What is the last payment date?", "What was the last time a payment was made?", "Are you showing the last time a payment was made?"
          - "What is the interest fee?", "What is the interest?"
