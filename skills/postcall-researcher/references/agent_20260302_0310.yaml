actions:
  global_reflection:
    # Customer's emotions captured from the latest turn (sent by SM Voice)
    - class: EmotionsLastHuman
      params:
        history_asr_emotions: self.dict_variable.history_asr_emotions

    - class: MemoryQuery
      # states: [...] 
      #   Optional. Define the states where this action should run.
      #   If not specified, the action runs on all states.
      run_background: True ## Run in background or not, default = False
      # Only run when:
      # 1) ace_debt_id is present, and
      # 2) at least one of the mem_* fields is not yet in dict_variable.
      condition: >-
        {{ raw_call_assignment.get("ace_debt_id") != None }} and
        ({{ "mem_meaningful" not in dict_variable }} or
         {{ "mem_insight" not in dict_variable }} or
         {{ "mem_adapt_opening" not in dict_variable }} or
         {{ "mem_adapt_nego" not in dict_variable }})
      params:
        endpoint_suffix: "/api/v1/tools/tool_kompato"
        input:
          ace_debt_id: self.raw_call_assignment.ace_debt_id
          last_time_history: "30d"
          limit: 10
        output: ["meaningful", "insight", "adapt_opening", "adapt_nego"]
        alias:  ["mem_meaningful", "mem_insight", "mem_adapt_opening", "mem_adapt_nego"]

    # Variables extracted from `raw_call_assignment.history_context`
    - class: HistoryContextExtractor
      params:
        smagent: self ## DO NOT CHANGE THIS
        len_msg_reflection: None
        type_llm_reflection: gpt-4o
        type_output_reflection: custom1
        reflection_template: context_reflection_template
        variables:
          # Whether the customer has had any meaningful interaction with Kompato
          meaningful:
            description:
              "yes": |
                If _user has had at least one meaningful business interaction with _assistant in the past. Meaningful business interactions include:
                  - (MOST IMPORTANT) portal drop-off, if any of the events has this pattern: 
                  - actual conversation with _assistant (going beyond simple greetings)
                  - payment made, discussed, or promised
                  - settlement negotiations or payment plans discussed
                  - providing important information such as bankruptcy, attorney, dispute, wrong party, language barrier
                  - identity verification completed with substantive discussion
                  - callback requested and scheduled
                  - do-not-call requested or other significant escalation actions like requesting to speak with live agents.
              "no": If _user has never had any meaningful business interaction with _assistant so far, or if this is the first time _assistant attemps to reach out to _user, or if there is no record of any past interactions with _user at all.
            example: "yes"
          # Summarize all past interactions of the customer with us so far
          insight:
            description: return a concise summary of the account status, paying special attention to events where _assistant was able to reach _user and initiated a conversation.
            example: many call attempts were made and ultimately the customer confirmed that it was a wrong number.
          # Personalized opening sentence
          adapt_opening:
            description: |
              Based on past business interactions with _user, generate an opening phrase that remind the customer of the **date** of the most recent meaningful call. Ignore any unsuccessful live agent transfers or failed identity verification from past calls. DO NOT mention anything else apart from the date. DO NOT mention 'financial situation' or the like.

              If _user has not had any meaningful business interactions with _assistant, return 'none'.
            example: I am calling to follow up on our discussion last Tuesday.
          # Personalized circumstance exploring
          adapt_nego:
            description: |
              Based on past business interactions with _user, generate one or two phrases that follow up on transactions or payment promises made by _user, for example:
                - If _user has made or agreed on a temporary Keep-in-Touch payment, remind them of the payment amount and payment date, and then ask how they would like to proceed to build a long-term payment plan.
                  -- Note that a Keep-in-Touch payment is a **temporary** payment that allows _user to demonstrate willingness to resolve their debt, but it is NOT a long-term payment plan that helps _user to resolve their debt. Keep this in mind when generating your phrasing.
                - If _user has made at least one payment that is NOT a Keep-in-Touch payment, acknowledge it by mentioning the payment amount and payment date, then ask if _user want to continue with this payment plan.
                - If _user has agreed on a payment plan that is NOT a Keep-in-Touch payment but has not paid, remind them of the promised payment amount and payment date, then ask if they would like us to help them set it up today.
                - If _user raised a concern in a past call, remind them of the concern and ask if it has been resolved since, and if not, if _user would like to continue discussing it.
                - If _user expressed hardship in previous calls, show empathy to sympathize with the _user and ask if their situation has improved since. Use open-ended questions.
                - If _user showed unfriendly behaviors in previous calls, such as being frustrated, being hesistant to confirm their identity, staying silent for extended periods of time, apologize for the inconvenience you caused them and politely ask if they would like to continue discussing their debt with you.

              ONLY mention the information that are provided to you. If the payment amount and/or payment date are not provided, DO NOT mention it. DO NOT invent any amount or any date by yourself. Use strictly what is given in the history context. DO NOT ask whether _user was able to make a payment or not.

              Ignore all these events, if any, in the past calls:
                - Unsucessful live agent transfer
                - Successful or unsuccessful identity verification
                - Wrong number, or _user was unavailable at that time
                - Request to be called back

              If _user has not had any meaningful business interactions with _assistant, or if _user only talked about topics not related to debt collection (like 'stray dogs on their property' or 'watching TV'), return 'none'.
            example: During our last call, you agreed to make a temporary Keep-in-Touch payment of 30 dollars. Were you able to make the payment? After this, how would you like to set up a long-term payment plan?

    # Define variables to be used in many states
    - states: ["inbound_verify_dob", "inbound_verify_ssn", "inbound_verify_ref_code"]
      reflection_template: template_default
      variables:
        dsc:
          overview: Captures whether the caller is a professional third-party, such as a debt settlement company or an attorney, who is authorized to act on a customer's behalf regarding their debt. This is distinct from the customer themselves or a non-professional third party.
          description:
            "yes": |
              If the caller identifies as a debt settlement company, an attorney, a law firm, or a legal third party authorized to act on a customer's behalf. This is triggered by:
                  -- Explicitly stating a firm name, especially those containing "Law Group," "Legal," or "Settlement" (e.g., "This is Ryan from Five Lakes Law Group").
                  -- Using industry-specific keywords like "mutual client," "the client's name is," or "on behalf of a client" when not directly repeating a prompt.
                  -- Answering a direct question about representation by confirming they are an "agent" or "representative" (e.g., assistant: "...your account or on behalf of a client?" user: "On behalf of a client").
                Once these criteria are met, the value is `yes` regardless of subsequent call quality issues or failure to verify.
            "no": | 
              If the caller confirms they are the account holder or are not a professional third-party representative. This is triggered by:
                  -- Explicitly denying third-party status (e.g., responding "No" when asked if they legally represent a customer).
                  -- Affirming they are the account holder in response to a choice-based question (e.g., assistant: "your account or for a client?" user: "My account," "Mine," "For myself").
                  -- Using first-person language to describe the debt as their own (e.g., "I got a message about my debt").
                  -- Providing their own personal information (Full Name, DOB, SSN) to verify the account.
                  -- Identifying as a professional in a role clearly outside the scope of debt representation (e.g., "I'm a police officer").
            "unknown": |
              If the caller's relationship to the account is never established, remains ambiguous, or is actively evaded. This applies if:
                  -- The topic of representation is never mentioned by the caller or the assistant.
                  -- The caller ignores, deflects, or gives a non-responsive answer when asked if they are the account holder or a representative (e.g., repeatedly asking for a human agent instead of answering).
                  -- The caller uses ambiguous terms like "agent" or "representative" as a command to speak with a person (e.g., "I want to talk to a representative"), not as a self-identification in response to a direct question.
          example: "no"

        third_party:
          overview: Captures whether the caller is a non-professional third party, such as a family member, friend, or acquaintance, who is inquiring about the account. This is distinct from the customer themselves and professional legal representatives (DCS/DSA/Attorney).
          description:
            "yes": |
              If the caller identifies as a personal relation to the customer (spouse, parent, child, friend, etc.) or explicitly states they are calling to help a person they know personally. This is triggered by:
                  -- Explicitly stating a personal relationship (e.g., "I'm his wife," "This is her father," "I'm calling for my mom," "I'm a friend helping out").
                  -- Using third-person language to refer to the account holder by name or relationship (e.g., "I'm calling about John's debt," "Does my husband owe this?").
                  -- Answering a representation question by confirming a personal link rather than a professional one (e.g., assistant: "Are you the account holder?" user: "No, I'm his son").
                  -- Explicitly denying being a professional firm while admitting to being a third party (e.g., "I'm not a lawyer, just his neighbor").
            "no": |
              If the caller confirms they are the account holder or identifies as a professional entity (DCS/DSA/Attorney). This is triggered by:
                  -- Explicitly identifying as the account holder (e.g., "It's my account," "I am [Customer Name]").
                  -- Identifying as a professional firm, attorney, or debt settlement company (these are considered professional representatives, not personal ones).
                  -- Using first-person language to describe the debt (e.g., "I received a letter," "I want to settle my payments").
                  -- Passing verification with their own demographics that match the account holder (unless they explicitly stated they are masquerading, which is rare/fraud).
            "unknown": |
              If the caller's relationship to the account holder is ambiguous or not established. This applies if:
                  -- The caller uses neutral phrasing like "I'm calling about the account" without specifying "my account" or "his/her account."
                  -- The caller ignores or deflects questions asking who they are (e.g., "Just tell me the balance" without confirming identity).
                  -- The caller provides a name that does not match what's on file, but does not explain their relationship (e.g., "This is Bob" [Account is for Steve], without saying "I'm Steve's dad").
          example: "no"

  global_pre_reflection_variable:
    is_working_hours:
      tool: lib_tools.tools_kompato.check_working_hours_by_timezone
      params:
        timezone_location: self.raw_call_assignment.timezone_location
        start_hour: 9
        end_hour: 18
        include_weekends: false

  global_processing_variable:
    warm_transfer_elapsed_time:
      tool: lib_tools.tools_kompato.calculate_duration
      params:
        date_input: self.dict_variable.warm_transfer_init_time

  action_before_reflection_func:
    # New action to handle call transfer result
    - class: CallTransferResultHandler
      # Recieve warm transfer result and save to cache (dict_variable)
      # transfer_result can be: "busy", "connected"
      params:
        extra_fields: self.extra_fields
        logger: self.logger
        key_to_update_cache: "transfer_result"

    - class: CustomerValidateResponseHandler
      # Use for Kompato inbound call, ID verification steps
      # Recieve response from /account/rpc query and save to cache
      params:
        conversation_id: self.conversation_id
        extra_fields: self.extra_fields
        logger: self.logger

    - class: InitAssistantHandler
      # Fist turn of conversation, response init_assitant defined in yaml
      params:
        messages: self.messages
        init_assistant_template: self.data_loaded.flow.init_assistant
        recipient_details: self.recipient_details
        raw_call_assignment: self.raw_call_assignment
        extra_fields: self.extra_fields
        logger: self.logger

    - class: IdleTimeUser
      # Handle user idle resquest, accumulate to user_idle_duration
      params:
        extra_fields: self.extra_fields ## DO NOT CHANGE THIS
        user_idle_duration: self.dict_variable.user_idle_duration ## DO NOT CHANGE THIS

    - class: InitInboundCallHandler
      # Handle init inbound call accross vendor
      # Update phone_number when call start
      # If phone_number matched multiple accounts --> update account_status to skip verify phone number
      params:
        extra_fields: self.extra_fields
        logger: self.logger
        key_to_update_cache: "from_phone"

    - class: PaymentResultHandler
      # Handle payment result
      params:
        conversation_id: self.conversation_id
        extra_fields: self.extra_fields
        charge_amount: self.dict_variable.validated_instant_charge_amount
        payment_tokenize: self.dict_variable.payment_tokenize
        logger: self.logger
        key_to_update_cache: "payment_result"
        conversation_config_update:
          flow:
            conv_allowed_idle_time_seconds: 60
            conv_idle_response_threshold: 30

    - class: IdleUserResponse
      # Custom response for User Idle request
      params:
        smagent: self ## DO NOT CHANGE THIS
        model: gpt-4o
        nturns: 6
        prompt: >-
          {% if 
                dict_variable.get('user_idle_duration', 0) >= 30
                and dict_variable.get('warm_transfer_sent', '') == 'yes' 
                and 
                  (
                    dict_variable.get('warm_transfer_elapsed_time_cb', 0) > 600
                    or dict_variable.get('warm_transfer_elapsed_time_payment', 0) > 600
                    or dict_variable.get('warm_transfer_elapsed_time_dsc', 0) > 600
                  )
                and dict_variable.get('transfer_result', '') != 'connected'
          %}
          Let the customer know that you have been looking for a live agent to assist them, but unfortunately no agent is available now. You will end the call here, and have a live agent return their call at [Time that the consumer told you | once one becomes available]. Let them know that they can also visit kompato ay-eye dot com or email support at kompato ay-eye dot com. Thank them for their time today then say "Goodbye <ENDCALL>"
          {% elif 
                  dict_variable.get('user_idle_duration', 0) >= 55 
                  and dict_variable.get('warm_transfer_sent', '') == 'yes' 
                  and 
                  (
                    dict_variable.get('warm_transfer_elapsed_time_cb', 0) > 600
                    or dict_variable.get('warm_transfer_elapsed_time_payment', 0) > 600
                    or dict_variable.get('warm_transfer_elapsed_time_dsc', 0) > 600
                  )
          %}
          Let the customer know that you have been looking for a live agent to assist them, but unfortunately no agent is available now. You will end the call here, and have a live agent return their call at [Time that the consumer told you | once one becomes available]. Let them know that they can also visit kompato ay-eye dot com or email support at kompato ay-eye dot com. Thank them for their time today then say "Goodbye <ENDCALL>"
          {% elif 
                  dict_variable.get('user_idle_duration', 0) >= 30 
                  and dict_variable.get('user_idle_duration', 0) < 32 
                  and dict_variable.get('warm_transfer_sent', '') == 'yes' 
                  and dict_variable.get('transfer_result', '') == 'connected' 
          %}
          Let the consumer know that there is an agent is in preparation to assist the call promptly, please stay on the line.
          {% elif 
                  current_state == 'negotiation_from_script' 
                  and dict_variable.get('user_idle_duration', 0) >= 3 
          %}
          Use words to this effect to engage conversation to continue with the account:
          {{raw_call_assignment.first_name}}, are you still with me? If you have any questions or have other concerns about your account, I'm here to help and discuss the options available to you.
          Or:
          - {{raw_call_assignment.first_name}}, can you hear me okay? Did you have any specific questions or concerns that we can discuss to find the best possible solution for you on this?
          {% elif 
                  current_state == 'negotiation_from_script' 
                  and dict_variable.get('user_idle_duration', 0) >= 6 
          %}
          Check if they are still with you or they need more time for thinking, remind them that you are fully equipped with all understanding about their account and would love to gain more understanding of their current situation to find out the best offer
          {% else %}
          Let the customer know that we are still listening and nudge them to respond.
          {% endif %}
        filler: >-
          {% if 
                  current_state == 'pre_opening' 
                  and dict_variable.get('user_idle_duration', 0) < 7 
          %}
          Hello, are you there?
          {% elif 
                  current_state == 'pre_opening' 
                  and dict_variable.get('user_idle_duration', 0) < 12 
          %}
          Hello, can you hear me?
          {% elif 
                  current_state == 'pre_opening' 
                  and dict_variable.get('user_idle_duration', 0) >= 15 
          %}
          Sorry we were unable to connect with you today, I am going to disconnect the call due to no response at this time. Please give us a call back at 8-8-8--5-6-6--7-2-8-0 . <ENDCALL>
          {% elif 
                  current_state == 'pre_opening' 
                  and dict_variable.get('user_idle_duration', 0) >= 29 
          %}
          Since I have not heard from you, I will end the call here. Have a good day. Good bye. <ENDCALL>
          {% elif 
                  current_state == 'check_rpc' 
                  and dict_variable.get('user_idle_duration', 0) < 7 
          %}
          |partial
          {% elif 
                  dict_variable.get('user_idle_duration', 0) >= 30 
                  and dict_variable.get('warm_transfer_sent', '') == 'yes' 
                  and dict_variable.get('transfer_result', '') != 'connected' 
          %}
          |partial
          {% elif 
                  dict_variable.get('user_idle_duration',0) >= 55 
                  and dict_variable.get('warm_transfer_sent', '') == 'yes' 
          %}
          |partial
          {% elif 
                  dict_variable.get('user_idle_duration', 0) >= 30 
                  and dict_variable.get('user_idle_duration', 0) < 32 
                  and dict_variable.get('warm_transfer_sent', '') == 'yes' 
                  and dict_variable.get('transfer_result', '') == 'connected' 
          %}
          |partial
          {% elif 
                  dict_variable.get('user_idle_duration', 0) >= 60 
                  and dict_variable.get('warm_transfer_sent', '') != 'yes' 
          %}
          Thank you for calling Kompato today. Since I have not heard from you, I will end the call here. You can also visit kompato ay-eye dot com or email support at kompato ay-eye dot com. Good bye. <ENDCALL>
          {% elif 
                  current_state == 'negotiation_from_script' 
                  and dict_variable.get('user_idle_duration', 0) >= 3 
          %}
          |partial
          {% elif 
                  current_state == 'payment_method_warm_transfer' 
                  and dict_variable.get('user_idle_duration', 0) >= 7 
          %}
          |partial
          {% else %} <sleep 1>
          {% endif %}

  action_after_reflection_func:
    - class: InboundCheckRPCRequest
      # Senf payload to /accounts/rpc
      # Custom payload field per state
      params:
        dict_variable: self.dict_variable
        list_current_state: self.list_current_state
        raw_call_assignment: self.raw_call_assignment
        current_state: self.current_state
        logger: self.logger
        key_to_update_cache: customer_validation_request_id
        concierge_rpc_path: "/v2/accounts/rpc"
        state_variable_mapping:
          inbound_opening:
            phone_number: >-
              {% if dict_variable.get('processed_phone_number', 'unknown') != 'unknown' %}
                {{dict_variable.processed_phone_number}}
              {% else %}
                {{dict_variable.from_phone}}
              {% endif %}

          inbound_verify_dob:
            phone_number: >-
              {% if dict_variable.get('processed_phone_number', 'unknown') != 'unknown' %}
                {{dict_variable.processed_phone_number}}
              {% else %}
                {{dict_variable.from_phone}}
              {% endif %}
            dob: "{{dict_variable.mmddob}}"

          inbound_verify_ssn:
            phone_number: >-
              {% if dict_variable.get('processed_phone_number', 'unknown') != 'unknown' %}
                {{dict_variable.processed_phone_number}}
              {% else %}
                {{dict_variable.from_phone}}
              {% endif %}
            ssn: "{{dict_variable.processed_ssn}}"

          inbound_verify_ref_code:
            ssn: >-
              {% if dict_variable.processed_ref_code != 'unknown' %}
                {{dict_variable.processed_ssn}}
              {% else %}
                unknown
              {% endif %}

            # use dob in case ssn is unknown
            dob: >-
              {% if dict_variable.processed_ref_code != 'unknown' and dict_variable.processed_ssn == 'unknown' %}
                {{dict_variable.mmddob}}
              {% else %}
                unknown
              {% endif %}
            sor_account_id: "{{dict_variable.processed_ref_code}}"

    - class: InboundCheckRPCResponseHandler
      # Update account status when receive customer validation response (query /accounts/rpc)
      # Wait max 2s to receive response payload
      # TODO: Merge 3 actions InboundCheckRPCRequest, CustomerValidateResponseHandler, InboundCheckRPCResponseHandler
      params:
        dict_variable: self.dict_variable
        conversation_id: self.conversation_id
        list_current_state: self.list_current_state
        raw_call_assignment: self.raw_call_assignment
        customer_validation_request_id: self.dict_variable.customer_validation_request_id
        key_to_update_cache: "account_status"
        logger: self.logger

    - class: WarmTransferAfterReflection
      params:
        transfer_message: I have located a live agent to assist you further.
        metadata: *sm_metadata
        extra_info: *base_warm_transfer_info
        current_state: self.current_state
        target_states: ["inbound_opening", "inbound_verify_full_name", "inbound_verify_dob", "inbound_verify_ssn", "inbound_verify_ref_code"]
        # Define each condition per line
        conditions:
          - "'{{dict_variable.dsc}}' == 'yes' and '{{dict_variable.warm_transfer_sent}}' != 'yes' and '{{dict_variable.is_working_hours}}' == 'yes'"

  action_after_transition_func:
    # Send warm transfer signal, custom state and warm transfer info
    # TODO: move to transition in each state
    - get_warmtransfer_signal_kompato_state_custom

    - class: SendSMS
      # Trigger send sms to customer, can setting by condition
      # TODO: move to transition in each state
      params:
        raw_call_assignment: self.raw_call_assignment
        dict_variable: self.dict_variable
        list_current_state: self.list_current_state
        current_state: self.current_state
        next_state: self.next_state
        logger: self.logger

        conditions:
          # multiple lines yaml format
          - >-
            {{next_state == 'payment_method_warm_transfer'}} and
            {{raw_call_assignment.can_text == 'TRUE' or dict_variable.text_consent == 'yes'}} and
            {{not dict_variable.sms_sent}}

    - class: RightPersonContactUpdate
      # Inbound call, send account_id to ENG after customer pass check_rpc state
      # # TODO: move to transition in each state
      params:
        raw_call_assignment: self.raw_call_assignment
        dict_variable: self.dict_variable
        list_current_state: self.list_current_state
        account_id: self.dict_variable.account_id
        current_state: self.current_state
        next_state: self.next_state
        logger: self.logger

        conditions:
          - "{{raw_call_assignment.direction == 'inbound'}} and {{next_state == 'negotiation_from_script'}} and {{not dict_variable.rpc_updated}}"

    - class: PaymentSetup
      # Trigger payment DTMF event
      # Update converstion idle config to prevent hang up during DTMF input
      params:
        raw_call_assignment: self.raw_call_assignment
        dict_variable: self.dict_variable
        list_current_state: self.list_current_state
        current_state: self.current_state
        next_state: self.next_state
        charge_amount: self.dict_variable.validated_instant_charge_amount
        payment_tokenize: self.dict_variable.payment_tokenize
        payment_method: self.dict_variable.payment_method
        logger: self.logger
        conversation_config_update:
          flow:
            conv_allowed_idle_time_seconds: 720
            conv_idle_response_threshold: 720

        # if one of the condition matched, then send signal
        conditions:
          - "'{{current_state}}' == 'payment_method_warm_transfer' and '{{dict_variable.payment_init}}' != 'True' and '{{dict_variable.disclosure_agree}}' == 'yes' and '{{dict_variable.nacha_confirmation}}' == 'yes' and '{{dict_variable.get('payment_method', 'unknown')}}' in {{dict_variable.get('vendor_payment_methods', [])}} and '{{dict_variable.get('payment_method', 'unknown')}}' in ({{dict_variable.get('ai_payment_methods', [])}}) and '{{dict_variable.within_window}}' == 'yes' and ('{{dict_variable.filler_installment_cnt}}' == 'valid' or ('{{dict_variable.filler_ptp_monthly_amount}}' != 'lower' and '{{dict_variable.filler_ptp_monthly_amount}}' != 'unknown') or ('{{dict_variable.kit_filler_ptp_monthly_amount}}' != 'lower' and '{{dict_variable.kit_filler_ptp_monthly_amount}}' != 'unknown' and '{{dict_variable.kit}}' == 'yes'))"

templates:
  # Placeholders that can be reused in many places
  dict_placeholder:

    conversation_style: |
      ## Conversation Style
      - Concise, succinct, natural, conversational, not overly polite (avoid thanking the customer excessively), and no apologies.
      {% set customer_first_name = raw_call_assignment.get('first_name', dict_variable.get('customer_info', {}).get('first_name', '')) %}
      - Avoid mentioning the customer's name {% if customer_first_name != "" %}(which is "{{customer_first_name}}"){% endif %} unless it is the beginning of the call, it is a very tense situation, or the customer is expressing extreme hardship.
      - Do not use the following words or phrases in any output: imperative, immediately, time-sensitive, as soon as possible, and/or any expression of urgency
        --> Instead, you may say the following:
          - We would like to get this resolved by (end of week/month)
          - We only have the terms discussed approved till (date).
      - Do not use the following phrases in any output: "Good luck"
        --> Instead, you may say the following: "Have a good day"
      - Do not use the following phrases in any output: "The office of ..."
        --> Remember that {{raw_call_assignment.company_name}} and {{raw_call_assignment.client_name}} are not law firms and do not pursue legal matters.
      - Vary your phrasing in the conversation to avoid sounding repetitive and robotic.

    task: |
      ## Task
      Using the provided _user information and their current emotions, which is {{dict_variable.emotions_last_human}}, respond concisely with the next turn in the conversation, including an emotion tag at the beginning of your sentence. Ensure the emotion tag fits the context of your response.

      Return one appropriate emotion from the following list (follow this guideline to select the appropriate emotion):
      - apologetic: Take responsibility and express regret for problems or mistakes.
      - appreciative: When thanking _user for their patience and cooperation, for example, when _user agrees to wait, or when _user confirms their identity.
      - calm: Create a stable, grounding presence that reduces anxiety and tension.
      - cheerful: Express positive energy and brightness.
      - compassionate: When showing care and concern for _user's well-being, or when delivering the mini-Miranda statement.
      - concerned: Show worry and care about _user's situation or potential consequences.
      - confident: When following company's policy, such as verifying the customer's identity or stating facts (related to debt collection, such as _user's balance, accrued interests).
      - confused: When _user is giving an unclear answer.
      - empathic: Show emotional connection and shared feeling about _user's difficult situation.
      - encouraging: Motivate _user to take action and build confidence in their ability to resolve their debt.
      - enthusiastic: When offering help to _user, typically used with sentences such as "How can I help you?" or "How can I assist you today?", or when giving contact details of the company to _user.
      - friendly: Create approachable, warm social connection.
      - happy: At the beginning of the call, when offering help to _user calling in.
      - hopeful: Inspire optimism about future possibilities and positive outcomes.
      - patient: Demonstrate willingness to take time, listen, and avoid rushing the customer.
      - professional: Default emotion, use it to establish credibility and represent the company appropriately while remaining approachable. 
      - relieved: When _user expresses positive improvements of their financial or personal situations.
      - serious: When handling claims or complaints from _user.
      - supportive: When suggesting alternative payment plans to accommodate _user's payment capacity, or when informing _user about the current balance of their debt, or when asking _user to confirm their personal information.
      - understanding: When asking _user about what circumstances leading to the default of their debt, or when _user seems to be a victim of fraud.
      
      When returning an emotion tag:
      - Use ONLY the emotions in this list. 
      - DO NOT make up any other emotion. 
      - Make sure to adapt the emotion to your response (for example, if the emotion is an upbeat one, a sad, painful response is inappropriate).
      - If an emotion tag is already present in the sentence, do not generate any additional one.

      Example: 
      * [happy] Hi Lily. [supportive] How can I help you today?
      * [encouraging] That's good to hear. I am glad we're working toward a solution.
      * [compassionate] I'm sorry to hear that, Phyllis.
      * [supportive] What if we explore a smaller monthly payment plan?

    customer_info: |
      ** Customer Information**
      When mentioning customer information, you MUST use the exact information provided below.
      - First Name: {{raw_call_assignment.first_name}}
      - Last Name: {{raw_call_assignment.last_name}}

      **Debt info**
      - Debt Product: {{raw_call_assignment.debt_type}}
      - Debt Balance: {{dict_variable.ssml_total_balance}}
      - Debt Principal: {{dict_variable.ssml_principal_balance}}
      - Debt Original Issuer: {{raw_call_assignment.original_creditor_name}}
      {% if raw_call_assignment.get('itemizationInterestBalance') is not none %}
      - Debt Interest: {{dict_variable.ssml_interest_balance}}
      {% endif %}
      {% if raw_call_assignment.get('itemizationFeeBalance') is not none %}
      - Debt Fee: {{dict_variable.ssml_fee_balance}}
      {% endif %}
      {% if raw_call_assignment.get('debt_delinquency_date', '') != "" %}
      - Debt Original Date Of Default: {{dict_variable.ssml_debt_original_date_of_default}}
      {% endif %}
      {% if raw_call_assignment.get('settlement_1_percentage', 'unknown') != 'unknown' and raw_call_assignment.settlement_1_percentage | int == 100 %}
      - The outstanding balance on this account must be paid in full. While installment plans are permitted, settling for a reduced amount is not allowed.
      {% endif %}
      
      **System information**
      - Today: {{dict_variable.ssml_call_date}}

    exception_handling: |
      **Exceptional Cases Handling**
      - If _user implicitly or explicitly:
        + complains about anything
        + disputes the debt amount
        + disputes that they already paid
        + informs us that they are a victim of identity theft
        + informs us that someone made unauthorized purchases on their account
        + requests to stop communication (calls, emails, SMS)
        + informs us that they are represented by an attorney or lawyer

      you MUST inform them that to [status the account/capture their request] correctly, their identity needs to be confirmed first. Then continue the conversation from where it was left off.
      - If _user continues to insist on these issues, you MUST emphasize the need to confirm their identity before revisiting their concerns.

    general_FAQs: |
      ## In case caller have any questions, answer based on the following instruction THEN CONTINUE the current question where you left off:

      1. **Out of Scope Queries:** --> Response: "I'm sorry, but I can't help you with that."

      2. **Identity and Role Queries:**
        - "Who are you?", "Who am I speaking with?", "Who is this?", "Who is {{raw_call_assignment.agent_name}}?"
        --> Response: "I'm {{raw_call_assignment.agent_name}}, a virtual assistant from {{raw_call_assignment.company_name}}."
        - "Who do you work for?", "What company are you representing?", "Where are you from?", "Who is your boss?"
        --> Response: "I work for {{raw_call_assignment.company_name}}."
        - "What are your working hours?", "When do you work?", "What is your working hours?", "When do you work?", "What time should I call to reach a live agent/human representative?", "When are your live agent available?"
        --> Response: "Our live agent will be available from 9am to 6pm Eastern time, Monday to Friday."
      
      3. **Call Recording Queries:**
        - "What do you mean by a recorded line?", "Is this call being recorded?"
        --> Response: "By recorded line, I mean that this call is being recorded."
        - "Why are you recording this call?", "Can you stop recording this call?"
        --> Response: "We need to record this call due to company policy."
        - "What if I do not want to be recorded?", "Can we proceed if we don't record this call?"
        --> Response: "Unfortunately, we will be unable to proceed with this call if we stop recording."

      5. **Callback Queries:**
        - "Why do you want to call back within 7 days?"
        --> Response: "We want to ensure that we're not being intrusive with your time, and that our calls suit your convenience. Would you like us to call back at a specific time?" THEN CONTINUE the current question where you left off

