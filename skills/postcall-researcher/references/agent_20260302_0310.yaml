        reflection_variable:
          # From mini-Miranda
          - variables:
              # Whether the mini-Miranda has been delivered in full
              mini_miranda:
                overview: Determine whether _assistant has delivered the mini-Miranda statement in full - "This is an attempt to collect a debt by a debt collector. Any information obtained will be used for that purpose." ONLY consider whether or not _assistant has completed this statement; it does not matter what _user said.
                description:
                  "yes": This mini-Miranda statement has been delivered in full by _assistant without any interruption by _user, "This is an attempt to collect a debt by a debt collector. Any information obtained will be used for that purpose."
                  "no": This statement has either not been delivered, or interrupted or otherwise only partially delivered.
                example: "yes"

              # Determine whether the customer has a clear intent to resolve the debt
              willing_to_pay:
                description:
                  "yes": The consumer clearly expresses **intent** or **willingness** to resolve the debt. This includes any statement or request to **make a payment**, **arrange a payment plan** (e.g., "I want to pay," "Can I make a payment?," "Let's set up a payment plan," or any opening statement inquiring about resolution options).
                  "no": The consumer does not express any intent or willingness to resolve the debt.
                  "settlement": The consumer explicitly discusses a **settlement** offer or agreement, indicating their intent to continue with settlement amounts and terms. (e.g. "I agree to settle, ", "Some settlement or something.")
                example: "yes"

          - variables:
              # Whether the customer clearly makes a promise to pay
              promise:
                overview: Captures _user's commitment to pay, refusal to pay, or an unresolved stance. A clear refusal (`no`) or firm commitment (`yes`) made during the conversation overrides any prior ambiguity or hedging.
                description:
                  "yes": |
                    _user has clearly agreed to a specific payment plan or resolution, or has confirmed a past payment was made. For a promise to be `yes`, _user must first demonstrate awareness of the debt being discussed.
                        -- A `yes` is indicated when _user agrees to the financial terms of a proposed plan (e.g., "Yes, that's okay," "That works for me"). This applies even if they subsequently request a procedural step like a transfer to an agent to finalize the transaction.
                        -- This includes confirmations of past payments (e.g., "I already sent it," "I mailed the check yesterday"), as they represent a firm commitment to the debt's resolution.
                        -- A user's counter-proposal or conditional offer is only considered a `yes` once _assistant explicitly accepts or confirms the new terms.
                  "no": |
                    _user has explicitly stated a definitive inability or unwillingness to make **any** payment towards the debt, or has definitively rejected the obligation entirely. This requires that _user understands the context of the debt being discussed.
                        -- This applies only to unambiguous, complete rejections of payment (e.g., "I can't pay anything," "I will not pay," "I'm not working and have no income").
                        -- Rejecting a specific plan proposed by _assistant while offering an alternative or continuing to negotiate is **not** a `no`; this is considered an unresolved negotiation and should be labeled `unknown`. A `no` indicates _user has stopped negotiating and is refusing to pay.
                        -- This does not apply if _user says "No" in response to a non-payment, administrative question (e.g., agent: "Is there anything else?", user: "No.").
                  "unknown": |-
                    _user's intent regarding payment is genuinely ambiguous, conditional and unresolved, or otherwise unclear. This is the default if the strict preconditions for `yes` or `no` are not met.
                        -- **Contextual Confusion:** If _user expresses significant confusion about the caller's identity, the debt's origin, or their obligation (e.g., "Who are you?", "What is this for?"), their intent is `unknown` until they acknowledge the debt.
                        -- **Unresolved Negotiations:** A promise is `unknown` during an active negotiation where terms have not been mutually agreed upon. This includes:
                          --- _user rejects _assistant's plan but proposes a counter-offer (e.g., a different amount or timeframe).
                          --- The negotiation is deadlocked because _user's offer is below _assistant's stated minimum, but _user has not withdrawn their intent to pay.
                          --- The conversation ends on _user's counter-offer or clarifying question before _assistant can respond.
                        -- **Pre-agreement Agent Request:** The intent is `unknown` if _user requests to speak to _assistant *before* or *instead of* agreeing to proposed financial terms.
                        -- **No Active Obligation:** This category is used when no explicit promise or refusal is made, if the account is already marked as resolved, or if the conversation does not concern _user's direct financial obligation (e.g., _user is not the debtor).
                example: "no"
              
              # The amount the customer confirms to pay
              amount:
                description: |
                  The total amount of payment in dollars that _user clearly and finally commits to pay, expressed as a NUMBER and unit of currency (e.g., '1038 dollars'). A commitment is only considered final when _user unambiguously agrees to a specific proposal from _assistant. _user's proposal or counter-offer is not a final commitment. Follow this strict order of priority:
                    1. **Agreed Settlement Amount (Highest Priority):** If _user agrees to a specific **settlement** amount proposed by the assistant, use that settlement amount. This takes highest priority over any other balances or calculations.
                      -- Agreement includes asking about payment terms for the proposed settlement (e.g., "Can I pay that $1038 settlement in three months?"). This counts as agreement to the total settlement amount.
                      -- Agreement followed by a request to speak with a live agent to finalize details (e.g., "Yes, I agree to that. But let me talk to an agent.") is still considered a final commitment to the agreed-upon amount.
                    2. **Agreed Plan to Pay Full Balance:** If no settlement was agreed upon and _user agrees to a payment plan explicitly proposed by _assistant to resolve their "full balance," use the full outstanding balance, `{{dict_variable.ssml_total_balance}}`. The commitment is to resolve the full balance, even if the installment terms (e.g., "$190 for 24 months") calculate to a different total.
                    3. **Calculated Total from an Agreed Plan:** If _user agrees to a payment plan defined by both an installment amount and a duration (e.g., "Yes, I agree to $100 for 12 months") and the plan is NOT explicitly for a settlement (Rule 1) or the full balance (Rule 2), you MUST calculate the total amount by multiplying the installment by the duration. Use this calculated total (e.g., 1200 dollars).
                    4. **Agreement by Reference:** If _user agrees to a specific amount proposed by the assistant using referential language (e.g., "I'll pay that amount," "I wanna make the same number for that one"), use the specific amount mentioned by _assistant, applying the priority logic from Rules 1-3.
                    5. **No Final Commitment (Return 'unknown'):** Return 'unknown' if no clear and final commitment to a total amount is made according to the rules above. This is the default if no higher-priority rule applies. This includes:
                      -- **_user Proposals or Counter-offers:** A _user's statement of what they *can* or *want* to pay (e.g., "I can do $500," "I want to do $200 for 24 months") is a proposal, NOT a final commitment until the assistant accepts it and _user re-confirms.
                      -- **Contradictory or Conditional Agreement:** An agreement immediately followed by a negation (e.g., "Yes. No...") or a condition that cannot be met at the time of the call (e.g., "Yes, but it has to be next month because my account was tampered with") voids the commitment.
                      -- **Vague Intent:** Vague promises (e.g., "I'll pay next week") are not a commitment to a specific amount.
                      -- **Temporary or "Keep-in-Touch" Plans:** An agreement to a short-term, temporary, or partial plan (e.g., "$50 for 3 months to keep the account current") is not a commitment to a final total amount.
                      -- **Voided Intent / Rejection:** If a _user states a specific amount, then rejects a subsequent, different proposal, the original amount is voided. If _user rejects all options or withdraws a previous commitment, the commitment is voided. Only the last firmly agreed-upon amount should be used.
                example: "2000 dollars"
              
              # The date of the first payment
              first_date:
                description: |
                  The specific calendar date (YYYY-MM-DD) when _user expresses a clear and confirmed intention to make their **first** payment, whether it's an initial payment or the first of installments. A "clear and confirmed intention" is a direct commitment to *pay on* a specific date, not a promise to call back to arrange a payment or an agreement to an offer with a payment deadline (e.g., 'must be paid by [Date]'). 
                    -- The extracted date must always be on or after Today ({{raw_call_assignment.today}}, which is {{dict_variable.day_of_week}}). The date can be an absolute date (e.g., "December 15th") or a relative term (e.g., "next Monday," "the 30th"). All relative dates must be calculated as the *next upcoming calendar occurrence* from Today. **Strictly enforce this rule for day-of-week terms:** "next [Day of Week]" (e.g., "next Friday") must resolve to the single chronologically closest upcoming occurrence of that day. For example, if Today is Tuesday, "next Friday" is the Friday of the current week (3 days away), not the Friday of the following week. 
                    -- **Strictly enforce futurity for day-of-month terms:** for instance, if Today is the 20th and _user says "the 15th" (providing only a day number), the date must resolve to the 15th of the *following* month. This also includes correctly resolving year rollovers for future dates (e.g., 'January 4th' stated in December resolves to January of the *next* calendar year). If _user agrees to pay immediately, they must explicitly state 'today', 'right now', or 'now' to resolve to Today's date ({{raw_call_assignment.today}}); do not infer immediacy from a general intent to pay (e.g., "I'm calling to make a payment") or from agreement to a settlement offer that lacks a specific timing component. 
                    -- If the consumer changes their mind or a stated date is unviable, return the *most recent confirmed and viable* payment date. Do not carry over a day of the month from a previously invalidated or past date unless _user explicitly confirms it in their new commitment; for example, if a payment for 'the 15th' is invalidated because it is in the past, and _user then says 'next month', the date is 'unknown' because the day '15th' was not re-confirmed. 
                    -- Return 'unknown' if: 
                      (1) _user explicitly refuses to pay or denies payment details; 
                      (2) _user makes no commitment to a specific calendar date, which includes providing a vague timeframe (e.g., "sometime next week," "in January," "next month" without a confirmed day), a general intent lacking a date (e.g., "I'll make a payment"), or a commitment to call back to arrange a payment (e.g., "I will call you back next Friday to start payments"); 
                      (3) _user agrees to an offer with a deadline (e.g., "must be paid before Dec 13th") but does not commit to a specific day *for* the transaction; 
                      (4) any stated date is unconfirmed, ambiguous, or invalidated. A date is considered ambiguous if _user's intent is unclear due to fragmented sentences (e.g., "...on the first... pardon?") or garbled/non-sequitur responses where a number's meaning as a date is not certain (e.g., _user says "Lease number eleven" when asked for a date). A date is invalidated if it has already passed (e.g., stating "November 5th" when Today is November 13th), contradicts an agreed-upon timeframe, or is mentioned in the past tense (e.g., "I was paying on the 1st"). Do not roll invalidated past dates to the next year. 
                    -- This variable is ONLY for the first Promise-to-Pay date; do NOT extract other entity types; focus strictly on the initial payment commitment.
                example: "2024-09-17"
              
              # The number of installments (number of months)
              months:
                description: |
                  the NUMBER of months for installments. 
                    -- Use the duration explicitly stated by _user or the inclusive count of months in a confirmed timeline (e.g., "starting in January and settling in March" is "3"). If _user agrees to, proposes, or counter-offers a specific monthly dollar amount (including saying "Yes" to a plan proposed by _assistant, agreeing to "continue" an existing plan, or stating an amount like "One hundred" in response to a monthly payment discussion) but no specific duration is mentioned, you MUST calculate the value, by dividing the total balance mentioned by _assistant by that monthly amount and round up to the nearest whole number. 
                    -- Return "1" ONLY for an explicit commitment to pay the full balance or a settlement in a single installment that is specifically scheduled for "today", "now", "all at once", or "one-time"; do not return "1" for a general expression of intent to pay (e.g., "I'm calling to make a payment," "I want to settle") unless a specific timing for a single payment is confirmed. 
                    -- Return "unknown" if _user agrees to a total settlement amount or expresses a desire to pay but does not specify a timeframe ("now", "today", "one-time") or number of payments, or if _user requests a human representative or ends the call BEFORE any specific amount or duration is agreed upon. If an agreement on a duration or monthly amount is reached, return that value even if _user subsequently requests a human representative, UNLESS the agreement is immediately followed by a contradiction, hedge, or statement of financial hardship that indicates _user cannot actually fulfill the obligation (e.g., "Yes, but I don't have the money right now"), in which case return "unknown". Also return "unknown" for refusals (e.g., "No"), even if followed by a vague intent to pay, and for ambiguous phrasing (e.g., "a payment", "same number"), or vague/conditional promises without a confirmed amount/date (e.g., "after I get paid"). A single month or date provided as a start date for a monthly plan does not override the installment calculation. 
                    -- For temporary or "keep-in-touch" bridge arrangements, return the duration of that specific confirmed schedule even if it does not resolve the full balance.
                example: "3"

              # The percentage of settlement suggested by the customer
              settlement_2_percentage:
                description: the percentage of settlement as a NUMBER from the conversation that _user clearly stated to pay. If _user rejects to pay or does not respond with the percentage amount, return 'unknown'. If _user changes their mind multiple times, choose the last agreed percentage. If _user refuses to pay or no longer commits to the amount in the latest turns of the conversation, ensure to unset the percentage and return 'unknown'.
                example: "40"
              
              # The date the customer agrees to be called back to review the payment plan
              review:
                description: |
                  A future date or time agreed upon with the user to rediscuss their payment situation, in YYYY-MM-DD format (Today is {{raw_call_assignment.today}}, a {{dict_variable.day_of_week}}). This is not a payment date. **Follow this logic hierarchy strictly**: (1) For calculable relative timeframes (e.g., "in six months," "next week," "two months from now," **"next month"**), calculate the exact date from today's date, preserving the day of the month. Example: If today is 2025-09-03 and user says "next month," use 2025-10-03. (2) If a time for a same-day callback is agreed upon (e.g., "call me back after 4 PM"), use today's date. (3) If **only a bare month name** is given, without a relative modifier like 'next' (e.g., user says just "August"), default to the 1st day of that month's next occurrence. Example: If it's 2025-07-24 and user says "August," use 2025-08-01. This rule does not apply to "next month." If no specific review date/time is set, return 'unknown'.
                example: "2024-09-17"

          - variables:
              # Whether the customer is willingly negotiating options to resolve their debt
              negotiate:
                overview: Reflects _user's current willingness and ability to engage in discussions or actions aimed at resolving their existing payment or debt situation with _assistant in the ongoing conversation.
                description:
                  "yes": |
                    _user indicates a clear willingness to engage in a discussion or action to resolve the payment within the current conversation. This includes explicitly agreeing to make a payment, or actively negotiating specific terms, amounts, or dates. _user is actively seeking or accepting a path to resolution in the present interaction.
                        -- Rejecting specific offers or stating inability for a particular plan does not negate a `yes` classification if _user continues to explore other options (e.g., "I can't pay $100, but can you do $50?", "Can I settle for a lower amount?"). The key is sustained engagement in finding an alternative solution within the same conversation.
                        -- User-initiated proposals must be clear and not immediately contradicted by _user upon _assistant's clarification to qualify.
                        -- Requesting to speak with a different agent or supervisor to find a workable payment solution also qualifies as `yes`.
                  "no": |
                    _user explicitly states an unwillingness or inability to make a payment or discuss payment options at this time, and ceases to explore viable alternatives within the current conversation.
                        -- This includes directly rejecting a payment arrangement without attempting to negotiate a different one (e.g., "Not at the moment. I'll have to get back with you," followed by disengagement).
                        -- This applies even if _user suggests a future follow-up (e.g., "Call me back in a month"), as this is a refusal to negotiate *now*.
                        -- This also applies if _user's attempt to propose an alternative is immediately denied or retracted upon clarification (e.g., user: "I could do X", assistant: "So you can do X?", user: "No, that's incorrect."), thereby failing to establish a clear path forward.
                        -- This includes situations where _user is unable to engage in a coherent discussion about payment, repeatedly providing nonsensical or irrelevant answers that prevent any negotiation from occurring, despite _assistant's attempts to clarify.
                  "unknown": |
                    _user's stance on negotiating a payment is genuinely unclear, contradictory, or conditional upon an external factor that prevents current negotiation.
                        -- _user gives immediately self-contradictory statements within a single turn (e.g., "Yes... No, no, sorry.") that leave their intent genuinely ambiguous.
                        -- _user's willingness is conditional on an external event or information they do not have, and they cease further negotiation pending that factor (e.g., "I'll pay after I get my next check," or "I need to talk to my spouse," without discussing hypothetical terms).
                        -- _user disputes the debt or is only seeking information and is not prompted by _assistant to negotiate a resolution.
                example: "unknown"
              
              confirmed:
                overview: Captures whether _user has explicitly confirmed or denied the core financial terms of a complete payment arrangement immediately after _assistant summarizes the terms for final agreement. The "payment arrangement" refers to the amount and timing, not the payment method (e.g., card number).
                description:
                  "yes": |
                    _user explicitly agrees (e.g., "Yes," "I would like to proceed," "Okay") immediately following a valid confirmation phase.
                        -- A valid confirmation phase occurs when _assistant summarizes the key financial terms of a payment arrangement and asks for agreement in the same turn (e.g., "So that's $100 on the 15th, is that correct?").
                        -- The summary must contain all required components for the payment type:
                          --- For a **one-time payment**, the summary must contain the **amount** and a specific **date** (e.g., "today," "on the 15th").
                          --- For a **recurring payment plan**, the summary must contain the payment **amount**, **schedule** (e.g., "monthly"), **start date**, and **frequency/duration** (e.g., "for 12 months").
                        -- The "payment arrangement" refers only to the financial terms (amount and timing). It does not require discussion of the payment method or source (e.g., "using your card on file") to be considered complete.
                        -- A component is considered part of the summary if it is stated by the agent in the confirmation turn OR was explicitly stated by _user in the immediately preceding turn.
                  "no": |
                    _user explicitly disagrees with the terms immediately following a valid confirmation phase.
                        -- An explicit disagreement can be a complete phrase (e.g., "No, I can't do that," "That's not right") or an incomplete phrase that clearly and unambiguously signals rejection, even if _user is cut off (e.g., "I don't...", "That's not...").
                        -- This label applies only to rejections of a complete, summarized offer. Rejections of partial offers made during negotiation should be `unknown`.
                        -- General refusal to cooperate (e.g., "I'm not paying anything") is not a `no` unless it is a direct response to a complete summary and confirmation question.
                  "unknown": |
                    The conditions for a `yes` or `no` label have not been met.
                        -- This label is used during negotiation, before a complete arrangement has been summarized by _assistant for final confirmation.
                        -- This label MUST be used if _assistant's summary is missing any of the required components for the payment type (e.g., a one-time payment summary is missing the date), even if _user agrees.
                        -- This label applies if _user's response to a valid confirmation question is ambiguous (e.g., "Hmm," "I guess so"), non-committal, a question, or if they do not respond.
                        -- An incomplete user utterance is `unknown` unless it clearly signals rejection (in which case it is `no`). For example, if _user says "I..." and the transcript ends, the label is `unknown`.
                example: "unknown"
              
              kit:
                overview: Tracks _user's intent regarding a temporary "Keep-In-Touch" (KIT) payment arrangement. A KIT is a fallback measure involving nominal payments. This variable specifically tracks firm commitment to the **financial component** of a KIT plan. An agreement is not firm if it is for a non-financial follow-up (like a callback), is immediately retracted, or is made contingent on another action. _user's explicit rejection of financial terms takes precedence over a subsequent agreement to a simple follow-up call.
                description:
                  "yes": |
                    _user commits to a KIT arrangement. This applies if:
                        -- _user explicitly and firmly agrees to a new KIT offer involving a specific nominal payment amount (e.g., "Yes, I can do $50 a month").
                        -- _assistant states that a KIT plan is *already in place*, and _user does not directly dispute or contradict this fact. Any response other than a direct contradiction (e.g., deflecting, changing the subject, requesting a live agent) qualifies as `yes`.
                  "no": |
                    _user rejects a KIT arrangement or firmly commits to an alternative plan. This applies if:
                        -- _user explicitly declines a KIT offer (e.g., "No, I can't do that").
                        -- _user implicitly rejects the financial terms of a KIT offer by stating they cannot afford the proposed payment (e.g., "I don't have it," "I don't know where I would get it from"). This label is `no` even if the user subsequently agrees to a non-financial follow-up call.
                        -- _user firmly agrees to a different, more substantial payment plan (e.g., payment in full, a settlement, or a standard installment plan), making the KIT offer irrelevant.
                        -- _user contradicts the agent's premise of a KIT plan by stating they are on a different type of arrangement (e.g., "I'm already on settlement") or that no such plan exists.
                  "unknown": |
                    _user's intent regarding the financial terms of a KIT arrangement is unclear, deferred, or non-committal. This applies if:
                        -- _user agrees to, or themselves requests, a generic follow-up call or to reschedule the conversation, without having first committed to or rejected the financial terms of a specific KIT offer.
                        -- _user gives a vague, dismissive, or non-committal affirmative response to a KIT offer (e.g., "Yeah, whatever", "I guess", "Fine"), as these do not constitute a firm commitment.
                        -- _user agrees to a plan (KIT or otherwise) but then immediately retracts, expresses doubt, or requests to speak to a live agent before the plan is finalized (e.g., "Yes, but wait...", "Okay, but let me talk to someone first").
                        -- _user and _assistant discuss potential payment amounts for a KIT plan, but the call ends before a specific amount is firmly agreed upon.
                        -- _user's state (e.g., confusion, distress, incoherence) makes their commitment to any financial arrangement unreliable, even if they use an affirmative word like "yes."
                example: "no"
              
              monthly:
                description: the installment amount in monthly in dollars that user agreed to pay in NUMBER and unit of currency, if customer reject to pay or don't answer the amount then return 'unknown'
                example: 100 dollars
              
              consolidation:
                description: return "yes" if Consumer claims they are with a program for debt/credit settlement, consolidation, relief, management or financial solutions. Else, return "no"
                example: "no"
              
              consolidation_confirmed:
                description: return "yes" if the consumer confirms after the agent asks for confirmation that the Consumer is with a program for debt/credit settlement, consolidation, relief, management or financial solutions. Else, return "no"
                example: "no"
              
              consolidation_program:
                description: return the details of the company or program that is consolidating debt for the consumer. Else, return "unknown"
                example: "unknown"

          - variables:
              exc:
                description:
                  complaint: if _user complain about historical calls, system issues, procedure issues, policy issues, response time or process of receiving requested documents.; and in the latest turns of the conversation has not confirmed that the complaint is now resolved or they have chosen to ignore it for now.
                  dispute: if _user just said they want to dispute the debt but not mention clear reasons such as debt amount, or they already paid, or they are a victim of identity theft.; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                  dispute_balance: If _user has a dispute about the balance of the debt or the charges (for example, 'We agreed to a $500 discount, but the portal is still showing the original amount,' 'The creditor promised me I would not need to pay late fees,' 'This balance is too high because...,' 'I was charged for this account, but I never received the item,' 'I refunded this charge, but it still showed up on my account'), but do NOT choose this value if _user questions or protests the payment options you are offering them (for example, 'I never had a monthly payment amount') or is actively countering a settlement offer (e.g., 'I can only pay half'), as we are in the process of negotiation; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                  dispute_paid: if _user has dispute that they already paid the debt (for example 'I paid the full amount via bank transfer six months ago. Can you confirm this on your end?', 'I settled this debt last year with a check. Why is it still showing as unpaid?', 'I made a payment directly to the creditor last year. This should be updated in your records.', 'I have already paid off this debt through your online portal. Can you verify the payment?', 'I cleared this balance with a credit card payment last 2 years. Please check and confirm it has been received'); and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now. Do NOT select this value if the _user merely mentions having an active "settlement," "settlement agreement," or "payment plan" that they are currently paying or intend to pay (e.g., "I have a settlement," "I made a settlement arrangement").
                  dispute_theft: if _user explicitly informs us that they are a victim of identity theft (e.g. "I received a notification about a debt in my name that I never incurred.", "I found out someone used my identity to open an account.", "This debt is not mine; I suspect my identity has been stolen.", "I noticed unfamiliar charges under my name that I never authorized.", "I believe my personal information was used fraudulently to create this debt.").; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                  dispute_txn_fraud: if _user explicitly informs us that they noticed their DEBT increased or their CREDIT LIMIT decreased due to unauthorized charges that they did not initiate in their **DEBT** account, where someone has unauthorized access to their DEBT account information and makes transactions without their consent. DO NOT choose this value if _user is explaining why they can't make a payment now, does not specify whether the issue is from their bank account or debt account, describes a loss of existing funds (e.g., 'money taken out', 'money missing', 'withdrawn'), or uses only general terms like 'account fraud' or 'transaction fraud' or 'unauthorized purchases' without specifying a credit/debt account. Examples include statements like "I noticed purchases on my debt account that I did not authorize.", "My account was charged for items I did not buy.", "I received a notification about a transaction I never made.", "There are unfamiliar transactions on my statement that I did not initiate.", "Someone used my account information to make unauthorized purchases."; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                  bankruptcy: If _user explicitly mentions the words "BANKRUPTCY," "BANKRUPT," "BANKRUPTCY FILING," or "FILING FOR BANKRUPTCY," it is a critical rule that the phrase "filed for" is NOT a bankruptcy indicator, so you should not enter this case and should go back to the negotiation flow. NEVER ask about bankruptcy if they only mention financial hardship or financial disability.
                  cease_comms: if caller requests to take them off your calling list or if caller proactively (which means without being prompted) asks to stop receiving communications from us including email, texting, sms or call; and in the latest turns of the conversation has not confirmed that they now want to continue receiving communications.
                  attorney: if the caller or consumer lets you know that they are being represented by an attorney or lawyer (e.g. "I have an attorney" or "Speak to my lawyer" or "My lawyer told me not to talk to you. Please contact them instead")
                  callback: if the _user want to a callback from a human agent and in the latest turns of the conversation has confirmed that they confirmed that they want a human agent call back
                  human_agent_request: if _user specifically requests speaking to a live agent, human, or representative; and in the latest turns of the conversation has not agreed to continue the conversation
                  "null": default value, if _user did not mention any above; or if the _user simply asks a question about virtual agent without requesting to speak to a live agent
                example: "null"
              info_confirm:
                description:
                  "yes": if the user has been asked to confirm or update their contact details to ensure they are timely informed about updates and changes to their account after a thorough discussion of potential payment plans and financial circumstances. Such as, "Could you please confirm your contact information?", "I'd like to make sure we have the correct contact information for you."
                  "no": if the user has not been asked to confirm their contact details
                example: "no"
              no_notice:
                description: return "yes" ONLY when both conditions are satisfied, i.e. (1) when after the agent has explicitly double check if the consumer has received a letter or email from {{raw_call_assignment.company_name}} and (2) the consumer confirmed that they have not received any. Else, return "no"
                example: "no"
              transfer:
                description: return "yes" ONLY when the agent lets the consumer know that the agent does not have the authority to approve lower settlement options but the agent will get a live agent to join the call now to discuss lower settlement options. Else, return "no"
                example: "no"
              payment_method:
                description:
                  ach: _user ultimately chooses to pay by bank transfer or ACH payments or _user persistent in choosing bank transfer or ACH payments.
                  credit_card: _user ultimately chooses to pay by credit card or _user persistent in choosing credit card.
                  debit_card: _user ultimately chooses to pay by debit card or _user persistent in choosing debit card.
                  mailing: _user ultimately chooses to pay by mailing money order or check or _user persistent in choosing mailing money order or check.
                  unknown: it is unclear what payment method _user would like to choose or the _user has not selected or confirmed or mentioned a payment method yet.
                  other: _user wants to pay by other payment method
                example: unknown
            len_msg_reflection: 4
            reflection_template: template_default
          
          - variables:
              struggling_situation:
                description:
                  "yes": if the user describes experiencing financial hardship (such as loss of job, medical emergency, disability, or similar circumstances)
                  "no": if the user is not struggling with their financial situation or they have not mentioned any financial hardship.
                example: "no"
        
        processing_variable:
          parsed_amount:
            tool: lib_tools.tools_kompato.parse_value
            params:
              value: self.dict_variable.amount
          monthly_amt_compared: #return below_min, above_min, equal_min
            tool: lib_tools.tools_kompato.amount_compare_to_list
            params:
              numbers_list:
                [50, self.raw_call_assignment.client_min_payment_amount_per_month]
              number: self.dict_variable.monthly
          filler_ptp_amt:
            tool: lib_tools.tools_kompato.outbound_get_filler_ptp_amt #return full, below_min, above_min, unknown
          filler_ptp_date:
            tool: lib_tools.tools_kompato.outbound_get_filler_ptp_date # return today, not today, unknown
          filler_monthly_amt:
            tool: lib_tools.tools_kompato.outbound_get_filler_monthly_amt #return below_min, equal_above_min
          within_window:
            tool: lib_tools.tools_kompato.outbound_compare_window #return yes, before, after, invalid, unknown
            params:
              smagent: self
              max_post_day: 35
          invalid_payment_date_cnt:
            tool: lib_tools.tools_kompato.count_patterns
            params:
              current_count: self.dict_variable.invalid_payment_date_cnt
              current_value: self.dict_variable.within_window
              patterns: ["after", "before"]
          unconfirmed_count:
            tool: lib_tools.tools_kompato.count_pattern
            params:
              current_count: self.dict_variable.unconfirmed_count
              current_value: self.dict_variable.confirmed
              pattern: "no"
          # installment_cnt_final:
          #   tool: lib_tools.tools_kompato.get_installment_cnt_final
          filler_installment_cnt:
            tool: lib_tools.tools_kompato.get_filler_installment_cnt #return valid, invalid, unknown
          min_monthly_total_balance:
            tool: lib_tools.tools_kompato.get_min_monthly_total_balance
          amount_settle_1:
            tool: lib_tools.tools_kompato.get_settlement_amount
          min_monthly_amount_settle_1:
            tool: lib_tools.tools_kompato.get_min_monthly_amount_settle_1
          max_installment_count:
            tool: lib_tools.tools_kompato.get_max_installment_count
          max_kit_monthly_amt:
            tool: lib_tools.tools_kompato.get_keep_in_touch_amount
          offer_monthly_amount:
            tool: lib_tools.tools_kompato.calc_offer_monthly_amount
          offer_installment:
            tool: lib_tools.tools_kompato.calc_offer_installment

          # new refractored tools
          n_months_user:
            tool: lib_tools.tools_kompato.divide_value
            params:
              total_amount: self.raw_call_assignment.itemizationCurrentBalance
              divide_amt: self.dict_variable.monthly
          total_amount_settlement_user:
            tool: lib_tools.tools_kompato.find_extreme
            params:
              numbers:
                [
                  self.dict_variable.amount,
                  self.dict_variable.total_amount_settlement,
                ]
              mode: max
          monthly_amount_settlement_user:
            tool: lib_tools.tools_kompato.find_extreme
            params:
              numbers:
                [
                  self.dict_variable.monthly,
                  self.dict_variable.min_monthly_amount_settlement,
                ]
              mode: max
          n_months_settlement_user:
            tool: lib_tools.tools_kompato.divide_value
            params:
              total_amount: self.dict_variable.total_amount_settlement_user
              divide_amt: self.dict_variable.monthly_amount_settlement_user
          minus_n_months_settlement_user:
            tool: lib_tools.tools_kompato.subtract_values
            params:
              value: self.dict_variable.n_months_settlement_user
              subtract_value: 1
          estimated_total_amount_settlement_user:
            tool: lib_tools.tools_kompato.multiple_value
            params:
              factor_1: self.dict_variable.monthly
              factor_2: self.dict_variable.n_months_settlement_user
          minus_total_amount_settlement_user:
            tool: lib_tools.tools_kompato.multiple_value
            params:
              factor_1: self.dict_variable.minus_n_months_settlement_user
              factor_2: self.dict_variable.monthly
          last_month_amount_settlement_user:
            tool: lib_tools.tools_kompato.subtract_values
            params:
              value: self.dict_variable.total_amount_settlement_user
              subtract_value: self.dict_variable.minus_total_amount_settlement_user
          n_months_reflected:
            tool: lib_tools.tools_kompato.get_installment_cnt
            params:
              amount: self.dict_variable.amount
              monthly: self.dict_variable.monthly
              months: self.dict_variable.months
              current_balance: self.raw_call_assignment.itemizationCurrentBalance
          minus_n_months_reflected:
            tool: lib_tools.tools_kompato.subtract_values
            params:
              value: self.dict_variable.n_months_reflected
              subtract_value: 1
          estimated_total_amount:
            tool: lib_tools.tools_kompato.multiple_value
            params:
              factor_1: self.dict_variable.monthly
              factor_2: self.dict_variable.n_months_reflected
          minus_total_amount:
            tool: lib_tools.tools_kompato.multiple_value
            params:
              factor_1: self.dict_variable.minus_n_months_reflected
              factor_2: self.dict_variable.monthly
          last_month_amount:
            tool: lib_tools.tools_kompato.subtract_values
            params:
              value: self.raw_call_assignment.itemizationCurrentBalance
              subtract_value: self.dict_variable.minus_total_amount

          total_amount_settlement_60_user:
            tool: lib_tools.tools_kompato.find_extreme
            params:
              numbers:
                [
                  self.dict_variable.amount,
                  self.dict_variable.total_amount_settlement_60,
                ]
              mode: max
          monthly_amount_settlement_60_user:
            tool: lib_tools.tools_kompato.find_extreme
            params:
              numbers:
                [
                  self.dict_variable.monthly,
                  self.dict_variable.min_monthly_amount_settlement_60,
                ]
              mode: max
          n_months_settlement_60_user:
            tool: lib_tools.tools_kompato.divide_value
            params:
              total_amount: self.dict_variable.total_amount_settlement_60_user
              divide_amt: self.dict_variable.monthly_amount_settlement_60_user
          minus_n_months_settlement_60_user:
            tool: lib_tools.tools_kompato.subtract_values
            params:
              value: self.dict_variable.n_months_settlement_60_user
              subtract_value: 1
          estimated_total_amount_settlement_60_user:
            tool: lib_tools.tools_kompato.multiple_value
            params:
              factor_1: self.dict_variable.monthly_amount_settlement_60_user
              factor_2: self.dict_variable.n_months_settlement_60_user
          minus_total_amount_settlement_60_user:
            tool: lib_tools.tools_kompato.multiple_value
            params:
              factor_1: self.dict_variable.minus_n_months_settlement_60_user
              factor_2: self.dict_variable.monthly_amount_settlement_60_user
          last_month_amount_settlement_60_user:
            tool: lib_tools.tools_kompato.subtract_values
            params:
              value: self.dict_variable.total_amount_settlement_60_user
              subtract_value: self.dict_variable.minus_total_amount_settlement_60_user
          total_amount_settlement_2_user:
            tool: lib_tools.tools_kompato.calc_percentage_amount
            params:
              total_amount: self.raw_call_assignment.itemizationCurrentBalance
              percentage: self.dict_variable.settlement_2_percentage
          total_amount_reduction_settlement_2_user:
            tool: lib_tools.tools_kompato.calc_percentage_amount
            params:
              total_amount: self.raw_call_assignment.itemizationCurrentBalance
              percentage: self.dict_variable.settlement_2_percentage
              minus: 1

          monthly_amount_kit:
            tool: lib_tools.tools_kompato.find_extreme
            params:
              numbers: [50, self.dict_variable.monthly]
              mode: max
          n_months_kit: #The keep-in-touch duration in months with users said no with the settlement plan, compare with 4 months
            tool: lib_tools.tools_kompato.divide_value
            params:
              total_amount: self.raw_call_assignment.itemizationCurrentBalance
              divide_amt: self.dict_variable.monthly_amount_kit
              mode: min
              base_compare_amt: 4
          ai_payment_methods:
            tool: lib_tools.tools_kompato.pick_value_from_conditions
            params:
              conditions:
                - condition: "ai_payment_methods is not None and isinstance(ai_payment_methods, list) and len(ai_payment_methods) > 0"
                  value: ai_payment_methods
                - condition: "str(vendor_id) == '6'"
                  value: ["credit_card", "debit_card"]
                - condition: "else"
                  value: ["debit_card"]
              local_vars:
                vendor_id:
                  value: self.raw_call_assignment.vendor_id
                  type: str
                ai_payment_methods:
                  value: self.raw_call_assignment.ai_payment_methods
                  type: array
              return_type: array
          vendor_payment_methods:
            tool: lib_tools.tools_kompato.pick_value_from_conditions
            params:
              conditions:
                - condition: "vendor_payment_methods is not None and isinstance(vendor_payment_methods, list) and len(vendor_payment_methods) > 0"
                  value: vendor_payment_methods
                - condition: "str(vendor_id) == '6'"
                  value: ["credit_card", "debit_card", "ach", "mailing"]
                - condition: "else"
                  value: ["debit_card", "ach", "mailing"]
              local_vars:
                vendor_payment_methods:
                  value: self.raw_call_assignment.vendor_payment_methods
                  type: array
                vendor_id:
                  value: self.raw_call_assignment.vendor_id
                  type: str
              return_type: array
          client_min_kit_per_vendor:
            tool: lib_tools.tools_kompato.pick_value_from_conditions
            params:
              conditions:
                - condition: "str(vendor_id) == '6'"
                  value: 25.0
                - condition: "else"
                  value: 50.0
              local_vars:
                vendor_id:
                  value: self.raw_call_assignment.vendor_id
                  type: str
              return_type: float
          kit_monthly_amount:
            tool: lib_tools.tools_kompato.find_extreme
            params:
              numbers:
                [
                  self.dict_variable.monthly,
                  self.dict_variable.client_min_kit_per_vendor,
                ]
              mode: max
          filler_ptp_monthly_amount:
            tool: lib_tools.tools_kompato.classify_amount_relative_to_reference
            params:
              user_value: self.dict_variable.monthly
              reference_value: self.raw_call_assignment.client_min_payment_amount_per_month
          kit_filler_ptp_monthly_amount:
            tool: lib_tools.tools_kompato.classify_amount_relative_to_reference
            params:
              user_value: self.dict_variable.monthly
              reference_value: self.dict_variable.client_min_kit_per_vendor
          filler_min_monthly_amount_settlement_60:
            tool: lib_tools.tools_kompato.classify_amount_relative_to_reference
            params:
              user_value: self.dict_variable.monthly
              reference_value: self.dict_variable.min_monthly_amount_settlement_60
          filler_min_monthly_amount_settlement:
            tool: lib_tools.tools_kompato.classify_amount_relative_to_reference
            params:
              user_value: self.dict_variable.monthly
              reference_value: self.dict_variable.min_monthly_amount_settlement
          ssml_first_ptp_date:
            tool: lib_tools.tools_kompato.format_spoken_date
            params:
              date_str: self.dict_variable.first_date
          ssml_monthly_amount_kit:
            tool: lib_tools.tools_kompato.convert_ssml
            params:
              value: self.dict_variable.monthly_amount_kit
          ssml_monthly_amount_user:
            tool: lib_tools.tools_kompato.convert_ssml
            params:
              value: self.dict_variable.monthly
          ssml_total_amount_settlement_2_user:
            tool: lib_tools.tools_kompato.convert_ssml
            params:
              value: self.dict_variable.total_amount_settlement_2_user
          ssml_total_amount_reduction_settlement_2_user:
            tool: lib_tools.tools_kompato.convert_ssml
            params:
              value: self.dict_variable.total_amount_reduction_settlement_2_user
          # Calculate the overshadow period
          initial_mvn_sent_time:
            tool: lib_tools.tools_kompato.pick_value_from_conditions
            params:
              conditions:
                - condition: "rca_initial_mvn in [None, '', 'None']"
                  value: rca_today
                - condition: "'-' not in rca_initial_mvn"
                  value: rca_today
                - condition: "else"
                  value: rca_initial_mvn
              local_vars:
                rca_initial_mvn:
                  value: self.raw_call_assignment.initial_mvn_sent_time
                  type: str
                rca_today:
                  value: self.raw_call_assignment.today
                  type: str
              return_type: str
            rerun: False
          # Days since the initial MVN sent
          days_since_initial_mvn_sent:
            tool: lib_tools.tools_kompato.datediff
            params:
              date_str1: self.dict_variable.initial_mvn_sent_time
              date_str2: self.raw_call_assignment.today
            rerun: False

        transition_conditions:
          ## START handle exception case
          "'{{dict_variable.exc}}' == 'callback'":
            next_state: exc_cb
            filler:
            repeat_filler:

          "'{{dict_variable.exc}}' == 'complaint'":
            next_state: exc_complaint
            filler:
            repeat_filler:
          "'{{dict_variable.exc}}' == 'dispute'":
            next_state: exc_dispute
            filler:
            repeat_filler:
          "'{{dict_variable.exc}}' == 'dispute_balance'":
            next_state: exc_dispute_balance
            filler:
            repeat_filler:
          "'{{dict_variable.exc}}' == 'dispute_paid'":
            next_state: exc_dispute_paid
            filler:
            repeat_filler:
          "'{{dict_variable.exc}}' == 'dispute_theft'":
            next_state: exc_dispute_theft
            filler:
            repeat_filler:
          "'{{dict_variable.exc}}' == 'dispute_txn_fraud'":
            next_state: exc_dispute_txn_fraud
            filler:
            repeat_filler:
          "'{{dict_variable.exc}}' == 'bankruptcy'":
            next_state: exc_bankruptcy
            filler:
            repeat_filler:
          "'{{dict_variable.exc}}' == 'cease_comms'":
            next_state: exc_cease_comms
            filler:
            repeat_filler:
          "'{{dict_variable.exc}}' == 'attorney'":
            next_state: exc_attorney
            filler:
            repeat_filler:
          "'{{dict_variable.exc}}' == 'human_agent_request'":
            next_state: exc_human_agent_request
            filler:
            repeat_filler:
          ### END handle exception case
          # ---------------------------------------
          
          # Repeat mini-Miranda if interrupted
          "'{{dict_variable.mini_miranda}}' != 'yes'":
            next_state: negotiation_from_script
            filler: I apologize but I need to deliver this mandatory statement. I must advise that this is an attempt to collect a debt by a debt collector. Any information obtained will be used for that purpose. |partial
            repeat_filler:

          #If the customer has promised to pay and has accepted a valid settlement offer that will resolve the account for full amount and has provided today's date, but didn't confirm the entire payment agreement for more than 1 attempt => Warm-transfer (given that it is during working hours and a WT signal has not been sent yet)
          "'{{dict_variable.promise}}' == 'yes' and '{{dict_variable.filler_ptp_amt}}' == 'full' and '{{dict_variable.filler_ptp_date}}' == 'today' and '{{dict_variable.confirmed}}' == 'no' and {{dict_variable.unconfirmed_count}} >= 2 and '{{dict_variable.is_working_hours }}' == 'yes' and '{{dict_variable.warm_transfer_sent}}' != 'yes'":
            next_state: payment_method_warm_transfer
            filler: *overshadow_period_statement
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I'm glad to see we are making a payment progress for this account. I have located a live agent to further help with the rest of payment setup.
                  metadata: *sm_metadata
                  extra_info: *warm_transfer_info_with_payment

          #If the customer has promised to pay and has provided a date that falls within 30 days from today, and the customer has accepted a valid settlement offer that will resolve the account for not below the minimum amount, but the customer didn't confirm the entire payment agreement  for more than 1 attempt => Warm-transfer (given that it is during working hours and a WT signal has not been sent yet)       
          "'{{dict_variable.promise}}' == 'yes' and '{{dict_variable.within_window}}' == 'yes' and '{{dict_variable.filler_installment_cnt}}' == 'valid' and '{{dict_variable.filler_ptp_amt}}' != 'below_min' and '{{dict_variable.filler_ptp_amt}}' != 'unknown' and '{{dict_variable.confirmed}}' == 'no' and {{dict_variable.unconfirmed_count}} >= 2 and '{{dict_variable.is_working_hours }}' == 'yes' and '{{dict_variable.warm_transfer_sent}}' != 'yes'":
            next_state: payment_method_warm_transfer
            filler: *overshadow_period_statement
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I'm glad to see we are making a payment progress for this account. I have located a live agent to further help with the rest of payment setup.
                  metadata: *sm_metadata
                  extra_info: *warm_transfer_info_with_payment

          #If the customer has promised to pay but hasn't provided a date that falls within 30 days from today, and hasn't provided a valid settlement offer, but the customer didn't confirm the entire payment agreement for more than 1 attempt => Warm-transfer (given that it is during working hours and a WT signal has not been sent yet)       
          "'{{dict_variable.promise}}' == 'yes' and '{{dict_variable.amount}}' != 'unknown' and '{{dict_variable.first_date}}' != 'unknown' and '{{dict_variable.confirmed}}' == 'no' and {{dict_variable.unconfirmed_count}} >= 2 and '{{dict_variable.is_working_hours }}' == 'yes' and '{{dict_variable.warm_transfer_sent}}' != 'yes'":
            next_state: payment_method_warm_transfer
            filler: *overshadow_period_statement
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I'm glad to see we are making a payment progress for this account. I have located a live agent to further help with the rest of payment setup.
                  metadata: *sm_metadata
                  extra_info: *warm_transfer_info_with_payment

          #If the customer has promised to pay and agreed to keep-in-touch plan and provided a date that falls within 30 days from today but the customer didn't confirm the entire payment agreement for more than 1 attempt => Warm-transfer (given that it is during working hours and a WT signal has not been sent yet)       
          "'{{dict_variable.promise}}' == 'yes' and '{{dict_variable.kit}}' == 'yes' and '{{dict_variable.within_window}}' == 'yes' and '{{dict_variable.confirmed}}' == 'no' and {{dict_variable.unconfirmed_count}} >= 2 and '{{dict_variable.is_working_hours }}' == 'yes' and '{{dict_variable.warm_transfer_sent}}' != 'yes'":
            next_state: payment_method_warm_transfer
            filler: *overshadow_period_statement
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I'm glad to see we are making a payment progress for this account. I have located a live agent to further help with the rest of payment setup.
                  metadata: *sm_metadata
                  extra_info: *warm_transfer_info_with_payment

          #If the customer has promised to pay and the user has been asked to confirm or update their contact details => Warm-transfer (given that it is during working hours and a WT signal has not been sent yet)        
          "'{{dict_variable.promise}}' == 'yes' and '{{dict_variable.info_confirm}}' == 'yes' and '{{dict_variable.is_working_hours }}' == 'yes' and '{{dict_variable.warm_transfer_sent}}' != 'yes'":
            next_state: payment_method_warm_transfer
            filler: *overshadow_period_statement
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I'm glad to see we are making a payment progress for this account. I have located a live agent to further help with the rest of payment setup.
                  metadata: *sm_metadata
                  extra_info: *warm_transfer_info_with_payment

          #If the agent lets the consumer know that the agent does not have the authority to approve lower settlement options but the agent will get a live agent to join the call => Warm-transfer (given that it is during working hours and a WT signal has not been sent yet)        
          "'{{dict_variable.transfer}}' == 'yes' and '{{dict_variable.is_working_hours }}' == 'yes' and '{{dict_variable.warm_transfer_sent}}' != 'yes'":
            next_state: exc_cb
            filler: "[appreciative] Thank you for your patience. We are looking for a human agent to assist you. Please hold for just a moment while I connect your call. Thank you!"
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I'm glad to see we are making a payment progress for this account. I have located a live agent to further help with the rest of payment setup.
                  metadata: *sm_metadata
                  extra_info: *warm_transfer_info_with_payment

          "{{dict_variable.invalid_payment_date_cnt}} > 3 and '{{dict_variable.is_working_hours }}' == 'yes' and '{{dict_variable.warm_transfer_sent}}' != 'yes'":
            next_state: exc_cb
            filler: "[appreciative] Thank you for your patience. We are looking for a human agent to assist you. Please hold for just a moment while I connect your call. Thank you!"
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I'm glad to see we are making a payment progress for this account. I have located a live agent to further help with the rest of payment setup.
                  metadata: *sm_metadata
                  extra_info: *warm_transfer_info_with_payment

          ### START handle main flow
          # willing to pay full and today
          "'{{dict_variable.no_notice}}' == 'yes'":
            next_state: update_info
            filler: May I double-check your contact information to ensure we have the correct details on file? |partial
            repeat_filler:

          "'{{dict_variable.promise}}' == 'yes' and '{{dict_variable.filler_ptp_amt}}' == 'full' and '{{dict_variable.filler_ptp_date}}' == 'today' and '{{dict_variable.confirmed}}' == 'yes'":
            next_state: payment_method_warm_transfer
            filler: *overshadow_period_statement
            repeat_filler:

          # payment plan that meets the date, amt, cnt constraints
          "'{{dict_variable.promise}}' == 'yes' and '{{dict_variable.within_window}}' == 'yes' and '{{dict_variable.filler_installment_cnt}}' == 'valid' and '{{dict_variable.filler_ptp_amt}}' != 'below_min' and '{{dict_variable.filler_ptp_amt}}' != 'unknown' and '{{dict_variable.confirmed}}' == 'yes'":
            next_state: payment_method_warm_transfer
            filler: *overshadow_period_statement
            repeat_filler:

          "'{{dict_variable.promise}}' == 'yes' and '{{dict_variable.negotiate}}' != 'no' and (('{{dict_variable.filler_installment_cnt}}' != 'valid' and '{{dict_variable.filler_ptp_monthly_amount}}' != 'lower' and '{{dict_variable.filler_ptp_monthly_amount}}' != 'unknown') or ('{{dict_variable.within_window}}' == 'after' and '{{dict_variable.filler_installment_cnt}}' == 'valid') or ('{{dict_variable.kit_filler_ptp_monthly_amount}}' != 'lower' and '{{dict_variable.kit_filler_ptp_monthly_amount}}' != 'unknown' and '{{dict_variable.kit}}' == 'yes')) and '{{dict_variable.confirmed}}' == 'yes'":
            next_state: payment_method_warm_transfer
            filler: *overshadow_period_statement
            repeat_filler:

          "{{dict_variable.invalid_payment_date_cnt}} > 3 and '{{dict_variable.is_working_hours }}' == 'no'":
            next_state: exc_cb
            filler:
            repeat_filler:

          # payment plan that but fails one of the date, amt, cnt constraints; and does not refuse to negotiate
          "'{{dict_variable.promise}}' == 'yes' and '{{dict_variable.negotiate}}' != 'no' and ('{{dict_variable.within_window}}' != 'yes' or '{{dict_variable.filler_installment_cnt}}' != 'valid' or '{{dict_variable.filler_ptp_amt}}' == 'below_min' or '{{dict_variable.filler_ptp_amt}}' == 'unknown')":
            next_state: negotiation_from_script
            filler:
            repeat_filler:

          "'{{dict_variable.promise}}' == 'yes' and '{{dict_variable.filler_ptp_amt}}' != 'full' and '{{dict_variable.filler_ptp_date}}' == 'today' and '{{dict_variable.negotiate}}' != 'no'":
            next_state: negotiation_from_script
            filler:
            repeat_filler:

          "'{{dict_variable.promise}}' == 'yes' and '{{dict_variable.filler_ptp_amt}}' == 'full' and '{{dict_variable.filler_ptp_date}}' != 'today' and '{{dict_variable.negotiate}}' != 'no'":
            next_state: negotiation_from_script
            filler:
            repeat_filler:

          "'{{dict_variable.promise}}' == 'no' and '{{dict_variable.filler_ptp_amt}}' == 'unknown' and '{{dict_variable.filler_ptp_date}}' == 'unknown' and '{{dict_variable.negotiate}}' != 'no' and  '{{dict_variable.review}}' != 'unknown'":
            next_state: negotiation_from_script
            filler:
            repeat_filler:

          "'{{dict_variable.promise}}' == 'yes' and '{{dict_variable.amount}}' != 'unknown' and '{{dict_variable.first_date}}' != 'unknown' and '{{dict_variable.confirmed}}' == 'yes'":
            next_state: payment_method_warm_transfer
            filler: *overshadow_period_statement
            repeat_filler:

          "'{{dict_variable.promise}}' == 'yes' and '{{dict_variable.kit}}' == 'yes' and '{{dict_variable.confirmed}}' == 'yes'":
            next_state: payment_method_warm_transfer
            filler: *overshadow_period_statement
            repeat_filler:

          "'{{dict_variable.promise}}' == 'yes' and '{{dict_variable.info_confirm}}' == 'yes'":
            next_state: payment_method_warm_transfer
            filler: *overshadow_period_statement
            repeat_filler:

          "'{{dict_variable.consolidation}}' == 'yes' and '{{dict_variable.consolidation_confirmed}}' == 'yes'  and '{{dict_variable.consolidation_program}}' != 'unknown'":
            next_state: update_info
            filler:
            repeat_filler:

          "'{{dict_variable.transfer}}' == 'yes' and '{{dict_variable.is_working_hours }}' == 'no'":
            next_state: exc_cb
            filler:
            repeat_filler:

          "'{{dict_variable.promise}}' == 'no' and '{{dict_variable.review}}' != 'unknown'":
            next_state: update_info
            filler:
            repeat_filler:

          else:
            next_state: negotiation_from_script
            filler:
            repeat_filler:

        repeat_continuously:
          max_repeat: 100
          state_exceed_max_repeat: end_call
          filler_exceed_max_repeat:
          repeat_filler:
        max_turn_back:

    payment_method_warm_transfer:
      type: 2llmcalls
      2llmcalls:
        response_delay: 1000
        dynamic_filler:
          model_name: gpt-4o
          nturns: 6
          fillers:
          prompt_template: prompt_filler_v2
          quick_fillers:
        type_llm_reflection: *reflection_model_name
        type_llm_response: *response_model_name
        len_msg_reflection:
        len_msg_response:
        type_output_reflection: custom1
        reflection_template: template_default
        variable_change_exception: { "exc": "null" }

        pre_reflection_variable:
          init_call_date:
            tool: lib_tools.tools_kompato.init_outbound_call_date
          init_consumer_info:
            tool: lib_tools.tools_kompato.init_outbound_consumer_info

        reflection_variable:
          - reflection_template: template_detect_payment
            type_output_reflection: structure_output
            variables:
              first_payment_amount:
                description: |
                  the first amount the user agrees to pay, if the user does not agree to pay or does not mention an amount, return 'unknown'
              first_payment_date:
                description:
                  The clearly stated date (YYYY-MM-DD) for the first payment. If the first payment date is not mentioned, return 'unknown'. Do not guess, infer, or fabricate the date.
                  Today is {{raw_call_assignment.today}}. First payment date should be today or in the future.
              second_payment_amount:
                description: the second amount the user agrees to pay, if the user does not agree to pay or does not mention an amount, return 'unknown'
              second_payment_date:
                description: |
                  The clearly stated date (YYYY-MM-DD) for the second payment after the first payment. If there is no second payment (e.g., only a single, one-off payment is scheduled), return None.
                  Today is {{raw_call_assignment.today}}. Second payment date should be in the future.
              confidence_score:
                description: |
                  A float value between 0 and 1 representing the model's confidence in the accuracy of the extracted payment plan variables.
                  A higher score indicates greater certainty that the values detected in the transcript match the customer's intent and the conversation context.

          - variables:
              cf_mail:
                description: return "yes" ONLY when both conditions are satisfied, i.e. (1) the agent has explicitly read the consumer's mailing address in records, and (2) the user says ok or has EXPLICITYLY said that that mailing address is correct and complete with state, zip code. Else, return "no"
                example: "no"
              cf_email:
                description: return "yes" ONLY when both conditions are satisfied, i.e. (1) the agent has explicitly read the consumer's email address in records, and (2) the user says ok or has EXPLICITLY said that that email address is correct and in the right format. Else, return "no"
                example: "no"
              new_mail:
                description: the new updated mail address that _user provided (extracted directly from answer of _user), if not available then return "unknown" as default value
                example: "unknown"
              new_email:
                description: the new updated email that _user provided (extracted directly from answer of _user), if not available then return "unknown" as default value
                example: "kompato@gmail.com"
              # Determine whether the customer agrees to be communicated with via text
              text_consent:
                overview: Determine whether or not _user agrees to be communicated with via text or email after being asked, "Do you give us permission to text or email you with account updates?"
                description:
                  "yes": _user agrees to be communicated with via text or email.
                  "no": _user does not agree to be communicated with via text or email.
                  "unknown": It is not clear whether _user agrees or disagrees to be communicated with via text or email. Only assign this to `text_consent` if the question has not been asked, or if it has been asked but _user's response is vague.
                example: "unknown"
              # Determine whether the customer agrees to be called back is disconnected
              human_call:
                overview: Determine whether or not _user agrees to be called back by a human when asked, "For any reason we get disconnected, do we have permission to call you back?"
                description:
                  agree: If _user explicitly agrees to be specifically called back by a human, then assign `agree` to `human_call`.
                  revoke: If _user explicitly disagrees to be specifically called back by a human, then assign `revoke` to `human_call`.
                  unknown: If it is not clear whether _user agrees or disagrees to a callback, assign `unknown` to `human_call`. Only assign this to `human_call` if the question has not been asked, or if it has been asked but _user's response is vague.
                example: unknown

          - variables:
              payment_method:
                description:
                  ach: _user ultimately chooses to pay by bank transfer or ACH payments or _user persistent in choosing bank transfer or ACH payments after being informed that this payment method is not accepted for their account.
                  credit_card: _user ultimately chooses to pay by credit card or _user persistent in choosing credit card after being informed that this payment method is not accepted for their account.
                  debit_card: _user ultimately chooses to pay by debit card or _user persistent in choosing debit card after being informed that this payment method is not accepted for their account.
                  mailing: _user ultimately chooses to pay by mailing money order or check or _user persistent in choosing mailing money order or check.
                  unknown: it is unclear what payment method _user would like to choose or the _user has not selected or confirmed or mentioned a payment method yet.
                  other: _user wants to pay by other payment method
                example: unknown
              payment_method_insistence:
                description:
                  "yes": After the assistant has clearly informed the user that their selected payment method is not accepted, the user continues to choose or insist on that unaccepted payment method. If the assistant then explicitly says the user's choice is not accepted (e.g., assistant says "Credit card is not accepted for your account.") and the user continues to insist on that method, return "yes".
                  "no": The user mentions an unaccepted payment method before being told it is not accepted, or if the user does not persist after being informed, or if the user switches to an accepted method. If the assistant lists accepted payment methods and the user mentions an unaccepted one (e.g., assistant says "We accept debit card or ACH payments.", user says "credit"), return "no".
                example: "no"
              payment_method_choice_status:
                description:
                  "unknown": Select this if the user does not reference any payment method, or gives a vague, unrelated, or ambiguous response when asked about their preferred payment method—without clearly accepting or refusing the payment method proposed such as {% if 'debit_card' in dict_variable.get("ai_payment_methods", []) %} **debit card**,{% endif %}{% if 'credit_card' in dict_variable.get("ai_payment_methods", []) %} **credit card**,{% endif %}{% if 'ach' in dict_variable.get("ai_payment_methods", []) %} **ACH payments**, {% endif %}.
                  "chosen": Select this if the user explicitly chooses a payment method.
                  "declined": Select this if the user clearly rejects moving forward with the payment method suggested by the assistant, explicitly expressing refusal to use {% if 'debit_card' in dict_variable.get("ai_payment_methods", []) %} **debit card**,{% endif %}{% if 'credit_card' in dict_variable.get("ai_payment_methods", []) %} **credit card**,{% endif %}{% if 'ach' in dict_variable.get("ai_payment_methods", []) %} **ACH payments**, {% endif %} method.
                example: "unknown"
              disclosure_agree:
                description:
                  "yes": The consumer gives a clear, affirmative response (such as "yes", "I agree", "agree", "okay", or similar) specifically *immediately after* _assistant asks a direct confirmation question regarding agreement with the payment plan details (e.g., after _assistant says "Do you agree to this payment?" or similar question explicitly recapping the payment amount, timing, and terms). Only responses given directly following this explicit "Do you agree..." or equivalent confirmation question should be marked as "yes".
                  "no": The consumer does not give a clear, affirmative response (such as different from "yes", "I agree", "agree", "okay", or similar) immediately after the specific confirmation question regarding agreement with the payment plan. Any responses that are absent, ambiguous, off-topic, or delayed relative to the agreement confirmation question should be marked as "no".
                example: "yes"
              nacha_confirmation:
                description:
                  "yes": Select "yes" if _user says "I agree" or "agree" immediately following _assistant's payment authorization statement for the payment method, which must contain the phrase "This payment authorization is valid and will remain in effect unless you notify Kompato AI of cancellation." This includes cases where _user responds with "I agree" after any version or rewording of the authorization statement, or after any clarifying questions have been answered and _assistant again prompts for stated agreement. Do not select "yes" for "I agree" responses that are delayed, unrelated, or not directly following the payment authorization request.
                  "no": Choose "no" if _user does not clearly and directly reply with "I agree" or "agree" right after _assistant's payment authorization statement. This applies if _user's reply is missing, unclear, unrelated, delayed, or does not follow the authorization request, as well as if _assistant has not yet provided the authorization statement or _user does not state agreement after it.
                example: "yes"

          - reflection_template: template_default
            len_msg_reflection: 2
            variables:
              exc:
                description:
                  complaint: if _user complain about historical calls, system issues, procedure issues, policy issues, response time or process of receiving requested documents; and in the latest turns of the conversation has not confirmed that the complaint is now resolved or they have chosen to ignore it for now.
                  dispute: if _user just said they want to dispute the debt but not mention clear reasons such as debt amount, or they already paid, or they are a victim of identity theft; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                  dispute_balance: if _user has dispute about the balance of the debt, the charges (for example 'We agreed to a $500 discount but the portal is still showing the original amount', 'The creditor promised me I would not need to pay late fees', 'This balance is too high because…', 'I was charged for this account, but I never received the item', 'I refunded this charge, but it still showed up on my account'); and in the latest turns of the conversation has not confirmed that the disputed balance is now resolved or they have chosen to ignore it for now.
                  dispute_paid: if _user has dispute that they already paid the debt (for example 'I paid the full amount via bank transfer six months ago. Can you confirm this on your end?', 'I settled this debt last year with a check. Why is it still showing as unpaid?', 'I made a payment directly to the creditor last year. This should be updated in your records.', 'I have already paid off this debt through your online portal. Can you verify the payment?', 'I cleared this balance with a credit card payment last 2 years. Please check and confirm it has been received'); and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                  dispute_theft: if _user explicitly informs us that they are a victim of identity theft (e.g. "I received a notification about a debt in my name that I never incurred.", "I found out someone used my identity to open an account.", "This debt is not mine; I suspect my identity has been stolen.", "I noticed unfamiliar charges under my name that I never authorized.", "I believe my personal information was used fraudulently to create this debt.").; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                  dispute_txn_fraud: if _user explicitly informs us that they noticed their DEBT increased or their CREDIT LIMIT decreased due to unauthorized charges that they did not initiate in their **DEBT** account, where someone has unauthorized access to their DEBT account information and makes transactions without their consent. DO NOT choose this value if _user is explaining why they can't make a payment now, does not specify whether the issue is from their bank account or debt account, describes a loss of existing funds (e.g., 'money taken out', 'money missing', 'withdrawn'), or uses only general terms like 'account fraud' or 'transaction fraud' or 'unauthorized purchases' without specifying a credit/debt account. Examples include statements like "I noticed purchases on my debt account that I did not authorize.", "My account was charged for items I did not buy.", "I received a notification about a transaction I never made.", "There are unfamiliar transactions on my statement that I did not initiate.", "Someone used my account information to make unauthorized purchases."; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                  bankruptcy: If _user explicitly mentions the words "BANKRUPTCY," "BANKRUPT," "BANKRUPTCY FILING," or "FILING FOR BANKRUPTCY," it is a critical rule that the phrase "filed for" is NOT a bankruptcy indicator, so you should not enter this case and should go back to the negotiation flow. NEVER ask about bankruptcy if they only mention financial hardship or financial disability.
                  cease_comms: if caller requests to take them off your calling list or if caller proactively (which means without being prompted) asks to stop receiving communications from us including email, texting, sms or call; and in the latest turns of the conversation has not confirmed that they now want to continue receiving communications.
                  attorney: if the caller or consumer lets you know that they are being represented by an attorney or lawyer (e.g. "I have an attorney" or "Speak to my lawyer" or "My lawyer told me not to talk to you. Please contact them instead")
                  human_agent_request: if _user specifically requests speaking to a live agent, human, or representative; and in the latest turns of the conversation has not agreed to continue the conversation
                  "null": default value, if _user did not mention any above; or if the _user simply asks a question about virtual agent without requesting to speak to a live agent
                example: "null"

        processing_variable:
          nacha_payment_method:
            tool: lib_tools.tools_kompato.pick_value_from_conditions
            params:
              conditions:
                - condition: "str(payment_method) == 'debit_card'"
                  value: "[Debit Card]"
                - condition: "str(payment_method) == 'credit_card'"
                  value: "[Credit Card]"
                - condition: "str(payment_method) == 'ach'"
                  value: "[Bank Account]"
                - condition: "else"
                  value: "[Debit Card]"
              local_vars:
                payment_method:
                  value: self.dict_variable.payment_method
                  type: str
              return_type: str
          warm_transfer_elapsed_time_payment:
            tool: lib_tools.tools_kompato.calculate_duration
            params:
              date_input: self.dict_variable.warm_transfer_init_time
          is_payment_now:
            tool: lib_tools.tools_kompato.is_payment_now
            params:
              call_date: self.dict_variable.call_date
              first_date: self.dict_variable.first_payment_date

          validated_first_payment_date:
            tool: lib_tools.tools_kompato.is_validated_first_payment_date
            params:
              first_payment_date: self.dict_variable.first_payment_date
              call_date: self.dict_variable.call_date
          validated_instant_charge_amount:
            tool: lib_tools.tools_kompato.validate_instant_charge_amount
            params:
              first_payment_amount: self.dict_variable.first_payment_amount
              first_payment_date: self.dict_variable.first_payment_date
              call_date: self.dict_variable.call_date
              current_balance: self.raw_call_assignment.itemizationCurrentBalance
              min_allowed_amount_per_month: self.raw_call_assignment.client_min_payment_amount_per_month
          
          unknown_payment_method_count:
            tool: lib_tools.tools_kompato.count_pattern
            params:
              current_count: self.dict_variable.unknown_payment_method_count
              current_value: self.dict_variable.payment_method_choice_status
              pattern: "unknown"
          refusal_payment_method_count:
            tool: lib_tools.tools_kompato.count_pattern
            params:
              current_count: self.dict_variable.refusal_payment_method_count
              current_value: self.dict_variable.payment_method_choice_status
              pattern: "declined"

          ssml_validated_instant_charge_amount:
            tool: lib_tools.tools_kompato.convert_ssml_balance
            params:
              number: self.dict_variable.validated_instant_charge_amount

          ssml_first_ptp_date:
            tool: lib_tools.tools_kompato.format_spoken_date
            params:
              date_str: self.dict_variable.first_payment_date

          ssml_first_ptp_amount:
            tool: lib_tools.tools_kompato.convert_ssml_balance
            params:
              number: self.dict_variable.first_payment_amount

          payment_tokenize:
            tool: lib_tools.tools_kompato.get_payment_tokenize_version_2
            params:
              first_payment_date: self.dict_variable.first_payment_date
              second_payment_date: self.dict_variable.second_payment_date
              calling_date: self.raw_call_assignment.today

        transition_conditions:
          ## START handle exception case
          # "'{{dict_variable.exc}}' == 'complaint'":
          #   next_state: exc_complaint
          #   filler:
          #   repeat_filler:
          # "'{{dict_variable.exc}}' == 'dispute'":
          #   next_state: exc_dispute
          #   filler:
          #   repeat_filler:
          # "'{{dict_variable.exc}}' == 'dispute_balance' and '{{raw_call_assignment.agreed_payment_plan}}' in ('10% off', '20% off', '30% off')":
          #   next_state: exc_dispute_balance
          #   filler:
          #   repeat_filler:
          # "'{{dict_variable.exc}}' == 'dispute_balance' and '{{raw_call_assignment.agreed_payment_plan}}' not in ('10% off', '20% off', '30% off')":
          #   next_state: exc_dispute_balance
          #   filler:
          #   repeat_filler:
          # "'{{dict_variable.exc}}' == 'dispute_paid'":
          #   next_state: exc_dispute_paid
          #   filler: #Okay. |partial #
          #   repeat_filler:
          # "'{{dict_variable.exc}}' == 'dispute_theft'":
          #   next_state: exc_dispute_theft
          #   filler: #got it. |partial # i understand. |partial
          #   repeat_filler:
          # "'{{dict_variable.exc}}' == 'dispute_txn_fraud'":
          #   next_state: exc_dispute_txn_fraud
          #   filler: #got it. |partial # i understand. |partial
          #   repeat_filler:
          # "'{{dict_variable.exc}}' == 'bankruptcy'":
          #   next_state: exc_bankruptcy
          #   filler: #Oh I see. |partial #
          #   repeat_filler:
          # # "'{{dict_variable.exc}}' == 'cease_comms'":
          # #   next_state: exc_cease_comms
          # #   filler: Okay. |partial #
          # #   repeat_filler:
          # "'{{dict_variable.exc}}' == 'attorney'":
          #   next_state: exc_attorney
          #   filler: #Got it. |partial #
          #   repeat_filler:

          # [EXCEPTION] The customer requests to speak with a live agent
          "'{{dict_variable.exc}}' == 'human_agent_request'":
            next_state: exc_human_agent_request
            filler:
            repeat_filler:

          # Ask for permission to call back if disconnected, if it hasn't been asked already
          "'{{dict_variable.human_call}}' == 'unknown'":
            next_state: payment_method_warm_transfer
            filler: For any reason we get disconnected, do we have permission to call you back?
            repeat_filler:

          "'{{dict_variable.nacha_confirmation}}' == 'yes' and '{{dict_variable.payment_init}}' != 'True'":
            next_state: payment_method_warm_transfer
            filler: For your privacy and security, you will now enter your card information using the phone keypad. Please start inputting
            repeat_filler:

          # If the customer fails to pay via DTMF => Warm-transfer (given that it is during working hours)
          "{{dict_variable.get('payment_init', False)}} and '{{dict_variable.payment_result}}' not in ['success', ''] and '{{dict_variable.is_working_hours}}' == 'yes'":
            next_state: exc_cb
            filler: It seems the payment has not succeeded. We are looking for a live agent to assist you. Just in case there is no live agent available, when will be a good time to call you back?
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I'm glad to see we are making a payment progress for this account. I have located a live agent to further help with the rest of payment setup.
                  metadata: *sm_metadata
                  extra_info: &warm_transfer_info_with_payment_result
                    <<: *warm_transfer_info_with_payment
                    payment_status: "{{dict_variable.get('raw_payment_result', {}).get('result')}}"
                    last_error_type: "{{dict_variable.get('raw_payment_result', {}).get('last_error_type')}}"
                    payment_method: "{{dict_variable.get('raw_payment_result', {}).get('payment_method')}}"

          # If the customer fails to pay via DTMF => Schedule a callback outside working hours
          "{{dict_variable.get('payment_init', False)}} and '{{dict_variable.payment_result}}' not in ['success', ''] and '{{dict_variable.is_working_hours}}' != 'yes'":
            next_state: exc_cb
            filler: It seems the payment has not succeeded. We'll schedule a callback for further support. When would be a good time for us to call you back?

          # The customer wants to pay by mail
          "'{{dict_variable.payment_method}}' == 'mailing'":
            next_state: update_info
            filler:
            repeat_filler:

          # The customer wishes to pay later, does not want to confirm their payment method in this call, is not available for payment setup right now
          "'{{dict_variable.within_window}}' == 'yes' and ('{{dict_variable.filler_installment_cnt}}' == 'valid' or ('{{dict_variable.filler_ptp_monthly_amount}}' != 'lower' and '{{dict_variable.filler_ptp_monthly_amount}}' != 'unknown') or ('{{dict_variable.kit_filler_ptp_monthly_amount}}' != 'lower' and '{{dict_variable.kit_filler_ptp_monthly_amount}}' != 'unknown' and '{{dict_variable.kit}}' == 'yes')) and ({{dict_variable.refusal_payment_method_count}} >= 3 or {{dict_variable.unknown_payment_method_count}} >= 5)":
            next_state: exc_cb
            filler: We'd be happy to schedule a call to help you with your payment setup. When would be a convenient time for us to reach out to you?
            repeat_filler:

          # Low confidence in the reflected payment plan, OR the customer insists on an unsupported payment method, OR the customer does not want to proceed with the payment setup more than 3 times, OR the first payment date is not validate, OR the payment date is not within the allowed window, OR the number of installments is not valid, OR the monthly amount is lower than the minimum allowed, either KIT or non-KIT
          "{{dict_variable.get('confidence_score', 0) | float <= 0.7}} or ('{{dict_variable.get('payment_method','unknown')}}' not in {{dict_variable.get('ai_payment_methods', [])}} and '{{dict_variable.get('payment_method','unknown')}}' not in ['', 'unknown', 'None'] and '{{dict_variable.payment_method_insistence}}' == 'yes') or {{not dict_variable.validated_first_payment_date}} or '{{dict_variable.within_window}}' != 'yes' or '{{dict_variable.filler_installment_cnt}}' != 'valid' or ('{{dict_variable.filler_ptp_monthly_amount}}' == 'lower' and '{{dict_variable.kit}}' != 'yes') or ('{{dict_variable.kit_filler_ptp_monthly_amount}}' == 'lower' and '{{dict_variable.kit}}' == 'yes') and '{{dict_variable.is_working_hours }}' == 'yes' and '{{dict_variable.warm_transfer_sent}}' != 'yes'":
            next_state: exc_cb
            filler: "We are looking for a live agent to assist you. Just in case there is no live agent available, when will be a good time to call you back?"
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I'm glad to see we are making a payment progress for this account. I have located a live agent to further help with the rest of payment setup.
                  metadata: *sm_metadata
                  extra_info: *warm_transfer_info_with_payment_result

          # The DTMF payment is successful
          "'{{dict_variable.payment_result}}' == 'success'":
            next_state: update_info
            filler: Thank you for setting up your payment with us. To ensure important account updates reach you timely, could we take a moment to update your contact details?
            repeat_filler:

          # The customer already agrees to the disclosure statement and selects a payment method that is not supported, and it is outside of working hours
          "'{{dict_variable.disclosure_agree}}' == 'yes' and '{{dict_variable.is_working_hours}}' == 'no' and '{{dict_variable.get('payment_method', 'unknown')}}' not in ['', 'unknown'] and '{{dict_variable.get('payment_method', 'unknown')}}' not in {{dict_variable.get('ai_payment_methods', [])}} and '{{dict_variable.payment_method_insistence}}' == 'yes'":
            next_state: exc_cb
            filler: We'd be happy to schedule a call to help you with your payment setup. When would be a convenient time for us to reach out to you?
            repeat_filler:

          # It's been more than 600s since a warm-transfer signal has been triggered
          "{{dict_variable.get('warm_transfer_elapsed_time_payment', 0) > 600}}":
            next_state: exc_cb
            filler: We'd be happy to schedule a call to help you with your payment setup. When would be a convenient time for us to reach out to you?
            repeat_filler:

          else:
            next_state: payment_method_warm_transfer
            filler:
            repeat_filler:

        repeat_continuously:
          max_repeat: 25
          state_exceed_max_repeat: exc_cb
          filler_exceed_max_repeat:
          repeat_filler:
        max_turn_back:

    update_info:
      type: 2llmcalls
      2llmcalls:
        response_delay: 1000
        dynamic_filler:
          model_name: gpt-4o
          nturns: 6
          fillers:
          prompt_template: prompt_filler_v2
          quick_fillers:
        type_llm_reflection: *reflection_model_name
        type_llm_response: *response_model_name
        len_msg_reflection:
        len_msg_response:
        type_output_reflection: custom1
        reflection_template: template_default
        variable_change_exception: { "exc": "null", "receive": "no" }

        pre_reflection_variable:
          init_call_date:
            tool: lib_tools.tools_kompato.init_outbound_call_date
          init_consumer_info:
            tool: lib_tools.tools_kompato.init_outbound_consumer_info

        reflection_variable:
          - variables:
              cf_phone:
                description: return "yes" ONLY when both conditions are satisfied, i.e. (1) the agent has explicitly read the consumer's PHONE NUMBER in records, and (2) the user says ok or has EXPLICITYLY said that that phone number is correct and right format of U.S. phone number. Else, return "no"
                example: "no"
              cf_mail:
                description: return "yes" ONLY when both conditions are satisfied, i.e. (1) the agent has explicitly read the consumer's mailing address in records, and (2) the user says ok or has EXPLICITYLY said that that mailing address is correct and complete with state, zip code. Else, return "no"
                example: "no"
              cf_email:
                description: return "yes" ONLY when both conditions are satisfied, i.e. (1) the agent has explicitly read the consumer's email address in records, and (2) the user says ok or has EXPLICITLY said that that email address is correct and in the right format. Else, return "no"
                example: "no"
              new_phone:
                description: the new updated phone number that _user provided (extracted directly from answer of _user), if not available then return "unknown" as default value
                example: "88909678798"
              new_mail:
                description: the new updated mail address that _user provided (extracted directly from answer of _user), if not available then return "unknown" as default value
                example: "unknown"
              new_email:
                description: the new updated email that _user provided (extracted directly from answer of _user), if not available then return "unknown" as default value
                example: "kompato@gmail.com"

          - variables:
              update_refusal:
                description: return "yes" if the consumer explicitly declines to update their contact information. Else, return "no"
                example: "no"
              exc:
                description:
                  complaint: if _user complain about historical calls, system issues, procedure issues, policy issues, response time or process of receiving requested documents.; and in the latest turns of the conversation has not confirmed that the complaint is now resolved or they have chosen to ignore it for now.
                  dispute: if _user just said they want to dispute the debt but not mention clear reasons such as debt amount, or they already paid, or they are a victim of identity theft.; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                  dispute_balance: if _user has dispute about the balance of the debt, the charges (for example 'We agreed to a $500 discount but the portal is still showing the original amount', 'The creditor promised me I would not need to pay late fees', 'This balance is too high because…', 'I was charged for this account, but I never received the item', 'I refunded this charge, but it still showed up on my account'); and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                  dispute_paid: if _user has dispute that they already paid the debt (for example 'I paid the full amount via bank transfer six months ago. Can you confirm this on your end?', 'I settled this debt last year with a check. Why is it still showing as unpaid?', 'I made a payment directly to the creditor last year. This should be updated in your records.', 'I have already paid off this debt through your online portal. Can you verify the payment?', 'I cleared this balance with a credit card payment last 2 years. Please check and confirm it has been received'); and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                  dispute_theft: if _user explicitly informs us that they are a victim of identity theft (e.g. "I received a notification about a debt in my name that I never incurred.", "I found out someone used my identity to open an account.", "This debt is not mine; I suspect my identity has been stolen.", "I noticed unfamiliar charges under my name that I never authorized.", "I believe my personal information was used fraudulently to create this debt.").; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
                  bankruptcy: If _user explicitly mentions the words "BANKRUPTCY," "BANKRUPT," "BANKRUPTCY FILING," or "FILING FOR BANKRUPTCY," it is a critical rule that the phrase "filed for" is NOT a bankruptcy indicator, so you should not enter this case and should go back to the negotiation flow. NEVER ask about bankruptcy if they only mention financial hardship or financial disability.
                  cease_comms: if caller requests to be taken off your calling list or proactively (without being prompted) asks to stop receiving communications from us (including email, texting, SMS, or calls), and in the latest turns of the conversation has not confirmed that they now want to continue receiving communications. If the caller simply declines to update their contact details, but does not explicitly request to stop all communications, do NOT return cease_comms.
                  attorney: if the caller or consumer lets you know that they are being represented by an attorney or lawyer (e.g. "I have an attorney" or "Speak to my lawyer" or "My lawyer told me not to talk to you. Please contact them instead")
                  human_agent_request: if _user specifically requests speaking to a live agent, human, or representative; and in the latest turns of the conversation has not agreed to continue the conversation
                  "null": default value, if _user did not mention any above; or if the _user simply asks a question about virtual agent without requesting to speak to a live agent
                example: "null"
              receive:
                description: return "yes" when the consumer EXPLICITLY says that they have received a letter or email from {{raw_call_assignment.company_name}} and wish to continue discuss their account. Else, return "no"
                example: "no"

