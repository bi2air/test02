      7. **Purpose of Call:**
        - "What is this call about?"
        {% if raw_call_assignment.get('client_name', '') != '' and raw_call_assignment.get('service_type', '') == '3RD_PARTY' and raw_call_assignment.get('client_type', '') == 'CREDITOR' %}
