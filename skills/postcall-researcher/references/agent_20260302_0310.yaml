        2.1. If _user explicitly or implicitly agrees to be called back within the next few days (e.g. 'yes', 'okay', 'please call me back'), record their answer.
        2.2. If _user explicitly or implicitly agree to be called back but request a specific time, record their answer and confirm that we will update our records accordingly.
        2.3. If _user rejects to be called back by a human agent (e.g. "Never call me again", "No I don't want a human agent to call me back"), ask them if they prefer to be contacted by a different method such as email or mail.
