            next_state: BACK|EXC
            filler:
            repeat_filler:

          "'{{dict_variable.dispute_type}}' == 'balance' and '{{raw_call_assignment.agreed_payment_plan}}' in ('10% off', '20% off', '30% off')":
            next_state: exc_dispute_balance
            filler:
            repeat_filler:

          "'{{dict_variable.dispute_type}}' == 'balance' and '{{raw_call_assignment.agreed_payment_plan}}' not in ('10% off', '20% off', '30% off')":
            next_state: exc_dispute_balance
            filler:
            repeat_filler:

          "'{{dict_variable.dispute_type}}' == 'paid'":
            next_state: exc_dispute_paid
            filler:
            repeat_filler:

          "'{{dict_variable.dispute_type}}' == 'theft'":
            next_state: exc_dispute_theft
            filler:
            repeat_filler:

          else: # dispute_type = unknown
            next_state: exc_dispute
            filler: # May we ask why you want to dispute this debt?
            repeat_filler:

        repeat_continuously:
          max_repeat: 10
          state_exceed_max_repeat: end_call
