                  concluded: if , in the latest turns of the conversation, the _user has agreed to be called back by a live agent, or receive other form of communication. While they still don't consider the complaint resolved, there is a clear next step.
                  unknown: if it is not clear whether the complaint is adequately addressed or not
                example: not_addressed
              complaint_confirmed:
                description:
