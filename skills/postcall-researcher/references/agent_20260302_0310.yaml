            filler:
            repeat_filler:

          "'{{dict_variable.exc}}' == 'cease_comms'":
            next_state: exc_cease_comms
            filler:
            repeat_filler:

          "'{{dict_variable.exc}}' == 'revoke_record_consent'":
            next_state: exc_revoke_recording
            filler:
            repeat_filler:

          # While verifying the customer's DOB, if the customer already confirmed their DOB but their DOB doesn't return a unique match, and we have no information about the customer's last 4 digits of SSN on file => Warm-transfer (given that it is during working hours and a WT signal has not been sent yet)
          "'{{dict_variable.dob_confirmed}}' == 'confirmed' and '{{dict_variable.is_dob_matched}}' != 'matched_unique' and '{{raw_call_assignment.last_4_ssn}}' == '' and '{{raw_call_assignment.zip}}' == '' and '{{dict_variable.is_working_hours }}' == 'yes' and '{{dict_variable.warm_transfer_sent}}' != 'yes'":
            next_state: exc_cb
            filler: Thank you for your patience. We are looking for a human agent to assist you. Please hold for just a moment while I connect your call. Thank you!
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I have located a live agent to further help with the account identification issue.
                  metadata: *sm_metadata
                  extra_info: *base_warm_transfer_info

          "'{{dict_variable.is_dob_matched}}' == 'matched_unique' and '{{dict_variable.dob_confirmed}}' == 'confirmed'":
