              active: if _user confirms that the consumer is in active service
              not: if _user says that that the consumer is NOT actively serving
              unknown: if it is not clear whether the consumer is in active service
            example: unknown
          service_end_date:
            description: return the date when they consumer will be back from their active service, else return "unknown"
            example: "june 2025"
          asked_service_end_date:
            description: return "yes" if you already ask _user for the end date of the consumer's service, else return "no"
            example: "yes"

        processing_variable:

        transition_conditions:
          "'{{dict_variable.active_service}}' == 'not'":
            next_state: exc_inconvenient_time
            filler:
            repeat_filler:

          "'{{dict_variable.active_service}}' == 'active' and '{{dict_variable.service_end_date}}' == 'unknown' and '{{dict_variable.asked_service_end_date}}' == 'no'":
            next_state: exc_military_service
            filler:
            repeat_filler:

          "'{{dict_variable.active_service}}' == 'active' and '{{dict_variable.service_end_date}}' == 'unknown' and '{{dict_variable.asked_service_end_date}}' == 'yes'":
            next_state: end_call
            filler:
            repeat_filler:

          "'{{dict_variable.active_service}}' == 'active' and '{{dict_variable.service_end_date}}' != 'unknown'":
            next_state: end_call
            filler:
            repeat_filler:
          ### unidentify
          else:
            next_state: exc_revoke_recording
            filler:
            repeat_filler:

        repeat_continuously:
          max_repeat: 10
          state_exceed_max_repeat: end_call
          filler_exceed_max_repeat: My apologies, our policies require calls to be recorded. |partial 
          repeat_filler: 1
        max_turn_back:

    exc_language:
      type: 2llmcalls
      2llmcalls:
        type_llm_reflection: *reflection_model_name
        type_llm_response: *response_model_name
        len_msg_reflection:
        len_msg_response:
        type_output_reflection: custom1
        reflection_template: template_exception
        pre_reflection_variable:
          init_call_date:
            tool: lib_tools.tools_kompato.init_outbound_call_date
          init_consumer_info:
            tool: lib_tools.tools_kompato.init_outbound_consumer_info
        reflection_variable:
          proceed_conversation:
            description: return "yes" if _user agrees to proceed the conversation in English, or resumes speaking in English else return "no"
            example: "yes"
          exc_cb_consent:
            description:
              "yes": if _user explicitly or implicitly agrees to be called back in 7 days (e.g. 'yes', 'okay', 'please call me back')
              "no": if _user explicitly or implicitly agree to be called back but not in 7 days (e.g. 'call me sooner', 'can you call me tommorrow?')
              never: if _user rejects to be called back by human (e.g. "Never call me again", "No I don't want a human to call me back")
              unknown: if _user gives unclear answer
            example: "yes"
          exc_cb_schedule:
            description: only return specific time or date for callback if provided by _user when _user disagrees to being called back within the next 7 days, else return 'unknown'
            example: "tomorrow at 3 PM"
        processing_variable:
          cnt_unknown:
            tool: lib_tools.tools_kompato.count_unknown_threshold
        transition_conditions:
          "'{{dict_variable.proceed_conversation}}' == 'yes'":
            next_state: BACK|EXC
            filler: #I'll have a supervisor call you back within the next 7 days. Is that alright?
            repeat_filler:
          "'{{dict_variable.exc_cb_consent}}' == 'unknown' and {{dict_variable.cnt_unknown}} < 2":
            next_state: exc_language
            filler: #I'll have a supervisor call you back within the next 7 days. Is that alright?
            repeat_filler:
          "'{{dict_variable.exc_cb_consent}}' == 'unknown' and {{dict_variable.cnt_unknown}} == 2":
            next_state: end_call
            filler: I'm sorry it appears I'm unable to help. |partial
            repeat_filler:
          "'{{dict_variable.exc_cb_consent}}' == 'no' and '{{dict_variable.exc_cb_schedule}}' == 'unknown' and {{dict_variable.cnt_unknown}} < 2":
            next_state: exc_language
            filler: #I understand. Do you have a preferred time or date for our supervisor to call back?
            repeat_filler:
          "'{{dict_variable.exc_cb_consent}}' == 'no' and '{{dict_variable.exc_cb_schedule}}' == 'unknown' and {{dict_variable.cnt_unknown}} == 2":
            next_state: end_call
            filler: I'm sorry it appears I'm unable to help. |partial
            repeat_filler:
          "'{{dict_variable.exc_cb_consent}}' == 'no' and '{{dict_variable.exc_cb_schedule}}' != 'unknown'":
            next_state: end_call
            filler:
            repeat_filler:

          "'{{dict_variable.exc_cb_consent}}' == 'never'":
            next_state: end_call
            filler:
            repeat_filler:
          else: # exc_cb_consent = 'yes'
            next_state: exc_language
            filler:
            repeat_filler:
        repeat_continuously:
          max_repeat: 7
          state_exceed_max_repeat: end_call
          filler_exceed_max_repeat: My apologies it seems I'm unable to help. |partial
          repeat_filler:
        max_turn_back:

postcall:
  # Call code extraction agent  
  call_code_agent_configs:
    usecase_id: en_collin_kompato_call_code_agent
    model_configs:
      model: gpt-4o-2024-11-20
      temperature: 0.0

    # Prompt to detect the call codes (before post-processing)
    prompt_detect_call_code: |
      You are a Collection Agent specialized in classifying conversations into the one to three most relevant call codes.
      Given abstracted conversation history, list of call codes with their descriptions, and reflection variable values with their descriptions (optional) and  your task to analyze and classify the conversation into the one to three most relevant call codes.

      # Instruction
      - Thoroughly analyze the conversation history, dictionary variable values, state variable descriptions, and call code descriptions.
      - Carefully review the conversation to select the one to three call codes that best fit the context and details of the exchange.
      - When reasoning, you may reference reflection variable values and descriptions if they help justify your choices, but focus primarily on the conversation context and call code descriptions.
      - Your justification should combine insights from the conversation, call code descriptions, and other inputs as relevant.

      #  Notes:
      - Consider all possible angles and variable values, not just the most direct or frequent call code.
      - Make sure the reasoning is clear, specific, and references the data provided.


      # Output Format
      - Return your reasoning in <reasoning> </reasoning> tags
      - Return list potential call code wrapped in <call_code_list> </call_code_list> tags.

      # Input Information

      ## Conversation History
      ```
      {{conversation_history}}
      ```

      ## List of Call Codes and Their Descriptions
      {{call_code_descriptions}}

      {% if raw_call_assignment.call_direction_detail not in ["human_outbound", "human_inbound", "transfer_inbound", "transfer_outbound"] %}
      ## Reflection Variable Descriptions
      ```
      {{reflection_variable_descriptions}}
      ```

      ## Reflection Variable Values
      ```
      {{reflection_variable_values}}
      ```
      {% endif %}

      # Example Output
      <reasoning>
      Your concise reasoning for the classification.
      </reasoning>
      <call_code_list>
      ["CALL_CODE_1", "CALL_CODE_2", "CALL_CODE_3"]
      </call_code_list>

    call_code_descriptions:
      - code: NLM
        description: Voicemail, not leave message - Voicemail encountered and there was no meaningful conversation with customer. The agent may provide their name and company information but DOES NOT mention the customer's name.
      - code: LM
        description: Voicemail encountered , left message - Voicemail was encountered and the agent mentions the customer's name, or contained appropriate identification information e.g. "May I please speak to [Customer Name]".
      - code: HUP
        description: Hang Up - Call was disconnected immediately after customer picked up, with no information exchange. The customer may have answered but remained silent or hung up before any meaningful conversation could take place. This represents a failed contact attempt where no account or personal data was verified.
      - code: IDF
        description: ID Verification Failed - Customer fails ID verification or refuses to verify their identity through standard verification protocols. This may occur when the customer cannot provide correct information for DOB, SSN, or zip code verification, or when they refuse to participate in the verification process entirely.
      - code: HUA
        description: Hang Up During Authentication - The customer confirmed their identity but disconnected during the formal ID verification process. The call ended while agent was attempting to verify personal information, such as date of birth, social security number, or zip code. This represents an incomplete verification attempt where the initial name confirmation was successful, but full verification was not completed.
      - code: NVR
        description: Name Verification Refused - Customer explicitly declined to confirm their full name, resulting in call termination. This may occur when the customer is suspicious of the call, concerned about privacy, or unwilling to engage with a collection effort. Without name confirmation, the conversation cannot legally proceed to account details.
      - code: IDV
        description: |
          ID Verification Successful - Customer successfully passed all required identity verification checks to confirm they are the intended recipient.
          The sucessful verification process must include 2 steps of confirmation: custmomer name and at least one of the following personal identifiers: date of birth, SSN, or address details.
      - code: TSR
        description: Transfer to Representative - Customer explicitly requested to speak with a human representative rather than continuing with the automated system. This request was acknowledged and confirmed, requiring the call to be routed to an available human agent. This transfer is tracked for quality assurance and staffing optimization purposes.
      - code: INC
        description: Consumer Incapacitated - Third party reports that the account holder is physically or mentally incapacitated and unable to handle their financial affairs. This status requires documentation and special handling procedures including potential contact with legal guardians or power of attorney representatives. The account may require special disposition based on the nature and permanence of the incapacitation.
      - code: LGB
        description: Language Barrier - Communication could not proceed effectively due to language differences between the caller and the customer. The customer indicated inability to understand or communicate in the language being used, making meaningful conversation impossible. This may require transfer to a bilingual agent or use of translation services for future contact attempts.
      - code: RTP
        description: Refusal to Pay - Customer explicitly declined to make any payment on the account, ONLY after the creditor made MULTIPLE attempts to negotiate a resolution. Throughout the conversation, the creditor provided multiple payment plan or settlement options, all of which the customer rejected. The customer acknowledged the debt and consistently confirmed their unwillingness or inability to pay despite repeated efforts to find a solution. This outcome must be well-documented to ensure compliance and to inform future contact strategies. If the customer passes all verification checks but declines to make payment on the first attempt, the call should still be classified as "ID Verification Failed" instead of "Refusal to Pay."
      - code: RCR
        description: Recording Consent Refused - Customer explicitly declined consent for the call to be recorded, requiring call termination. Recording consent is often required for compliance, quality assurance, and legal protection purposes in collection calls. Without this consent, company policy typically prevents proceeding with account discussion. If the customer does not agree to be recorded, prioritize the call classification accordingly.
      - code: NCV
        description: Not Convenient - Customer indicated that the current time is inappropriate or inconvenient for this discussion. The customer confirmed they are the correct person but stated they are unable to engage in a financial conversation at this moment due to timing, location, or other circumstantial factors. This requires scheduling an alternative contact time. MUST NOT select this code if the user claims to be busy (e.g., "I have a minute", "I'm in public") but STILL asks the agent to proceed (e.g., "Talk to me", "I'm interested", "Go ahead"). If the user stays on the line and engages in the conversation despite the distraction, the call is considered CONVENIENT enough to proceed.
      - code: CAB
        description: Callback Requested - Customer acknowledged the call but requested to be contacted at a specific future time that is more convenient for them. A specific callback date and time was established and confirmed with the customer for follow-up.
      - code: WCR
        description: Written Communication Only Requested - Customer has specifically requested that all future communications be conducted in writing only, with no phone calls. This preference was explicitly confirmed and must be honored according to consumer protection regulations. Future contact attempts must be limited to postal mail or other written communication methods as permitted by law.
      - code: CDS
        description: Cease and Desist - Customer has formally requested the complete cessation of all communication attempts regarding this account. This legal request was acknowledged and confirmed, requiring immediate flagging in the system to prevent any further contact. Violation of cease and desist requests can result in legal penalties under consumer protection laws.
      - code: CPR
        description: Complaint Received - Customer expressed dissatisfaction and formally registered a complaint about the account, collection practices, or other aspects of their experience. The nature of the complaint was documented but not fully resolved during the call. This requires escalation to appropriate departments for investigation and resolution according to consumer protection protocols.
      - code: HCH
        description: |
          Hardship Concern - Customer has indicated financial difficulty, inability to pay, or circumstances preventing payment. This includes but is not limited to: unemployment, reduced income, medical expenses, family emergencies, divorce, disability, business closure, or any other legitimate financial constraints that impact their ability to meet payment obligations. Collection activities should be adjusted to explore hardship options and payment arrangements appropriate to the customer's situation. Must NOT select this code if the customer mentions PAST struggles (like "I was on welfare") but explicitly states they have found a new job (e.g., "I just got hired", "got a job today"). Finding a job indicates the hardship is resolving, so this code does NOT apply.
      - code: PPA
        description: Payment Plan Agreed - Customer has agreed to a structured payment plan with specific terms for resolving the debt. The arrangement includes defined payment amounts, frequencies, and duration as mutually agreed upon during the negotiation. This plan has been formally accepted and the customer has been transferred to complete payment details. There is a special case to detect, if the customer is unable to respond at the time and requests to be contacted later, the same classification should apply. This also applies if the customer mentioned they have made a payment within the last 14 days via any channel, provided they supplied information about the payment date and amount. Do NOT select this code if the user says "yeah", "okay", or "sure" merely as filler words while distracted, rambling, or talking about unrelated topics (e.g., fireworks, personal stories). A PPA requires a clear, focused confirmation of the payment terms.
      - code: PPIF
        description: Promise to Pay in Full - Customer has agreed to pay the entire outstanding balance in a single payment. They have confirmed the full amount due and committed to a specific payment date, but have not yet completed the actual payment transaction. Follow-up will be required to ensure the promised payment is received as scheduled.
      - code: PSIF
        description: Promise to Settle in Full - Customer has accepted a discounted settlement offer that will resolve the account for less than the full balance. The settlement terms include a specific payment amount and timeline as agreed during negotiation, representing a mutually beneficial resolution. This agreement requires documentation and follow-up to ensure payment is received according to settlement terms.
      - code: WRN
        description: Wrong Number - The person who answered the call indicated that they are not the intended recipient and have no connection to the account holder. It appears that the number is incorrectly linked to the account and should be removed from active contact attempts. Immediate updating of the contact information in the system is necessary to prevent further misdirected calls. If the conversation includes inappropriate language and the caller has not successfully passed all required identity verification checks to confirm they are the intended recipient, classify the call with the code "Wrong Number."
      - code: TPC
        description: Third-Party Contact - A person other than the account holder provided new or updated contact information for reaching the intended recipient. While not authorized to discuss account details, this third party offered alternative ways to reach the actual account holder or suggested that they could pass along the message to the account holder. This new contact information must be verified before being used for future communication attempts. If the caller is not the intended recipient, classify the call accordingly.
      - code: FRA
        description: Fraud Reported - Customer claims the account was created fraudulently or through identity theft without their knowledge or consent. The customer has denied responsibility for the debt based on fraudulent activity and requested investigation. This allegation requires immediate escalation for fraud investigation and potential reporting to credit bureaus and authorities.
      - code: DNC
        description: Do Not Call - Customer has explicitly requested to be removed from all phone contact lists and to cease calling this specific phone number. This request must be honored immediately to comply with consumer protection regulations and company policies. The number should be flagged in the system to prevent future outbound calls. This differs from a complete cease and desist as it only applies to phone contact at this specific number, not all forms of communication. Proper documentation of this request is essential for compliance tracking.
      - code: DIS
        description: Debt Disputed - The customer has raised concerns regarding the accuracy, validity, or legitimacy of the debt. This includes disputes over the debt's ownership, amount, or previous payments not reflected in the current balance. Additionally, the customer may have identified errors in account information or requested formal validation documentation. This situation requires immediate account notation, suspension of collection activities, and investigation or validation in accordance with applicable regulations. However, this does NOT apply if the customer mentioned they have made a payment within the last 14 days via any channel, provided they supplied information about the payment date and amount.
      - code: CSM
        description: SCRA Coverage Reported - Customer verified active military service status which invokes special protections under the Servicemembers Civil Relief Act. The customer provided details about their military service including branch, status, and anticipated service period. SCRA protections include interest rate caps, foreclosure prevention, and other specific accommodations that must be immediately applied to the account.
      - code: PRS
        description: In Prison - Customer or third party confirmed that the account holder is currently incarcerated in a correctional facility. Details about the incarceration including facility location and expected release date may have been provided. This status requires special handling procedures and may affect collection strategies due to the customer's limited financial capabilities while imprisoned.
      - code: LGH
        description: Legal Guardian Handling - A legally authorized guardian is managing the account holder's affairs due to the account holder's incapacity or death. The guardian provided verifiable information about their legal relationship to the account holder and their authority to discuss the account. Communication about the account must now be directed exclusively to this authorized representative.
      - code: ATY
        description: Attorney Representation - Customer stated they have retained legal counsel to represent them regarding this debt, requiring all future communications be directed to their attorney. Select this call code if the caller or consumer lets you know that they are being represented by an attorney or lawyer (e.g. "I have an attorney" or "Speak to my lawyer" or "My lawyer told me not to talk to you. Please contact them instead")
      - code: BKP
        description: Bankruptcy - Customer reported current bankruptcy proceedings or intent to file bankruptcy that would include this account. The customer provided specific details about their bankruptcy filing including case number, chapter, and filing date. This legal status triggers immediate cessation of collection activities according to automatic stay provisions and requires verification with bankruptcy court records.
      - code: DSA
        description: |
          Debt Settlement Agreement - This code applies when a professional third-party entity (e.g., National Debt Relief, AmeriCor, or a law firm) is involved in managing the account. Select this code if The Consumer states they are enrolled in a program for debt/credit settlement, relief, consolidation, or financial management OR A Representative calls on behalf of the account holder to discuss settlement, negotiate terms, or make payments.

    # Special group call codes that apply codition mapping to detect (lower order is higher priority)
    postprocess_conditions:
      - code: HUA
        description: Fallback logic for IDV call code
        condition: '{{ call_code == "IDV" }} and {{ "negotiation_from_script" not in list_current_state }}'
      - code: IDV
        description: Fallback logic for IDF, NVR, HUA
        condition: '{{ call_code in ["IDF", "NVR", "HUA"] }} and {{ "negotiation_from_script" in list_current_state }}'
      - code: PTSR
        description: Customer does not pass RPC and call transfer successfully triggered - transferred
        condition: '{{ call_code == "TSR" }} and {{ "negotiation_from_script" not in list_current_state }}'
      - code: PNCV
        description: pre-RPC, not convenient
        condition: '{{ call_code == "NCV" }} and {{ "negotiation_from_script" not in list_current_state }}'
      - code: PCAB
        description: pre-RPC, call back
        condition: '{{ call_code == "CAB" }} and {{ "negotiation_from_script" not in list_current_state }}'
      - code: PAY
        description: Payment plan setup successfully, intent to pay
        condition: >-
          ('{{dict_variable.payment_init}}' == 'True' and '{{dict_variable.payment_result}}' == 'success')
      - code: WFR
        description: Wait for representative
        condition: "{{ dict_variable.rpc == 'cus' }} and '{{ dict_variable.warm_transfer_sent }}' == 'yes' and '{{ dict_variable.transfer_result }}' != 'connected' "
      - code: PWFR
        description: pre-RPC wait for representative
        condition: "{{ dict_variable.rpc not in ['wrong_number', 'not'] }} and '{{call_code}}' != 'WRN' and '{{ dict_variable.warm_transfer_sent }}' == 'yes' and '{{ dict_variable.transfer_result }}' != 'connected' and {{ 'negotiation_from_script' not in list_current_state }} "
      - code: FTP
        description: Fail to pay via DTMF, but not transfer to Human agent or
        condition: >-
          (
            '{{dict_variable.payment_init}}' == 'True' and '{{dict_variable.payment_result}}' != 'success' and '{{ dict_variable.transfer_result }}' != 'connected'
          )

  # Extra info extraction agent
  extract_info_agent_configs:
    usecase_id: en_collin_kompato_extract_info_agent
    model_configs:
      model: gemini-3-flash

    prompts:
      prompt_summary_conversation: |
        You are an expert at summarizing debt collection conversations. Given a conversation transcript, create a concise summary that captures the key points.

        # Instructions
        - Summarize the main outcome of the call (2-3 sentences)
        - Include customer's response to the debt collection attempt
        - Mention any commitments, disputes, or next actions
        - Keep it factual and objective
        - Do not include sensitive information like full SSN or account numbers

        # Conversation Transcript
        ```
        {{conversation_transcript}}
        ```

        # Response Format
        Return ONLY the summary text without any tags or formatting.

      prompt_detect_dispute_info: |
        # Objective
        You are a reviewer agent in the finance and banking sector.
        You will receive a transcript of a phone call related to debt collection and recovery, located in the section PHONE_CALL_TRANSCRIPT.
        The transcript records the conversation of 2 roles: the debt collector (assistant) and the customer (user).

        Your task is to analyze this transcript, detect if any dispute being addressed in the transcript, classify and generate a concise dispute_reason summarizing the customer's specific claim.

        # DISPUTE_CATEGORIES
        - `dispute_balance`: if _user has dispute about the balance of the debt, the charges (for example 'We agreed to a $500 discount but the portal is still showing the original amount', 'The creditor promised me I would not need to pay late fees', 'This balance is too high because…', 'I was charged for this account, but I never received the item', 'I refunded this charge, but it still showed up on my account'); and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
        - `dispute_paid`: if _user has dispute that they already paid the debt (for example 'I paid the full amount via bank transfer six months ago. Can you confirm this on your end?', 'I settled this debt last year with a check. Why is it still showing as unpaid?', 'I made a payment directly to the creditor last year. This should be updated in your records.', 'I have already paid off this debt through your online portal. Can you verify the payment?', 'I cleared this balance with a credit card payment last 2 years. Please check and confirm it has been received'); and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
        - `dispute_theft`: if _user explicitly informs us that they are a victim of identity theft (e.g. "I received a notification about a debt in my name that I never incurred.", "I found out someone used my identity to open an account.", "This debt is not mine; I suspect my identity has been stolen.", "I noticed unfamiliar charges under my name that I never authorized.", "I believe my personal information was used fraudulently to create this debt.").; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
        - `dispute_txn_fraud`: if _user explicitly informs us that they are a victim of transaction fraud, where someone has unauthorized access to their account information and makes purchases without their consent. Examples include statements like "I noticed purchases on my account that I did not authorize.", "My account was charged for items I did not buy.", "I received a notification about a transaction I never made.", "There are unfamiliar transactions on my statement that I did not initiate.", "Someone used my account information to make unauthorized purchases."; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.

        # PHONE_CALL_TRANSCRIPT
        ```
        {{conversation_transcript}}
        ```

        # Instructions
        1. Read the transcript carefully.
        2. Classify the dispute into one of DISPUTE_CATEGORIES
        3. Detect the dispute reason that user implied or explicitly stated in the conversation. The reason is a short, neutral summary (1-2 sentences) that captures the core of the customer's claim and must clearly explain why the customer believes the debt is incorrect.

        # Response Format
        Return ONLY the dispute_label and dispute_reason in JSON format.
        {
          "dispute_label": "The category of the dispute, one of the following: dispute_balance, dispute_paid, dispute_theft, dispute_txn_fraud",
          "dispute_reason": "The reason for the dispute, if no dispute reason is detected return None"
        }

      prompt_detect_callback_info: |
        # Objective
        You are a date and time parsing assistant. Your task is to:
        1. Convert natural language expressions of time into a structured date and time format
        2. Detect if the customer specifically requested a human callback

        # Input Information
        - Full conversation transcript:
        ```
        {{conversation_transcript}}
        ```

        - Current call date (reference date): {{dict_variable.call_date}} which is {{dict_variable.ssml_call_date}}
        - Current day of the week: {{dict_variable.day_of_week}}

        # Instructions
          1. Interpret the raw callback time expression relative to the original call date.
          2. Identify if the callback should be:
              - Later the same day (e.g., "later today", "this afternoon", "in a few hours")
              - Next day (e.g., "tomorrow", "tomorrow morning")
              - A specific future date (e.g., "next Monday", "on the 15th")
              - At a specific time (e.g., "9 AM", "at 3 PM", "afternoon")
              - If user mentioned "Anytime" and have not provided specific day and time --> extract call back date as tommorrow 9AM

          3. Return a call back day in format (YYYY-MM-DD) if not available, return "unknown".
          4. Return a call back time in format (HH:MM) if not available, return "unknown".
          5. Analyze if the customer specifically requested a human callback. Look for phrases like:
              - "I want to speak to a real person"
              - "Can a human call me back"
              - "I need to talk to an actual person"
              - "No bots/robots/AI"
              Return "true" if human callback requested, "false" if not, "unknown" if not clear.

        # Response Format
        Return ONLY the callback information in JSON format.
        {
          "callback_day": "The callback date in YYYY-MM-DD format, or 'unknown' if not available",
          "callback_time": "The callback time in HH:MM format, or 'unknown' if not available",
          "human_callback_requested": "true if human callback was specifically requested, false if not, unknown if unclear"
        }

      # Prompt to detect payment plan
      prompt_detect_payment_plan: |
        ## Context
        You are provided with a conversation between a consumer and bank agent, located in the section Conversation transcript.
        Your goal is to output a Python dictionary containing all payment plan details discussed in the transcript, using the provided current balance and (if available) settlement amount.

        ## FIELD DEFINITIONS

        - **1st_amount:**
            The amount of the first payment in USD, which amount the user agrees to pay initial, if the user does not agree to pay and/or does not mention an amount, return 'unknown'
            Example: "100.0"

        - **1st_date:**
            The clearly stated date (YYYY-MM-DD) for the first payment. If the first payment date is not mentioned, return 'unknown'. Do not guess, infer, or fabricate the date. First payment date should be in calling date or in the future.
            Example: "2025-03-25"

        - **2nd_amount:**
            The amount of the second payment in USD after the first payment, if the user does not agree to pay and/or does not mention an amount, .
            If installments, return the amount of the first installment. In case of full payment, return 0.0
            Example: "0.0"

        - **2nd_date:**
            The clearly stated date (YYYY-MM-DD) for the second payment after the first payment. If there is no second payment (e.g., only a single, one-off payment is scheduled), return 'unknown'. Second payment date should be in the future.
            Example: "2025-03-25"

        - **n_installments:**
            The number of installments in the payment plan
            Example: 12

        - **payment_plan_total:**
            This represents the total payment amount, which should be equal to or less than the {total_charge_amount} and must accurately reflect the user's agreed total amount. Make sure the total of all payment amounts does not surpass the {total_charge_amount} and matches the user's agreed terms.
            (do math if necessary, Total debt outstanding balance is {total_charge_amount})
        ---

        ## INSTRUCTIONS
        - If the customer does not clearly promise a payment date but agree to pay before a certain date, return that date for first date paying
        - If the customer does not clearly state a payment date and no date was agreed upon, always return 'unknown' for first_payment_date, regardless of payment plan offered.
        - If the customer specifies a recurring payment day (e.g., "the twenty"), calculate the first occurrence of that day that is AFTER the call date (not on or before **only if a specific day was agreed upon.**.
            - If the specified day of the month is **greater than** the call date's day, use that day in the current month.
            - If the specified day of the month is **less than or equal** to the call date's day, use that day in the **next month**.
            - The first payment date must **never** be before the call date.
        - If the information is unclear or ambiguous, output None.
        - Do not include explanations.
        - **Override any mentioned delay: Ensure the first payment date is within 30 days of the calling date.**
        - If the user mentions both a potential delay and a specific day of the month and that date is before the calling date, always choose the specific date in NEXT MONTH (the next specific day after the calling date).
        - If the user requests recurring monthly payments on a specific day of the month and the start date is ambiguous, always use the next occurrence of that day after the calling date.
        - If the first payment date is before the calling date, use the same day in the next month **only if a specific day was agreed upon.**
        ---

        ### Provided total charge amount
        {total_charge_amount}

        ### Calling date
        {call_date}

        ### Conversation transcript
        {conversation_transcript}

