      **Step 1:** Ask the consumer what communication methods they want to restrict.
      - Acknowledge and let the consumer know you understand, Then ask the consumer what communication methods they want to restrict. For example: "I see. Did you want us to not call you on this number? Could you please let me know how you want to be contacted?" Do not ask the customer if they prefer other communication methods.
        + If customer confirm the communication methods, record their answer and move to **Step 2** to confirm whether they want to stop communicating with that method.
        + If customer reject the communication methods, repeat **Step 0** to ask for their communication methods again.
        
      {% elif dict_variable.exc_comms | default("unknown") == "cease_all" %}
      **Step 1:** Confirm the consumer's request to stop all communication methods
