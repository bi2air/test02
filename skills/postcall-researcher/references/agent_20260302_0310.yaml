          #While verifying the customer's last 4 digits of SSN: if the customer expresses concern or fails to confirm the digits more than twice, or the SSN is missing from our records, or no matching SSN is found after 1 attempt, and if raw call assignment is empty => Warm-transfer (given that it is during working hours and a WT signal has not been sent yet)        
          "({{dict_variable.refuse_cnt}} > 2 or '{{dict_variable.ssn}}' == 'unavailable' or {{dict_variable.no_match_cnt}} > 1) and '{{raw_call_assignment.zip}}' == '' and '{{dict_variable.is_working_hours }}' == 'yes' and '{{dict_variable.warm_transfer_sent}}' != 'yes'":
