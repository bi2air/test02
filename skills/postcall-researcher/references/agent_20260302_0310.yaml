                  return the phone number that _user provides. Note the different ways to pronounce numbers: "o" instead of "zero" (0), "double zero" instead of "zero zero" (00), "triple zero" or "zero double zero" instead of "zero zero zero" (000), "thirteen" instead of "one three" (13), "forty two" instead of "four two" (42), "ten" instead of "one zero" (10), "one hundred" instead of "one zero zero" (100), and so on. In all other cases, including when the topic has not been discussed, _user provides an irrelevant/unintelligible response, or _user is unable or unwilling to provide the phone number, return "unknown".
                example: "unknown"
              exc:
                description:
                  revoke_record_consent: if _user explicitly says that they do not want to be recorded (e.g. "I prefer no recording", "Why recording?")
                  cease_comms: if _user requests to take them off your calling list or delete their contact number, or if caller proactively (which means without being prompted) asks to stop receiving communications from us including email, texting, sms or call; and in the latest turns of the conversation has not confirmed that they now want to continue receiving communications.
                  human_agent_request: if _user refuses to speak to the virtual agent and/or requests speaking to a live agent, representative or customer service, or a specific person (e.g., "Representative", "Operator", "Agent", "I want to speak to [Name]", "I am looking for [Name]", "I want someone speaking Spanish"); and in the latest turns of the conversation has not agreed to continue the conversation
                  "null": default value, if _user did not mention any above; or if the _user simply asks a question about virtual agent without requesting to speak to a live agent
                example: "null"
            type_llm_reflection: *local_reflection_model_name
            reflection_template: template_phone_number

          - variables:
              # Determine the purpose of the call. Used as a placeholder in the response prompt only. Not used in transition.
              contact_purpose:
                description: concisely capture the purpose of the call stated or implied by the customer at the start of the call, such as "making a payment", "account inquiry", "debt dispute", "debt inquiry", "returning a call", and so on. Prioritize capturing the purpose that is most related to the context of debt collection. For example, if _user says "you called me about settlements", then the purpose is "settlement" and not "returning a call". Return "unknown" if _user did not specify any purpose (for example, they simply said "hello").
                example: "account inquiry"
            type_llm_reflection: *local_reflection_model_name

          - variables:
              # Determine whether the customer has a clear intent to resolve the debt
              willing_to_pay:
                description:
                  "yes": The consumer clearly expresses **intent** or **willingness** to resolve the debt. This includes any statement or request to **make a payment**, **arrange a payment plan** (e.g., "I want to pay," "Can I make a payment?," "Let's set up a payment plan," or any opening statement inquiring about resolution options).
                  "no": The consumer does not express any intent or willingness to resolve the debt.
                  "settlement": The consumer explicitly discusses a **settlement** offer or agreement, indicating their intent to continue with settlement amounts and terms. (e.g. "I agree to settle, ", "Some settlement or something.")
                example: "yes"

          - variables:
              # does the caller come from a debt settlement company?
              dsc:
                overview: To capture situations where the caller is a debt settlement company, an attorney, or a legal third party that represent a customer
                description: 
                  "yes": if _user introduces themselves as a debt settlement company, an attorney, a law firm, or a legal third party holding the power of the debt holder that calls in to discuss options to resolve the debt of a customer, such as making a payment, discussing settlement options, and the like. Common keywords to detect this are "mutual client", "the client's name is [Name]", "the account of [Name]", "on behalf of a client".
                  "no": if _user explicitly confirms they are not a legal third party, typically by responding 'No' when being asked if they legally represent a customer, or if _user confirms that they are the customer themselves, or if _user uses first-person language (e.g., "my account", "my debt", "I owe a debt") to indicate that they are not a legal third party.
                  "unknown": _user does not mention anything about being a legal entity or representing a customer.
                example: "no"

              # is the caller a friend or family of the customer?
              third_party:
                overview: Captures whether the caller is a non-professional third party, such as a family member, friend, or acquaintance, who is inquiring about the account. This is distinct from the customer themselves and professional legal representatives (DCS/DSA/Attorney).
                description: 
                  "yes": |
                    If the caller identifies as a personal relation to the customer (spouse, parent, child, friend, etc.) or explicitly states they are calling to help a person they know personally. This is triggered by:
                        -- Explicitly stating a personal relationship (e.g., "I'm his wife," "This is her father," "I'm calling for my mom," "I'm a friend helping out").
                        -- Using third-person language to refer to the account holder by name or relationship (e.g., "I'm calling about John's debt," "Does my husband owe this?").
                        -- Answering a representation question by confirming a personal link rather than a professional one (e.g., assistant: "Are you the account holder?" user: "No, I'm his son").
                        -- Explicitly denying being a professional firm while admitting to being a third party (e.g., "I'm not a lawyer, just his neighbor").
                  "no": |
                    If the caller is NOT explicitly identified as a personal relation (family, friend, etc.). This category includes Account Holders, Professional Representatives, and Ambiguous cases. This is triggered by:
                        -- Explicitly identifying as the account holder (e.g., "It's my account") or using first-person language (e.g., "I want to settle my payments").
                        -- Passing verification with their own demographics that match the account holder.
                        -- Identifying as a professional firm, attorney, or debt settlement company (professional representatives).
                        -- Using neutral phrasing like "I'm calling about the account" without specifying "my account" or "his/her account."
                        -- Ignoring or deflecting questions asking who they are (e.g., "Just tell me the balance" without confirming identity).
                        -- Providing a name that does not match what's on file without explaining the relationship (e.g., "This is Bob" [Account is for Steve], without saying "I'm Steve's dad").
                example: "no"
            type_llm_reflection: *local_reflection_model_name

        processing_variable:
          # Check if the phone number provided by the customer is valid (having 10 digits, correct country code, etc.)
          # Return "unknown" if the provided number is not valid; otherwise, return the valid phone number as is (without country code)
          processed_phone_number:
            tool: lib_tools.tools_kompato.preprocess_phone_number
            params:
              phone_number: self.dict_variable.phone_number
              length: 10
              country_code: "1"
          
        transition_conditions:
          # [EXCEPTION] The customer makes a Cease & Desist request
          "'{{dict_variable.exc}}' == 'cease_comms'":
            next_state: exc_cease_comms
            filler: >- 
              [confident] Got it. My name is {{raw_call_assignment.agent_name}}. I will be your virtual assistant today. |partial

          # [EXCEPTION] The customer refuses to be recorded
          "'{{dict_variable.exc}}' == 'revoke_record_consent'":
            next_state: exc_revoke_recording
            filler: I will be your virtual assistant today. |partial

          # The caller is from a DSC and they request for a live agent right away => Warm-transfer if during working hours
          "'{{dict_variable.dsc}}' == 'yes' and '{{dict_variable.exc}}' == 'human_agent_request' and '{{dict_variable.is_working_hours}}' == 'yes'":
            next_state: exc_cb
            filler: Got it. Please hold on while we're trying to locate a live agent to support.
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I have located a live agent to assist you.
                  metadata: *sm_metadata
                  extra_info: *base_warm_transfer_info

          # The caller is from a DSC and they request for a live agent right away => Schedule a callback if outside working hours
          "'{{dict_variable.dsc}}' == 'yes' and '{{dict_variable.exc}}' == 'human_agent_request' and '{{dict_variable.is_working_hours}}' != 'yes'":
            next_state: exc_cb
            filler: Got it. Unfortunately, our live agents are currently unavailable as it is outside working hours. When would be a good time for us to call you back?

          # The caller is from a non-professional third party => Warm-transfer if during working hours
          "'{{dict_variable.third_party}}' == 'yes' and '{{dict_variable.dsc}}' != 'yes' and '{{dict_variable.is_working_hours}}' == 'yes'":
            next_state: exc_cb
            filler: I see. Since you are calling on behalf of someone else, please hold while we try to locate a live agent to support you. Just in case a live agent can't join the call promptly, when would be a good time for us to call you back?
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I have located a live agent to assist you further.
                  metadata: *sm_metadata
                  extra_info: *base_warm_transfer_info

          # The caller is from a non-professional third party => Schedule a callback if outside working hours
          "'{{dict_variable.third_party}}' == 'yes' and '{{dict_variable.dsc}}' != 'yes' and '{{dict_variable.is_working_hours}}' != 'yes'":
            next_state: exc_cb
            filler: Since you are calling on behalf of someone else, normally I'd connect you to a live agent to assist you further. However, our live agents are currently unavailable as it is outside of working hours. When would be a good time for us to call you back?

          # The caller is from a DSC and the phone number is looked up to a single account (exact match) => Verify full name
          "'{{dict_variable.dsc}}' == 'yes' and ('{{raw_call_assignment.account_id}}' not in ['', 'None'] or '{{dict_variable.account_id}}' not in ['', 'None'])":
            next_state: inbound_verify_full_name
            filler: >- 
              {% if 'first_name' in raw_call_assignment and 'last_name' in raw_call_assignment %}
              Got it. My name is {{raw_call_assignment.agent_name}}. I will be your virtual assistant today. Could you please confirm if you are representing {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}?
              {% else %}
              Got it. My name is {{raw_call_assignment.agent_name}}. I will be your virtual assistant today. Could you please confirm if you are representing {{dict_variable.get('customer_info', {}).get('first_name', '')}} {{dict_variable.get('customer_info', {}).get('last_name', '')}}?
              {% endif %}
            repeat_filler:

          # The phone number is looked up to a single account (exact match, and the caller is not from a DSC), 
          # but the customer request a live agent AND it is within working hours 
          # => Verify full name + send warm-transfer signal
          "('{{raw_call_assignment.account_id}}' not in ['', 'None'] or '{{dict_variable.account_id}}' not in ['', 'None']) and '{{dict_variable.exc}}' == 'human_agent_request' and '{{dict_variable.is_working_hours}}' == 'yes' and '{{dict_variable.warm_transfer_sent}}' != 'yes'":
            next_state: inbound_verify_full_name
            filler: >-
              [confident] Got it. While I check availability for a live agent. I am a fully conversational virtual agent that can assist with most questions or concerns.
              {% if 'first_name' in raw_call_assignment and 'last_name' in raw_call_assignment %}
              Am I speaking to {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}?
              {% else %}
              Am I speaking to {{dict_variable.get('customer_info', {}).get('first_name', '')}} {{dict_variable.get('customer_info', {}).get('last_name', '')}}?
              {% endif %}
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I have located a live agent to further help you.
                  metadata: *sm_metadata
                  extra_info: *base_warm_transfer_info

          # The phone number is looked up to a single account (exact match, and the caller is not from a DSC), but the customer request a live agent AND it is outside working hours 
          # => Verify full name
          "('{{raw_call_assignment.account_id}}' not in ['', 'None'] or '{{dict_variable.account_id}}' not in ['', 'None']) and '{{dict_variable.exc}}' == 'human_agent_request' and '{{dict_variable.is_working_hours}}' != 'yes'":
            next_state: inbound_verify_full_name
            filler: >-
              [confident] Got it. Unfortunately, our live agents are currently unavailable. I am a fully conversational virtual agent that can assist with most questions or concerns.
              {% if 'first_name' in raw_call_assignment and 'last_name' in raw_call_assignment %}
              Am I speaking to {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}?
              {% else %}
              Am I speaking to {{dict_variable.get('customer_info', {}).get('first_name', '')}} {{dict_variable.get('customer_info', {}).get('last_name', '')}}?
              {% endif %}

          # The phone number is looked up to a single account (exact match), and the caller is not from a DSC, and the customer hasn't raised any specific objection
          "'{{dict_variable.dsc}}' != 'yes' and '{{raw_call_assignment.account_id}}' not in ['', 'None'] or '{{dict_variable.account_id}}' not in ['', 'None'] ":
            next_state: inbound_verify_full_name
            filler: >-
              {% if 'first_name' in raw_call_assignment and 'last_name' in raw_call_assignment %}
              Got it. My name is {{raw_call_assignment.agent_name}}. I will be your virtual assistant today. It looks like we're trying to get a hold of {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}} at this number. Is this them?
              {% else %}
              Got it. My name is {{raw_call_assignment.agent_name}}. I will be your virtual assistant today. It looks like we're trying to get a hold of {{ dict_variable.get('customer_info', {}).get('first_name', '') }} {{ dict_variable.get('customer_info', {}).get('last_name', '') }} at this number. Is this them?
              {% endif %}

          # No phone number or no matching account and it is NOT YET confirmed if the caller is a legal third party => Repeat the state to ask
          "'{{dict_variable.dsc}}' == 'unknown' and '{{dict_variable.account_status}}' == 'no_matched'":
            next_state: inbound_opening
            filler: May I ask if you are calling about your own account or you are an agent calling on behalf of a mutual client?
            repeat_filler:

          # No phone number or no matching account and it is clarified that the caller is or is not a legal third party => Verify DOB
          "'{{dict_variable.dsc}}' != 'unknown' and '{{dict_variable.processed_phone_number}}' != 'unknown' and ('{{dict_variable.account_status}}' == 'no_matched' or '{{dict_variable.account_id}}' in ['', 'None'])":
            next_state: inbound_verify_dob
            filler:
            repeat_filler:
          
          # Multiple matching accounts and the customer requests human agents DURING working hours => Verify DOB + trigger warm-transfer
          "'{{dict_variable.account_status}}' == 'multiple_accounts' and '{{dict_variable.exc}}' == 'human_agent_request' and '{{dict_variable.is_working_hours}}' == 'yes' and '{{dict_variable.warm_transfer_sent}}' != 'yes'":
            next_state: inbound_verify_dob
            filler: While I check availability for a live agent, as your virtual agent, to ensure they can assist you correctly, may I have your day and month of birth?
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I have located a live agent to further help you.
                  metadata: *sm_metadata
                  extra_info: *base_warm_transfer_info

          # Multiple matching accounts and the customer requests human agents outside working hours => Verify DOB
          "'{{dict_variable.account_status}}' == 'multiple_accounts' and '{{dict_variable.exc}}' == 'human_agent_request' and '{{dict_variable.is_working_hours}}' != 'yes'":
            next_state: inbound_verify_dob
            filler: Unfortunately, our live agents are currently unavailable. As your virtual agent, may I have your day and month of birth?

          # Just multiple matching accounts => Verify DOB
          "'{{dict_variable.account_status}}' == 'multiple_accounts'":
            next_state: inbound_verify_dob
            filler:

          # The customer explicitly requests a human agent DURING working hours (no other conditions match at this point) => Repeat the state + trigger warm-transfer
          "'{{dict_variable.exc}}' == 'human_agent_request' and '{{dict_variable.is_working_hours}}' == 'yes'and '{{dict_variable.warm_transfer_sent}}' != 'yes' ":
            next_state: inbound_opening
            filler: >-
              [understanding] I understand you'd like to speak with a live agent. [confident] While I check their availability, I'm a virtual assistant and can help with most questions or concerns. Could you let me know the phone number we called you on or the one associated with your account?
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I have located a live agent to further help you.
                  metadata: *sm_metadata
                  extra_info: *base_warm_transfer_info

          # The customer explicitly requests a human agent outside working hours (no other conditions match at this point) => Repeat the state
          "'{{dict_variable.exc}}' == 'human_agent_request' and '{{dict_variable.is_working_hours}}' != 'yes'":
            next_state: inbound_opening
            filler: >-
              [understanding] I understand you'd like to speak with a live agent. [apologetic] Unfortunately, our live agents are currently unavailable. I'm a virtual assistant and can help with most questions or concerns. Could you let me know the phone number we called you on or the one associated with your account?

          # All other cases
          else:
            next_state: inbound_opening
            filler:

        # End the call if repeating this state for more than N times
        repeat_continuously:
          max_repeat: 10
          state_exceed_max_repeat: end_call
          filler_exceed_max_repeat: Sorry, since I cannot address your account, I will note down the request and let a human agent to call you back later. What time would work best for you?
        max_turn_back:

    inbound_verify_full_name:
      type: 2llmcalls
      2llmcalls:
        dynamic_filler:
          model_name: gpt-4o
          nturns: 6
          fillers:
          prompt_template: prompt_filler_v2
          quick_fillers:
        type_llm_reflection: *reflection_model_name
        type_llm_response: *response_model_name
        len_msg_reflection:
        len_msg_response:
        type_output_reflection: custom1
        variable_change_exception: { "exc": "null" }
        reflection_template: template_default

        pre_reflection_variable:
          # Store the account ID from the RCA
          account_id: *tool_store_account_id

        reflection_variable:
          - variables:
              # Identify whether the caller is the Right-Person-Contact (RPC)
              rpc:
                overview: Classifies the user's primary role or intent regarding the called party; apply precedence (unknown > not > attorney > cus > wrong_number); higher-priority categories must be clear, unambiguous, and sustained; weigh the totality of evidence.
                description:
                  cus: The user clearly identifies themselves as the account holder or customer by explicitly stating their identity (e.g., "This is {{raw_call_assignment.first_name}}", "Speaking", "Yes, that's me", "Yes"), by providing specific verification details when prompted, or by engaging directly in detailed discussions about their account or case. This category applies only if the user does not state or imply they are an attorney, that an attorney is involved, or that they are not the intended recipient for the specific account being discussed, especially if subsequent information or their statements contradict an initial verbal identification. Also include cases where the user says "yes" in response to their name but simultaneously requests not to be contacted again, such as "do not ever text", or situations where the user confirms their identity but expresses distress, reluctance, or complaints about being contacted (e.g. "Yes, but don't call me anymore", "Yes, stop texting me", "Yes, but I don't want to talk to you", or "Yes, but please remove my number").
                  wrong_number: The user states or implies this is a wrong number, that the call has reached the incorrect person for the intended account, or that the number used does not belong to the specific account holder {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}} being targeted by the call. This includes situations where the user, despite any initial verbal identification, provides verification information (e.g., DOB, address, SSN) that does not match the intended account, or clearly expresses confusion and indicates they are not the correct recipient for the specific account or purpose of the call.
                  not: The user explicitly states or implies they are not the account holder or customer. This includes cases where they are calling on behalf of the customer (e.g., a family member, a representative from an agency, an authorized third party) but are not the primary customer themselves, or simply deny being the customer without further explanation.
                  unknown: The user's role or relationship to the account cannot be determined from the conversation, or there is insufficient information to categorize them as 'cus', 'attorney', 'wrong_number', or 'not'.
                example: "not"
            type_llm_reflection: *local_reflection_model_name

          - variables:
              # In case the caller is not the customer, capture the customer's contact by asking the caller
              rpc_contact:
                overview: If the caller (_user) is not the customer, capture _user's confirmation on whether the number they are calling from is a good number to reach the intended customer.
                description:
                  "yes": _assistant asked _user if this is a good number to reach {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}; and _user confirms that this is {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}'s number.
                  "no": _assistant asked _user if this is a good number to reach {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}; and _user confirms that this is NOT {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}'s number.
                  "unknown": _assistant HAS ALREADY asked _user if this is a good number to reach {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}; and _user has not confirmed or denied.
                  "not_asked": _assistant has NOT asked _user if this is a good number to reach {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}.
                example: "not_asked"

          - variables:
              # Exceptions
              exc:
                description:
                  cease_comms: if caller requests to take them off your calling list or if caller proactively (which means without being prompted) asks to stop receiving communications from us including email, texting, sms or call; and in the latest turns of the conversation has not confirmed that they now want to continue receiving communications.
                  human_agent_request: if _user refuses to speak to the virtual agent and/or requests speaking to a live agent, representative, collection agent, customer service; and in the latest turns of the conversation has not agreed to continue the conversation
                  "null": default value, if _user did not mention any above; or if the _user simply asks a question about virtual agent without requesting to speak to a live agent
                example: "null"
            len_msg_reflection: 2
            reflection_template: template_default
          
          - variables:
              # does the caller come from a debt settlement company?
              dsc:
                overview: To capture situations where the caller is a debt settlement company, an attorney, or a legal third party that represent a customer
                description: 
                  "yes": if _user introduces themselves as a debt settlement company, an attorney, a law firm, or a legal third party holding the power of the debt holder that calls in to discuss options to resolve the debt of a customer, such as making a payment, discussing settlement options, and the like. Common keywords to detect this are "mutual client", "the client's name is [Name]", "the account of [Name]", "on behalf of a client".
                  "no": if _user explicitly confirms they are not a legal third party, typically by responding 'No' when being asked if they legally represent a customer, or if _user confirms that they are the customer themselves, or if _user uses first-person language (e.g., "my account", "my debt", "I owe a debt") to indicate that they are not a legal third party.
                  "unknown": _user does not mention anything about being a legal entity or representing a customer.
                example: "no"

              # is the caller a friend or family of the customer?
              third_party:
                overview: Captures whether the caller is a non-professional third party, such as a family member, friend, or acquaintance, who is inquiring about the account. This is distinct from the customer themselves and professional legal representatives (DCS/DSA/Attorney).
                description: 
                  "yes": |
                    If the caller identifies as a personal relation to the customer (spouse, parent, child, friend, etc.) or explicitly states they are calling to help a person they know personally. This is triggered by:
                        -- Explicitly stating a personal relationship (e.g., "I'm his wife," "This is her father," "I'm calling for my mom," "I'm a friend helping out").
                        -- Using third-person language to refer to the account holder by name or relationship (e.g., "I'm calling about John's debt," "Does my husband owe this?").
                        -- Answering a representation question by confirming a personal link rather than a professional one (e.g., assistant: "Are you the account holder?" user: "No, I'm his son").
                        -- Explicitly denying being a professional firm while admitting to being a third party (e.g., "I'm not a lawyer, just his neighbor").
                  "no": |
                    If the caller is NOT explicitly identified as a personal relation (family, friend, etc.). This category includes Account Holders, Professional Representatives, and Ambiguous cases. This is triggered by:
                        -- Explicitly identifying as the account holder (e.g., "It's my account") or using first-person language (e.g., "I want to settle my payments").
                        -- Passing verification with their own demographics that match the account holder.
                        -- Identifying as a professional firm, attorney, or debt settlement company (professional representatives).
                        -- Using neutral phrasing like "I'm calling about the account" without specifying "my account" or "his/her account."
                        -- Ignoring or deflecting questions asking who they are (e.g., "Just tell me the balance" without confirming identity).
                        -- Providing a name that does not match what's on file without explaining the relationship (e.g., "This is Bob" [Account is for Steve], without saying "I'm Steve's dad").
                example: "no"
            type_llm_reflection: *local_reflection_model_name
            
        processing_variable:
          # Check whether the account status of the customer is in one of the compliance codes for special handling
          is_special_compliance_code:
            tool: lib_tools.tools_kompato.pick_value_from_conditions
            params:
              conditions:
                - condition: "rca_account_status in compliance_codes"
                  value: "yes"
                - condition: "else"
                  value: "no"
              local_vars:
                rca_account_status:
                  value: self.raw_call_assignment.debtStatusCode
                  type: str
                compliance_codes:
                  value: *compliance_codes
                  type: array
              return_type: str

          # As a result of AGI-4176 (prepare all variables pre-negotiation)
          init_call_date:
            tool: lib_tools.tools_kompato.init_outbound_call_date
          init_consumer_info:
            tool: lib_tools.tools_kompato.init_outbound_consumer_info

        transition_conditions:
          # [EXCEPTION] The customer requests a Cease & Desist
          "'{{dict_variable.exc}}' == 'cease_comms'":
            next_state: exc_cease_comms

          # If the caller explicitly denies being the customer and there's no clue about them being a DSC or not => End call
          "'{{dict_variable.rpc}}' == 'wrong_number'":
            next_state: end_call
            filler: I have this good contact as referring to {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}, I will mark this as a wrong contact number. Thank you. Have a good day. <ENDCALL>

          # The caller is from a non-professional third party => Warm-transfer if during working hours
          "'{{dict_variable.third_party}}' == 'yes' and '{{dict_variable.dsc}}' != 'yes' and '{{dict_variable.is_working_hours}}' == 'yes'":
            next_state: exc_cb
            filler: I see. Since you are calling on behalf of someone else, please hold while we try to locate a live agent to support you. Just in case a live agent can't join the call promptly, when would be a good time for us to call you back?
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I have located a live agent to assist you further.
                  metadata: *sm_metadata
                  extra_info: *base_warm_transfer_info

          # The caller is from a non-professional third party => Schedule a callback if outside working hours
          "'{{dict_variable.third_party}}' == 'yes' and '{{dict_variable.dsc}}' != 'yes' and '{{dict_variable.is_working_hours}}' != 'yes'":
            next_state: exc_cb
            filler: Since you are calling on behalf of someone else, normally I'd connect you to a live agent to assist you further. However, our live agents are currently unavailable as it is outside of working hours. When would be a good time for us to call you back?

          # The caller doesn't confirm to be the customer, but one of the ID info (DOB, SSN, Ref code) matches, and the caller is from a DSC calling DURING working hours => Handle PoA and trigger warm-transfer
          "'{{dict_variable.rpc}}' != 'cus' and '{{dict_variable.id_verified}}' == 'yes' and '{{dict_variable.dsc}}' == 'yes' and '{{dict_variable.is_working_hours}}' == 'yes' and '{{dict_variable.warm_transfer_sent}}' != 'yes' ":
            next_state: handle_power_of_attorney
            filler: Got it. Thank you. Please bear with us as we try to connect you with a live agent and fill them in on the purpose of your call.
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I have located a live agent to assist you.
                  metadata: *sm_metadata
                  extra_info: *dsc_warm_transfer_info

          # The caller doesn't confirm to be the customer, but one of the ID info (DOB, SSN, Ref code) matches, and the caller is from a DSC calling OUTSIDE working hours => Handle PoA
          "'{{dict_variable.rpc}}' != 'cus' and '{{dict_variable.id_verified}}' == 'yes' and '{{dict_variable.dsc}}' == 'yes' and '{{dict_variable.is_working_hours}}' != 'yes'":
            next_state: handle_power_of_attorney
            filler: Got it. Normally, we'd get you connected with a live agent right away, but all our live agents are currently unavailable. To proceed, could you confirm if you have the necessary documents or a power of attorney?
          
          # The caller requests a live agent
          "'{{dict_variable.exc}}' == 'human_agent_request'":
            next_state: exc_human_agent_request

          # The caller identifies to be the customer and not from a DSC, one of the IDs matches, but their account status is a special compliance code => Warm-transfer if it's during working hours
          "'{{dict_variable.rpc}}' == 'cus' and '{{dict_variable.id_verified}}' == 'yes' and '{{dict_variable.dsc}}' != 'yes' and '{{dict_variable.is_special_compliance_code}}' == 'yes' and '{{dict_variable.is_working_hours}}' == 'yes'":
            next_state: exc_cb
            filler: Got it {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}. It seems your account may need special assistance from a supervisor. Let me check if one is available for you, one moment.
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I have located a live agent to further assist you.
                  metadata: *sm_metadata
                  extra_info: *base_warm_transfer_info

          # The caller identifies to be the customer and not from a DSC, one of the IDs matches, but their account status is a special compliance code => Schedule a callback if it's outside working hours
          "'{{dict_variable.rpc}}' == 'cus' and '{{dict_variable.id_verified}}' == 'yes' and '{{dict_variable.dsc}}' != 'yes' and '{{dict_variable.is_special_compliance_code}}' == 'yes' and '{{dict_variable.is_working_hours}}' != 'yes'":
            next_state: exc_cb
            filler: Got it {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}. It seems your account may need special assistance from a supervisor. Since it's currently outside of working hours, we will schedule a callback for you. When would be a convenient time for us to call you back?

          # The caller identifies to be the customer, one of the IDs matches, and they are not from a DSC => RPC-ed
          "'{{dict_variable.rpc}}' == 'cus' and '{{dict_variable.id_verified}}' == 'yes' and '{{dict_variable.dsc}}' != 'yes'":
            next_state: negotiation_from_script
            filler: >- 
              Thank you for confirming. [supportive] This is an attempt to collect a debt by a debt collector. Any information obtained will be used for that purpose. |partial

          # The caller identifies to be the customer OR appears to be from a DSC, none of the ID info matches, and the DOB is available in the RCA => Verify DOB
          "('{{dict_variable.rpc}}' == 'cus' or '{{dict_variable.dsc}}' == 'yes') and '{{dict_variable.id_verified}}' != 'yes' and '{{raw_call_assignment.date_of_birth}}' not in ['', 'None']":
            next_state: inbound_verify_dob

          # The caller identifies to be the customer OR appears to be from a DSC, none of the ID info matches, and the SSN is available in the RCA => Verify SSN
          "('{{dict_variable.rpc}}' == 'cus' or '{{dict_variable.dsc}}' == 'yes') and '{{dict_variable.id_verified}}' != 'yes' and '{{raw_call_assignment.last_4_ssn}}' not in ['', 'None']":
            next_state: inbound_verify_ssn

          # The caller identifies to be the customer OR appears to be from a DSC, none of the ID info matches, both the DOB and SSN are unavalable, and it is OUTSIDE working hours => Schedule a callback
          "('{{dict_variable.rpc}}' == 'cus' or '{{dict_variable.dsc}}' == 'yes') and '{{dict_variable.id_verified}}' != 'yes' and '{{raw_call_assignment.last_4_ssn}}' in ['', 'None'] and '{{raw_call_assignment.date_of_birth}}' in ['', 'None'] and '{{dict_variable.is_working_hours }}' == 'no'":
            next_state: exc_cb

          # The caller identifies to be the customer OR appears to be from a DSC, none of the ID info matches, both the DOB and SSN are unavailable, and it is DURING working hours => => Warm-transfer (given that it is during working hours and a WT signal has not been sent yet)
          "('{{dict_variable.rpc}}' == 'cus' or '{{dict_variable.dsc}}' == 'yes') and '{{dict_variable.id_verified}}' != 'yes' and '{{raw_call_assignment.last_4_ssn}}' in ['', 'None'] and '{{raw_call_assignment.date_of_birth}}' in ['', 'None'] and '{{dict_variable.is_working_hours }}' == 'yes' and '{{dict_variable.warm_transfer_sent}}' != 'yes'":
            next_state: exc_cb
            filler: Thank you. We are looking for a human agent to assist you. Please hold for just a moment while I connect your call. Just in case there is no live agent available, when will be a good time to call you back?
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I have located a live agent to further help with the account identification issue.
                  metadata: *sm_metadata
                  extra_info: *base_warm_transfer_info
          
          # It is unclear whether the caller is the customer or a DSC
          "'{{dict_variable.rpc}}' != 'cus' and '{{dict_variable.dsc}}' == 'unknown'":
            next_state: inbound_verify_full_name
            filler: May I ask if you are calling about your own account or you are an agent calling on behalf of a mutual client?
            repeat_filler:

          # The caller denies being the customer and hasn't provided any way to reach the intended customer, and they confirm not being from a DSC => End call
          "'{{dict_variable.rpc}}' == 'not' and '{{dict_variable.rpc_contact}}' == 'no' and '{{dict_variable.dsc}}' == 'no'":
            next_state: end_call
            filler: >-
              [apologetic] I have this good contact as referring to {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}, I will mark this as a wrong contact number. Thank you. Have a good day. <ENDCALL>
            repeat_filler:

          # The caller denies being the customer and hasn't provided any way to reach the intended customer, and they haven't confirmed being from a DSC or not => Repeat this state
          "'{{dict_variable.rpc}}' == 'not' and '{{dict_variable.rpc_contact}}' == 'no' and '{{dict_variable.dsc}}' == 'unknown'":
            next_state: inbound_verify_full_name
            filler:
            repeat_filler:

          # The caller doesn't confirm to be the customer but did provide a way to reach the intended customer
          "'{{dict_variable.rpc}}' == 'not' and '{{dict_variable.rpc_contact}}' == 'yes'":
            next_state: end_call
            filler: Thank you, we will try back at another time.<ENDCALL>
            repeat_filler:

          # The caller explicitly states they are not the customer, it is unknown whether they provide a good way to reach the customer, and it is OUTSIDE of working hours => End call
          "'{{dict_variable.rpc}}' == 'not' and '{{dict_variable.rpc_contact}}' == 'unknown' and '{{dict_variable.is_working_hours }}' == 'no'":
            next_state: end_call

          # All other cases
          else:
            next_state: inbound_verify_full_name

        repeat_continuously:
          max_repeat: 7
          state_exceed_max_repeat: end_call
          filler_exceed_max_repeat: Sorry, since I cannot address your account. I will note down the request and let the human agent to call you back later. What time would work best for you?
          repeat_filler:
        max_turn_back:

    inbound_verify_dob:
      type: 2llmcalls
      2llmcalls:
        dynamic_filler:
          model_name: gpt-4o
          nturns: 6
          fillers:
          prompt_template: prompt_filler_v2
          quick_fillers:
        type_llm_reflection: *reflection_model_name
        type_llm_response: *response_model_name
        len_msg_reflection:
        len_msg_response:
        type_output_reflection: custom1
        variable_change_exception: { "exc": "null" }
        reflection_template: template_verify_dob

        pre_reflection_variable:
          # Save account_id from raw_call_assignment to dict_variable
          account_id: *tool_store_account_id

        reflection_variable:
          - variables:
              # The date of birth provided by the customer
              dob:
                description: |
                  _user stated their day of birth (extract directly from _user response). Return as a two-digit number (dd), zero-padded if single digit. When _user provides numerical information following a request for their date of birth, aggressively parse any numerical string for a plausible date pattern, even if the string also represents other information (e.g., an address or other identifier). This parsing should prioritize identifying the first plausible date pattern (e.g., MMDDYY, MDDYY, MMDDYYYY, MMDD) at the beginning of such combined numerical sequences, even if the sequence contains other data. The day is typically the second numerical component when separated by delimiters (e.g., '1-10-82' -> '10'). For continuous numerical sequences, the day is the second segment parsed as a valid day (1-31) following a valid month (1-12). Specifically, for sequences like 'MDD' (e.g., '126'), prioritize parsing as a single-digit month (M=1) followed by a two-digit day (DD=26) if both are valid, over a two-digit month (MM=12) followed by a single-digit day (D=6). Examples for continuous numerical sequences include: from '311' (interpreted as Month=3, Day=11), extract '11'; from '2980' (interpreted as Month=2, Day=9, Year=80), extract '09'; from '2665' (interpreted as Month=2, Day=6, Year=65), extract '06'; from '42490' (interpreted as Month=4, Day=24, Year=90), extract '24'. If an explicit year (e.g., '1962') is provided, anchor the date interpretation to that year. For ambiguous sequences where both MMDD and DDMM interpretations yield a valid day (e.g., from '11020711', where the initial '1102' can be M=11, D=02 or D=11, M=02), prioritize the DDMM interpretation (e.g., from '1102' extract '11'). Assign "refuse" to `dob` if _user explicitly states they cannot or will not provide the information for a stated reason (e.g., 'Why do you need that?', 'I don't want to tell you'). Assign "unknown" to `dob` only if _user provides no numerical information interpretable as a date of birth and does not explicitly refuse it, or provides completely irrelevant non-numerical responses.
                example: "27"

              # The month of birth provided by the customer
              mob:
                description: |
                  Extract the _user's stated month of birth as a two-digit number ('mm' format, e.g., '01' for January, '12' for December). The month should be extracted from any clear statement of a date of birth by the _user. This includes: 1. Explicit month names (e.g., "February 21st, 57", "January 26th, 1962"). 2. Standard numerical date formats (MM/DD/YY, MM-DD-YY, MM DD YY, M/D/YY, etc., e.g., "1-10-82", "03 29 75", "04-16"). 3. Contiguous numerical sequences: When the _user provides a sequence of numbers or spoken digits, identify the most complete and coherent valid date pattern within it. This pattern must consist of 1 or 2 digits forming a valid month (1-12) followed by 1 or 2 digits forming a valid day (1-31), potentially followed by a 2-digit or 4-digit year (e.g., MMDD, MDD, MMDDYY, MDDYY, MMDDYYYY, MDDYYYY). If a year is present, prioritize the month-day pattern immediately preceding it. If multiple valid month-day patterns exist within a longer numerical string, select the one that forms the most common or complete date format. Disregard any leading, trailing, or internal extraneous numbers or words that do not form part of this identified date pattern (e.g., "Six, 05, 26, 1979" should yield 05; "11020711 1962" should yield 07 from "0711 1962"; "52163" should yield 05 from "52163"; "827574375" should yield 08 from "827"). If the _user explicitly refuses to provide their date of birth or month of birth (e.g., "why do you need that?", "I don't want to give it"), assign <mob:refuse>. If the _user does not state their month of birth, or provides information that is ambiguous, incomplete, or does not form a valid month-day pattern (e.g., "wait a minute", "I'll tell you later", "2665", or only a year is stated like "1985"), assign unknown.
                example: "04"

              # Whether the customer confirmed their day and month of birth
              dob_confirmed:
                overview: Capture whether _user confirmed that both their month and day of birth were recorded correctly.
                description:
                  confirmed: _user stated or confirmed that both their MONTH and DAY of birth were recorded correctly.
                  unknown: _user hasn't confirmed both their month and day of birth were recorded correctly, OR stated that the recorded date of birth was not correct.
                example: unknown

          - variables:
              # Exceptions
              exc:
                description:
                  cease_comms: if _user requests to take them off your calling list or if caller proactively (which means without being prompted) asks to stop receiving communications from us including email, texting, sms or call; and in the latest turns of the conversation has not confirmed that they now want to continue receiving communications.
                  human_agent_request: if _user refuses to speak to the virtual agent and/or requests speaking to a live agent or representative, collection agent, customer service; and in the latest turns of the conversation has not agreed to continue the conversation
                  "null": default value, if _user did not mention any above; or if the _user simply asks a question about virtual agent without requesting to speak to a live agent
                example: "null"
            len_msg_reflection: 2
            reflection_template: template_exc_default

        processing_variable:
          # Format date of birth in "mm/dd" format
          # Return "unknown" if the DOB is invalid
          mmddob:
            tool: lib_tools.tools_kompato.get_mmddob
            params:
              dob: self.dict_variable.dob
              mob: self.dict_variable.mob

          # Return the spoken format of the date of birth
          mmddob_spoken:
            tool: lib_tools.tools_kompato.get_mmddob_spoken
            params:
              dob: self.dict_variable.dob
              mob: self.dict_variable.mob

          # Validate the DOB and verify whether it matches with the information in the RCA
          # "unknown" => The DOB has an invalid format
          # "no_matched" => The DOB is valid but does not match with the RCA
          # "matched_unique" => The DOB is valid and matches with the RCA
          is_dob_matched:
            tool: lib_tools.tools_kompato.verify_dob
            params:
              dob: self.dict_variable.dob
              mob: self.dict_variable.mob
              rca_date_of_birth: self.raw_call_assignment.date_of_birth

          # Count the number of times the provided RPC information (DOB in this case) does not match with what's on file
          no_match_dob_cnt:
            tool: lib_tools.tools_kompato.count_pattern
            params:
              current_count: self.dict_variable.no_match_dob_cnt
              current_value: self.dict_variable.is_dob_matched
              pattern: "no_matched"

          # Count the number of times _user refused to provide RPC information (DOB in this case)
          refuse_dob_cnt:
            tool: lib_tools.tools_kompato.count_pattern
            params:
              current_count: self.dict_variable.refuse_dob_cnt
              current_value: self.dict_variable.dob
              pattern: "refuse"

          # Check whether the account status of the customer is in one of the compliance codes for special handling
          is_special_compliance_code:
            tool: lib_tools.tools_kompato.pick_value_from_conditions
            params:
              conditions:
                - condition: "rca_account_status in compliance_codes"
                  value: "yes"
                - condition: "else"
                  value: "no"
              local_vars:
                rca_account_status:
                  value: self.raw_call_assignment.debtStatusCode
                  type: str
                compliance_codes:
                  value: *compliance_codes
                  type: array
              return_type: str

          # As a result of AGI-4176 (prepare all variables pre-negotiation)
          init_call_date:
            tool: lib_tools.tools_kompato.init_outbound_call_date
          init_consumer_info:
            tool: lib_tools.tools_kompato.init_outbound_consumer_info

        transition_conditions:
          # [EXCEPTION] The customer requests a Cease & Desist
          "'{{dict_variable.exc}}' == 'cease_comms'":
            next_state: exc_cease_comms

          # [EXCEPTION] The customer requests to speak with a live agent and they are not from a DSC
          "'{{dict_variable.exc}}' == 'human_agent_request' and '{{dict_variable.dsc}}' != 'yes'":
            next_state: exc_human_agent_request

          # The caller is from a non-professional third party => Warm-transfer if during working hours
          "'{{dict_variable.third_party}}' == 'yes' and '{{dict_variable.dsc}}' != 'yes' and '{{dict_variable.is_working_hours}}' == 'yes'":
            next_state: exc_cb
            filler: I see. Since you are calling on behalf of someone else, please hold while we try to locate a live agent to support you. Just in case a live agent can't join the call promptly, when would be a good time for us to call you back?
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I have located a live agent to assist you further.
                  metadata: *sm_metadata
                  extra_info: *base_warm_transfer_info

          # The caller is from a non-professional third party => Schedule a callback if outside working hours
          "'{{dict_variable.third_party}}' == 'yes' and '{{dict_variable.dsc}}' != 'yes' and '{{dict_variable.is_working_hours}}' != 'yes'":
            next_state: exc_cb
            filler: Since you are calling on behalf of someone else, normally I'd connect you to a live agent to assist you further. However, our live agents are currently unavailable as it is outside of working hours. When would be a good time for us to call you back?

          # The provided RPC information doesn't yield a unique match, or the customer refuses to provide their RPC information twice => Verify SSN
          "{{dict_variable.refuse_dob_cnt}} > 2 or {{dict_variable.no_match_dob_cnt}} > 2":
            next_state: inbound_verify_ssn
            filler: >-
              {% if dict_variable.get('no_match_dob_cnt', 0) >= 1 %}
              [understanding] Thank you for sharing that. However, we cannot verify your identity with that provided day and month of birth. |partial 
              {% else %}
              [understanding] Thank you for sharing that. However, we cannot verify your identity without your day and month of birth. |partial 
              {% endif %}

          # The customer refuses to provide their DOB, or the DOB produces no match => Ask for their DOB again
          "'{{dict_variable.dob}}' == 'refuse' or '{{dict_variable.is_dob_matched}}' == 'no_matched'":
            next_state: inbound_verify_dob

          # The caller provides a DOB that matches with a single account, but the caller does not confirm to be the customer but a DSC, and it is during working hours => Handle PoA + trigger warm-transfer (given that it is during working hours and a WT signal has not been sent yet)
          "'{{dict_variable.mmddob}}' != 'unknown' and '{{dict_variable.rpc}}' != 'cus' and ('{{dict_variable.is_dob_matched}}' == 'matched_unique' or '{{dict_variable.account_status}}' == 'single_account') and '{{dict_variable.dsc}}' == 'yes' and '{{dict_variable.is_working_hours}}' == 'yes' and '{{dict_variable.warm_transfer_sent}}' != 'yes'":
            next_state: handle_power_of_attorney
            filler: Got it. Thank you. Please bear with us as we try to connect you with a live agent and fill them in on the purpose of your call.
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I have located a live agent to assist you.
                  metadata: *sm_metadata
                  extra_info: *dsc_warm_transfer_info

          # The caller provides a DOB that matches with a single account, but the caller does not confirm to be the customer but a DSC, and it is OUTSIDE working hours => Handle PoA
          "'{{dict_variable.mmddob}}' != 'unknown' and '{{dict_variable.rpc}}' != 'cus' and ('{{dict_variable.is_dob_matched}}' == 'matched_unique' or '{{dict_variable.account_status}}' == 'single_account') and '{{dict_variable.dsc}}' == 'yes' and '{{dict_variable.is_working_hours}}' != 'yes'":
            next_state: handle_power_of_attorney
            filler: Got it. Normally, we'd get you connected with a live agent right away, but all our live agents are currently unavailable. To proceed, could you confirm if you have the necessary documents or a power of attorney?

          # The caller provides a DOB that matches with a single account, the caller confirms to be the customer, but the account status is a special compliance code => Warm-transfer if it's during working hours
          "'{{dict_variable.mmddob}}' != 'unknown' and '{{dict_variable.rpc}}' == 'cus' and ('{{dict_variable.is_dob_matched}}' == 'matched_unique' or '{{dict_variable.account_status}}' == 'single_account') and '{{dict_variable.dsc}}' != 'yes' and '{{dict_variable.is_special_compliance_code}}' == 'yes' and '{{dict_variable.is_working_hours}}' == 'yes'":
            next_state: exc_cb
            filler: Got it {{raw_call_assignment.first_name}}. Thank you for confirming your date of birth. It seems your account may need special assistance from a supervisor. Let me check if one is available for you, one moment.
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I have located a live agent to further assist you.
                  metadata: *sm_metadata
                  extra_info: *base_warm_transfer_info

          # The caller provides a DOB that matches with a single account, the caller confirms to be the customer, but the account status is a special compliance code => Schedule a callback if it's outside of working hours
          "'{{dict_variable.mmddob}}' != 'unknown' and '{{dict_variable.rpc}}' == 'cus' and ('{{dict_variable.is_dob_matched}}' == 'matched_unique' or '{{dict_variable.account_status}}' == 'single_account') and '{{dict_variable.dsc}}' != 'yes' and '{{dict_variable.is_special_compliance_code}}' == 'yes' and '{{dict_variable.is_working_hours}}' != 'yes'":
            next_state: exc_cb
            filler: Got it {{raw_call_assignment.first_name}}. Thank you for confirming your date of birth. It seems your account may need special assistance from a supervisor. Since it's currently outside of working hours, we will schedule a callback for you. When would be a convenient time for us to call you back?

          # The caller provides a DOB that matches with a single account, the caller confirms to be the customer => RPC successful, go to mini-miranda
          "'{{dict_variable.mmddob}}' != 'unknown' and '{{dict_variable.rpc}}' == 'cus' and ('{{dict_variable.is_dob_matched}}' == 'matched_unique' or '{{dict_variable.account_status}}' == 'single_account') and '{{dict_variable.dsc}}' != 'yes'":
            next_state: negotiation_from_script
            filler: >- 
              Thank you for confirming. [supportive] This is an attempt to collect a debt by a debt collector. Any information obtained will be used for that purpose. |partial

          # The caller provides a DOB that matches with a single account, but the caller hasn't yet confirmed to be the customer => Verify full name + Update id_verified to 'yes'
          # This happens if at inbound_preopening, the phone number produces no match or multiple matches
          "'{{dict_variable.mmddob}}' != 'unknown' and '{{dict_variable.rpc}}' == '' and ('{{dict_variable.is_dob_matched}}' == 'matched_unique' or '{{dict_variable.account_status}}' == 'single_account')":
            next_state: inbound_verify_full_name
            filler: >-
              {% if 'first_name' in raw_call_assignment and 'last_name' in raw_call_assignment %}
                {% if dict_variable.dsc == 'yes' %}
              Just to confirm, are you calling on behalf of {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}?
                {% else %}
              Am I speaking to {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}?
                {% endif %}
              {% else %}
                {% if dict_variable.dsc == 'yes' %}
              Just to confirm, are you calling on behalf of {{ dict_variable.get('customer_info', {}).get('first_name', '') }} {{ dict_variable.get('customer_info', {}).get('last_name', '') }}?
                {% else %}
              Am I speaking to {{ dict_variable.get('customer_info', {}).get('first_name', '') }} {{ dict_variable.get('customer_info', {}).get('last_name', '') }}?
                {% endif %}
              {% endif %}
            action_after_transition_func:
              - class: UpdateVariableByTransition
                params:
                  field_name: "id_verified"
                  field_value: "yes"

          # The caller provides a DOB that produces multiple matches => Verify by SSN
          "'{{dict_variable.mmddob}}' != 'unknown' and '{{raw_call_assignment.account_id}}' == '' and '{{dict_variable.account_status}}' == 'multiple_accounts'":
            next_state: inbound_verify_ssn

          # The caller provides a DOB that produces no match and has confirmed that it is indeed their DOB
          "'{{dict_variable.mmddob}}' != 'unknown' and '{{raw_call_assignment.account_id}}' == '' and '{{dict_variable.account_status}}' == 'no_matched' and '{{dict_variable.dob_confirmed}}' == 'confirmed'":
            next_state: inbound_verify_ssn
            filler: >-
              [understanding] Thank you for sharing that. However, we cannot verify your identity with that provided day and month of birth. |partial 
          # All other cases
          else:
            next_state: inbound_verify_dob

        repeat_continuously:
          max_repeat: 7
          state_exceed_max_repeat: end_call
          filler_exceed_max_repeat: Sorry, since I cannot address your account, I will note down the request and let a human agent to call you back later. What time would work best for you?
          repeat_filler:
        max_turn_back:

    inbound_verify_ssn:
      type: 2llmcalls
      2llmcalls:
        dynamic_filler:
          model_name: gpt-4o
          nturns: 6
          fillers:
          prompt_template: prompt_filler_v2
          quick_fillers:
        type_llm_reflection: *reflection_model_name
        type_llm_response: *response_model_name
        len_msg_reflection:
        len_msg_response:
        type_output_reflection: custom1
        variable_change_exception: { "exc": "null" }
        reflection_template: template_default

        pre_reflection_variable:
          # Store the account ID from the RCA
          account_id: *tool_store_account_id

        reflection_variable:
          - variables:
              # Capture the last four digits of SSN provided by the customer. Return "unknown" if SSN not provided. Return "refuse" if they refuse to provide the information
              ssn:
                description: |
                  Extract the four-digit numerical sequence provided by _user that is clearly intended as their Social Security Number's last four digits, in direct response to a request for this information. If the user provides multiple numerical sequences in response to a combined request (e.g., SSN and DOB), prioritize the sequence appearing first or explicitly identified as the SSN. If an initial numerical response for SSN is immediately corrected or clarified by the user, extract the corrected value. If the provided Social Security Number does not meet the format (e.g., wrong length or contains symbols), return it unchanged. Assign 'refuse' if _user explicitly or implicitly refuses to provide SSN or any other personal identifying information (PII) required for identification or verification that would typically precede an SSN request (e.g., 'I'm not comfortable sharing details', 'Why do you need that?', general reluctance, changing the subject after a PII request). Assign 'unavailable' if _user states they forgot their SSN digits or cannot recall them. Assign 'unknown' if _user did not provide a clear SSN as defined, or provided an ambiguous or uncertain numerical response for SSN (e.g., '3292 20 something'), and did not indicate refusal or inability to recall (e.g., ignored the request, conversation moved on without a clear response to the SSN prompt, or expressed confusion about the request itself without refusing).
                example: "unknown"

          - variables:
              # Exceptions
              exc:
                description:
                  cease_comms: if caller requests to take them off your calling list or if caller proactively (which means without being prompted) asks to stop receiving communications from us including email, texting, sms or call; and in the latest turns of the conversation has not confirmed that they now want to continue receiving communications.
                  human_agent_request: if _user refuses to speak to the virtual agent and/or requests speaking to a live agent or representative, collection agent, customer service; and in the latest turns of the conversation has not agreed to continue the conversation
                  "null": default value, if _user did not mention any above; or if the _user simply asks a question about virtual agent without requesting to speak to a live agent
                example: "null"
            len_msg_reflection: 2
            reflection_template: template_exc_default

        processing_variable:
          # Check and validate the provided SSN. 
          # Return "unknown" if it is not a string of digits. 
          # Return the provided SSN otherwise.
          processed_ssn:
            tool: lib_tools.tools_kompato.validate_digit_string
            params:
              input_string: self.dict_variable.ssn

          # Return the spoken format of the SSN
          ssn_spelling:
            tool: lib_tools.tools_kompato.reformat_numbers_tts
            params:
              number_sequence: self.dict_variable.processed_ssn
              segment_length: 1

          # Check whether the provided SSN matches what's on file
          # Return "unknown" if the provided SSN has an invalid format, or is not provided
          # Return "no_matched" if the provided SSN doesn't match what's on file
          # Return "matched_unique" if the provided SSN matches what's on file
          is_ssn_matched:
            tool: lib_tools.tools_kompato.verify_last_4_ssn
            params:
              provided_ssn: self.dict_variable.processed_ssn
              rca_ssn: self.raw_call_assignment.last_4_ssn

          # Count the number of times the SSN doesn't match what's on file
          no_match_ssn_cnt:
            tool: lib_tools.tools_kompato.count_pattern
            params:
              current_count: self.dict_variable.no_match_ssn_cnt
              current_value: self.dict_variable.is_ssn_matched
              pattern: "no_matched"

          # Count the number of times the caller refuses to provide the SSN
          refuse_ssn_cnt:
            tool: lib_tools.tools_kompato.count_pattern
            params:
              current_count: self.dict_variable.refuse_ssn_cnt
              current_value: self.dict_variable.ssn
              pattern: "refuse"

          # Check whether the account status of the customer is in one of the compliance codes for special handling
          is_special_compliance_code:
            tool: lib_tools.tools_kompato.pick_value_from_conditions
            params:
              conditions:
                - condition: "rca_account_status in compliance_codes"
                  value: "yes"
                - condition: "else"
                  value: "no"
              local_vars:
                rca_account_status:
                  value: self.raw_call_assignment.debtStatusCode
                  type: str
                compliance_codes:
                  value: *compliance_codes
                  type: array
              return_type: str

          # As a result of AGI-4176 (prepare all variables pre-negotiation)
          init_call_date:
            tool: lib_tools.tools_kompato.init_outbound_call_date
          init_consumer_info:
            tool: lib_tools.tools_kompato.init_outbound_consumer_info

        transition_conditions:
          # [EXCEPTION] The customer requests a Cease & Desist
          "'{{dict_variable.exc}}' == 'cease_comms'":
            next_state: exc_cease_comms

          # The caller requests a human agent and they are not identified to be a DSC => Handle human request
          "'{{dict_variable.exc}}' == 'human_agent_request' and '{{dict_variable.dsc}}' != 'yes'":
            next_state: exc_human_agent_request

          # The caller is from a non-professional third party => Warm-transfer if during working hours
          "'{{dict_variable.third_party}}' == 'yes' and '{{dict_variable.dsc}}' != 'yes' and '{{dict_variable.is_working_hours}}' == 'yes'":
            next_state: exc_cb
            filler: I see. Since you are calling on behalf of someone else, please hold while we try to locate a live agent to support you. Just in case a live agent can't join the call promptly, when would be a good time for us to call you back?
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I have located a live agent to assist you further.
                  metadata: *sm_metadata
                  extra_info: *base_warm_transfer_info

          # The caller is from a non-professional third party => Schedule a callback if outside working hours
          "'{{dict_variable.third_party}}' == 'yes' and '{{dict_variable.dsc}}' != 'yes' and '{{dict_variable.is_working_hours}}' != 'yes'":
            next_state: exc_cb
            filler: Since you are calling on behalf of someone else, normally I'd connect you to a live agent to assist you further. However, our live agents are currently unavailable as it is outside of working hours. When would be a good time for us to call you back?

          "{{dict_variable.refuse_dob_cnt}} > 1 and {{dict_variable.refuse_ssn_cnt}} > 2":
            next_state: exc_cb
            filler: Thank you for letting me know. However, I cannot verify your identity if neither your date of birth nor your Social Security Number is provided. |partial

          # The RCA is updated to a single account but the caller does not provide a matching SSN => Verify reference code
          "'{{raw_call_assignment.account_id}}' != '' and ({{dict_variable.no_match_ssn_cnt}} > 2 or {{dict_variable.refuse_ssn_cnt}} > 2)":
            next_state: inbound_verify_ref_code
            filler: >-
              {% if dict_variable.get('no_match_ssn_cnt', 0) >= 1 %}
              [understanding] Thank you for sharing that. However, we cannot verify your identity with that provided Social Security Number. |partial
              {% else %}
              [understanding] Thank you for sharing that. However, we cannot verify your identity without your Social Security Number. |partial 
              {% endif %}

          # The RCA is not updated (multiple matches or no match), the DOB has already been provided, and the caller has refused to provide a piece of information twice => Verify by reference code
          "'{{raw_call_assignment.account_id}}' == '' and {{dict_variable.refuse_ssn_cnt}} > 1 and '{{dict_variable.mmddob}}' != 'unknown'":
            next_state: inbound_verify_ref_code
            filler: >-
              [understanding] Thank you for sharing that. However, we cannot verify your identity without your Social Security Number. |partial

          # The caller refuses to provide the SSN, or the SSN they provided doesn't match what's on file => Verify by reference code
          "'{{dict_variable.ssn}}' == 'refuse' or '{{dict_variable.is_ssn_matched}}' == 'no_matched'":
            next_state: inbound_verify_ssn

          # The caller provided an SSN that matches what's on file but is detected to be a DSC calling DURING working hours => Handle PoA and trigger warm-transfer
          "'{{dict_variable.processed_ssn}}' != 'unknown' and '{{dict_variable.rpc}}' != 'cus' and ('{{dict_variable.is_ssn_matched}}' == 'matched_unique' or '{{dict_variable.account_status}}' == 'single_account') and '{{dict_variable.dsc}}' == 'yes' and '{{dict_variable.is_working_hours}}' == 'yes'":
            next_state: handle_power_of_attorney
            filler: Got it. Thank you. Please bear with us as we try to connect you with a live agent and fill them in on the purpose of your call.
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I have located a live agent to assist you.
                  metadata: *sm_metadata
                  extra_info: *dsc_warm_transfer_info
          
          # The caller provided an SSN that matches what's on file but is detected to be a DSC calling outside working hours => Handle PoA
          "'{{dict_variable.processed_ssn}}' != 'unknown' and '{{dict_variable.rpc}}' != 'cus' and ('{{dict_variable.is_ssn_matched}}' == 'matched_unique' or '{{dict_variable.account_status}}' == 'single_account') and '{{dict_variable.dsc}}' == 'yes' and '{{dict_variable.is_working_hours}}' != 'yes'":
            next_state: handle_power_of_attorney
            filler: Got it. Normally, we'd get you connected with a live agent right away, but all our live agents are currently unavailable. To proceed, could you confirm if you have the necessary documents or a power of attorney?

          # The caller provided an SSN that matches what's on file and has confirmed to be the customer (DSC undetected), but the account status is a special compliance code => Warm-transfer if it's during working hours
          "'{{dict_variable.processed_ssn}}' != 'unknown' and '{{dict_variable.rpc}}' == 'cus' and ('{{dict_variable.is_ssn_matched}}' == 'matched_unique' or '{{dict_variable.account_status}}' == 'single_account') and '{{dict_variable.dsc}}' != 'yes' and '{{dict_variable.is_special_compliance_code}}' == 'yes' and '{{dict_variable.is_working_hours}}' == 'yes'":
            next_state: exc_cb
            filler: Got it {{raw_call_assignment.first_name}}. Thank you for confirming the last four digits. It seems your account may need special assistance from a supervisor. Let me check if one is available for you, one moment.
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I have located a live agent to further assist you.
                  metadata: *sm_metadata
                  extra_info: *base_warm_transfer_info

          # The caller provided an SSN that matches what's on file and has confirmed to be the customer (DSC undetected), but the account status is a special compliance code => Schedule a callback if it's outside of working hours
          "'{{dict_variable.processed_ssn}}' != 'unknown' and '{{dict_variable.rpc}}' == 'cus' and ('{{dict_variable.is_ssn_matched}}' == 'matched_unique' or '{{dict_variable.account_status}}' == 'single_account') and '{{dict_variable.dsc}}' != 'yes' and '{{dict_variable.is_special_compliance_code}}' == 'yes' and '{{dict_variable.is_working_hours}}' != 'yes'":
            next_state: exc_cb
            filler: Got it {{raw_call_assignment.first_name}}. Thank you for confirming the last four digits. It seems your account may need special assistance from a supervisor. Since it's currently outside of working hours, we will schedule a callback for you. When would be a convenient time for us to call you back?

          # The caller provided an SSN that matches what's on file and has confirmed to be the customer (DSC undetected) => RPC-ed
          "'{{dict_variable.processed_ssn}}' != 'unknown' and '{{dict_variable.rpc}}' == 'cus' and ('{{dict_variable.is_ssn_matched}}' == 'matched_unique' or '{{dict_variable.account_status}}' == 'single_account') and '{{dict_variable.dsc}}' != 'yes'":
            next_state: negotiation_from_script
            filler: Thank you for confirming. [supportive] This is an attempt to collect a debt by a debt collector. Any information obtained will be used for that purpose. |partial

          # The caller provided an SSN that matches what's on file but there's no information about them being the RPC (inbound_verify_full_name not yet entered) => Verify by full name
          "'{{dict_variable.processed_ssn}}' != 'unknown' and '{{dict_variable.rpc}}' == '' and ('{{dict_variable.is_ssn_matched}}' == 'matched_unique' or '{{dict_variable.account_status}}' == 'single_account')":
            next_state: inbound_verify_full_name
            filler: >-
              {% if 'first_name' in raw_call_assignment and 'last_name' in raw_call_assignment %}
                {% if dict_variable.dsc == 'yes' %}
              Just to confirm, are you calling on behalf of {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}?
                {% else %}
              Am I speaking to {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}?
                {% endif %}
              {% else %}
                {% if dict_variable.dsc == 'yes' %}
              Just to confirm, are you calling on behalf of {{ dict_variable.get('customer_info', {}).get('first_name', '') }} {{ dict_variable.get('customer_info', {}).get('last_name', '') }}?
                {% else %}
              Am I speaking to {{ dict_variable.get('customer_info', {}).get('first_name', '') }} {{ dict_variable.get('customer_info', {}).get('last_name', '') }}?
                {% endif %}
              {% endif %}
            action_after_transition_func:
              - class: UpdateVariableByTransition
                params:
                  field_name: "id_verified"
                  field_value: "yes"

          # The provided SSN produces multiple matches or no match => Verify by reference code
          "'{{dict_variable.processed_ssn}}' != 'unknown' and '{{dict_variable.account_status}}' != 'single_account' ":
            next_state: inbound_verify_ref_code
            filler: >-
              [understanding] Thank you for sharing that. However, we cannot verify your identity with that provided Social Security Number. |partial

          # All other cases
          else:
            next_state: inbound_verify_ssn

        repeat_continuously:
          max_repeat: 7
          state_exceed_max_repeat: end_call
          filler_exceed_max_repeat: Sorry, since I cannot address your account. I will note down the request and let the human agent to call you back later. What time would work best for you?
          repeat_filler: 1
        max_turn_back:

    inbound_verify_ref_code:
      type: 2llmcalls
      2llmcalls:
        dynamic_filler:
          model_name: gpt-4o
          nturns: 6
          fillers:
          prompt_template: prompt_filler_v2
          quick_fillers:
        type_llm_reflection: *reflection_model_name
        type_llm_response: *response_model_name
        len_msg_reflection:
        len_msg_response:
        type_output_reflection: custom1
        reflection_template: template_default

        pre_reflection_variable:
          # Store the account ID from RCA
          account_id: *tool_store_account_id

        reflection_variable:
          - variables:
              # The reference code provided by the customer
              ref_code:
                description: |
                  _user stated their reference number/reference code/account number (extract directly from _user's response). It should be in the format of nine digits. If the provided reference number/reference code/account number does not meet the format (e.g., wrong length or contains symbols), return it unchanged. If _user did not state it (e.g., "wait a minute," "sorry, I didn't get that"), assign "unknown".
                example: "unknown"

          - variables:
              # Exceptions
              exc:
                description:
                  cease_comms: if caller requests to take them off your calling list or if caller proactively (which means without being prompted) asks to stop receiving communications from us including email, texting, sms or call; and in the latest turns of the conversation has not confirmed that they now want to continue receiving communications.
                  human_agent_request: if _user refuses to speak to the virtual agent and/or requests speaking to a live agent or representative, collection agent, customer service; and in the latest turns of the conversation has not agreed to continue the conversation
                  "null": default value, if _user did not mention any above; or if the _user simply asks a question about virtual agent without requesting to speak to a live agent
                example: "null"
            len_msg_reflection: 4
            reflection_template: template_exc_default

        processing_variable:
          # Check and validate the provided reference code
          # Return "unknown" if it is not a string of digits
          # Return the provided reference code otherwise
          processed_ref_code:
            tool: lib_tools.tools_kompato.validate_digit_string
            params:
              input_string: self.dict_variable.ref_code

          # Return the spoken format of the provided reference code
          ref_code_spelling:
            tool: lib_tools.tools_kompato.format_ssml_ref_code
            params:
              provided_ref_code: self.dict_variable.processed_ref_code

          # Check and validate whether the provided reference code matches what's on file
          # Return "unknown" if it hasn't been provided, or the format is not valid
          # Return "no_matched" if the provided code doesn't match what's on file
          # Return "matched_unique" if the provided code matches what's on file
          is_refcode_matched:
            tool: lib_tools.tools_kompato.verify_refcode
            params:
              provided_refcode: self.dict_variable.processed_ref_code
              rca_refcode: self.raw_call_assignment.ace_debt_id

          # Count the number of times the provided reference code doesn't match what's on file
          no_match_ref_code_cnt:
            tool: lib_tools.tools_kompato.count_pattern
            params:
              current_count: self.dict_variable.no_match_ref_code_cnt
              current_value: self.dict_variable.is_refcode_matched
              pattern: "no_matched"

          # Count the number of times the caller refuses to provide the reference code
          refuse_ref_code_cnt:
            tool: lib_tools.tools_kompato.count_pattern
            params:
              current_count: self.dict_variable.refuse_ref_code_cnt
              current_value: self.dict_variable.ref_code
              pattern: "no_matched"

          # Check whether the account status of the customer is in one of the compliance codes for special handling
          is_special_compliance_code:
            tool: lib_tools.tools_kompato.pick_value_from_conditions
            params:
              conditions:
                - condition: "rca_account_status in compliance_codes"
                  value: "yes"
                - condition: "else"
                  value: "no"
              local_vars:
                rca_account_status:
                  value: self.raw_call_assignment.debtStatusCode
                  type: str
                compliance_codes:
                  value: *compliance_codes
                  type: array
              return_type: str

          # As a result of AGI-4176 (prepare all variables pre-negotiation)
          init_call_date:
            tool: lib_tools.tools_kompato.init_outbound_call_date
          init_consumer_info:
            tool: lib_tools.tools_kompato.init_outbound_consumer_info

        transition_conditions:
          # [EXCEPTION] The caller request a Cease and Desist
          "'{{dict_variable.exc}}' == 'cease_comms'":
            next_state: exc_cease_comms
            filler:

          # The caller requests a human agetn and is not detected to be from a DSC
          "'{{dict_variable.exc}}' == 'human_agent_request' and '{{dict_variable.dsc}}' != 'yes'":
            next_state: exc_human_agent_request

          # The caller is from a non-professional third party => Warm-transfer if during working hours
          "'{{dict_variable.third_party}}' == 'yes' and '{{dict_variable.dsc}}' != 'yes' and '{{dict_variable.is_working_hours}}' == 'yes'":
            next_state: exc_cb
            filler: I see. Since you are calling on behalf of someone else, please hold while we try to locate a live agent to support you. Just in case a live agent can't join the call promptly, when would be a good time for us to call you back?
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I have located a live agent to assist you further.
                  metadata: *sm_metadata
                  extra_info: *base_warm_transfer_info

          # The caller is from a non-professional third party => Schedule a callback if outside working hours
          "'{{dict_variable.third_party}}' == 'yes' and '{{dict_variable.dsc}}' != 'yes' and '{{dict_variable.is_working_hours}}' != 'yes'":
            next_state: exc_cb
            filler: Since you are calling on behalf of someone else, normally I'd connect you to a live agent to assist you further. However, our live agents are currently unavailable as it is outside of working hours. When would be a good time for us to call you back?
            
          # The RCA is updated to a single account but the caller is detected to be from a DSC calling during working hours => Handle PoA + trigger warm-transfer
          "'{{dict_variable.processed_ref_code}}' != 'unknown' and '{{dict_variable.is_refcode_matched}}' == 'matched_unique' and '{{dict_variable.rpc}}' != 'cus' and '{{dict_variable.account_status}}' == 'single_account' and '{{dict_variable.dsc}}' == 'yes' and '{{dict_variable.is_working_hours}}' == 'yes' and '{{dict_variable.warm_transfer_sent}}' != 'yes' ":
            next_state: handle_power_of_attorney
            filler: Got it. Thank you. Please bear with us as we try to connect you with a live agent and fill them in on the purpose of your call.
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I have located a live agent to assist you.
                  metadata: *sm_metadata
                  extra_info: *dsc_warm_transfer_info

          # The RCA is updated to a single account but the caller is detected to be from a DSC calling outside working hours => Handle PoA
          "'{{dict_variable.processed_ref_code}}' != 'unknown' and '{{dict_variable.is_refcode_matched}}' == 'matched_unique' and '{{dict_variable.rpc}}' != 'cus' and '{{dict_variable.account_status}}' == 'single_account' and '{{dict_variable.dsc}}' == 'yes' and '{{dict_variable.is_working_hours}}' != 'yes'":
            next_state: handle_power_of_attorney
            filler: Got it. Normally, we'd get you connected with a live agent right away, but all our live agents are currently unavailable. To proceed, could you confirm if you have the necessary documents or a power of attorney?

          # The RCA is updated to a single account and the caller confirms to be the customer, but the account status is a special compliance code => Warm-transfer if it's during working hours
          "'{{dict_variable.processed_ref_code}}' != 'unknown' and '{{dict_variable.rpc}}' == 'cus' and ('{{dict_variable.is_refcode_matched}}' == 'matched_unique' or '{{dict_variable.account_status}}' == 'single_account') and '{{dict_variable.dsc}}' != 'yes' and '{{dict_variable.is_special_compliance_code}}' == 'yes' and '{{dict_variable.is_working_hours}}' == 'yes'":
            next_state: exc_cb
            filler: Got it {{raw_call_assignment.first_name}}. Thank you for confirming the reference code. It seems your account may need special assistance from a supervisor. Let me check if one is available for you, one moment.
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I have located a live agent to further assist you.
                  metadata: *sm_metadata
                  extra_info: *base_warm_transfer_info

          # The RCA is updated to a single account and the caller confirms to be the customer, but the account status is a special compliance code => Schedule a callback if it's outside of working hours
          "'{{dict_variable.processed_ref_code}}' != 'unknown' and '{{dict_variable.rpc}}' == 'cus' and ('{{dict_variable.is_refcode_matched}}' == 'matched_unique' or '{{dict_variable.account_status}}' == 'single_account') and '{{dict_variable.dsc}}' != 'yes' and '{{dict_variable.is_special_compliance_code}}' == 'yes' and '{{dict_variable.is_working_hours}}' != 'yes'":
            next_state: exc_cb
            filler: Got it {{raw_call_assignment.first_name}}. Thank you for confirming the reference code. It seems your account may need special assistance from a supervisor. Since it's currently outside of working hours, we will schedule a callback for you. When would be a convenient time for us to call you back?

          # The RCA is updated to a single account and the caller confirms to be the customer => RPC-ed
          "'{{dict_variable.processed_ref_code}}' != 'unknown' and '{{dict_variable.rpc}}' == 'cus' and ('{{dict_variable.is_refcode_matched}}' == 'matched_unique' or '{{dict_variable.account_status}}' == 'single_account') and '{{dict_variable.dsc}}' != 'yes'":
            next_state: negotiation_from_script
            filler: Thank you for confirming. [supportive] This is an attempt to collect a debt by a debt collector. Any information obtained will be used for that purpose. |partial

          # The RCA is updated to a single account but the caller hasn't confirmed being RPC (inbound_verify_full_name hasn't yet been entered) => Verify by full name
          "'{{dict_variable.processed_ref_code}}' != 'unknown' and '{{dict_variable.rpc}}' == '' and '{{dict_variable.account_status}}' == 'single_account'":
            next_state: inbound_verify_full_name
            filler: >-
              {% if 'first_name' in raw_call_assignment and 'last_name' in raw_call_assignment %}
                {% if dict_variable.dsc == 'yes' %}
              Just to confirm, are you calling on behalf of {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}?
                {% else %}
              Am I speaking to {{raw_call_assignment.first_name}} {{raw_call_assignment.last_name}}?
                {% endif %}
              {% else %}
                {% if dict_variable.dsc == 'yes' %}
              Just to confirm, are you calling on behalf of {{ dict_variable.get('customer_info', {}).get('first_name', '') }} {{ dict_variable.get('customer_info', {}).get('last_name', '') }}?
                {% else %}
              Am I speaking to {{ dict_variable.get('customer_info', {}).get('first_name', '') }} {{ dict_variable.get('customer_info', {}).get('last_name', '') }}?
                {% endif %}
              {% endif %}
            action_after_transition_func:
              - class: UpdateVariableByTransition
                params:
                  field_name: "id_verified"
                  field_value: "yes"

          # Reference code provided but no unique match --> Attempt again until exceeding 5 no-match or refuse
          "'{{dict_variable.is_refcode_matched}}' != 'matched_unique' and {{dict_variable.no_match_ref_code_cnt}} <= 5 and {{dict_variable.refuse_ref_code_cnt}} <= 5":
            next_state: inbound_verify_ref_code
            filler:
            repeat_filler:

          # The reference code is provided but doesn't produce a single match and it is during working hours => Schedule a callback and trigger warm-transfer(given that it is during working hours and a WT signal has not been sent yet)
          "'{{dict_variable.processed_ref_code}}' != 'unknown' and ('{{dict_variable.account_status}}' != 'single_account' or '{{dict_variable.is_refcode_matched}}' != 'matched_unique') and '{{dict_variable.is_working_hours}}' == 'yes' and '{{dict_variable.warm_transfer_sent}}' != 'yes' ":
            next_state: exc_cb
            filler: Thank you. We are looking for a human agent to assist you. Please hold for just a moment while I connect your call. Just in case there is no live agent available, when will be a good time to call you back?
            action_after_transition_func:
              - class: WarmTransferSignal
                params:
                  transfer_message: I have located a live agent to further help with the account identification issue.
                  metadata: *sm_metadata
                  extra_info: *base_warm_transfer_info

          # The reference code is provided but doesn't produce a single match and it is outside working hours => Schedule a callback
          "'{{dict_variable.processed_ref_code}}' != 'unknown' and ('{{dict_variable.account_status}}' != 'single_account' or '{{dict_variable.is_refcode_matched}}' != 'matched_unique') and '{{dict_variable.is_working_hours}}' != 'yes'":
            next_state: exc_cb
            filler: Thank you. Unfortunately I cannot address your account. |partial

          # All other cases
          else:
            next_state: inbound_verify_ref_code
            filler:
            repeat_filler:

        repeat_continuously:
          max_repeat: 7
          state_exceed_max_repeat: end_call
          filler_exceed_max_repeat: Sorry, since I cannot address your account. I will note down your call and let the human agent to call you back later. What time would work best for you?
          repeat_filler: 1
        max_turn_back:

    handle_power_of_attorney:
      type: 2llmcalls
      2llmcalls:
        type_llm_reflection: *reflection_model_name
        type_llm_response: *response_model_name
        len_msg_reflection:
        len_msg_response:
        type_output_reflection: custom1
        reflection_template: template_default
        variable_change_exception:
    
        pre_reflection_variable:
    
        reflection_variable:
          - variables:
              # Record the name of the legal third party
              dsc_name:
                description: The name of the company or organization the caller is working for and represents the client is typically stated in the pattern "This is [Name] from [Company]". If it is not stated or mentioned anywhere in the conversation, return "unknown".
                example: "unknown"
              
              # Record the status of the POA document (whether the caller sent it, is in possession of it, or not at all)
              poa_status:
                overview: Record the status of the Power of Attorney (POA) document, whether the legal third party does not have it yet ('no'), is in possession of it but hasn't sent it yet ('not_sent'), already sent it ('sent').
                description:
                  "no": _user explicitly states that they do not have any document proving their POA.
                  "not_sent": _user is in possession of the document but has not sent it to us yet.
                  "sent": _user already sent the document to us.
                  "unknown": _user did not mention anything about having any document proving their Power of Attorney, or kept asking questions about the documents.
                example: "no"

              # Whether we have instructed the DSC (caller) to sent us or to collect the required documents
              poa_instructed:
                overview: Whether we have instructed the DSC to collect the required documents proving their Power of Attorney (POA) and where to go next.
                description:
                  "yes": If _assistant has instructed _user to send the required documents proving their POA to the support email address for review.
                  "no": If _assistant has not given any instructions.
                example: "no"

          - variables:
              # Exceptions
              exc:
                description:
                  human_agent_request: if _user refuses to speak to the virtual agent and/or requests speaking to a live agent or representative, collection agent, customer service, or just someone (implying a real person); and in the latest turns of the conversation has not agreed to continue the conversation
                  "null": default value, if _user did not mention any above; or if the _user simply asks a question about virtual agent without requesting to speak to a live agent
                example: "null"
            len_msg_reflection: 2
            reflection_template: template_exc_default
    
        processing_variable:
          # Calculate the elapsed time since sending a warm-transfer
          warm_transfer_elapsed_time_dsc:
            tool: lib_tools.tools_kompato.calculate_duration
            params:
              date_input: self.dict_variable.warm_transfer_init_time
    
        transition_conditions:
          # Since WT signal has been sent prior to entering the state, here we wait until a live agent connects, or schedule a callback if no live agent connects after 600s
          "'{{dict_variable.warm_transfer_sent}}' == 'yes' and {{dict_variable.get('warm_transfer_elapsed_time_dsc', 0)}} > 600":
            next_state: exc_cb
            filler: Unfortunately, our live agents are not available to join the call. When would be a convenient time for us to call you back?
            repeat_filler:

          # If the DSC already sent the POA OR explicitly request to speak with a representative, and it is outside working hours, schedule a callback
          "('{{dict_variable.poa_status}}' == 'sent' or '{{dict_variable.exc}}' == 'human_agent_request') and '{{dict_variable.is_working_hours}}' != 'yes'":
            next_state: exc_cb
            filler: Got it. Unfortunately, all our agents are currently unavailable. When would be a good time for us to call you back?

          # If the POA's status is not unknown and we have instructed the DSC of the next step and it is out of working hours => End call
          "'{{dict_variable.poa_status}}' != 'unknown' and '{{dict_variable.poa_instructed}}' == 'yes' and '{{dict_variable.is_working_hours}}' != 'yes'":
            next_state: end_call
            filler:
            repeat_filler:
          
          # Else, repeat this state
          else:
            next_state: handle_power_of_attorney
            filler:
            repeat_filler:

        repeat_continuously:
          max_repeat: 20
          state_exceed_max_repeat: end_call
          filler_exceed_max_repeat: 
          repeat_filler:
    
        max_turn_back:

