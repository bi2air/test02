        len_msg_response:
        type_output_reflection: custom1
        reflection_template: template_default

        pre_reflection_variable:
          init_call_date:
            tool: lib_tools.tools_kompato.init_outbound_call_date
          init_consumer_info:
            tool: lib_tools.tools_kompato.init_outbound_consumer_info
        reflection_variable:
          voice_mail:
            description: return "yes" if the _user appears to be a voicemail automated answering machine. Common phrases including "This is a message for...", "Please leave a message after the tone.", "I'm not available right now.", "At the beep...", "You've reached the voicemail of...", "Please call me back at...", "I'll get back to you soon.", "Sorry I missed your call.", "[Name] is currently not available", "This is [Name]..." (often followed by "leaving a message"). Else, return "no"
            example: "no"
          busy_confirmed:
            description:
              busy: if _user confirmed that they are busy, this time is inconvenient; and in the latest turns of the conversation has not confirmed that they are now available
              available: if _user says they have a minute to talk, or are otherwise available; and in the latest turns of the conversation has not said that they are now busy
              unknown: if _user did not mention anything about their availability
            example: "busy"
          callback_time:
            description: call back period or time that _user stated (extracted directly from answer of user), if _user haven't provided yet, return "unknown"
            example: tomorow at 9PM
          new_contact:
            description: new contact number that _user stated (extracted directly from answer of user), if _user haven't provided yet or say this is the good number to contact them, return "unknown"
            example: unknown
          confirmed_contact:
            description: return "confirmed" if _user provided a new phone number or say this is the good number to contact them, after you ask if this is the best number to reach them. else, return "unknown"
            example: unknown
        processing_variable:
          cnt_unknown:
            tool: lib_tools.tools_kompato.count_unknown_threshold

        transition_conditions:
          "'{{dict_variable.voice_mail}}' == 'yes'":
            next_state: end_call
            filler: <ENDCALL>
            repeat_filler:

          "'{{dict_variable.busy_confirmed}}' == 'available'":
            next_state: BACK|EXC
            filler:
            repeat_filler:

          "'{{dict_variable.busy_confirmed}}' == 'unknown' or '{{dict_variable.callback_time}}' == 'unknown' or '{{dict_variable.confirmed_contact}}' == 'unknown'":
            next_state: exc_inconvenient_time
            filler:
            repeat_filler:

          else: # unknown method and unknown value
            next_state: end_call
            filler: We'll call you back around {{dict_variable.callback_time}}. |partial
            repeat_filler:

        repeat_continuously:
          max_repeat: 10
          state_exceed_max_repeat: end_call
          filler_exceed_max_repeat: Thanks, we'll call you back. |partial 
          repeat_filler:
        max_turn_back:

