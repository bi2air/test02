          - "I need the paperworks for this.", "Could you send me the details of the account?", "Please send me documentations on this"
          - "How long does this stay on my credit report?", "Can you erase this from my credit report?", "How does this impact my credit score?"
          - "What's the difference between reference number and account number?"

    post_verify_FAQs: |
