          COMPLIANCE_Privacy_Explain-Credit-Impact:
            card_id: COMPLIANCE
            case_id: COMPLIANCE_Privacy
            ds_id: 5.2b
            description: |-
              Return `na` if:
                • Call drops / disconnects before reaching this stage of the call
                • No credit reporting and collections practices mention
              Else, Accurately represented credit reporting and collections practices
              - Approval Factors: Eligibility is based on credit score, debt-to-income ratio, and previous history with Affirm; a down payment may be required if full credit isn't granted.

              - Zero Fees: Affirm strictly does not charge late fees, service fees, prepayment fees, or compound interest.

              - Interest Rates: ""Pay in 4"" plans are always 0% interest, while monthly installments range from 0% to 36% simple interest based on credit.

              - Payment Methods: Customers can pay via the Affirm website/app using a debit card, credit card, or ACH bank transfer (3–5 days).

              - Late Consequences: While there are no late fees, payments 30+ days overdue are reported to credit bureaus, which can lower credit scores by 50–100 points.

              - Credit Reporting: Affirm reports to Experian and TransUnion; ""Pay Monthly"" plans usually involve a hard credit pull, while ""Pay in 4"" uses a soft pull.

              - Refund Process: Refunds must be initiated through the merchant; once processed, Affirm credits the loan principal, though paid interest is non-refundable.

              - Dispute Policy: Customers should resolve issues with merchants first; bank-level disputes are discouraged as they may result in account restrictions.

              - Hardship Support: Affirm offers assistance for job loss, natural disasters, or the loss of a valued one; customers should provide income/expense details when reaching out.
            evidence_source: conversation_history
            possible_answers: yes | no | na
          COMPLIANCE_Privacy_Protect-PII:
            card_id: COMPLIANCE
            case_id: COMPLIANCE_Privacy
            ds_id: 5.2c
            description: |-
              The agent must NOT read back or confirm the customer's specific information on file (e.g., full DOB, full SSN, full card numbers) to the customer.
              - Score 'yes' if the agent avoids this, 'no' if the agent reads back or confirms PII.
