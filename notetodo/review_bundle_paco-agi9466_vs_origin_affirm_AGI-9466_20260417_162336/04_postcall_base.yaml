        ds_id: PAR_10
        context: Before discussing account details
        description: |
          Requirement: If the collector (assistant) did not mention any debt details OR not inquire about identity (name), return 'na'.

                    Else, were the required identity (name) questions confirmed by consumer?
                    - yes: if the user explicitly confirm it
                    - no: otherwise
        possible_answers: "yes | no | na"
        target_answer: "yes"
        evidence_source: conversation_history
        requirement_level: HARD
        applicability: GATING_IF(POLICY-ADHERENCE_Debt-Mention)
        reversed_evidence:
      POLICY-ADHERENCE_Identify-DOB-Ask:
        trigger_condition: " '{{raw_call_assignment.call_direction_detail}}' in ['ai_inbound', 'human_inbound']"
        card_id: PAR
        ds_id: PAR_11
        context: Before discussing account details
        description: |
          Requirement: If the collector (assistant) did not mention any debt details OR the call never reached identity (immediate hang‑up, VM, wrong number upfront, third party, transfer before verification), return 'na'.

                    Else, were the required identity (DOB) questions asked?
        possible_answers: "yes | no | na"
        target_answer: "yes"
