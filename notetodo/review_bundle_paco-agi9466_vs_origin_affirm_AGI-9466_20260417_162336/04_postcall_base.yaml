      HALLUCINATION_Support-By-System-Record:
        card_id: HALLUCINATION
        ds_id: HALLUCINATION_01
        context: During call
        description: |
          Return 'na' if the agent/AI did not make any factual claim about amount, payoff, settlement, eligibility, dates, comms history, legal, credit reporting, SOL (not include claim related to user's identity (name, dob, ssn, zipcode), Mini-Miranda disclosure).
                    Otherwise, if the collector (assistant) has mentioned any of these aspects (not include claim related to user's identity (name, dob, ssn, zipcode), Mini-Miranda disclosure), verify whether a corresponding field exists and matches in the System of Record (SoR).
                    For the payment offer amount from the agent:
                      - It's only need to complie with the conditions from Payment Terms & Offers. 
                      - When evaluating payment plans, consider whether the total proposed payments align with the stated balance, allowing for flexibility in the final installment if specified or implied.
                    Return:
                      - if all checks are correct, return 'yes'
                      - if at least one check is incorrect, return 'no'
                    
        possible_answers: "yes | no | na"
        target_answer: "yes"
        evidence_source: conversation_history
        requirement_level: SOFT
        applicability: NORMALIF(PROHIBITED-CONTENT_Factual-Claim-Made)
      HALLUCINATION_None-Unrealistic-Outcome-Promise:
        card_id: HALLUCINATION
        ds_id: HALLUCINATION_02
        context: During call
        description: |
          Did the AI/Agent limit its statements to outcomes within its control, avoiding promises such as credit score improvement or lawsuit prevention? Return:
                      - when outcome claim references uncontrollable results, return 'no', for examples: 
                        -- "This will remove the debt from your credit report."
                        -- OR, "Paying today will improve your credit score."
                        -- OR, "We'll stop all legal action immediately."
                        -- OR, "We'll send your payment confirmation today."
                      - otherwise, return 'yes'
        possible_answers: "yes | no"
        target_answer: "yes"
        evidence_source: conversation_history
        requirement_level: SOFT
        applicability: NORMAL
        reversed_evidence: yes
      HALLUCINATION_None-Internal-Contradiction:
        card_id: HALLUCINATION
        ds_id: HALLUCINATION_03
        context: During call
        description: |
          Did the AI/Agent provide consistent information throughout the conversation (e.g., the same balance each time it was quoted)?
                      Note: The agent can provide various payment plans as long as they meet the conditions outlined in the Payment Terms & Offers. Return:
                      - no: when two or more claims of same type conflict without correction
                      - yes: otherwise

        possible_answers: "yes | no"
        target_answer: "yes"
        evidence_source: conversation_history
        requirement_level: SOFT
        applicability: NORMAL
        reversed_evidence: yes
      HALLUCINATION_Support-Unsupported-Legal-Reference:
        card_id: HALLUCINATION
        ds_id: HALLUCINATION_04
        context: During call
        description: |
          Did the AI/Agent refrain from referring to consumer rights, legal action, or credit reporting without evidence of legal basis?
                    Legal references include (but are not limited to):
                      - Litigation or legal action: lawsuit, court, legal department, judgment, attorney, subpoena, settlement.
                      - Credit reporting: credit bureau, credit file, tradeline, Equifax, Experian, TransUnion, report/delete from credit.
                      - Consumer rights or regulations: rights, dispute, validation letter, FDCPA, FCRA, CFPB, consumer protection.
                      - Enforcement or government references: police, sheriff, arrest, garnishment, investigation, regulator, law enforcement.
                      - Regulatory citations or pseudo-legal language: "under the law", "by law", "legally required", "federal regulation", "section 809", "U.S.C.", "Regulation E".
                    
                    Return:
                    - if the agent did NOT use any of the language above, return 'yes'
                    - if the agent DID use any language above, return 'no', e.g. "We'll file a lawsuit tomorrow", "We've reported this to the credit bureau."

        possible_answers: "yes | no"
        target_answer: "yes"
        evidence_source: conversation_history
        requirement_level: SOFT
        applicability: NORMAL
        reversed_evidence: yes

  # Customer insight agent
  customer_insights_agent_configs:
    usecase_id: customer_insights
    model_configs:
      model: gemini-3-flash
      temperature: 0.0
      max_tokens: 15000
      use_llm_hub: true
      max_retry: 3
      reasoning_effort: low

    human_turns_threshold: 7
    call_duration_threshold: 45
    customer_insights_skip_conditions:
      # skip smoke test call from vendor 4
      - "'{{raw_call_assignment.vendor_id}}' in ['4']"
      - "'{{call_code}}' in ['WCR', 'HUP', 'NKP', 'NCV', 'PRS', 'HUA', 'NVR', 'LM', 'NLM', 'NO_ACTION_CODE']"

    prompt_configs:
      expected_output: |
        Return the output in list of mutiple dict, where each item is the answer to one question. Each item MUST contain these keys:
        - `reasoning`: a concise explanation describing why this archetype/variant was selected (2–4 sentences), include one or two brief quotes from the transcript supporting your choice.
        - `supporting_evidence`: Extract the exact statements made by the user in the transcript that justify the chosen archetype/variant (do NOT include any speaker labels or identifiers such as 'user:' or 'assistant:' in these excerpts). Where possible, provide SEPARATE examples, each demonstrating a different relevant attribute or characteristic of the selected archetype/variant, to thoroughly support your assessment.
        - `archetype`: The archetype name (e.g., "Hostile"), as provided in the archetype configurations
        - `variant`: The variant name (e.g., "Aggressive Confrontational"), as provided in the variant configurations
        - `characteristics`: The characteristics of the variant mapping characteristic names to values (use only the names defined for the chosen variant)
        - `confidence`: A float value between 0 and 100 representing the model's confidence in the accuracy of the chosen archetype/variant. A higher score indicates greater certainty that the chosen archetype/variant is correct.
        - `recommended_strategy`: return empty string
        - `secondary_archetype`: return empty string
        - `human_escalation_required`:
            Did a policy-defined escalation trigger occur based on the following criteria?
              **Policy-Defined Situations and Escalation Triggers:**:
                  - Situation: The customer explicitly states or clearly implies that the matter involves an attorney (not include a third-party caller self-identifies as the consumer's attorney (e.g., inbound attorney call)) -> Trigger: the agent (assistant) MUST ask for (or confirm) attorney contact.
                  - Situation: When the customer explicitly requests the live agent -> Trigger: the agent (assistant) MUST mention the live agent transfer, OR inform the transfer process (e.g. "our live agents are currently unavailable", "I'm checking live agent availability").

              If none of the two defined Situations occurred during the call, return false.
              If one or both of the defined Situations occurred AND the agent followed the corresponding Trigger as outlined above, respond with true.
              If one or both of the defined Situations occurred BUT the agent failed to follow the corresponding Trigger, respond with false.

        **IMPORTANT**: Output MUST be a single JSON-like dict with these keys

        Required fields and types (the object must contain exactly these keys):
        {
          "archetype": string,
          "variant": string,
          "confidence": number,                // float between 0 and 100
          "recommended_strategy": string,     // return empty string ""
          "secondary_archetype": string,        // return empty string ""
          "supporting_evidence": [string],    // array of exact user utterances (no speaker labels)
          "human_escalation_required": boolean,
          "characteristics": { "key": "value", ... }, // object mapping characteristic names to values (strings)
          "reasoning": string                  // 2-4 sentences, include 1-2 short quoted excerpts from the transcript
        }

        MUST return the most confident archetype and variant. If you cannot determine a archetype with any confidence, still return the object with best-effort values, put confidence low (e.g., 10), and supporting_evidence as an empty array [].

        Example valid single-output (must be returned exactly as JSON when appropriate):
        {
          "archetype": "Cooperative",
          "variant": "FIN-Struggling but Honest",
          "confidence": 90.0,
          "recommended_strategy": "",
          "secondary_archetype": "",
          "supporting_evidence": [
            "No. I have to wait till next week.",
            "I don't have an email address no more."
          ],
          "human_escalation_required": false,
          "characteristics": {
            "engagement_level": "high",
            "communication_style": "passive",
            "want_to_pay": "yes",
            "payment_probability": "70%"
          },
          "reasoning": "The user expressed willingness to resolve the debt but asked to delay payment until next week (\"No. I have to wait till next week.\"). They also provided updated contact information and affirmed willingness to cooperate (\"I don't have an email address no more.\"), indicating a cooperative but temporarily constrained financial situation."
        }

      template: |
        ## Context
          In this call, a bank agent (also referred to as "assistant" or "collector") and a customer (also referred to as "user" or "debtor") engage in a conversation for the purpose of debt collection.
          You are a Quality Assessment expert for AI compliance guardrails. Your job is to read a single debt-collection conversation and assign it exactly one Archetype and one Variant from the provided definitions for the user's statements in the transcript.

        ## Task
          - Read the entire conversation.
          - Use ONLY the archetype and variant behavior patterns supplied (do not invent or merge archetypes).
          - Select the single best-fitting archetype and variant for the user's statements in the transcript.
          - Populate the required characteristics for that chosen variant (use only the characteristic names listed for that variant).
          - Provide concise reasoning citing conversation evidence (short quotes or line references).

        ## What to do with the provided conversation
          - Analyze behavior patterns against the variant behavior lists.
          - Decide which single variant most closely matches the dominant behavior by analyzing the user's statements in the transcript.
          - Fill in every characteristic for that chosen variant.
          - Provide a short justification with 1–2 short quotes or paraphrases from the transcript.

        ## Output Requirement
          You MUST return your answer in JSON format.
          You MUST mention the word "JSON" near the start of your response to signal the required format.
          Your output must be a valid JSON object conforming to the following structure:

        {{expected_output}}

        ## Archetype and variant behavior patterns

        {{archetype_configs}}

        ## Input

        The conversation to be assessed for compliance is the following:
        ```
        {{conversation_transcript}}
        ```

    # Archetype and variant behavior patterns
    archetype_configs:
      Cooperative:
        Archetype Definition: Debtors who are willing to resolve their obligations and work with collectors to find solutions.
        Variants:
          - Willing to pay:
              Variant behavior patterns: |
                Answers calls promptly
                Provides information readily
                Asks clarifying questions
                Seeks payment arrangements
                Honors commitments
              Characteristics:
                - engagement_level: returns [low, moderate, high] based on the level of engagement of the debtor in the conversation.
                - communication_style: returns [polite, formal, aggressive, passive, assertive, passive-aggressive] based on the communication style of the debtor.
                - solution_oriented: returns [yes, no] based on whether the debtor is solution-oriented.
                - payment_probability: return percentage of the probability of the debtor making a payment.
          - Confused but willing:
              Variant behavior patterns: |
                Asks many questions
                Needs repeated explanations
                May misunderstand terms
                Seeks reassurance
                Eventually cooperates
              Characteristics:
                - engagement_level: returns [low, moderate, high] based on the level of engagement of the debtor in the conversation.
                - communication_style: returns [uncertain, friendly, formal, aggressive, passive, assertive, passive-aggressive] based on the communication style of the debtor.
                - needs_guidance: returns [yes, no] based on whether the debtor needs guidance.
                - payment_probability: return percentage of the probability of the debtor making a payment.
          - FIN-Struggling but Honest:
              Variant behavior patterns: |
                Explains financial hardship
                Offers partial payments
                Provides documentation
                Seeks hardship programs
                Maintains communication
              Characteristics:
                - engagement_level: returns [low, medium, high] based on the level of engagement of the debtor in the conversation.
                - communication_style: returns [friendly, formal, aggressive, passive, assertive, passive-aggressive, apologetic] based on the communication style of the debtor.
                - want_to_pay: returns [yes, no] based on whether the debtor wants to pay.
                - payment_probability: return percentage of the probability of the debtor making a payment.
      Hostile:
        Archetype Definition: Debtors who respond with aggression, denial, or threats, requiring de-escalation and compliance management.
        Variants:
          - Aggressive Confrontational:
              Variant behavior patterns: |
                Immediate hostility
                Uses profanity
                Makes threats
                Raises voice/yells
                Hangs up quickly
              Characteristics:
                - aggression_level: returns [low, moderate, high] based on the level of aggression of the debtor.
                - profanity_usage: returns [frequent, occasional, none] based on the frequency of profanity used by the debtor.
                - threat_likelihood: return percentage of the likelihood of the debtor making a threat
                - compliance_risk: returns [low, moderate, high] based on the compliance risk of the conversation.
          - Denial and Deflection:
              Variant behavior patterns: |
                Denies debt exists
                Claims identity theft
                Blames others
                Disputes everything
                Avoids responsibility
              Characteristics:
                - denial_pattern: returns [consistent, inconsistent] based on the consistency of the denial pattern of the debtor.
                - blame_shifting: returns [yes, no] based on whether the debtor blames others.
                - factual_disputes: returns [frequent, occasional, rare, none] based on the frequency of factual disputes made by the debtor.
                - profanity_usage: returns [frequent, occasional, rare, none] based on the frequency of profanity used by the debtor.
                - cooperation: returns [yes, no] based on the cooperation of the debtor.
          - Litigious Threatener:
              Variant behavior patterns: |
                Cites laws (often incorrectly)
                Threatens lawsuits
                Claims recording
                Seeks FDCPA violations
                Demands documentation
              Characteristics:
                - legal_knowledge: returns [partial, correct, incorrect] based on the legal knowledge of the debtor.
                - threat_type: returns [legal, non-legal] based on the type of threat made by the debtor.
                - recording_calls: return [likely, unlikely] based on the likelihood of the debtor recording the call.
                - seeking_violation: returns [yes, no] based on whether the debtor is seeking a violation of the FDCPA.
      Vulnerable:
        Archetype Definition: Debtors requiring special handling due to age, disability, mental health, or severe financial distress.
        Variants:
          - Elderly/Confused:
              Variant behavior patterns: |
                  Confusion about debt
                  Repeats questions
                  Difficulty hearing/understanding
                  May involve family
                  Needs simplified explanations
              Characteristics:
                - age_range: return number of the age range of the debtor. 
                - comprehension: returns [partial, normal] based on the comprehension of the debtor.
                - memory_issues: returns [possible, unlikely] based on the likelihood of the debtor having memory issues.
                - requires_patience: returns [yes, no] based on whether the debtor requires patience.
          - Mental Health Crisis:
              Variant behavior patterns: |
                Crying/emotional breakdown
                Mentions self-harm
                Expresses hopelessness
                Panic responses
                Disconnected thinking
              Characteristics:
                - emotional_state: returns [distressed, stable] based on the emotional state of the debtor.
                - stability: returns [concerning, normal] based on the stability of the debtor.
                - risk_indicators: returns [present, absent] based on the presence of risk indicators in the conversation.
                - requires_intervention: returns [yes, no] based on whether the debtor requires intervention.
          - Language Barrier:
              Variant behavior patterns: |
                Struggles with English
                Asks for a translator
                Misunderstands terms
                Family interpretation
                Cultural differences
              Characteristics:
                - english_proficiency: returns [limited, normal] based on the English proficiency of the debtor.    
                - comprehension: returns [partial, normal] based on the comprehension of the debtor.
                - cultural_factors: returns [relevant, irrelevant] based on the relevance of cultural factors in the conversation.
                - requires_translation: returns [yes, no] based on whether the debtor requires translation.
      Sophisticated:
        Archetype Definition: Debtors with knowledge of the system who strategically manage their debts and test compliance.
        Variants:
          - Informed Negotiator:
              Variant behavior patterns: |
                Knows rights precisely
                Negotiates settlements
                Requests everything in writing
                Compares offers
                Strategic payment timing
              Characteristics:
                - financial_literacy: return [high, low] based on the financial literacy of the debtor. 
                - negotiation_skills: returns [strong, weak] based on the negotiation skills of the debtor.
                - settlement_seeking: returns [yes, no] based on whether the debtor is seeking a settlement.
                - documentation_focus: returns [high, low] based on the focus on documentation of the debtor.
          - Compliance Tester:
              Variant behavior patterns: |
                Tests agent knowledge
                Records everything
                Asks trap questions
                Cites specific laws
                Documents violations
              Characteristics:
                - legal_knowledge: returns [extensive, limited] based on the legal knowledge of the debtor.
                - recording_calls: returns [always, rarely] based on the likelihood of the debtor recording the call.
                - seeking_violations: returns [actively, passively] based on the likelihood of the debtor seeking violations of the FDCPA.
                - documentation: returns [thorough, minimal] based on the focus on documentation of the debtor.
          - System Gamer:
              Variant behavior patterns: |
                Exploits system weaknesses
                Files false disputes
                Delays tactics
                Payment reversals
                Multiple identities
              Characteristics:
                - manipulation_tactics: returns [sophisticated, simplistic] based on the sophistication of the manipulation tactics used by the debtor.
                - loophole_seeking: returns [constant, occasional] based on the frequency of loophole seeking by the debtor.
                - bad_faith_actions: returns [frequent, occasional] based on the frequency of bad faith actions by the debtor.
                - dispute_rate: returns [high, low] based on the rate of disputes made by the debtor.


  vendor_qaqc_agent_configs:
    - class: AffirmScorecardEvaluator
      params:
        usecase_id: affirm_scorecard
        version: 1.0.7

        model_groups:
          default:
            model: gemini-3-flash
            temperature: 0.0
            max_tokens: 15000
            use_llm_hub: true
            max_retry: 3
            reasoning_effort: low

        case_weight_mapping:
          OPEN_Greeting: 5
          OPEN_Identify-Loans: 5
          OPEN_Collect-Payment: 5
          COLLECT_Full-Payment: 5
          COLLECT_RFD: 2
          COLLECT_Partial-Payment: 5
          COLLECT_Scheduled-Payment: 5
          COLLECT_PTP: 5
          EDUCATE-ADVISORY_Account-Info: 8
          EDUCATE-ADVISORY_Exception: 4
          CLOSE_Tool: 8
          CLOSE_Endcall: 5
          COMPLIANCE_Identity: 5
          COMPLIANCE_Privacy: 5
          COMPLIANCE_Procedure: 5
          COMPLIANCE_Disclosures: 5
          FIRST-CONTACT-RESOLUTION: 0

        prompt_configs:
          expected_input: |
            You are provided with the entire conversation between the collector and the debtor. Each line has the following format: `[timestamp (optinal)] [role]: [line]`, where:
            - `timestamp` represents the time the message occurs and is optional.
            - `role` indicates whom is speaking, and can take only two values, 'user' for the debtor/customer/consumer, and 'assistant' for the bank agent/collector.
            - `line` is the message spoken by the debtor or the bank agent (depending on the role).

          expected_output: |
            Return the output in list of mutiple dict, where each item is the answer to one question. Each item MUST contain these keys:
              - `question_id`: The question id as provided in the questionaire
              - `reasoning`: A concise explanation of the logic used to determine the answers by ordering the questions in the category. If the condition(s) for the behavior never occurred, make a note of that.
              - `evidence`: Return the excerpt of the turn (or turns) in the conversation (with their timestamp if exist in conversation script) where the assistant satisfied or failed the question. If there is no exact excerpt, provide a summary or insights found from the conversation. If no evidence is present in the conversation, return `Not found`.
              - `answer`: Provide an answer to a question by responding with only "yes" or "no". Do not give any explanation here.
                - `yes`: The required behavior was fully observed.
                - `no`: The required behavior was contradicted.

            **IMPORTANT**: You MUST return as many items in your output as the number of questions provided in the questionnaire.


            ## Expected Output Format
            [
              {{
                "question_id": "q01",
                "reasoning": "The agent asked for the full name of the customer.",
                "evidence": "[2025-07-14T17:20:53Z] assistant: Is this Justin Max?",
                "answer": "yes"
              }},
              {{
                "question_id": "q02",
                "reasoning": "The agent did not disclose the Mini-miranda statement.",
                "evidence": "Not found.",
                "answer": "no"
              }},
              {{
                "question_id": "q03",
                "reasoning": "The agent suggested a full payment today.",
                "evidence": "[2025-07-14T17:20:60Z] assistant: Would you be able to make a full payment today?",
                "answer": "yes"
              }}
            ]

          card_metadata:
            OPEN: |-
              ** Customer Information **
              - First Name: {{raw_call_assignment.first_name}}
              - Last Name: {{raw_call_assignment.last_name}}
              - Date of Birth: {{raw_call_assignment.date_of_birth}}
              - Company Name: {{raw_call_assignment.company_name}}

              ** Agent Information **
              - Agent Name: {{raw_call_assignment.agent_name}}
              - Today's Date: {{raw_call_assignment.today}}

              {%- if dict_variable.loan_details %}
              ** Debt Details AFTER authentication **
              - Loan Details: {{dict_variable.loan_details}}
              {%- endif %}

            COLLECT: |-
              ** Call Information **
              - Direction: {{raw_call_assignment.direction}}
              - Today's Date: {{raw_call_assignment.today}}

              ** Debt Information **
              - Debt ID: {{raw_call_assignment.debt_id}}
              - Number of Loans: {{raw_call_assignment.num_overdue_loans}}
              - Total Overdue Amount: {{raw_call_assignment.total_overdue_amount}}

              {%- if dict_variable.filtered_loans %}
              ** The oldest loan details **
              - Loan ID: {{dict_variable.filtered_loans.loan_id}}
                - Merchant Name: {{dict_variable.filtered_loans.merchant_name}}
                - Overdue Amount: {{dict_variable.filtered_loans.overdue_amount}}
                - Days Past Due: {{dict_variable.filtered_loans.days_past_due}}
              {%- endif %}

            EDUCATE-ADVISORY: |-
              ** Call Information **
              - Direction: {{raw_call_assignment.direction}}
              - Today's Date: {{raw_call_assignment.today}}

              ** Debt Information **
              - Debt ID: {{raw_call_assignment.debt_id}}
              - Number of Loans: {{raw_call_assignment.num_overdue_loans}}
              - Total Overdue Amount: {{raw_call_assignment.total_overdue_amount}}

              ** The loan(s) details **
              - Loan Details: {{dict_variable.loan_details}}
              

            CLOSE:

            COMPLIANCE: |-
              ** Call Information **
              - Direction: {{raw_call_assignment.direction}}
              - Today's Date: {{raw_call_assignment.today}}

              ** Customer Information **
              - First Name: {{raw_call_assignment.first_name}}
              - Last Name: {{raw_call_assignment.last_name}}

              ** Debt Information **
              - Debt ID: {{raw_call_assignment.debt_id}}
              - Number of Loans: {{raw_call_assignment.num_overdue_loans}}
              - Total Overdue Amount: {{raw_call_assignment.total_overdue_amount}}

            FIRST-CONTACT-RESOLUTION:

          template: |
            ## Context

            In this call, a bank agent (also referred to as "assistant" or "collector") and a customer (also referred to as "user" or "debtor") engage in a conversation for the purpose of debt collection.

            ## Objectives

            You are a Quality Assessment expert in AI compliance guardrails. Your task is to check if the input conversation complies with federal rules, which are expressed as a list of Yes-No questions. Each question in the list has a code name (e.g., 'POLICY-ADHERENCE_Debt-Mention'), and a description in the form of a closed-ended question.
            You must consider these questions in separately.

            ## In-context-information
            {card_metadata}

            ## Expected Input Format

            {expected_input}

            ## Expected Output Format

            {expected_output}

            ## Questions

            {questionaire}

            ## Input

            The conversation to be assessed for compliance is the following:
            ```
            {conversation}
            ```

        questions:
          OPEN_Greeting_Mention-Affirm:
            card_id: OPEN
            case_id: OPEN_Greeting
            ds_id: 1.1a
            description: |-
              Return `na` if:
                • Call drops / disconnects before reaching this stage of the call (voicemail, wrong number, third-party)
                • Customer refuses to confirm their identity, preventing the agent from proceeding to loan identificatio
              Else, Identify the caller is speaking with Affirm.
            evidence_source: conversation_history
            possible_answers: yes | no | na
          OPEN_Greeting_Mention-Customer-Name:
            card_id: OPEN
            case_id: OPEN_Greeting
            ds_id: 1.1b
            description: |-
              Return `na` if:
                • Call drops / disconnects before reaching this stage of the call (voicemail, wrong number, third-party)
                • Customer refuses to confirm their identity, preventing the agent from proceeding to loan identificatio
              Else, The agent personalizes the call by using the Customer's name at least ONCE during the call.
            evidence_source: conversation_history
            possible_answers: yes | no | na
          OPEN_Greeting_Avoid-Honorifics:
            card_id: OPEN
            case_id: OPEN_Greeting
            ds_id: 1.1c
            description: |-
              Did the agent avoid using honorifics (sir/ma'am/madam) throughout the call? (identification does not count)
              - Return `yes` if the agent never uses sir/ma'am/madam during the call.
              - Return `no` if the agent uses sir/ma'am/madam at any point (excluding identity verification).
            evidence_source: conversation_history
            possible_answers: yes | no
          OPEN_Greeting_Mention-Agent-Name:
            card_id: OPEN
            case_id: OPEN_Greeting
            ds_id: 1.1d
            description: |-
              Return `na` if:
                • Call drops / disconnects before reaching the identity verification.
                • Call drops / disconnects before reaching this stage of the call (voicemail, wrong number, third-party)
                • Customer refuses to confirm their identity, preventing the agent from proceeding to loan identificatio
              Else, Provide your first name to the customer.
            evidence_source: conversation_history
            possible_answers: yes | no | na
          OPEN_Identify-Loans_Mention-Merchant-Name:
            card_id: OPEN
            case_id: OPEN_Identify-Loans
            ds_id: 1.2a
            description: |-
              {%- if (dict_variable.background_verification_status == 'SUCCEEDED') or (dict_variable.sms_verify_pin_status == 'SUCCEEDED') %}
              
              Apply this rule only scripts from successful authentication until call end. Agent MUST provide merchant names for all overdue loans
              - Return `na`: if no loan mentioned.
              - Return `no`: if the agent identifies overdue or grouped loans but fails to name the specific merchants associated with them.
              - Return `yes`: otherwise.

              NOTE: Exclude any mention of overdue loans made before the successful authentication.
              {%- else %}
              Always return `na`.
              {%- endif %}
            evidence_source: conversation_history
            possible_answers: yes | no | na
          OPEN_Identify-Loans_Mention-Overdue-Amount:
            card_id: OPEN
            case_id: OPEN_Identify-Loans
            ds_id: 1.2b
            description: |-
              Return `na` if:
                • Call drops / disconnects before reaching this stage of the call (voicemail, wrong number, third-party, incomplete RPC)
                • Customer refuses to confirm their identity, preventing the agent from proceeding to loan identification

              Else:
              Evaluate ONLY post-authentication loan amount identification.
              After the authentication boundary, did the agent identify the overdue amount for each loan?
              - 3 loans or less: Return `yes` only if the agent stated the specific overdue amount for EACH individual loan/ grouped loan (not just a combined total). Return `no` if only a total amount was provided or any individual loan/ grouped loan amount is missing.
              - 4+ loans: Return `yes` if the agent provided the total number of overdue loans and the total overdue amount.
            evidence_source: conversation_history
            possible_answers: yes | no | na
          COLLECT_Full-Payment_Offer-Same-Day-Payment:
            card_id: COLLECT
            case_id: COLLECT_Full-Payment
            ds_id: 2.1a
            description: |-
              Return `na` if:
                • Call drops / disconnects before reaching this stage of the call
                • Inbound calls: Customer proactively called in with payment intent — this includes any customer who called in to make a payment, update/change their payment method, or otherwise initiate a payment-related action.
              Else, Stress a same-day payment for the full overdue balance. The agent MUST present:
              1. Disclose the total overdue amount (only mention "full" is acceptable).
              2. Ask the customer to make an immediate payment (today or right now).
            evidence_source: conversation_history
            possible_answers: yes | no | na
          COLLECT_Full-Payment_State-WIIFM:
            card_id: COLLECT
            case_id: COLLECT_Full-Payment
            ds_id: 2.1b
            description: |-
              Return `na` if:
                • Call drops / disconnects before reaching this stage of the call (payment arrangement, customer refuses to pay)
              Else, WIIFM statement needs to be stated at least once during the call. Only apply when the call reach payment arrangement or customer refuses to pay. Refrain from mentioning "calls will end / may stop" as a benefit / WIIFM on any option - especially for PTP.
              Examples of WIIFM statements that can be utilized by our agents to motivate Customers:
                  - "Taking care of this on the phone with me is quick & easy and can save you the hassle of dealing with it later"
                  - "By making a payment today, you would avoid the daily calls from us. It is a way to ensure you are caught up on your payments and won't be bothered regarding this again."
                  - "Securing a payment today will ensure your account is in good standing"
                  - "If you make a payment today, your account is credited almost immediately. If you choose to do it later/on your own, there is a bit of delay in getting your account credited."
                  - "Every payment made brings you one step closer to paying off this loan! That is one less thing you need to worry about."
                  - "We offer a convenient `Autopay` feature which ensures payments are handled in a timely manner".
            evidence_source: conversation_history
            possible_answers: yes | no | na
          COLLECT_Full-Payment_Prioritize-Oldest-Debt:
            card_id: COLLECT
            case_id: COLLECT_Full-Payment
            ds_id: 2.1c
            description: |-
              Return `na` if:
                • Call drops / disconnects before success authentication
                • The customer only has 1 overdue loan.
                • The customer explicitly agreed to pay the total outstanding balance (verify the amount mentioned covers all overdue loans combined — not just a single loan).
                • The customer agreed to pay full.
              Else, For the payment process, when multiple loans are overdue always process the oldest payment first.
            evidence_source: conversation_history
            possible_answers: yes | no | na
          COLLECT_RFD_Obtain-RFD:
            card_id: COLLECT
            case_id: COLLECT_RFD
            ds_id: 2.2a
            description: |-
              Return `na` if:
                • Call drops / disconnects before reaching this stage of the call
                • Customer proactively accepts to make a same-day full payment without declining
                • Customer proactively volunteers their reason for delinquency without being asked - RFD is already obtained
                • Customer did not decline the same-day full payment offer — RFD is only required after the customer refuses full payment
                • Customer requests cease-and-desist, stop-communication, or hangs up before the agent has a reasonable opportunity to negotiate payment
              Else, Obtain the customer's reason for delinquency (RFD). Apply when the customer refuse to pay same-day full payment.
              - yes: if the agent asks a specific, direct question about why the payment was missed (e.g., "What caused you to fall behind on this payment?", "Can you tell me the reason for the delinquency?"). General rapport-building statements such as "I'd like to understand your situation" without a direct question do NOT count.
              - yes: if the customer volunteered their RFD without being asked.
              - no: otherwise.
            evidence_source: conversation_history
            possible_answers: yes | no | na
          COLLECT_RFD_Not-Ask-RFD-At-End:
            card_id: COLLECT
            case_id: COLLECT_RFD
            ds_id: 2.2b
            description: |-
              This question checks whether the agent asked for the RFD at the wrong time — specifically, after a payment was already confirmed or processed.
              IMPORTANT: The violation only occurs if a payment process happened AND the agent asked for RFD after it was completed.
              - Return `yes` if the agent did NOT ask for the RFD after a payment was confirmed/processed.
              - Return `yes` if no payment process occurred at all — the rule cannot be violated if there was no payment to end.
              - Return `no` only if the agent explicitly asked for the RFD after a payment was confirmed or processed (i.e., asking "Why were you late?" after collecting the payment).
            evidence_source: conversation_history
            possible_answers: yes | no
          COLLECT_Partial-Payment_Offer-Partial-Payment:
            card_id: COLLECT
            case_id: COLLECT_Partial-Payment
            ds_id: 2.3a
            description: |-
              Return `na` if:
                • Call drops / disconnects before reaching this stage of the call
                • Customer agrees to same-day full payment — partial payment step is not needed
                • Customer agrees to pay full — partial payment step is not needed
                • Customer proactively offered to pay partial payment
                • Customer explicitly states they have no available funds at any point before the partial payment ask — per guidance, asking for partial payment is not appropriate in this case.
                • Customer requests a specific future date to pay the full balance — a future full-payment arrangement supersedes the need to ask for partial payment.
                • Customer requests to end the call, cease communication, or hangs up before this stage is reached.
                • Customer's response diverts the negotiation before the partial payment step — e.g., raising a legitimacy challenge (scammer accusation), redirecting to self-service (website/app), or any behavior that prevents the agent from having a reasonable opportunity to continue negotiation.
                • [Hardship] Customer emphasizes from the beginning that they cannot make payments due to not having enough money.
              Else, Ask the customer if they are able to make a partial payment today.
            evidence_source: conversation_history
            possible_answers: yes | no | na
          COLLECT_Partial-Payment_Verify-Meaningful-Amount:
            card_id: COLLECT
            case_id: COLLECT_Partial-Payment
            ds_id: 2.3b
            description: |-
              Return `na` if:
                • Call drops / disconnects before reaching this stage of the call
                • No partial amount was collected
              Else:
              - Return `yes` if the partial amount equal to or greater than 50% of the total overdue balance or $5.
            evidence_source: conversation_history
            possible_answers: yes | no | na
          COLLECT_Scheduled-Payment_Schedule-Full-Payment:
            card_id: COLLECT
            case_id: COLLECT_Scheduled-Payment
            ds_id: 2.4a
            description: |-
              This question sits at step 3 of the COLLECT negotiation flow: Ask full today → Ask partial today → Ask full later (this question) → Ask partial later.
              Return `na` if:
                • Call drops / disconnects before reaching this stage of the call
                • Customer agrees to same-day full payment today — full payment collected, no scheduling needed
                • Customer agrees to same-day partial payment today — negotiation moves to close or partial scheduling
                • Customer's response diverts the negotiation before this step — e.g., raising a legitimacy challenge, redirecting to self-service (website/app), or any behavior that prevents the agent from having a reasonable opportunity to continue negotiation.
              This question APPLIES (evaluate yes/no) when:
                • Customer declines BOTH same-day full payment AND same-day partial payment, OR
                • Customer accepts paying the full balance but explicitly on a future date (not today)
              - Return `yes` if the agent explicitly offers OR schedule a future payment for the full overdue balance.
              - Return `no` if the agent fails to make this offer after same-day options are exhausted.
              Note: A prior partial payment arrangement does NOT satisfy this step.
            evidence_source: conversation_history
            possible_answers: yes | no | na
          COLLECT_Scheduled-Payment_Schedule-Partial-Payment:
            card_id: COLLECT
            case_id: COLLECT_Scheduled-Payment
            ds_id: 2.4b
            description: |-
              Return `na` if:
                • Call drops / disconnects before reaching this stage of the call (partial payment step)
                • Customer agrees to same-day-payment, or full payment - scheduled partial payment is not needed
                • Customer completes refusal / no payment arranged
                • Customer requests to end the call, cease communication, or hangs up before this stage is reached.
                • Customer's response diverts the negotiation before this step — e.g., raising a legitimacy challenge, redirecting to self-service (website/app), or any behavior that prevents the agent from having a reasonable opportunity to continue negotiation.

              Else, Offer OR schedule a future payment for the customer for their partial payment.
            evidence_source: conversation_history
            possible_answers: yes | no | na
          COLLECT_Scheduled-Payment_Validate-60D-Window:
            card_id: COLLECT
            case_id: COLLECT_Scheduled-Payment
            ds_id: 2.4c
            description: |-
              Return `na` if:
                • Call drops / disconnects before reaching this stage of the call
                • Customer agrees to same-day-payment, or partial payment - scheduled payment is not needed
              Else, A scheduled payment date must be within 60 days.
            evidence_source: conversation_history
            possible_answers: yes | no | na
          EDUCATE-ADVISORY_Account-Info_Explain-Implication:
            card_id: EDUCATE-ADVISORY
            case_id: EDUCATE-ADVISORY_Account-Info
            ds_id: 3.1a
            description: |-
              IMPORTANT: First check `na` conditions before evaluating yes/no.
              Return `na` if:
                • Call drops / disconnects or customer requests cease-and-desist before reaching this stage of the call
                • Full same-day payment for all overdue amounts is collected
                • Customer disputes the loan (call enters exception handling — scored in 3.2a instead)
                • No payment of any kind was arranged or committed — customer completely declined all payment options with no arrangement made
              Note: If na conditions apply, return `na` — NOT `no`.
              Else (any payment was arranged — partial, future full, or payment plan — but not full same-day):
              Evaluate whether the agent educated the customer on the implications of having an overdue payment (e.g., impact on credit standing, account status, collections process).
              - Return `yes` if the agent educated on overdue implications.
              - Return `no` if the agent failed to educate despite the obligation applying.
            evidence_source: conversation_history
            possible_answers: yes | no | na
          EDUCATE-ADVISORY_Account-Info_Trigger-Late-Point:
            card_id: EDUCATE-ADVISORY
            case_id: EDUCATE-ADVISORY_Account-Info
            ds_id: 3.1b
            description: |-
              IMPORTANT: First check `na` conditions before evaluating yes/no.
              Return `na` if:
                • Call drops / disconnects before reaching this stage of the call
                • Full same-day payment for all overdue amounts is collected
                • Customer disputes the loan (call enters exception handling — scored in 3.2a instead)
                • No payment of any kind was arranged or committed — customer completely declined with no arrangement made
                • No relevant loan/account events exist on the account (no failed payments, no upcoming due dates within 14 days, no charge-off date) — nothing applicable to advise
              Note: If na conditions apply, return `na` — NOT `no`.
              Else (any payment arranged — partial, future full, or payment plan — but not full same-day):
              - Return `yes` if the agent communicated late talking points relevant to the customer's situation (e.g., implications of deferral, upcoming due date reminder, account standing).
              - Return `no` if the agent failed to deliver any late talking points despite the obligation applying.
            evidence_source: conversation_history
            possible_answers: yes | no | na
          EDUCATE-ADVISORY_Account-Info_Advise-Due-Date:
            card_id: EDUCATE-ADVISORY
            case_id: EDUCATE-ADVISORY_Account-Info
            ds_id: 3.1c
            description: |-
              {%- if (dict_variable.background_verification_status == 'SUCCEEDED') or (dict_variable.sms_verify_pin_status == 'SUCCEEDED') %}
              Return `na` if:
                • Call drops / disconnects before reaching this stage of the call (voicemail, wrong number, third-party, incomplete RPC, incomplete authentication, incomplete payment process)
                • No upcoming payment due dates exist on ** The loan(s) details ** — nothing applicable to advise
                • Payment was not registered during the call — the payment must be fully processed (Verify method, Authorization disclosure, Register payment).
                • Customer requests to end the call, cease communication, or hangs up before this stage is reached.
              Else, Advise the customer of their next applicable payment due dates and upcoming within 14 days. If more than 4+ loans, only advise of the closest upcoming due date.
              - Return `yes` if the agent mentioned any specific upcoming due date or payment timeline (e.g., "your next payment is due on May 15th", "you have a payment coming up on the 1st"). Any explicit mention of a specific upcoming date qualifies.
              - Return `no` if the agent failed to mention any upcoming due date when the payment was successfully completed.
              Note: Distinguish "days past due" (historical) from "upcoming due date" (future). Only upcoming dates count here.
              {%- else %}
              Always return `na`.
              {%- endif %}
            evidence_source: conversation_history
            possible_answers: yes | no | na
          EDUCATE-ADVISORY_Account-Info_Advise-Relevance:
            card_id: EDUCATE-ADVISORY
            case_id: EDUCATE-ADVISORY_Account-Info
            ds_id: 3.1d
            description: |-
              {%- if (dict_variable.background_verification_status == 'SUCCEEDED') or (dict_variable.sms_verify_pin_status == 'SUCCEEDED') %}
              Return `na` if:
                • Call drops / disconnects before reaching this stage of the call
                • Full same-day payment for all overdue amounts is collected
                • The payment was successfully attempted and set up.
              Else:
              - Return `no` if the agent failed to mention the relevant loan(s), else `yes`.
              {%- else %}
              Always return `na`.
              {%- endif %}
            evidence_source: conversation_history
            possible_answers: yes | no | na
          EDUCATE-ADVISORY_Account-Info_Advise-Charge-Off-Date:
            card_id: EDUCATE-ADVISORY
            case_id: EDUCATE-ADVISORY_Account-Info
            ds_id: 3.1e
            description: |-
              Return `na` if:
                • Call drops / disconnects before reaching this stage of the call
                • No charge off date was presented.
              Else, Advice of charge off date, if present, educating on what this means and how to prevent it.
            evidence_source: conversation_history
            possible_answers: yes | no | na
          EDUCATE-ADVISORY_Exception_Follow-Protocol:
            card_id: EDUCATE-ADVISORY
            case_id: EDUCATE-ADVISORY_Exception
            ds_id: 3.2a
            description: |-
              Return `na` if:
                • Call drops / disconnects before reaching this stage of the call
                • No exception case scenario arises during the call (customer raises no dispute, bankruptcy, refund, or other exception) - this criterion is not triggered.
                • Note: Live agent transfers, Do Not Call (DNC) requests, and Cease and Desist (C&D) requests are handled by separate compliance protocols and should be marked `na` here — they are NOT exception cases for this question.
