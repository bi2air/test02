          COMPLIANCE_Procedure_Update-Require:
            card_id: COMPLIANCE
            case_id: COMPLIANCE_Procedure
            ds_id: 5.3b
            description: |-
              IMPORTANT: First check `na` conditions before evaluating yes/no.
              Return `na` if:
                • Call drops / disconnects before reaching this stage of the call
                • The call involves only standard payment processing with no additional account modification request — payment scheduling alone does NOT trigger this question
                • No specific procedural requirement was triggered (no DNC request, no C&D request, no account update needed)
                • The only action taken is a standard transfer to a live agent without an underlying DNC, C&D, or account modification request
              Else, Correctly update account as required (process DNC request, disable collections, C&D requests, update user comms-, etc).
              - process DNC request: '{{extra_info.call_code}}' must in ['DNC', 'WRN', 'CDS', 'WCR', 'ATY', 'DSA']
              - C&D requests: the agent must acknowledge the request (brief clarification of scope is permitted), then immediately stop all collection attempts and transfer to a human agent (auto-escalation)
              - escalation: the agent must inform about the escalation process to the customer
            evidence_source: conversation_history
            possible_answers: yes | no | na
          COMPLIANCE_Disclosures_Disclosure-Recording:
            card_id: COMPLIANCE
            case_id: COMPLIANCE_Disclosures
            ds_id: 5.4a
            description: |-
              Return `na` if:
                • Call drops before any disclosure opportunity arises (call never progresses past initial connection, call never reaches identity verification)
                • Call drops upon reaching voicemail
                • Action-specific disclosures (e.g. payment authorization) are N/A only when that specific action is not taken during the call
              Else, Provide recorded line disclosure on both inbound and outbound calls, and when any new party joins the conversation.
            evidence_source: conversation_history
            possible_answers: yes | no
          COMPLIANCE_Disclosures_Disclosure-Mini-Miranda:
            card_id: COMPLIANCE
            case_id: COMPLIANCE_Disclosures
            ds_id: 5.4b
            description: |-
              {%- if raw_call_assignment.direction == 'outbound' %}
              IMPORTANT: First check `na` conditions before evaluating yes/no.
              Return `na` if:
                • Call drops before any disclosure opportunity arises (call never progresses past initial connection, call never reaches identity verification)
                • The agent did not initiate any payment processing or scheduling during the call — Mini-Miranda is only evaluated for calls where a payment arrangement was actively attempted or executed. Calls that ended due to transfer, DNC/C&D, authentication failure, or customer refusal before any payment was initiated are `na`.
                • Exception: If the agent proactively provided the Mini-Miranda disclosure before the call terminated (even without a payment attempt), evaluate as yes/no rather than `na`.
              Else (a payment was actively attempted or executed during the call):
              - Return `yes` if the Mini-Miranda disclosure was provided at or near the beginning of the call, before or during debt discussion.
              - Return `no` if the call progressed into payment discussion without the Mini-Miranda being provided.
              {%- elif raw_call_assignment.direction == 'inbound' %}
              Always return `na`.
              {%- endif %}
            evidence_source: conversation_history
            possible_answers: yes | no | na
          COMPLIANCE_Disclosures_Disclosure-Mandatory-Script:
            card_id: COMPLIANCE
            case_id: COMPLIANCE_Disclosures
            ds_id: 5.4c
            description: |-
              IMPORTANT: First check `na` conditions before evaluating yes/no.
              Return `na` if:
                • Call drops before any disclosure opportunity arises (call never progresses past initial connection)
                • Payment process was not successfully completed, AND no transfer to a live agent occurred — no disclosure-triggering actions happened

              Else, evaluate each trigger independently:
              + Trigger A — When payment process was successfully completed: The agent reads mandatory disclosures. Look for explicit authorization language, not just a summary.
              + Trigger B — When transfer to a live agent: The agent MUST have clearly informed the customer that they are being transferred.

              - Return `no` if any trigger was evaluated and the corresponding disclosure was omitted, else return `yes`.

            evidence_source: conversation_history
            possible_answers: yes | no | na
          COMPLIANCE_Disclosures_Maintain-Clarity:
            card_id: COMPLIANCE
            case_id: COMPLIANCE_Disclosures
            ds_id: 5.4d
            description: |-
              This question evaluates ONLY the quality of delivery for these three disclosures (master list): Mini-Miranda, Caller/Company Identification, Call Recording Disclosure.
              STOP: If NONE of Mini-Miranda, Caller/Company Identification, or Call Recording Disclosure appear in the transcript → return `na` immediately. Do not evaluate any other disclosures.
              Return `na` if:
                • Call drops before any disclosure opportunity arises
                • None of the three master list disclosures were delivered during the call
              Else (at least one master list disclosure was delivered), evaluate clarity of delivery:
              - Return `yes` if each master list disclosure that WAS delivered was read fully and clearly, without skipping or rushing (interruptions by the customer are acceptable).
              - Return `no` if the agent skipped or rushed through a master list disclosure in a way that impaired its meaning.
            evidence_source: conversation_history
            possible_answers: yes | no | na
          FIRST-CONTACT-RESOLUTION_FCR_Resolve-All-Inquiry:
            card_id: FIRST-CONTACT-RESOLUTION
            case_id: FIRST-CONTACT-RESOLUTION_FCR
            ds_id: 6.1a
            description: |-
              Address all issues that are presented or discovered during this interaction
              - `no`: if any issue was ignored or left unacknowledged.
              - `yes`: otherwise
            evidence_source: conversation_history
            possible_answers: yes | no
          FIRST-CONTACT-RESOLUTION_FCR_Educate-Future-Prevention:
            card_id: FIRST-CONTACT-RESOLUTION
            case_id: FIRST-CONTACT-RESOLUTION_FCR
            ds_id: 6.1b
            description: |-
              IMPORTANT: First check `na` conditions before evaluating yes/no.
              Return `na` if payment was NOT processed during the call. This includes:
                • Call drops / disconnects before payment is processed
                • Transfer to a live agent before payment is processed
                • Authentication failure leading to call end
                • Consumer disconnect before payment
                • Forced closure (out-of-scope, C&D) before payment
              Else (payment was processed), evaluate whether the agent used the CLOSING MOMENT to reduce the need for a future call:
              - Prevention education = identifying (explicitly or implicitly) the friction that led to the current issue AND giving the customer specific tools, knowledge, or settings to prevent recurrence.
              - The bar is LOW: any specific forward-looking guidance about due dates, app features, payment methods, or account awareness counts.
              - Return `yes` if the agent provided specific, actionable prevention guidance at the closing moment.
              - Return `no` if the agent closed the call without any prevention-oriented guidance.
              Examples of `yes`:
              [yes] "Your payment is set for May 12th. Your next invoice is due June 1st — you can view all upcoming due dates anytime through the Affirm app so you can stay ahead of them."
              [yes] "If a payment ever fails in the future, you'll get a notification — you can update your payment method directly in the app before it becomes overdue."
              [yes] "To avoid this in the future, you can log into affirm.com anytime to check your loan statuses and due dates before they go past due."
              [yes] "Just a reminder — your next payment is due on the 15th. You'll receive a notification a few days before, so keep an eye out."
              [yes] "Make sure your payment method is up to date in the app so future payments go through smoothly."
              [yes] "Resolving this balance can help ensure your account remains in good standing and keeps financing options open for you." ← account benefit / standing awareness at closing counts
              [yes] "I also want to inform you that your loan has an upcoming invoice of $X due on [date]." ← proactive upcoming obligation notification counts
              Examples of `no`:
              [no]  "Thank you for your time. Have a great day!" ← no prevention guidance
              [no]  "Is there anything else I can help you with?" ← open-ended offer alone is not prevention education
            evidence_source: conversation_history
            possible_answers: yes | no | na
