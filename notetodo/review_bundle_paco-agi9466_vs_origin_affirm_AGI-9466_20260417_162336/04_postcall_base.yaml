      DISCLOSURE_No-Debt-Discuss-After-Failed-RPC:
        trigger_condition: " '{{raw_call_assignment.call_direction_detail}}' in ['ai_outbound', 'ai_inbound', 'human_outbound', 'human_inbound']"
