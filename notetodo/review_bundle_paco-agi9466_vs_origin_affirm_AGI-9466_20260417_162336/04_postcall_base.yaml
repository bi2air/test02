        context: During call
        description: |
          Requirement: Return 'na' if:
                    - the collector (assistant) did not mention any debt details, 
                    - OR, the call never reached identity (immediate hang‑up, VM, wrong number upfront, third party, transfer before verification).
                    
                    Else, were all debt details disclosed after RPC completion (if applicable)?
        possible_answers: "yes | no | na"
        target_answer: "yes"
        evidence_source: conversation_history
