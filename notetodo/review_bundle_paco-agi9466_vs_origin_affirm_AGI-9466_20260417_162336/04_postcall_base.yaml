        ds_id: PAR_14
        context: During call
        description: "'{{extracted_info.consent.do_not_call}}' == 'True' or '{{extra_info.call_code}}' in ['DNC', 'WRN', 'CDS', 'WCR', 'ATY', 'DSA']"
        possible_answers: "yes | no | na"
        target_answer: "yes"
        evidence_source: extracted_info
        requirement_level: SOFT
        applicability: NORMAL_IF(POLICY-ADHERENCE_Stop-Call-Or-Wrong-Party-Request)
