          "attorney_city": null,
          "attorney_state": null,
          "attorney_zip": null,
          "attorney_phone": null
        }

        # Examples
        - Customer says "My attorney is [name] from [firm]" → Extract both name and firm
        - Customer says "You can reach my lawyer at (phone number)" → Extract phone number
        - Customer says "I'm represented by [firm], located at [address]" → Extract all address fields
        - Customer says "I have a lawyer" but provides no details → Return null for all fields
        - Attorney calls in: "I'm calling from [firm]" and provides email "[email]" → Extract firm name and email
        - Customer asks "What's your mailing address?" and agent responds "Our address is [address]" → DO NOT extract (this is agent's company address)
        - Agent says "You can reach us at [phone number]" → DO NOT extract (this is agent's company phone)

      prompt_detect_new_contact_info: |
        # Objective
        You are a reviewer agent in the finance and banking sector.
        You will receive a transcript of a phone call related to debt collection and recovery, located in the section PHONE_CALL_TRANSCRIPT.
        The transcript records the conversation of 2 roles: the debt collector (assistant/agent) and the customer (user/customer).

