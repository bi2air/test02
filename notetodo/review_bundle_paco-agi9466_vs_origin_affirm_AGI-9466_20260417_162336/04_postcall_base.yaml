            case_id: COMPLIANCE_Identity
            ds_id: 5.1a
            description: |-
              IMPORTANT: First check `na` conditions, then evaluate the agent's PROCEDURE — not whether verification succeeded.
              Return `na` if:
                • Call drops immediately before any verification attempt is possible — call never progresses past initial connection
                • Call drops before RPC success (voicemail, wrong number, third party)
                • Inbound-specific verification steps are N/A for outbound calls, and vice versa
              Else, evaluate whether the agent followed the correct verification procedure:
              OUTBOUND: Agent asks for both first and last name to verify they are speaking with the account holder.
              INBOUND: Agent attempts to verify both full name AND SMS PIN. Return `yes` if the agent initiates both verification steps, regardless of whether the SMS PIN was successfully received or validated — technical failures (e.g., PIN not going through) do not make the agent's procedure incorrect.
