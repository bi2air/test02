postcall:
  # Call code extraction agent  
  call_code_agent_configs:
    usecase_id: en_collin_kompato_call_code_agent
    model_configs:
      model: gemini-3-flash
      temperature: 0.0

    # Prompt to detect the call codes (before post-processing)
    prompt_detect_call_code: |
      You are an expert in call disposition classification. Your task is to classify the ## Conversation History below into one to three most relevant call codes. Use the # Context and # Instruction to guide your thinking and decision making.

      # Context:
      - The conversation is transcribed from the phone call by Automatic Speech Recognition (ASR). The text may contains some typos or errors, or inaccuracies, unproper punctuation, or incomplete sentences. 
      - The collection agent is marked as "assistant|agent|bot", and the caller is marked as "user|customer|human".
      - Available call codes below are the codes you can output; definitions and descriptions are authoritative.

      # Instruction:
      - Read ## Call Code Descriptions to understand the options and then ## Conversation History to make sense of the call. 
      - In ## Conversation History, use the user's phrases, utterance as the evidence as user intent. Use the assistant line of query to undertand what is the information is seeking, and then pair that question with user's response to make a complete turn of conversation
      - Carefully review the conversation to select one to three call codes that best fit the context and details of the exchange
      - Then combine your review and undersanding of the conversation and call code options as the reasoning for your decision. You will use this reasoning to justify your choice of call codes.
      - After the first choice of call code, review other call codes if they are alternatives to the first choice. You are encouraged to output three call codes to increase the coverage of the conversation.
      - Your output will be a JSON object with XML format <reasoning> </reasoning> and <call_code_list> </call_code_list> tags as in # Output session.

      #  Notes:
      - Make sure the reasoning is clear, specific, and grounded to the conversation history and the call code descriptions.
      - Consider all possible angles and think before you decide, not just the most appearant call code.

      # Input Information
      ## Call Code Descriptions
      {{call_code_descriptions}}

      # Output
      <reasoning>
      Your concise reasoning for the classification.
      </reasoning>
      <call_code_list>
      ["CALL_CODE_1", "CALL_CODE_2", "CALL_CODE_3"]
      </call_code_list>

      {% if raw_call_assignment.call_direction_detail not in ["human_outbound", "human_inbound", "transfer_inbound", "transfer_outbound"] and not var_def_not_render and show_reflection_variable_section %}
      ## Reflection Variable Descriptions
      ```
      {{reflection_variable_descriptions}}
      ```

      ## Reflection Variable Values
      ```
      {{reflection_variable_values}}
      ```
      {% endif %}

      ## Conversation History
      ```
      {{conversation_history}}
      ```

    # call_code_descriptions — lower index = higher priority when multiple codes qualify.
    # Codes handled only by postprocess_conditions (PWFR, PNCV, PTSR, PCAB, WFR, FTP, PAY) are omitted here.
    # Reference: knowledge_base/call_disposition_reference/kompato_CallDispositionReference_CallCodes.md
    call_code_descriptions:
      - code: ECH
        description: |
          Robot Call - Pre-recorded call or IVR detected. No human response received. No message left and no transfer initiated.
          Use when: Pre-recorded message or IVR system answers (including iOS call screening). No human picks up.
          Edge cases: Tie-break vs NKP — ECH = IVR/pre-recorded system detected; NKP = silent connection with no IVR signal.
          Few-shots: Call answered by "Thank you for calling XYZ, press 1 for..." → ECH. iOS call screening intercepts the call with automated response → ECH.
      - code: HTT
        description: |
          Technical Issue Transfer - Any API call or technical process failure during the call prevents the AI agent from completing the collections interaction. Transfer to human Collections agent.
          Use when: Any system failure (including /pay API errors) prevents the AI from running the collections interaction normally.
          Edge cases: CRITICAL — Use HTT for system/technical failures. Use EPT when the failure is due to payment scope limitations (amount or method beyond AI capability), not a technical error.
          Few-shots: /pay API fails mid-call and AI cannot complete the interaction → HTT. System error prevents account retrieval → HTT.
      - code: EPT
        description: |
          Elevated Payment Transfer - Payment assistance is beyond AI capability (amount or method outside AI scope). Transfer to human Collections agent.
          Use when: Customer initiates payment but the amount or payment method is outside what the AI agent can handle (e.g., partial amounts not supported, payment instrument type not handled by DTMF).
          Edge cases: CRITICAL — Use EPT for payment scope/capability limitations. Use HTT for system/technical failures. EPT = "I can't handle this type/amount"; HTT = "the system broke."
          Few-shots: Customer wants to make a partial payment not supported by the DTMF system → EPT. Customer's payment method is not accepted by AI → EPT. /pay API fails with a system error (not a scope issue) → HTT (not EPT).          
      - code: DCP
        description: |
          Already Paid (other channel, same day) - Customer states that today's payment was made via a channel OTHER than this call's DTMF (online portal, prior agent, check, bank transfer). The AI does not pursue further payment.
          Use when: Customer explicitly claims a payment was made today via another channel, providing enough specificity to make the claim concrete (channel, amount, or confirmation number). Must be a SAME-DAY payment.
          Edge cases: Tie-break vs PAY — PAY = successful DTMF payment in THIS call; DCP = payment made today via a different channel. Tie-break vs DIS — DIS = customer disputes the debt, including claims that the debt was already paid in the past (prior-day or earlier). DCP is specifically for SAME-DAY alternate-channel payments. If the customer claims payment from a prior day or further back, that's a balance dispute → DIS, not DCP.
          Few-shots: Customer says "I paid this online today before you called, confirmation XYZ123" → DCP. Customer says "I just paid through the portal an hour ago" → DCP. Customer says "I paid this off three months ago, why are you calling?" → DIS (not DCP — prior-payment balance dispute).          
      - code: DEC
        description: |
          Deceased - A third party informs the agent that the account holder has passed away. The AI closes the call respectfully with no payment pressure and no transfer. Affirm code: PDJ.
          Use when: A third party (family, spouse, executor) unambiguously states the account holder is deceased ("died," "passed away," "deceased"). The statement must be definite, not hypothetical or uncertain.
          Edge cases: Tie-break vs INC — INC = account holder is incapacitated but alive (hospitalized, dementia, coma, brain injury); DEC = account holder has died. Statements like "she's not well" or "he's very ill" without mentioning death → INC, not DEC. Tie-break vs LGH — DEC is the notification of death; LGH is for a guardian/POA who then engages substantively on account matters. If a family member notifies of death AND then substantively discusses the estate account as POA, both DEC and LGH may apply — LGH primary if substantive account discussion follows.
          Few-shots: Spouse says "He passed away last month" → DEC. Daughter says "My mother is deceased" → DEC. Executor says "She died, I'm handling her estate, let's talk about the account" → DEC + LGH (LGH primary if substantive engagement). Caller says "She's not available, very ill" without saying deceased → INC (not DEC).
      - code: NLM
        description: |
          Voicemail - Agent encounters a voicemail or automated answering system, the agent may speak briefly in confusion, say nothing useful after the beep, or terminate the call without leaving a formal message containing a callback number, reason for call, or identification.
          Use when: Voicemail system is detected but the agent does not leave a substantive, actionable message after the tone. Includes cases where the agent says "May I speak with [Name]?" into the machine, utters filler words, or disconnects without leaving callback info.
          Edge cases: Tie-break vs LM — LM = voicemail reached AND substantive message (callback number, stated reason, or formal identification) left AFTER the beep; NLM = voicemail reached but no such message left. Tie-break vs NKP — NKP = no voicemail system detected at all (silent connection); NLM = voicemail system was reached.
          Few-shots: Agent hears voicemail greeting, says "May I speak with John?" then disconnects → NLM. Agent hears beep but call drops with no message → NLM. Agent hears beep, leaves name and callback number → LM (not NLM).
      - code: LM 
        description: |
          Voicemail - Agent encounters a voicemail, automated/answering system AND leaves a substantive message (callback details, reason for call, and CUSTOMER's NAME).
          Use when: Voicemail system is detected (system prompts like "record your name," "after the tone," "state your reason"). Agent explicitly leaves a callback number, states reason for call, AND LEAVE CUSTOMER's NAME AFTER the recording tone.
          Edge cases: Agent merely speaks in confusion to the machine without leaving a formal message → NLM, not LM. Must have substantive, actionable content (callback number, stated reason, and CUSTOMER's NAME) AFTER the beep. If call terminates or agent gets confused without leaving a formal message → NLM.
          Few-shots: Agent hears beep, then says "This is Anna from Kompato, please call us back at 1-888-555-1234, could I talk to [CUSTOMER NAME]" → LM. Agent hears beep, says "May I speak with John?" then disconnects → NLM (not LM).
      - code: NKP
        description: |
          No Pick Up - Connection established but no substantive customer response followed. No voicemail was reached. The transcript contains only the agent's greeting (or similar system output) with no meaningful customer text.
          Use when: The conversation transcript shows the agent opening followed by silence or system noise with no customer speech. No voicemail prompt or system answering message detected.
          Edge cases: Tie-break vs LM/NLM — LM/NLM = voicemail system reached (with/without substantive message left); NKP = no voicemail system reached, the line simply never produced a customer response. Tie-break vs HUP — HUP = customer DID pick up and produced a brief/cryptic/unrelated phrase before the call ended; NKP = no response at all (silent connection). Tie-break vs ECH — ECH = IVR / pre-recorded system answered; NKP = silence with no IVR signal. In practice this code is often assigned by system rules from call-duration/no-transcript signals; the LLM should use NKP only when the transcript itself confirms no customer engagement.
          Few-shots: Transcript shows agent opening, then silence, then call end → NKP. Transcript shows "Hello?" then disconnect → HUP (not NKP — brief pickup). Transcript shows "You have reached the voicemail of..." → LM/NLM (not NKP). Transcript shows a recorded business greeting ("Thank you for calling XYZ...") → ECH (not NKP).
      - code: TPC
        description: |
          Third-Party Contact - Person other than the account holder provided information or context to help reach the intended recipient, including callback times or availability windows.
          Use when: Third party acknowledges knowing the account holder. Third party provides alternative phone number, address, availability time, or any contextual detail about the recipient. Third party offers to relay messages or suggests future contact times. Third party provides a callback time or availability window for reaching the account holder (e.g., "call back after 7:30," "she'll be home in the morning").
          Edge cases: Distinguish from WRN — TPC requires explicit evidence of a relationship (acknowledging knowing the person, providing info about them). Even vague or incomplete info that aids in locating the recipient qualifies as TPC. No relationship evidence → WRN. CRITICAL DISTINCTION FROM CAB — If a third party (not the account holder) provides a callback time for reaching the account holder, this is TPC, NOT CAB. CAB requires the account holder themselves to schedule a callback. A third party arranging a callback time is providing information to reach the recipient, which is the core function of TPC.
          Few-shots: Person says "He's not here, try calling after 5pm" → TPC (not CAB). Wife says "He's not available, call back later" → TPC (not CAB). Person says "That's my son, I'll tell him you called" → TPC. Sister calls and agent arranges callback for 9am → TPC (not CAB). Person says "I don't know that person, wrong number" → WRN (not TPC).
      - code: WRN
        description: |
          Wrong Number - The person who answered or called explicitly denied being the intended recipient (e.g., "No, this is not [name]", "You've got the wrong number") or identified themselves as a business or non-consumer entity unrelated to the account holder (e.g., "This is a business", "This is [Business Name]"). This code is used when there is an identity mismatch and the respondent has no connection to the account holder.
          Use when: The person explicitly denies being the intended recipient, states the number belongs to a business, identifies themselves as a non-consumer entity, or otherwise confirms the number is not associated with the account holder. An explicit denial of identity or identification as a business line is sufficient regardless of any additional engagement or requests to stop contact. To classify as TPC instead of WRN, there must be explicit evidence of a relationship (acknowledging knowing the recipient or providing info about them).
          Edge cases: CRITICAL — When a caller identifies as a business or non-consumer and requests to stop contact ("take my number off the list," "I don't wanna be contacted at all"), this is WRN, NOT CDS or DNC. The business identification is the primary signal — it means the number is wrong. Even if the caller says "stop all communication" or uses strong language about ceasing contact, the fact that they are NOT the account holder means only the phone number should be removed (WRN behavior), not account-level restrictions applied (CDS/DNC behavior). CDS and DNC require the caller to be the verified account holder or a potential debtor. An unverified business caller CANNOT trigger account-level restrictions.
          Few-shots: Inbound caller says "Take my number off the list" + "This is a business. I don't wanna be contacted at all" → WRN (not CDS). Caller says "You have the wrong number" → WRN. Caller says "No, this is not [name]" → WRN. Caller says "Stop calling this number, this is a business" → WRN (not DNC).
      - code: IDF
        description: |
          ID Verification Failed - Customer confirms the right name, but DOB/SSN/zip information does not match with data in the system, OR customer refuses to verify their identity through standard verification protocols.
          Use when: Customer says "No" when asked if DOB on file is correct (data mismatch). Customer provides a DOB, SSN, or zip that does not match system records. Customer says "No," "Nope," "I'm not giving you that," "I refuse" when asked for DOB/SSN (active refusal while still on the line). Customer confirms they are not the intended person during verification.
          Edge cases: Key distinction from HUA — IDF = customer provided WRONG data (DOB/SSN doesn't match) OR customer is still on the line ACTIVELY refusing/engaging (saying "No," asking questions, arguing). HUA = customer confirmed name but the call ENDED (hung up, went silent, line dropped, timed out) during verification — no active engagement, just disconnection. If the customer says "No" to DOB and CONTINUES the conversation (asks questions, argues, refuses more) → IDF. If the customer goes silent and call times out → HUA. If the customer provided wrong data earlier but then the call also drops → still IDF (data mismatch occurred).
          Few-shots: Customer says "No" to "Is Feb 22 1961 your DOB?" then says "It's not" → IDF (data mismatch). Customer provides SSN 2549 that doesn't match → IDF. Customer says "Nope" repeatedly to DOB while still talking → IDF (active refusal). Customer provides wrong DOB "2 3 65" that doesn't match → IDF (data doesn't match even if conversation continues). Customer says "No" to DOB on file, then provides different DOB + wrong SSN, then goes silent → IDF (data mismatch happened before silence). Customer confirms name, agent asks for DOB, customer goes silent → call ends → HUA (no data provided, just disconnected).
      - code: NVR
        description: |
          Name Verification Refused - Customer failed to confirm their name/identity following agent's attempt, through explicit refusal, evasion, incoherence, or hostility.
          Use when: After the agent asks "Is this [Name]?" or similar, the customer responds with SUBSTANTIVE verbal engagement that avoids confirming identity — defensive questions ("Who's calling?," "What do you want?"), evasion ("Hold on," "Wait a minute"), incoherent/irrelevant answers, hostility (profanity, aggression), or repeated demands for context. The key signal: the customer engages in a back-and-forth exchange with the agent without confirming their name.
          Edge cases: Distinguish from HUP — NVR requires SUBSTANTIVE verbal interaction after a name verification attempt (multiple exchanges, questions, hostility). A single "Hello?" or brief response followed by immediate disconnection is still HUP if no real exchange occurred. Use NVR when: (1) the customer asks questions about the caller/company, (2) the customer responds with hostility or profanity, (3) the customer engages in multiple turns without confirming identity. Use HUP when: the call ends before any meaningful exchange, or the customer provides only a brief/single-word response before disconnecting. Distinguish from CAB — if callback arranged specifically because identity could not be verified → NVR.
          Few-shots: Agent asks "Is this John Smith?" and customer says "Who is calling? What do you want?" → NVR. Agent asks for name, customer says "Kiss my ass, bitch" → NVR. Agent asks "Is this Jeffrey Soliz?" and customer asks "Who's this?" then "Big Sky?" (multiple turns) → NVR. Customer picks up, says "Hello?" once, then disconnects → HUP (not NVR).
      - code: IDV
        description: |
          ID Verification Successful - Customer successfully passed all required identity verification checks — confirmed name AND at least one additional identifier (DOB, or SSN). This becomes the mandatory default classification for the rest of the call unless a more specific terminal disposition is reached.
          Use when: Customer explicitly confirms name AND provides/confirms at least one additional identifier. IDV stays as the default unless a more specific outcome occurs. Switch away from IDV when: the customer declines one or more payment offers (use NNP), a payment arrangement is made (use PPA/PPIF/PSIF), the customer explicitly refuses to pay any amount (use RTP), or any other terminal disposition applies.
          Edge cases: Customer expresses uncertainty about debt or agency → still IDV. Customer gives non-committal response to payment offer ("I'm not sure," "Maybe," "Possibly," "I'll think about it") without clearly declining → still IDV (not NNP — non-committal is not a clear decline). Declining to share personal circumstances or explain default reasons is NOT a refusal to pay and NOT NNP → still IDV. If no specific payment amounts were offered at all, the call remains IDV. CRITICAL — If a payment offer was made but NO customer response to that offer is present in the conversation (the conversation ends immediately after the offer, or the customer's reply to the offer is missing), this is NOT NNP → still IDV. NNP requires the customer's explicit decline to be visible in the conversation. If payment was offered AND the customer explicitly said "No" or clearly declined, use NNP (not IDV). Only override with RTP if customer makes direct, unambiguous statement refusing to pay ANY amount (e.g., "I won't pay," "I refuse"). Hostility, profanity, or incoherent outbursts (e.g., "don't fuck yourself," random aggressive words) without explicit payment refusal → still IDV, NOT RTP and NOT CPR. A customer who becomes hostile or disengaged after verification but has NOT made a formal complaint about service/practices is NOT CPR — general hostility or profanity directed at no specific service issue is just a failed conversation, which remains IDV.
          Few-shots: Customer confirms name + DOB, then says "No" to sharing circumstances → IDV. Customer verified, payment discussed but customer says "Possibly" or "Maybe" without committing or declining → IDV (not NNP). Customer verified, declines to explain default circumstances, no payment amounts offered → IDV (not NNP). Customer verified, becomes hostile and uses profanity ("don't fuck yourself") but never explicitly refuses to pay → IDV (not RTP, not CPR). Customer verified, says incoherent hostile things and call ends → IDV. Customer verified, says "I'm not familiar with this agency" → IDV. Agent asks about circumstances, customer says "No," agent then offers monthly payment amount, conversation ends with no customer response to the offer → IDV (customer only declined to share circumstances — no explicit decline of payment offer was shown).
      - code: DIM
        description: |
          Debt Sale 2025 - Customer raises questions about the sale of their loan to a third-party buyer, or explicitly asks about a debt sale letter/email they received. Requires transfer to a human Collections agent.
          Use when: Customer mentions receiving a notice about their debt being sold, questions who now owns the debt, or asks about a third-party buyer taking over the account.
          Edge cases: Tie-break vs DIS — DIM = customer asking about a debt sale/transfer event; DIS = customer disputing the validity or amount of the debt. If the customer disputes that the sale was legal or authorized, both DIM and DIS may apply.
          Few-shots: Customer says "I got a letter saying my loan was sold, what does that mean?" → DIM. Customer says "Who did you sell my debt to?" → DIM.
     
      - code: GVT
        description: |
          Government Shutdown Impact - Customer identifies themselves as affected by a US federal-government shutdown (furloughed federal employee, federal contractor without pay, etc.) and ties that impact to their ability to pay on this account.
          Use when: Customer explicitly names a federal-government-shutdown impact on income/employment and connects it to payment ability. The shutdown must be specifically identified as the cause — not generic unemployment or hardship language.
          Edge cases: Tie-break vs HCH — HCH = general long-term hardship; GVT = government-shutdown-specific hardship that may trigger distinct handling. Use GVT when the shutdown is explicitly named; HCH otherwise. Tie-break vs CSM — CSM = active military service under SCRA; GVT = federal civilian impacted by shutdown. Different legal bases.
          Few-shots: Customer says "I'm a federal worker, I've been furloughed since the shutdown, I can't pay until it ends" → GVT. Customer says "I'm a government contractor and haven't been paid because of the shutdown" → GVT. Customer says "I lost my job, I have no income" without referring to the shutdown → HCH (not GVT).
     
      - code: INC
        description: |
          Consumer Incapacitated - A third party (or the customer) reports the account holder is deceased, severely ill, hospitalized long-term, or mentally incapacitated.
          Use when: Caller states the account holder has passed away (deceased, died). Caller states account holder has a severe or long-term condition preventing engagement (dementia, coma, brain injury, long-term hospitalization, brain fog).
          Edge cases: Minor/temporary illness ("they have a cold," "they're sleeping") → NOT INC. "Brain fog" qualifies as mental incapacity → INC. Incapacitation must imply serious, potentially long-term inability to engage.
          Few-shots: "She's not available, sir. She's deceased now. This is her husband." → INC. "She has brain fog. How can I help you?" → INC. "She's been in the hospital for a couple of weeks, she's battling cancer." → INC.

     
      - code: LGB
        description: |
          Language Barrier - Communication could not proceed effectively due to language differences between agent and customer.
          Use when: Customer indicates inability to understand or communicate in the language being used. Language barrier makes meaningful conversation impossible.
          Edge cases: N/A
          Few-shots: Customer responds only in Spanish to English-speaking agent → LGB. Customer says "I don't understand English" → LGB.
     
      - code: RCR
        description: |
          Recording Consent Refused - Customer explicitly declined consent for the call to be recorded.
          Use when: Customer says "I do not consent to be recorded," "I don't want to be recorded," "No" when asked for recording consent, or similar refusal of recording. This applies even if the customer also complains about other issues during the call.
          Edge cases: RCR takes PRIORITY over CPR (Complaint). If a customer refuses recording consent AND also complains about practices, the recording refusal is the primary classification — use RCR, not CPR. The complaint is secondary to the compliance-critical consent refusal.
          Few-shots: Agent says "This call is being recorded" and customer says "I don't want to be recorded" → RCR. Customer says "No" when asked for recording consent → RCR.
     
      - code: TSR
        description: |
          Transfer to Representative - Customer explicitly requests to speak with a live person, or a structural handoff to a live agent occurs during the call. Once a transfer request is made or handoff occurs, this code remains the classification for the entire call. IMPORTANT: If the conversation ends with the AI agent transferring to a live agent (e.g., "Let me connect you with a live agent"), this is ALWAYS TSR regardless of what happened earlier in the call.
          Use when: Customer says "customer service," "representative," "human," "operator," "transfer me," or similar. Agent says "while I check availability for a live agent" followed by a live person introduction. Transfer request is made even if the virtual assistant fails to fulfill it. ALSO use when the AI agent initiates a transfer to a live agent due to a system failure (e.g., payment processing error, unable to retrieve payment information, "The system can not retrieve your payment information") — this is a structural handoff even though the customer did not request it. RULE: Look at the FINAL outcome of the call. If the call ends with a transfer to a live agent, classify as TSR — not the code that was applicable before the transfer.
          Edge cases: TSR overrides IDV, NCV, CAB, PPIF, PSIF, PPA, NNP, RTP, and other standard operational codes. CRITICAL OVERRIDE: Even if the customer agreed to pay in full (PPIF), provided a PIN, and the system attempted payment — if the payment system FAILED and the AI agent then transfers to a live agent, you MUST select TSR, NOT PPIF. The transfer is the FINAL disposition and supersedes ALL prior payment commitments. Even if the live agent performs verification, updates addresses, or discusses payment, you MUST select TSR. HUA, DIS, CDS still take precedence over TSR. If customer refuses secondary verification AND requests live agent → HUA (not TSR; refusal takes precedence). Once transfer request is made or system-initiated handoff occurs, TSR remains classification regardless of prior payment commitments or subsequent content. Key indicators: "Let me connect you with a live agent," "while I check availability," "customer service," "The system can not retrieve your payment information."
          Few-shots: Customer agrees to pay full $2112.50, provides PIN 123456, system repeatedly says "retrieving your payment information," then fails and agent says "The system can not retrieve your payment information. Let me connect you with a live agent" → TSR (NOT PPIF — the transfer at the END of the call is the final disposition, overriding the earlier payment commitment). Customer says "customer service" at the start, then agent transfers to live person who handles the whole call → TSR. Customer says "Representative. Representative." and agent fails to transfer → TSR. Customer says "I want a person" while refusing DOB → HUA (not TSR).


     
      - code: NCV
        description: |
          Not Convenient - Customer confirmed identity and indicated the current time is inconvenient for financial discussion. NCV describes the customer's STATE ("now is not good"), not a mechanism. It can co-occur with CAB when the inconvenience prompts a callback to be scheduled.
          Use when: Customer explicitly says "now is not a good time," "I can't talk," "I'm busy," "I have to go," "Let's do this later." Customer disengages after identity verification due to circumstantial factors.
          Edge cases: Identity verified BUT user then disengages due to circumstances → NCV (not IDV). If customer says they're busy but STILL engages substantively in conversation (e.g., "I have a minute, go ahead"), the call is convenient enough — do NOT use NCV. Tie-break vs CAB/HCH: NCV = transient inconvenience (no specific time, no long-term reason); CAB = callback mechanism arranged at a specific time; HCH = long-term hardship state. NCV and CAB CAN co-exist — if the customer expresses inconvenience AND a callback is scheduled, include both in `list_call_code`. NCV and HCH do NOT typically co-occur — a long-term hardship is not the same as "bad time right now." Pre-IDV equivalent: PNCV (post-process rule handles the mapping).
          Few-shots: Customer says "I'm at work, I can't talk right now" and hangs up → NCV. Customer says "Now is not a good time" without specifying when to call back → NCV. Customer says "Now is not a good time, can you call me tomorrow at 3pm?" with agent confirmation → NCV + CAB (both). Customer says "I'm busy but go ahead" and continues talking → NOT NCV.
     
      - code: CAB
        description: |
          Callback Requested - The ACCOUNT HOLDER explicitly requests or agrees to a future outbound callback at a reasonably specific time. CAB is the MECHANISM (callback scheduled), not a state — it can co-occur with HCH (hardship state) or NCV (inconvenience state) in `list_call_code` when the callback is arranged because of those states.
          Use when: The account holder (confirmed or claimed) requests or agrees to be called back at a specific future time. A "reasonably specific" window includes "tomorrow," "Monday," "next week," "in a couple of weeks," provided the assistant acknowledges and confirms. A timeframe tied to a financial event (e.g., "call me when I get my check") is valid. CAB strictly means scheduling an OUTBOUND call from the agent to the account holder.
          Edge cases: CRITICAL PREREQUISITE — CAB only applies when the ACCOUNT HOLDER themselves requests a callback. If a THIRD PARTY (spouse, family member, roommate, unknown person) provides a callback time for reaching the account holder, classify as TPC, NOT CAB. Tie-break vs HCH/NCV: CAB = callback scheduled (mechanism); HCH = long-term hardship state; NCV = transient inconvenience state. CAB CAN co-occur with HCH or NCV — if the customer describes hardship AND a callback is arranged, include both in `list_call_code`. CAB is a mechanism, not a veto on state codes. Vs PPIF — if the customer commits to paying the full balance AND arranges a callback to provide card details, this is PPIF (primary), not CAB alone. Do NOT use CAB for vague statements like "call me later" or "whenever" where NO timeframe is established. Pre-IDV equivalent: PCAB (post-process rule handles the mapping).
          Few-shots: Account holder says "call me back in 2 weeks when I get paid," agent confirms → CAB. Customer describes long-term medical hardship AND schedules a callback → CAB + HCH (both in `list_call_code`). Third party says "She's not here, call back after 7:30" → TPC (not CAB). Customer commits to pay full balance and asks to be called at noon with card ready → PPIF (not CAB).
     
      - code: WCR
        description: |
          Written Communication Only Requested - Customer explicitly requested all future communications be in writing (mail / email / letter), with no further phone calls. WCR REQUIRES the customer to name a written channel as the preference — generic "stop calling" without a written preference is DNC, not WCR.
          Use when: Customer directs phone contact to cease AND specifies an alternative written channel (mail, email, letter, text-only, "send it in writing," "write me a letter"). Both parts must be present — the phone-stop AND the written-channel preference. This applies even when prompted by frustration with call frequency.
          Edge cases: Tie-break vs CDS/DNC (channel scope): WCR = redirect to written only (phone out, written in); DNC = stop THIS phone (written still OK, not specified); CDS = stop ALL channels (phone + written + electronic). Distinguish from CPR — WCR is a specific channel-preference demand; CPR is a general complaint about communication practice without specifying the fix. If the customer only says "stop calling" without naming a written alternative → DNC, not WCR. If the customer says "send it all in writing" without asking phone calls to stop → still WCR (the written-only demand implies phone-stop).
          Few-shots: Customer says "Don't call me, just send everything by mail" → WCR. Customer says "I only want emails, no more phone calls" → WCR. Customer says "Send me a letter, I don't want calls" → WCR. Customer says "Stop calling" with no written preference → DNC (not WCR). Customer says "Stop all contact, don't mail, don't call, nothing" → CDS (not WCR — all channels stopped).
     
      - code: CDS
        description: |
          Cease and Desist - The account holder (or someone reasonably presumed to be the account holder) has requested the complete cessation of all communication attempts regarding this account across all methods, including calls, emails, and texts.
          Use when: The caller explicitly demands cessation of ALL communication methods using phrases like "stop all communication," "cease all contact," "remove me from everything," or "cease and desist." Agent acknowledgment can be brief. This takes precedence even if the caller also requests documentation. Formal legal terminology is not required if intent is clear. The caller does not need to have completed full identity verification, but they must NOT have identified themselves as a third party or business.
          Edge cases: CRITICAL EXCLUSION — If the caller identifies as a BUSINESS or explicitly states they are NOT the account holder (e.g., "This is a business," "I'm not that person"), classify as WRN (not CDS), because the caller is not the debtor and cannot trigger account-level restrictions. CDS applies when: (1) the caller is the verified account holder, OR (2) the caller is reasonably presumed to be the account holder (e.g., they are at the account holder's number and have not denied being the account holder). Distinct from DNC (phone-only stop) and WCR (written preference).
          Few-shots: Caller at account holder's number says "Stop all communication" without completing verification → CDS. Caller who identifies as a business says "I don't wanna be contacted at all" → WRN (not CDS). Verified account holder says "Cease and desist" → CDS. Caller says "Can you take me off your call list? All communication." → CDS.
     
      - code: CPR
        description: |
          Complaint Received - Customer expressed dissatisfaction, frustration, or concern regarding their account, collection practices, communication methods, or service experience, whether stated formally or implied through behavior. This includes complaints about confusing or unhelpful notifications (SMS, email, letters), annoyance with automated systems, or dissatisfaction with how they were contacted.
          Use when: Customer is unhappy with lack of notification details, expresses annoyance with SMS/text/email content (e.g., "The text didn't say who this was," "I didn't click the link because it looked like spam"), rejects provided responses as unhelpful, repeatedly demands a live agent when unavailable, or persistently questions the assistant's inability to help. Key indicator: dissatisfaction with communication quality or practices WITHOUT disputing the debt itself.
          Edge cases: CRITICAL DISTINCTION FROM DIS — Complaints about HOW the customer was contacted (confusing texts, unclear notifications, spam-like messages) are CPR, NOT DIS. A customer calling to find out who texted them and expressing frustration about unclear communications is making a complaint about contact quality, not disputing the debt. DIS requires an explicit challenge to the debt's validity, accuracy, or legitimacy. If the customer expresses willingness to pay or asks for payment details while complaining about communication, this reinforces CPR over DIS. Also distinct from HCH: a customer who is frustrated about communications but not describing financial hardship should be CPR, not HCH.
          Few-shots: Customer says "I didn't know who was texting me, the message didn't include any details" and asks for payment address → CPR (not DIS). Customer says "I wasn't clicking links because of scams" but wants to pay → CPR. Customer repeatedly asks for a live agent and expresses frustration → CPR.
     
      - code: ATY
        description: |
          Attorney Representation - Customer stated they have retained or are seeking legal counsel, or legal representation is indicated through any signal in the conversation.
          Use when: Customer mentions "my attorney," "I'm getting a lawyer," "my attorney has contacted you," or references a POA/legal authority. Agent prompts caller for proof of POA or legal representation documentation. Multiple or repeated references to an attorney, even if brief or fragmented. Consumer indicates attorney involvement even indirectly or amidst emotional distress.
          Edge cases: ATY takes priority over ALL other codes including RTP. Fragmented speech about attorney ("her attorney," even amidst distress) still qualifies — scan the ENTIRE conversation for any mention of "attorney," "lawyer," or "legal counsel." Agent's prompt for POA is a secondary signal even if caller gives unclear response. Distinguish from LGH — ATY = specific attorney/legal counsel mentioned; LGH = general guardian without specific attorney reference. CRITICAL DISTINCTION FROM DSA — If the customer uses the word "lawyer" or "attorney" ANYWHERE in their description, classify as ATY even if they also mention debt consolidation/settlement context. "Debt consolidation LAWYER" = ATY (the word "lawyer" is the decisive signal). Only use DSA if the customer names a financial program/agency WITHOUT any mention of a lawyer or attorney.
          Few-shots: Customer says "Talk to my lawyer" → ATY. Customer says "I turned my account over to a debt consolidate lawyer" → ATY (word "lawyer" overrides "debt consolidate"). Fragmented speech "on her journey... her attorney" → ATY. Customer says "I'm working with National Debt Relief" (no mention of lawyer) → DSA (not ATY).
     
      - code: DIS
        description: |
          Debt Disputed - The customer explicitly challenged the accuracy, validity, or legitimacy of the debt itself. This includes explicitly stating the debt is not theirs, the amount is wrong, previous payments are not reflected, or asserting the debt is void, canceled, settled, or legally discharged. This code also applies if the customer challenges the creditor's right to collect or the legality of the debt transfer (e.g., "sold without consent"). DIS takes precedence over CAB if the customer disputes the debt even if a callback is scheduled.
          Use when: Customer explicitly states the debt is not theirs, the amount is wrong, previous payments are not reflected, or asserts the debt is void/canceled/settled. Also applies when customer claims not to recognize the amount or implies the balance is incorrect (e.g., "I wasn't aware it was that much"). If a customer requests to stop contact specifically because they dispute the debt (e.g., "Stop calling, I don't owe this"), classify as DIS.
          Edge cases: CRITICAL — Do NOT classify as DIS if the customer is merely complaining about HOW they were contacted (confusing texts, unclear SMS, spam-looking links). Asking for details because a notification lacked specifics is a communication complaint (CPR), NOT a dispute. A dispute must be an explicit challenge to the DEBT ITSELF — its existence, amount, validity, or legitimacy. Also do NOT classify as DIS for "sticker shock" (e.g., "Wow, that's a lot") without questioning accuracy. Do NOT apply if customer made a payment within the last 14 days. If the customer expresses willingness to pay (e.g., "I was gonna pay") while complaining about notifications, this is strong evidence AGAINST DIS — use CPR instead.
          Few-shots: Customer says "I don't owe this money" → DIS. Customer says "The text didn't say who this was for" but asks for payment address → CPR (not DIS). Customer says "I wasn't aware it was that much" → DIS.
     
      - code: FRA
        description: |
          Fraud Reported - Customer claims the account was opened fraudulently, through identity theft, or without their knowledge or consent.
          Use when: Customer explicitly alleges fraud or identity theft. Customer categorically denies the account's existence or their responsibility for creating it (even without using the word "fraud").
          Edge cases: Distinguish from DIS — FRA = customer denies they ever created/owned the account; DIS = disputes accuracy or balance of a recognized account. Categorical denial of account ownership → FRA (not DIS). Requires immediate escalation for fraud investigation.
          Few-shots: Customer says "I never opened that account, someone stole my identity" → FRA. Customer says "I have no connection to this debt whatsoever" → FRA. Customer says "The balance is wrong, I already paid some" → DIS (not FRA).
     
      - code: BKP
        description: |
          Bankruptcy Pending - Customer reported current bankruptcy proceedings or intent to file bankruptcy that would include this account.
          Use when: Customer provides specific bankruptcy details (case number, chapter, filing date) or states intent to file. Triggers immediate cessation of collection activities per automatic stay provisions.
          Edge cases: Requires verification with bankruptcy court records. Intent to file is sufficient even without specific details.
          Few-shots: Customer says "I filed Chapter 7 last month, case number 12345" → BKP. Customer says "I'm about to file for bankruptcy" → BKP.
     
      - code: PPA
        description: |
          Payment Plan Agreed - Customer agreed to a structured payment plan with specific terms (amounts, frequency, and duration) for resolving the debt. Also applies when the customer agreed to pay, the DTMF payment flow was initiated but failed, and the call ended BEFORE a transfer to a live agent was triggered.
          Use when: Customer formally accepts a structured payment arrangement with defined payment amounts and schedule. Customer mentions a payment made within the last 14 days via any channel, providing payment date and amount. Also use when the customer agreed to pay, the system initiated DTMF payment but it failed (e.g., PIN authentication failed, payment instrument retrieval failed), and the call ended/hung up before the system could trigger a transfer to a live agent. The payment was attempted but failed, and no transfer followed.
          Edge cases: Special case — customer unable to respond at the time and requests later contact → same PPA classification applies. Requires clear, focused confirmation of payment terms — casual "yeah" or "okay" as filler while distracted does NOT qualify. CRITICAL DISTINCTION — PPA applies when DTMF payment failed AND call ended before transfer was triggered. If transfer WAS triggered → use TSR (connected) or WFR (busy) instead. If DTMF failed and no transfer and no hang-up → use FTP.
          Few-shots: Customer agrees to $50/month for 6 months and gets transferred to payment → PPA. Customer says "I already paid $100 last week via check" with details → PPA. Customer agrees to pay full $500, enters DTMF, PIN fails, call hangs up before transfer is triggered → PPA (not PPIF, not FTP). Customer says "yeah, sure" while talking about unrelated topics → NOT PPA.
     
      - code: SIF
        description: |
          Settled in Full - Customer agreed to a discounted settlement offer AND successfully paid the settlement amount via DTMF during the call, fully resolving the account. SIF requires BOTH the settlement agreement AND successful in-call payment completion.
          Use when: Customer accepts a discounted settlement offer AND the DTMF payment for that settlement amount completes successfully within the call. Account is resolved at the reduced amount.
          Edge cases: Tie-break vs PSIF — PSIF = settlement agreed but payment pending/scheduled; SIF = settlement agreed AND payment completed in-call. If DTMF payment was attempted but failed, use FTP (post-process) or PSIF if the commitment remains. Tie-break vs PAY — PAY = any successful in-call payment (full balance or otherwise); SIF = specifically settlement-amount payment that resolves the account. If the payment covers the FULL original balance via DTMF with no settlement discount, use PAY, not SIF.
          Few-shots: Customer agrees to $248 settlement on a $352 balance, enters DTMF, payment posts successfully → SIF. Customer agrees to settle at $300, enters DTMF, PIN fails → PSIF (not SIF — payment did not complete). Customer pays the full $352 via DTMF with no settlement → PAY (not SIF — no settlement discount).
     
      - code: RTP
        description: |
          Refusal to Pay - Customer explicitly and unambiguously refused to make any payment on the account ONLY after the creditor presented the balance AND made MULTIPLE attempts to negotiate payment options. RTP requires: (1) identity verification was completed, (2) the balance was presented, (3) the creditor offered multiple payment plans or settlement options, and (4) the customer explicitly rejected ALL of them or stated they will not pay any amount.
          Use when: Customer uses explicit refusal language such as "I can't pay anything," "None," "I'm not paying," "It's not possible," "I refuse to pay," or "I will never pay." RTP requires an unambiguous statement of intent NOT to pay — not merely saying "No" to specific offered amounts. Simply declining offered payment amounts without explicit refusal language is NNP, not RTP. The customer must have been given a genuine opportunity to negotiate before RTP applies.
          Edge cases: CRITICAL — Declining to share personal circumstances or explain default reasons is NOT RTP (use IDV). Profanity or hostility alone does NOT automatically qualify as RTP — the customer must have explicitly refused to pay or been given multiple payment options which they all rejected. Random profanity, frustration, or incoherent hostile outbursts (e.g., "don't fuck yourself") WITHOUT an explicit statement refusing payment is NOT RTP. If the conversation never reached the payment negotiation stage (i.e., no specific payment amounts were offered and rejected), profanity alone should be classified as IDV (if verified) or the appropriate pre-negotiation code. RTP requires the conversation to have progressed to active financial negotiation where specific payment options were presented and explicitly refused. A customer who becomes hostile or disengaged before any payment discussion occurs should NOT be classified as RTP.
          Few-shots: Customer rejects $66/month, then rejects $50/month, then says "I'm not paying anything" → RTP. Customer says "No" to sharing circumstances but no payment options were discussed yet → IDV. Customer uses profanity and disconnects before any payment offer → IDV (not RTP). Customer becomes extremely hostile, uses profanity, AND explicitly says "I'm not paying" or "None" when offered payment amounts → RTP (not CPR — the explicit payment refusal takes precedence over the hostility/complaint aspect).
     
      - code: CSM
        description: |
          SCRA Coverage Reported - Customer verified active military service status invoking Servicemembers Civil Relief Act protections.
          Use when: Customer provides details about military service (branch, status, anticipated service period) invoking SCRA protections. SCRA protections include interest rate caps, foreclosure prevention, and other accommodations that must be immediately applied.
          Edge cases: N/A
          Few-shots: Customer says "I'm active duty military, you need to apply SCRA protections" → CSM. Customer says "I'm deployed overseas with the Army" → CSM.
     
      - code: PRS
        description: |
          In Prison - Customer or third party confirmed that the account holder is CURRENTLY incarcerated in a correctional facility.
          Use when: Incarceration in a correctional facility is confirmed as a CURRENT, ongoing status. Specific facility name or release date not required.
          Edge cases: PRS takes precedence over financial codes if both are mentioned. CRITICAL — PRS requires CURRENT incarceration. Past-tense references to arrest or jail (e.g., "I got arrested" as an explanation for default circumstances) do NOT qualify if the customer is clearly not currently incarcerated (e.g., they are on the phone freely discussing the account). Use the surrounding context to determine if the arrest is current or historical.
          Few-shots: Customer says "I'm currently in jail" → PRS. Third party says "He's incarcerated at the county jail right now" → PRS. Customer says "I got arrested" as an explanation for why they defaulted, but is freely conversing on the phone → NOT PRS (use IDV or appropriate code based on conversation outcome).
     
      - code: LGH
        description: |
          Legal Guardian Handling - A legally authorized guardian is managing the account holder's affairs due to the account holder's incapacity or death.
          Use when: Guardian provides verifiable information about their legal relationship and authority to discuss the account. Third party presents power of attorney (POA) or demonstrates legal authority over the account. Communication must be directed exclusively to this authorized representative.
          Edge cases: Distinguish from ATY — use LGH for general guardian/POA scenarios; use ATY when a specific attorney or legal counsel is mentioned. Distinguish from TPC — LGH requires demonstrated legal authority (guardian, POA); TPC is any third party providing info without legal standing.
          Few-shots: Third party calls with power of attorney, negotiates settlement on account holder's behalf → LGH. "She's deceased... her daughter has financial power of attorney" → LGH. Agent confirms caller has power of attorney over incapacitated account holder → LGH.
     
      - code: PSIF
        description: |
          Promise to Settle in Full - Customer agreed to a discounted settlement offer that will fully resolve the account for less than the original outstanding balance.
          Use when: Customer accepts a reduced settlement amount with a specific payment timeline that fully settles the account. No further payments are required after the agreed discounted amount is paid.
          Edge cases: Distinguish from PPIF — PSIF = reduced/discounted amount; PPIF = 100% original balance. Full settlement must be confirmed — account fully resolved with no remaining balance.
          Few-shots: Customer agrees to pay $248 instead of $352.90 full balance to settle → PSIF. Customer agrees to pay full $352.90 → PPIF (not PSIF).
      

     
      - code: HCH
        description: |
          Hardship Concern - Customer describes a LONG-TERM, substantive hardship that materially limits ability to pay — permanent or long-duration job loss, long-term disability, ongoing serious medical condition, homelessness, or chronic financial inability. HCH is a STATE code describing the customer's situation, not an outcome override. HCH may co-occur with CAB (callback scheduled because of hardship) or PPA (payment plan structured around the hardship) in `list_call_code`.
          Use when: Customer substantively discusses a long-term hardship — not a passing mention. The hardship must be (1) long-term or open-ended in duration, and (2) described with enough context that a reviewer can identify the specific hardship (unemployment duration, medical condition, etc.). Short passing phrases without elaboration do not qualify.
          Edge cases: SHORT-TERM ≠ HCH. "I'm broke right now," "I can't pay today," "I don't have a credit card with me" are situational difficulties without long-term context — do NOT include HCH. A brief mention of difficulty (e.g., "facing difficulties," "got arrested," "family issues") without substantive discussion → use IDV (if verified), not HCH. Tie-break vs CAB/NCV: CAB = callback scheduled (mechanism); NCV = transient inconvenience (no callback); HCH = long-term hardship state. CAB and HCH CAN co-exist — if the customer describes real hardship AND a callback is arranged, include both in `list_call_code`. Tie-break vs RTP: HCH describes inability; RTP describes unwillingness after multiple payment offers.
          Few-shots: Customer describes permanent disability, no income, no foreseeable recovery → HCH (may also include CAB if callback is set). Customer says "I lost my job six months ago and still haven't found work, I'm trying but can't afford payments" → HCH. Customer says "I'm broke currently" without elaborating on duration or cause → NOT HCH (short-term situational). Customer mentions "got arrested" briefly while freely conversing → NOT HCH (use IDV). Customer describes chronic illness and agrees to a callback in 2 weeks → HCH + CAB (both).
     
      - code: HUA
        description: |
          Hang Up During Authentication - Customer confirmed their name but the call ENDED (hung up, disconnected, went silent) during the ID verification process. The verification was never completed — the call was cut short.
          Use when: Customer confirmed their name but the call ended during verification — customer hung up, went silent (multiple SILENCE markers), line dropped, or call timed out. The customer did NOT provide any DOB/SSN data and did NOT actively refuse — the call simply ended. Also applies when customer asks context questions ("Who is this?", "What's this about?") but the call ends before any verification data is exchanged.
          Edge cases: Key distinction from IDF — If the customer says "No" to the DOB on file (data mismatch) or actively says "Nope," "I refuse" while still engaging → IDF (not HUA). HUA is for calls that ENDED during auth without data being checked. If the customer asks "Who is this?" then goes silent → HUA (call ended, no verification data). If the customer says "I don't know" to DOB and the call continues → IDF (refusal while engaged). If the customer says "I don't know" and immediately hangs up → HUA (call ended).
          Few-shots: Customer confirms name, agent asks for DOB, customer goes silent → call ends → HUA. Customer confirms name, asks "Who is this? What's this about?" → call ends → HUA. Customer confirms name, DOB question asked, customer says "What's this concerning?" then silence → HUA. Customer confirms name, says "I don't know it" to DOB and call ends → HUA (call ended, no data checked). Customer says "No" to DOB on file → IDF (not HUA — data mismatch). Customer says "Nope" repeatedly while still on line → IDF (not HUA — active refusal). Call truncated right after DOB question is asked, before customer responds → HUA (not IDV — verification was never completed).
     
      - code: HUP
        description: |
          Hang Up - Call ends or is effectively abandoned before any meaningful two-way conversation occurs and before any identity or account information is verified. This includes cases where the agent only delivers the opening, the customer says nothing further, the line goes silent, the customer disconnects immediately, or the customer gives only a cryptic, random, or irrelevant phrase (e.g., random nouns, a business name like "Orange Wagon" or "Joe's Pizza") without clearly expressing intent to engage or continue the conversation. CRITICAL: A customer answering with what sounds like a business name (e.g., "Orange Wagon") is NOT the same as the customer explicitly stating "this is a business" or "you have the wrong number." Answering with a business-sounding phrase alone — without the caller explicitly confirming they are NOT the intended person — does NOT qualify as WRN. Use HUP. WRN requires the caller to EXPLICITLY state it is a wrong number or that they are a business, not merely answer with a phrase that could be a business name.
          Use when: The interaction never progresses beyond the initial contact attempt and the customer's response does not confirm their identity or a clear intent to continue the conversation. A single unrelated, cryptic, or nonsensical phrase does not qualify as engagement unless the customer provides further input indicating an intent to engage, continue, or clarify their response.
          Edge cases: Distinguish from NVR — If the agent asks "Is this [Name]?" and the customer engages in a SUBSTANTIVE back-and-forth exchange (asking questions, demanding context, showing hostility) without confirming identity, use NVR. If the customer provides only a brief response ("Hello?") and the call ends quickly without real engagement, use HUP. The key question: was there a meaningful exchange after the name question, or did the call just die? Do NOT use HUP if voicemail is reached (use NLM/LM), if the person explicitly refuses name or ID verification after substantive engagement (use NVR/HUA), if identity was confirmed and the call dropped during authentication (use HUA), or if the person clearly states they are the wrong party (use WRN). WRN requires EXPLICIT confirmation of wrong number. Simply answering with a business name or unrelated phrase without explicitly stating it is a wrong number does NOT qualify as WRN — use HUP instead.
          Few-shots: Customer says "Orange Wagon" then call ends → HUP (not WRN) — answering with a business-sounding name without explicitly saying "this is a business" or "wrong number" is HUP. Customer answers, says nothing, line goes silent → HUP. Customer says "Hello?" then immediately disconnects → HUP. Even if reflection variable says response=business, if the caller never EXPLICITLY said "this is a business" or "wrong number," classify as HUP.
     
      - code: NNP
        description: |
          Negotiated No Payment - Customer passed identity verification, at least one specific payment option was offered by the agent, customer clearly declined the offered option(s) without using explicit refusal language, expressed no hardship or dispute, and the call ended without a payment commitment.
          Use when: ALL of the following must be true: (1) Customer verified identity successfully, (2) the agent offered at least one specific payment amount or plan, (3) customer clearly declined or said "No" to the offered amount(s), (4) customer did NOT use explicit refusal language (e.g., "I won't pay," "I refuse to pay," "I will never pay"), (5) no hardship or financial difficulty was expressed, (6) no dispute was raised about the debt, and (7) the call ended with no payment arrangement.
          Edge cases: CRITICAL DISTINCTION FROM IDV — If the customer gave non-committal responses ("possibly," "maybe," "I'm not sure," "I'll think about it") without clearly declining, use IDV (not NNP). If the customer declined to share personal circumstances or explain default reasons but no specific payment amounts were offered and declined, use IDV (not NNP). CRITICAL — NNP requires the customer's explicit decline to be PRESENT AND VISIBLE in the conversation. If the conversation ends after a payment offer with no customer response shown, the customer did NOT decline — use IDV (not NNP). Do NOT infer a decline from a truncated or incomplete conversation. NNP requires a CLEAR DECLINE of at least one specific offer — vague, ambiguous, non-committal responses, or absent responses do NOT qualify. CRITICAL DISTINCTION FROM RTP — RTP requires explicit, unambiguous refusal language ("I refuse," "I won't pay," "I will never pay"). Simply saying "No" to offered amounts is NNP, not RTP. CRITICAL DISTINCTION FROM HCH — If the customer mentions any hardship language (job loss, medical issues, financial difficulty, inability to afford), classify as HCH, not NNP. CRITICAL DISTINCTION FROM DIS — If the customer challenges the debt's validity, existence, or amount, classify as DIS, not NNP. If mixed signals appear (hardship AND refusal together), assign HCH.
          Few-shots: Agent offers $76/month, customer says "No," agent offers $61/month, customer deflects and call ends with no commitment → NNP. Agent offers $66/month, customer clearly says "No" to that offer and call ends → NNP (customer explicitly responded to the payment offer). Customer declines all payment options saying "I just can't do those amounts right now" with no hardship or refusal language → NNP. Customer verified, declines to share circumstances of default, no payment amounts offered → IDV (not NNP — no payment negotiation occurred). Customer says "Possibly" or "Maybe" to a payment offer without declining → IDV (not NNP — non-committal is not a decline). Customer verified, payment amount mentioned but conversation ends before customer clearly declines → IDV (not NNP — no clear decline visible). Agent asks about default circumstances, customer says "No" (declining to share circumstances), agent then offers monthly payment amount, conversation ends with no further customer response → IDV (not NNP — the "No" was about sharing circumstances, not a response to the payment offer; no customer response to the offer is shown). Customer says "I refuse to pay this" → RTP (not NNP — explicit refusal). Customer says "I lost my job, I can't pay" → HCH (not NNP — hardship language present).
     
      - code: DSA
        description: |
          Debt Settlement Agreement - Customer indicates they are working with a third-party debt settlement, consolidation, or relief program to manage their debt.
          Use when: Customer explicitly or implicitly directs agent to contact a named debt relief/settlement program (Beyond Finance, National Debt Relief, Debt Solutions, etc.). Customer states "a company is handling that for me" or "check with my debt negotiator." Consumer or representative claims they are working with a program for debt/credit settlement, consolidation, relief, management, or financial solutions.
          Edge cases: Distinguish from ATY — DSA = financial relief/settlement program; ATY = law office or attorney. If third party is not explicitly identified as a law office, assume it is a debt settlement service. Directing agent to contact a named debt relief agency is sufficient signal regardless of explicit confirmation. Do not let identity verification attempts or other conversational elements distract from settlement agency signals. Do not let the assistant's mention of "attorney" trigger ATY if the consumer only identifies a financial program.
          Few-shots: Customer says "You need to call National Debt Relief, they're handling my account" → DSA. Customer says "A company is managing my debts" → DSA. Customer says "Talk to my lawyer about this" → ATY (not DSA).
     
      - code: DNC
        description: |
          Do Not Call - The caller (NOT a business or clearly wrong number) has requested to stop calls to THIS phone number. DNC is a PHONE-level flag; it suppresses further calls to this number without suppressing written channels or account-level activity. Identity verification is NOT required.
          Use when: Caller says "stop calling," "don't call this number," "put me on your do not call list." Formal or informal/frustrated language qualifies equally. DNC applies even if the caller refuses to confirm their name — the explicit demand to stop phone calls is the primary signal.
          Edge cases: DNC is phone-level and CAN co-occur with post-IDV outcomes in `list_call_code`. If the customer makes a payment commitment (PPA/PPIF) and also says "don't call me again," include DNC alongside the financial outcome — the phone-stop and the payment arrangement are independent facts. DNC overrides NVR and HUA when the caller explicitly demands to stop calls — the phone-stop is the terminal disposition, not "hung up / refused name." Tie-break vs CDS/WCR (channel scope): DNC = stop THIS phone; CDS = stop ALL channels (phone + written + electronic); WCR = redirect phone contact to written only. EXCEPTION: If the caller identifies as a BUSINESS or explicitly denies being the account holder AND says the person doesn't live there (e.g., "There's no [Name] here, stop calling"), classify as WRN — the number is simply wrong. DNC requires the caller to COULD be the account holder (didn't deny it).
          Few-shots: Caller says "Don't call this damn phone again" without confirming name → DNC. Caller agrees to a $50/month plan AND says "but stop calling me about this" → primary PPA + DNC in `list_call_code`. Caller says "This is a business, take my number off the list" → WRN (not DNC). Caller says "There's no Robin here, stop calling" → WRN (not DNC — wrong number). Caller says "Stop calling" then "Do not contact" then agrees to stop ALL communication channels → CDS (not DNC — escalated to all channels).
     
      - code: PPIF
        description: |
          Promise to Pay in Full - Customer verbally committed to paying 100% of the full outstanding balance in a single payment, with no discounts or settlement reductions. IMPORTANT: Do NOT use PPIF if the call ends with a transfer to a live agent — when a transfer occurs after a payment failure, the final disposition is TSR, not PPIF.
          Use when: Customer confirms the full amount due and agrees to a specific payment date or time (e.g., "I'll take care of it later today," "Call me back at noon to get my card"). Use even if a callback is required to collect payment details or finalize the transaction. PPIF requires that NO transfer to a live agent occurs after the payment commitment.
          Edge cases: CRITICAL — Do NOT classify as CAB when a clear commitment to pay full balance is made. If the customer commits to paying the full balance AND arranges a callback to provide card details, this is ALWAYS PPIF, never CAB. The payment commitment takes precedence over the callback arrangement. Distinguish from PSIF — PPIF = 100% original balance; PSIF = discounted/reduced settlement amount. TRANSFER EXCEPTION — If the customer agreed to pay BUT the system fails to process payment (e.g., "The system can not retrieve your payment information") AND the AI agent then transfers to a live agent ("Let me connect you with a live agent"), classify as TSR, NOT PPIF. The transfer overrides the payment commitment. Distinguish from PPA — if the DTMF payment flow was initiated but failed, and the call ended before a transfer to a live agent was triggered, classify as PPA (not PPIF).
          Few-shots: Customer says "I'll pay the full $393.92 tomorrow" → PPIF. Customer says "Call me back at noon, I'll have my card ready to pay it all" → PPIF (not CAB). Customer agrees to pay $248 settlement instead of $352 full balance → PSIF (not PPIF). Customer agrees to pay full $2112.50, provides PIN 123456, system fails to retrieve payment info, agent says "Let me connect you with a live agent" → TSR (NOT PPIF — transfer overrides payment commitment). Customer enters DTMF payment flow, payment fails, call hangs up before transfer is triggered → PPA (not PPIF).
    # Special group call codes that apply codition mapping to detect (lower order is higher priority)
    postprocess_conditions:
      - code: HUA # 12 
        description: Fallback logic for IDV call code
        condition: '{{ call_code == "IDV" }} and {{ "negotiation_from_script" not in list_current_state }}'
      - code: IDV # 40
        description: Fallback logic for IDF, NVR, HUA
        condition: '{{ call_code in ["IDF", "NVR", "HUA"] }} and {{ "negotiation_from_script" in list_current_state }}'
      - code: PTSR # 5
        description: Customer does not pass RPC and call transfer successfully triggered - transferred
        condition: '{{ call_code == "TSR" }} and {{ "negotiation_from_script" not in list_current_state }}'
      - code: PNCV # 4
        description: pre-RPC, not convenient
        condition: '{{ call_code == "NCV" }} and {{ "negotiation_from_script" not in list_current_state }}'
      - code: PCAB # 6
        description: pre-RPC, call back
        condition: '{{ call_code == "CAB" }} and {{ "negotiation_from_script" not in list_current_state }}'
      - code: PAY # 21
        description: Payment plan setup successfully, intent to pay
        condition: '{{ call_code in ["PPA", "PSIF"] }} and {{ "payment_method_warm_transfer" in list_current_state }}'
      - code: WFR # 7
        description: Wait for representative
        condition: "{{ dict_variable.rpc == 'cus' }} and '{{ dict_variable.warm_transfer_sent }}' == 'yes' and '{{ dict_variable.transfer_result }}' != 'connected' "
      - code: PWFR # 3
        description: pre-RPC wait for representative
        condition: "{{ dict_variable.rpc not in ['wrong_number', 'not'] }} and '{{call_code}}' != 'WRN' and '{{ dict_variable.warm_transfer_sent }}' == 'yes' and '{{ dict_variable.transfer_result }}' != 'connected' and {{ 'negotiation_from_script' not in list_current_state }} "
      - code: FTP # 14
        description: Fail to pay via DTMF, but not transfer to Human agent or
        condition: >-
          (
            ('{{dict_variable.payment_init}}' == 'True' and '{{dict_variable.payment_result}}' != 'success') or
            ('{{dict_variable.payment_init}}' != 'True' and '{{dict_variable.first_payment_amount}}' not in ['', 'unknown'])
          ) and
          '{{ dict_variable.transfer_result }}' != 'connected'

  # Extra info extraction agent
  extract_info_agent_configs:
    usecase_id: en_collin_kompato_extract_info_agent
    model_configs:
      model: gemini-3-flash

    prompts:
      prompt_summary_conversation: |
        You are an expert at summarizing debt collection conversations. Given a conversation transcript, create a concise summary that captures the key points.

        # Instructions
        - Summarize the main outcome of the call (2-3 sentences)
        - Include customer's response to the debt collection attempt
        - Mention any commitments, disputes, or next actions
        - Keep it factual and objective
        - Do not include sensitive information like full SSN or account numbers

        # Conversation Transcript
        ```
        {{conversation_transcript}}
        ```

        # Response Format
        Return ONLY the summary text without any tags or formatting.

      prompt_detect_dispute_info: |
        # Objective
        You are a reviewer agent in the finance and banking sector.
        You will receive a transcript of a phone call related to debt collection and recovery, located in the section PHONE_CALL_TRANSCRIPT.
        The transcript records the conversation of 2 roles: the debt collector (assistant) and the customer (user).

        Your task is to analyze this transcript, detect if any dispute being addressed in the transcript, classify and generate a concise dispute_reason summarizing the customer's specific claim.

        # DISPUTE_CATEGORIES
        - `dispute_balance`: if _user has dispute about the balance of the debt, the charges (for example 'We agreed to a $500 discount but the portal is still showing the original amount', 'The creditor promised me I would not need to pay late fees', 'This balance is too high because…', 'I was charged for this account, but I never received the item', 'I refunded this charge, but it still showed up on my account'); and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
        - `dispute_paid`: if _user has dispute that they already paid the debt (for example 'I paid the full amount via bank transfer six months ago. Can you confirm this on your end?', 'I settled this debt last year with a check. Why is it still showing as unpaid?', 'I made a payment directly to the creditor last year. This should be updated in your records.', 'I have already paid off this debt through your online portal. Can you verify the payment?', 'I cleared this balance with a credit card payment last 2 years. Please check and confirm it has been received'); and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
        - `dispute_theft`: if _user explicitly informs us that they are a victim of identity theft (e.g. "I received a notification about a debt in my name that I never incurred.", "I found out someone used my identity to open an account.", "This debt is not mine; I suspect my identity has been stolen.", "I noticed unfamiliar charges under my name that I never authorized.", "I believe my personal information was used fraudulently to create this debt.").; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
        - `dispute_txn_fraud`: if _user explicitly informs us that they are a victim of transaction fraud, where someone has unauthorized access to their account information and makes purchases without their consent. Examples include statements like "I noticed purchases on my account that I did not authorize.", "My account was charged for items I did not buy.", "I received a notification about a transaction I never made.", "There are unfamiliar transactions on my statement that I did not initiate.", "Someone used my account information to make unauthorized purchases."; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.
        - `dispute_merchant`: if _user explicitly informs us that they are experiencing issues with a merchant, such as non-delivery of goods, receipt of defective products, or being charged incorrect amounts. Fraudulent merchants may continue billing for canceled subscriptions, refuse refunds, or use misleading advertising to lure purchases .Examples include statements like "I didn't receive the item I paid for.", "The product arrived damaged.", "I was charged twice for the same purchase.", "The merchant refused to issue a refund for the returned item.", "I canceled my subscription, but the charges continue."; and in the latest turns of the conversation has not confirmed that the dispute is now resolved or they have chosen to ignore it for now.

        # PHONE_CALL_TRANSCRIPT
        ```
        {{conversation_transcript}}
        ```

        # Instructions
        1. Read the transcript carefully.
        2. Classify the dispute into one of DISPUTE_CATEGORIES
        3. Detect the dispute reason that user implied or explicitly stated in the conversation. The reason is a short, neutral summary (1-2 sentences) that captures the core of the customer's claim and must clearly explain why the customer believes the debt is incorrect.

        # Response Format
        Return ONLY the dispute_label and dispute_reason in JSON format.
        {
          "dispute_label": "The category of the dispute, one of the following: dispute_balance, dispute_paid, dispute_theft, dispute_txn_fraud, dispute_merchant",
          "dispute_reason": "The reason for the dispute, if no dispute reason is detected return None"
        }

      prompt_detect_callback_info: |
        # Objective
        You are a date and time parsing assistant. Your task is to:
        1. Convert natural language expressions of time into a structured date and time format
        2. Detect if the customer specifically requested a human callback

        # Input Information
        - Full conversation transcript:
        ```
        {{conversation_transcript}}
        ```

        - Current call date (reference date): {{dict_variable.call_date}} which is {{dict_variable.ssml_call_date}}
        - Current day of the week: {{dict_variable.day_of_week}}

        # Instructions
          1. Interpret the raw callback time expression relative to the original call date.
          2. Identify if the callback should be:
              - Later the same day (e.g., "later today", "this afternoon", "in a few hours")
              - Next day (e.g., "tomorrow", "tomorrow morning")
              - A specific future date (e.g., "next Monday", "on the 15th")
              - At a specific time (e.g., "9 AM", "at 3 PM", "afternoon")
              - If user mentioned "Anytime" and have not provided specific day and time --> extract call back date as tommorrow 9AM

          3. Return a call back day in format (YYYY-MM-DD) if not available, return "unknown".
          4. Return a call back time in format (HH:MM) if not available, return "unknown".
          5. Analyze if the customer specifically requested a human callback. Look for phrases like:
              - "I want to speak to a real person"
              - "Can a human call me back"
              - "I need to talk to an actual person"
              - "No bots/robots/AI"
              Return "true" if human callback requested, "false" if not, "unknown" if not clear.

        # Response Format
        Return ONLY the callback information in JSON format.
        {
          "callback_day": "The callback date in YYYY-MM-DD format, or 'unknown' if not available",
          "callback_time": "The callback time in HH:MM format, or 'unknown' if not available",
          "human_callback_requested": "true if human callback was specifically requested, false if not, unknown if unclear"
        }

      # Prompt to detect payment plan
      prompt_detect_payment_plan: |
        ## Context
        You are provided with a conversation between a consumer and bank agent, located in the section Conversation transcript.
        Your goal is to output a Python dictionary containing all payment plan details discussed in the transcript, using the provided current balance and (if available) settlement amount.

        ## FIELD DEFINITIONS

        - **1st_amount:**
            The amount of the first payment in USD, which amount the user agrees to pay initial, if the user does not agree to pay and/or does not mention an amount, return 'unknown'
            Example: "100.0"

        - **1st_date:**
            The clearly stated date (YYYY-MM-DD) for the first payment. If the first payment date is not mentioned, return 'unknown'. Do not guess, infer, or fabricate the date. First payment date should be in calling date or in the future.
            Example: "2025-03-25"

        - **2nd_amount:**
            The amount of the second payment in USD after the first payment, if the user does not agree to pay and/or does not mention an amount, .
            If installments, return the amount of the first installment. In case of full payment, return 0.0
            Example: "0.0"

        - **2nd_date:**
            The clearly stated date (YYYY-MM-DD) for the second payment after the first payment. If there is no second payment (e.g., only a single, one-off payment is scheduled), return 'unknown'. Second payment date should be in the future.
            Example: "2025-03-25"

        - **n_installments:**
            The number of installments in the payment plan
            Example: 12

        - **payment_plan_total:**
            This represents the total payment amount, which should be equal to or less than the {total_charge_amount} and must accurately reflect the user's agreed total amount. Make sure the total of all payment amounts does not surpass the {total_charge_amount} and matches the user's agreed terms.
            (do math if necessary, Total debt outstanding balance is {total_charge_amount})
        ---

        ## INSTRUCTIONS
        - If the customer does not clearly promise a payment date but agree to pay before a certain date, return that date for first date paying
        - If the customer does not clearly state a payment date and no date was agreed upon, always return 'unknown' for first_payment_date, regardless of payment plan offered.
        - If the customer specifies a recurring payment day (e.g., "the twenty"), calculate the first occurrence of that day that is AFTER the call date (not on or before **only if a specific day was agreed upon.**.
            - If the specified day of the month is **greater than** the call date's day, use that day in the current month.
            - If the specified day of the month is **less than or equal** to the call date's day, use that day in the **next month**.
            - The first payment date must **never** be before the call date.
        - If the information is unclear or ambiguous, output None.
        - Do not include explanations.
        - **Override any mentioned delay: Ensure the first payment date is within 30 days of the calling date.**
        - If the user mentions both a potential delay and a specific day of the month and that date is before the calling date, always choose the specific date in NEXT MONTH (the next specific day after the calling date).
        - If the user requests recurring monthly payments on a specific day of the month and the start date is ambiguous, always use the next occurrence of that day after the calling date.
        - If the first payment date is before the calling date, use the same day in the next month **only if a specific day was agreed upon.**
        ---

        ### Provided total charge amount
        {total_charge_amount}

        ### Calling date
        {call_date}

        ### Conversation transcript
        {conversation_transcript}

      prompt_detect_id_verify_info: |
        # Objective
